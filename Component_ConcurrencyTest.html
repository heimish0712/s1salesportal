<style>
.concurrency-test-section-p240 { max-width: 1180px; }
.concurrency-wrap-p240 { display:flex; flex-direction:column; gap:14px; }
.concurrency-head-p240 { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; padding:16px; border:1px solid #d7dde8; border-radius:16px; background:#fff; }
.concurrency-title-p240 { font-size:18px; font-weight:800; color:#172033; }
.concurrency-sub-p240 { margin-top:4px; font-size:12px; color:#667085; line-height:1.5; }
.concurrency-actions-p240 { display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
.concurrency-grid-p240 { display:grid; grid-template-columns: 1.1fr .9fr; gap:14px; }
.concurrency-card-p240 { border:1px solid #d7dde8; border-radius:16px; background:#fff; padding:16px; }
.concurrency-card-title-p240 { font-size:15px; font-weight:800; margin-bottom:8px; color:#1d2939; }
.concurrency-form-p240 { display:grid; grid-template-columns: 140px 1fr; gap:10px; align-items:center; }
.concurrency-form-p240 label { font-size:12px; font-weight:700; color:#475467; }
.concurrency-form-p240 input, .concurrency-form-p240 select { width:100%; min-height:34px; border:1px solid #cfd6e4; border-radius:10px; padding:7px 10px; font-size:13px; box-sizing:border-box; }
.concurrency-scenario-buttons-p240 { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
.concurrency-note-p240 { padding:10px 12px; border-radius:12px; background:#fff8e6; border:1px solid #f1d08a; color:#7a4b00; font-size:12px; line-height:1.55; }
.concurrency-danger-note-p240 { padding:10px 12px; border-radius:12px; background:#fff1f0; border:1px solid #ffb8b0; color:#9f1c12; font-size:12px; line-height:1.55; margin-top:10px; }
.concurrency-progress-p240 { min-height:10px; height:10px; background:#edf1f7; border-radius:999px; overflow:hidden; margin:10px 0 4px; }
.concurrency-progress-bar-p240 { height:100%; width:0%; background:#246bfe; transition:width .15s ease; }
.concurrency-result-summary-p240 { display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:8px; margin-top:12px; }
.concurrency-metric-p240 { border:1px solid #e3e8f2; border-radius:12px; padding:10px; background:#fafbff; }
.concurrency-metric-p240 span { display:block; font-size:11px; color:#667085; }
.concurrency-metric-p240 strong { display:block; margin-top:3px; font-size:18px; color:#101828; }
.concurrency-log-table-p240 { width:100%; border-collapse:collapse; font-size:12px; }
.concurrency-log-table-p240 th, .concurrency-log-table-p240 td { padding:7px 8px; border-bottom:1px solid #edf1f7; text-align:left; vertical-align:top; }
.concurrency-log-table-p240 th { background:#f8fafc; color:#475467; font-weight:800; }
.concurrency-status-p240 { display:inline-flex; align-items:center; border-radius:999px; padding:2px 8px; font-size:11px; font-weight:800; }
.concurrency-status-p240.ok { background:#e8f7ee; color:#027a48; }
.concurrency-status-p240.fail { background:#fff1f0; color:#b42318; }
.concurrency-status-p240.info { background:#eef4ff; color:#175cd3; }
.concurrency-small-p240 { color:#667085; font-size:12px; line-height:1.5; }
.concurrency-json-p240 { max-height:220px; overflow:auto; background:#101828; color:#f2f4f7; padding:10px; border-radius:12px; font-size:11px; white-space:pre-wrap; }
.concurrency-denied-p240 { padding:18px; border:1px solid #ffd0cc; background:#fff5f4; color:#9f1c12; border-radius:14px; }
@media (max-width: 960px) { .concurrency-grid-p240 { grid-template-columns:1fr; } .concurrency-result-summary-p240 { grid-template-columns:repeat(2, minmax(0,1fr)); } }
</style>
<script>
let concurrencyInitP240_ = null;
let concurrencyRunningP240_ = false;
let concurrencyLastRunP240_ = null;

function loadConcurrencyTestPageP240(force) {
  const area = document.getElementById('concurrencyTestAreaP240');
  if (!area) return;
  const p = typeof getPortalPermission_ === 'function' ? getPortalPermission_() : null;
  if (!(p && p.canUseAdminHome)) {
    area.innerHTML = '<div class="concurrency-denied-p240">동시성 테스트는 관리자/서무 권한에서만 사용할 수 있습니다.</div>';
    return;
  }
  if (concurrencyInitP240_ && !force) {
    renderConcurrencyTestPageP240_(concurrencyInitP240_);
    return;
  }
  area.innerHTML = '<div class="loading">동시성 테스트 패널을 불러오는 중입니다...</div>';
  google.script.run
    .withSuccessHandler(function(res) {
      concurrencyInitP240_ = res || {};
      renderConcurrencyTestPageP240_(concurrencyInitP240_);
    })
    .withFailureHandler(function(err) {
      area.innerHTML = '<div class="concurrency-denied-p240">동시성 테스트 패널을 불러오지 못했습니다.<br>' + escapeHtml_(getConcurrencyErrorP240_(err)) + '</div>';
    })
    .getPortalConcurrencyTestInitP240();
}

function renderConcurrencyTestPageP240_(init) {
  const area = document.getElementById('concurrencyTestAreaP240');
  if (!area) return;
  init = init || {};
  const maxCount = Number(init.maxCount) || 20;
  const recentRows = Array.isArray(init.recentLogs) ? init.recentLogs : [];
  let html = '';
  html += '<div class="concurrency-wrap-p240">';
  html += '<div class="concurrency-head-p240">';
  html += '<div><div class="concurrency-title-p240">관리자 전용 동시성 테스트</div>';
  html += '<div class="concurrency-sub-p240">여러 개의 google.script.run 요청을 동시에 발사해 Lock, 저장 충돌, 테스트 데이터 정리를 확인합니다. 실제 메일 발송은 하지 않습니다.</div></div>';
  html += '<div class="concurrency-actions-p240"><button class="secondary" onclick="loadConcurrencyTestPageP240(true)">새로고침</button><button class="secondary" onclick="cleanupLastConcurrencyRunP240_()">마지막 실행ID 정리</button></div>';
  html += '</div>';

  html += '<div class="concurrency-grid-p240">';
  html += '<div class="concurrency-card-p240">';
  html += '<div class="concurrency-card-title-p240">테스트 설정</div>';
  html += '<div class="concurrency-form-p240">';
  html += '<label>동시 요청 수</label><input id="concCountP240" type="number" min="1" max="' + maxCount + '" value="10">';
  html += '<label>랜덤 지연(ms)</label><input id="concJitterP240" type="number" min="0" max="1500" value="150" title="각 요청 시작 전에 0~입력값 ms 랜덤 지연을 줍니다.">';
  html += '<label>오늘할일 날짜</label><input id="concTodayDateP240" type="date" value="' + escapeHtml_(getTodayIsoDateP240_()) + '">';
  html += '<label>고객 메모 rowNo</label><input id="concCustomerRowNoP240" type="number" min="3" placeholder="TEST 고객 행 번호만 입력">';
  html += '<label>고객번호 선택</label><input id="concCustomerNoP240" placeholder="선택 입력. rowNo만으로도 실행 가능">';
  html += '</div>';
  html += '<div class="concurrency-scenario-buttons-p240">';
  html += '<button onclick="runConcurrencyScenarioP240_(\'SUPPORT_CREATE\')">영업지원요청 10건 동시등록</button>';
  html += '<button onclick="runConcurrencyScenarioP240_(\'TODAY_UPSERT\')">오늘할일 10건 동시저장</button>';
  html += '<button class="danger" onclick="runConcurrencyScenarioP240_(\'CUSTOMER_MEMO\')">고객 메모 동시저장</button>';
  html += '</div>';
  html += '<div class="concurrency-note-p240">권장 순서: 영업지원요청 → 오늘할일 → 고객 메모. 고객 메모 테스트는 실제 메모를 덮어쓴 뒤 상태 시트에 저장된 원본값으로 복구합니다.</div>';
  html += '<div class="concurrency-danger-note-p240">고객 메모 테스트는 반드시 TEST 고객 rowNo로만 실행하세요. 실제 고객 rowNo를 넣으면 그 고객 메모가 테스트 문구로 잠시 바뀝니다.</div>';
  html += '</div>';

  html += '<div class="concurrency-card-p240">';
  html += '<div class="concurrency-card-title-p240">실행 상태</div>';
  html += '<div id="concurrencyRunInfoP240" class="concurrency-small-p240">아직 실행한 테스트가 없습니다.</div>';
  html += '<div class="concurrency-progress-p240"><div id="concurrencyProgressBarP240" class="concurrency-progress-bar-p240"></div></div>';
  html += '<div id="concurrencySummaryP240"></div>';
  html += '<pre id="concurrencyJsonP240" class="concurrency-json-p240" style="display:none"></pre>';
  html += '</div>';
  html += '</div>';

  html += '<div class="concurrency-card-p240">';
  html += '<div class="concurrency-card-title-p240">최근 테스트 로그</div>';
  html += renderConcurrencyRecentLogTableP240_(recentRows);
  html += '</div>';
  html += '</div>';
  area.innerHTML = html;
}

function renderConcurrencyRecentLogTableP240_(rows) {
  rows = Array.isArray(rows) ? rows : [];
  if (!rows.length) return '<div class="concurrency-small-p240">아직 로그가 없습니다.</div>';
  let html = '<table class="concurrency-log-table-p240"><thead><tr><th>시각</th><th>실행ID</th><th>시나리오</th><th>순번</th><th>결과</th><th>메시지</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    const ok = String(r.result || '').toUpperCase() === 'OK';
    html += '<tr><td>' + escapeHtml_(r.at || '') + '</td><td>' + escapeHtml_(r.runId || '') + '</td><td>' + escapeHtml_(r.scenario || '') + '</td><td>' + escapeHtml_(r.seq || '') + '</td><td><span class="concurrency-status-p240 ' + (ok ? 'ok' : 'fail') + '">' + escapeHtml_(r.result || '') + '</span></td><td>' + escapeHtml_(r.message || '') + '</td></tr>';
  });
  html += '</tbody></table>';
  return html;
}

function runConcurrencyScenarioP240_(scenario) {
  if (concurrencyRunningP240_) {
    toast('이미 동시성 테스트가 실행 중입니다.');
    return;
  }
  const count = clampConcurrencyCountP240_();
  const jitterMs = clampConcurrencyJitterP240_();
  const runId = makeClientConcurrencyRunIdP240_();
  const marker = '[CONCURRENCY_TEST:' + runId + ']';
  const customerRowNo = Number((document.getElementById('concCustomerRowNoP240') || {}).value) || 0;
  const customerNo = String((document.getElementById('concCustomerNoP240') || {}).value || '').trim();
  const date = String((document.getElementById('concTodayDateP240') || {}).value || '').trim();
  if (scenario === 'CUSTOMER_MEMO') {
    if (!customerRowNo || customerRowNo < 3) {
      toast('고객 메모 테스트는 TEST 고객 rowNo를 먼저 입력해야 합니다.');
      return;
    }
    if (!confirm('고객 메모 테스트는 입력한 rowNo의 실제 메모를 잠시 덮어씁니다. TEST 고객 행이 맞습니까?')) return;
  }
  concurrencyRunningP240_ = true;
  concurrencyLastRunP240_ = { runId: runId, scenario: scenario, marker: marker };
  updateConcurrencyProgressP240_(0, count, runId, scenario);
  setConcurrencySummaryP240_('실행 중', { total: count, success: 0, failed: 0, avgMs: '-', maxMs: '-' }, null);
  const promises = [];
  for (let i = 1; i <= count; i++) {
    promises.push(callConcurrencyActionP240_({
      scenario: scenario,
      runId: runId,
      seq: i,
      jitterMs: jitterMs,
      date: date,
      customerRowNo: customerRowNo,
      customerNo: customerNo
    }).then(function(res) {
      const done = promises.filter(function(p) { return p.__done; }).length + 1;
      promises[i - 1].__done = true;
      updateConcurrencyProgressP240_(done, count, runId, scenario);
      return res;
    }));
  }
  Promise.all(promises).then(function(results) {
    return callConcurrencySummaryP240_({ scenario: scenario, runId: runId, results: results }).then(function(summary) {
      concurrencyRunningP240_ = false;
      setConcurrencySummaryP240_(summary && summary.pass ? 'PASS' : '확인 필요', summary || {}, results);
      loadConcurrencyTestPageP240(true);
      return summary;
    });
  }).catch(function(err) {
    concurrencyRunningP240_ = false;
    setConcurrencySummaryP240_('실행 실패', { error: getConcurrencyErrorP240_(err) }, null);
  });
}

function callConcurrencyActionP240_(payload) {
  return new Promise(function(resolve) {
    google.script.run
      .withSuccessHandler(function(res) { resolve(res || { ok: false, error: 'empty response' }); })
      .withFailureHandler(function(err) { resolve({ ok: false, error: getConcurrencyErrorP240_(err), scenario: payload.scenario, seq: payload.seq, elapsedMs: 0 }); })
      .runPortalConcurrencyTestActionP240(payload);
  });
}

function callConcurrencySummaryP240_(payload) {
  return new Promise(function(resolve) {
    google.script.run
      .withSuccessHandler(function(res) { resolve(res || {}); })
      .withFailureHandler(function(err) { resolve({ ok: false, pass: false, error: getConcurrencyErrorP240_(err), total: (payload.results || []).length }); })
      .summarizePortalConcurrencyTestRunP240(payload);
  });
}

function cleanupLastConcurrencyRunP240_() {
  const runId = concurrencyLastRunP240_ && concurrencyLastRunP240_.runId;
  const manual = prompt('정리할 실행ID를 입력하세요. 마지막 실행ID가 자동 입력되어 있습니다.', runId || '');
  const targetRunId = String(manual || '').trim();
  if (!targetRunId) return;
  if (!confirm(targetRunId + ' 실행ID의 테스트 데이터를 정리합니다. 진행할까요?')) return;
  google.script.run
    .withSuccessHandler(function(res) {
      toast('테스트 데이터 정리 완료');
      const box = document.getElementById('concurrencyJsonP240');
      if (box) { box.style.display = 'block'; box.textContent = JSON.stringify(res || {}, null, 2); }
      loadConcurrencyTestPageP240(true);
    })
    .withFailureHandler(function(err) { toast(getConcurrencyErrorP240_(err)); })
    .cleanupPortalConcurrencyTestRunP240({ runId: targetRunId, restoreCustomer: true });
}

function updateConcurrencyProgressP240_(done, total, runId, scenario) {
  const pct = total ? Math.round(done / total * 100) : 0;
  const bar = document.getElementById('concurrencyProgressBarP240');
  if (bar) bar.style.width = pct + '%';
  const info = document.getElementById('concurrencyRunInfoP240');
  if (info) info.innerHTML = '<b>실행ID:</b> ' + escapeHtml_(runId || '-') + ' · <b>시나리오:</b> ' + escapeHtml_(scenario || '-') + ' · ' + done + '/' + total + ' 완료';
}

function setConcurrencySummaryP240_(label, summary, results) {
  const el = document.getElementById('concurrencySummaryP240');
  if (!el) return;
  summary = summary || {};
  const okClass = label === 'PASS' || label === '실행 중' ? 'ok' : 'fail';
  let html = '<div style="margin-top:10px"><span class="concurrency-status-p240 ' + okClass + '">' + escapeHtml_(label || '-') + '</span></div>';
  html += '<div class="concurrency-result-summary-p240">';
  html += '<div class="concurrency-metric-p240"><span>전체</span><strong>' + escapeHtml_(String(summary.total || 0)) + '</strong></div>';
  html += '<div class="concurrency-metric-p240"><span>성공</span><strong>' + escapeHtml_(String(summary.success || 0)) + '</strong></div>';
  html += '<div class="concurrency-metric-p240"><span>실패</span><strong>' + escapeHtml_(String(summary.failed || 0)) + '</strong></div>';
  html += '<div class="concurrency-metric-p240"><span>평균ms</span><strong>' + escapeHtml_(String(summary.avgMs || '-')) + '</strong></div>';
  html += '<div class="concurrency-metric-p240"><span>최대ms</span><strong>' + escapeHtml_(String(summary.maxMs || '-')) + '</strong></div>';
  html += '</div>';
  if (summary.duplicateRowNos && summary.duplicateRowNos.length) html += '<div class="concurrency-danger-note-p240">중복 rowNo 감지: ' + escapeHtml_(summary.duplicateRowNos.join(', ')) + '</div>';
  if (summary.duplicateReceipts && summary.duplicateReceipts.length) html += '<div class="concurrency-danger-note-p240">중복 접수번호 감지: ' + escapeHtml_(summary.duplicateReceipts.join(', ')) + '</div>';
  if (summary.error) html += '<div class="concurrency-danger-note-p240">' + escapeHtml_(summary.error) + '</div>';
  el.innerHTML = html;
  const box = document.getElementById('concurrencyJsonP240');
  if (box) {
    box.style.display = summary && Object.keys(summary).length ? 'block' : 'none';
    box.textContent = JSON.stringify({ summary: summary, sampleResults: (results || []).slice(0, 10) }, null, 2);
  }
}

function clampConcurrencyCountP240_() {
  const initMax = Number(concurrencyInitP240_ && concurrencyInitP240_.maxCount) || 20;
  const el = document.getElementById('concCountP240');
  const v = Math.max(1, Math.min(initMax, Number(el && el.value) || 10));
  if (el) el.value = v;
  return v;
}

function clampConcurrencyJitterP240_() {
  const el = document.getElementById('concJitterP240');
  const v = Math.max(0, Math.min(1500, Number(el && el.value) || 0));
  if (el) el.value = v;
  return v;
}

function makeClientConcurrencyRunIdP240_() {
  const d = new Date();
  const pad = function(n) { return String(n).padStart(2, '0'); };
  return 'CT' + String(d.getFullYear()).slice(2) + pad(d.getMonth() + 1) + pad(d.getDate()) + pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds()) + '_' + Math.floor(Math.random() * 10000);
}

function getTodayIsoDateP240_() {
  const d = new Date();
  const pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}

function getConcurrencyErrorP240_(err) {
  let msg = '';
  try { msg = typeof getErrorMessage_ === 'function' ? getErrorMessage_(err) : ''; } catch (e) {}
  if (!msg) msg = err && err.message ? err.message : String(err || '');
  return String(msg || '처리하지 못했습니다.').replace(/Exception:|ScriptError/gi, '').trim();
}
</script>
