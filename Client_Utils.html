function toast(msg, options){

  // 알림은 순수 표시 요소입니다. focus/selection/activeElement에는 절대 개입하지 않습니다.
  el.removeAttribute('role');
  el.removeAttribute('aria-live');
  el.setAttribute('aria-hidden', 'true');
  el.setAttribute('tabindex', '-1');
  try { el.inert = true; } catch (err) {}

  el.textContent = text;
  el.style.display = 'block';

}

function shouldSuppressToastWhileEditing_(msg, options){

}

function normalizePortalLongNoContactFlagP475_(value) {
  const s = String(value == null ? '' : value).trim().toLowerCase();
  return value === true || s === 'o' || s === 'ok' || s === 'y' || s === 'yes' || s === 'true' || s === '1' || s === '완료';
}

function getPortalDetailRawValueByHeadersP475_(detail, headers) {
  detail = detail || {};
  const raw = detail.raw || {};
  const list = Array.isArray(headers) ? headers : [headers];
  const norm = function(v) { return String(v == null ? '' : v).replace(/[\s(){}\[\]_.\-·ㆍ/\\]/g, '').toLowerCase().trim(); };
  const rawKeys = Object.keys(raw || {});
  for (let i = 0; i < list.length; i++) {
    const h = String(list[i] || '').trim();
    if (!h) continue;
    if (Object.prototype.hasOwnProperty.call(raw, h) && String(raw[h] || '').trim() !== '') return raw[h];
    const wanted = norm(h);
    for (let k = 0; k < rawKeys.length; k++) {
      if (norm(rawKeys[k]) === wanted && String(raw[rawKeys[k]] || '').trim() !== '') return raw[rawKeys[k]];
    }
  }
  return '';
}

function getPortalLongNoContactFieldP475_(detail, key) {
  detail = detail || {};

}

}

function renderPortalLongNoContactTmBlockP475_(detail, mode) {

function findPortalLongNoContactBlockP476_(detail, mode) {
  const id = getPortalLongNoContactBlockIdP476_(detail, mode);

  if (el) return el;
  const rowNo = Number(detail && detail.rowNo || 0) || 0;
  const customerNo = String(detail && detail.customerNo || '').trim();

    (rowNo ? '[data-row-no="' + rowNo + '"]' : '');
  try { el = document.querySelector(selector); } catch (err) { el = null; }
  return el;
}

function ensurePortalLongNoContactBlockP476_(detail, mode) {
  let block = findPortalLongNoContactBlockP476_(detail, mode);
  if (block) return block;
  if (!shouldRenderPortalLongNoContactBlockP475_(detail)) return null;

  const html = renderPortalLongNoContactTmBlockP475_(detail, mode);
  if (!html) return null;

  if (mode === 'expand') {
    const rowNo = Number(detail && detail.rowNo || 0) || 0;
    const memoBox = rowNo ? document.getElementById('expandedMemoBox_' + rowNo) : null;
    if (memoBox && memoBox.parentNode) {
      memoBox.insertAdjacentHTML('afterend', html);
      return findPortalLongNoContactBlockP476_(detail, mode);
    }
  }

  if (mode === 'modal') {
    const modalBodyEl = document.getElementById('modalBody');
    if (modalBodyEl) {
      const existing = modalBodyEl.querySelector('[data-tm-long-no-contact-block="Y"][data-mode="modal"]');
      if (existing) return existing;
      const firstCard = modalBodyEl.querySelector('.section-card');
      if (firstCard) firstCard.insertAdjacentHTML('afterend', html);
      else modalBodyEl.insertAdjacentHTML('afterbegin', html);
      return findPortalLongNoContactBlockP476_(detail, mode);
    }
  }

  return null;
}

function updatePortalLongNoContactTmBlockP476_(detail, mode) {
  detail = detail || {};
  const vm = getPortalLongNoContactBlockViewModelP476_(detail);
  let block = findPortalLongNoContactBlockP476_(detail, mode);

  // P476: 실제로 O가 빠진 경우에만 숨깁니다. O 상태에서는 박스를 제거하지 않고 내부 텍스트만 교체합니다.
  if (!vm.flagOn) {
    if (block) block.classList.add('portal-tm-long-no-contact-hidden-p476');
    return false;
  }

  block = block || ensurePortalLongNoContactBlockP476_(detail, mode);
  if (!block) return false;
  block.classList.remove('portal-tm-long-no-contact-hidden-p476');

  const msgEl = block.querySelector('[data-tm-long-no-contact-role="message"]');
  const contentEl = block.querySelector('[data-tm-long-no-contact-role="content"]');
  if (msgEl && msgEl.textContent !== vm.message) msgEl.textContent = vm.message;
  if (contentEl) {
    const next = vm.content || '-';
    if (contentEl.value !== next) contentEl.value = next;
  }
  return true;
}

function isPortalLongNoContactFieldP476_(field) {

  rowNo = Number(rowNo) || 0;

  Object.keys(patch).forEach(function(k) {
    detail[k] = patch[k];
    if (!detail.raw) detail.raw = {};

    if (k === 'tmProgressStatus') detail.raw['TM 진행 현황'] = patch[k];

  if (typeof updatePortalLongNoContactTmBlockP476_ === 'function') {

    try {

        updatePortalLongNoContactTmBlockP476_(currentDetail, 'modal');

  return true;
}

// PATCH P1-5: 표 헤더 클릭 정렬 공통 유틸

window.portalPerfSessionIdP460 = window.portalPerfSessionIdP460 || ('P460-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8));
window.portalPerfBufferP460 = window.portalPerfBufferP460 || [];

function portalNowP460_() { return (window.performance && performance.now) ? performance.now() : Date.now(); }

function portalPerfCompactDetailP460_(detail) {

}

function portalPerfLogP460_(eventName, detail) {
  try {
    const d = portalPerfCompactDetailP460_(detail || {});
    const row = {
      sessionId: window.portalPerfSessionIdP460,
      event: String(eventName || ''),
      durationMs: Number(detail && detail.durationMs || 0) || 0,
      rowNo: d.rowNo || '',

    if (window.portalPerfBufferP460.length > 250) window.portalPerfBufferP460.splice(0, window.portalPerfBufferP460.length - 250);
    const slowMs = (typeof PORTAL_PERF_LOG_SLOW_MS_P460 !== 'undefined') ? PORTAL_PERF_LOG_SLOW_MS_P460 : 1200;
    if (window.portalPerfBufferP460.length >= ((typeof PORTAL_PERF_LOG_SHEET_BATCH_MAX_P460 !== 'undefined') ? PORTAL_PERF_LOG_SHEET_BATCH_MAX_P460 : 30) || row.durationMs >= slowMs || row.error) {

    } else {

    }

}

function portalPerfStartP460_(eventName, detail) {

}

  return portalPerfLogP460_(mark.event, Object.assign({}, mark.detail || {}, extra || {}, { durationMs: ms, status: 'ok' }));
}

function portalPerfErrorP460_(mark, err, extra) {

  const msg = (typeof getErrorMessage_ === 'function') ? getErrorMessage_(err) : (err && err.message ? err.message : String(err || ''));

function schedulePortalPerfFlushP460_(delay) {

function flushPortalPerfLogsP460_(options) {
  options = options || {};
  if (window.portalPerfFlushInFlightP460) return;
  const buffer = window.portalPerfBufferP460 || [];
  if (!buffer.length) {
    if (!options.silent) toast('보낼 성능로그가 없습니다.');
    return;
  }
  const batch = buffer.splice(0, Math.min(buffer.length, 80));
  window.portalPerfFlushInFlightP460 = true;
  try {
    google.script.run
      .withSuccessHandler(function(res){
        window.portalPerfFlushInFlightP460 = false;
        window.portalPerfLastSavedSummaryP460 = res || null;
        if (!options.silent) toast('성능로그 시트 저장 완료: ' + ((res && res.appended) || batch.length) + '건');
        if ((window.portalPerfBufferP460 || []).length) schedulePortalPerfFlushP460_(800);

      .withFailureHandler(function(err){

        window.portalPerfBufferP460 = batch.concat(window.portalPerfBufferP460 || []).slice(-250);
        if (!options.silent) toast('성능로그 시트 저장 실패: ' + ((typeof getErrorMessage_ === 'function') ? getErrorMessage_(err) : String(err || '')));
      })
      .appendPortalPerfLogsP460(batch);
  } catch (err) {
    window.portalPerfFlushInFlightP460 = false;
    window.portalPerfBufferP460 = batch.concat(window.portalPerfBufferP460 || []).slice(-250);
    if (!options.silent) toast('성능로그 전송 실패: ' + (err && err.message ? err.message : err));
  }
}

function copyPortalPerfLogsP460_() {
  const logs = (window.portalPerfBufferP460 || []).slice(-120);
  const text = JSON.stringify({ sessionId: window.portalPerfSessionIdP460, bufferCount: (window.portalPerfBufferP460 || []).length, lastSaved: window.portalPerfLastSavedSummaryP460 || null, logs: logs }, null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {

function clearPortalPerfLogsP460_() {

}

function loadPortalPerfLogSummaryP460_() {
  try {
    google.script.run
      .withSuccessHandler(function(res){
        const msg = res && res.ok ? ('성능로그_DB 총 ' + (res.count || 0) + '건 · 최근 로그를 콘솔에 출력했습니다.') : '성능로그 요약을 불러오지 못했습니다.';

  } catch (err) { toast('성능로그 요약 호출 실패: ' + (err && err.message ? err.message : err)); }
}

function isPortalTransientWriteErrorP460_(err) {
  const msg = (typeof getErrorMessage_ === 'function') ? getErrorMessage_(err) : (err && err.message ? err.message : String(err || ''));
  return /LOCK|잠금|다른 작업 처리 중|Service invoked too many times|Exceeded maximum execution|timed out|timeout|일시|서버 사용량/i.test(String(msg || ''));
}

function getPortalSaveRetryDelayP460_(attempt) {
  const base = (typeof PORTAL_SAVE_RETRY_BASE_MS_P460 !== 'undefined') ? PORTAL_SAVE_RETRY_BASE_MS_P460 : 650;
  const max = (typeof PORTAL_SAVE_RETRY_MAX_MS_P460 !== 'undefined') ? PORTAL_SAVE_RETRY_MAX_MS_P460 : 5000;
  return Math.min(max, Math.round(base * Math.pow(1.6, Math.max(0, Number(attempt || 1) - 1))));
}

function waitPortalMsP460_(ms) { return new Promise(function(resolve){ setTimeout(resolve, Math.max(0, Number(ms) || 0)); }); }

function runPortalPromiseWithTransientRetryP460_(workFn, meta, options) {
  options = options || {};
  const maxAttempts = Math.max(1, Number(options.maxAttempts || ((typeof PORTAL_SAVE_RETRY_MAX_ATTEMPTS_P460 !== 'undefined') ? PORTAL_SAVE_RETRY_MAX_ATTEMPTS_P460 : 4)) || 4);
  let attempt = 0;
  function runNext() {
    attempt++;
    const mark = portalPerfStartP460_(String(meta && meta.event || 'save'), Object.assign({}, meta || {}, { attempt: attempt }));
    return Promise.resolve().then(workFn).then(function(res){
      portalPerfEndP460_(mark, { serverTiming: res && (res.timingP460 || res.timingP459 || res.timing) || null });
      return res;
    }, function(err){
      const transient = isPortalTransientWriteErrorP460_(err);
      portalPerfErrorP460_(mark, err, { transient: transient, attempt: attempt });
      if (transient && attempt < maxAttempts) {
        const delay = getPortalSaveRetryDelayP460_(attempt);
        try { toast('저장 재시도 중입니다. 입력값은 유지됩니다.'); } catch (e) {}
        return waitPortalMsP460_(delay).then(runNext);
      }
      throw err;
    });
  }
  return runNext();
}

function normalizePortalSortTextP15_(value) {
  return String(value == null ? '' : value).replace(/\u00a0/g, ' ').trim();
}

function parsePortalSortNumberP15_(value) {
  const raw = normalizePortalSortTextP15_(value).replace(/[^0-9.\-]/g, '');
  if (!raw || raw === '-' || raw === '.' || raw === '-.') return NaN;
  return Number(raw);
}

function parsePortalSortDateP15_(value) {
  const text = normalizePortalSortTextP15_(value);
  if (!text) return NaN;
  let m = text.match(/(20\d{2}|\d{2})[.\-\/]\s*(\d{1,2})[.\-\/]\s*(\d{1,2})(?:\s+(\d{1,2}):(\d{2}))?/);
  if (m) {
    let y = Number(m[1]);
    if (y < 100) y += 2000;
    const d = new Date(y, Number(m[2]) - 1, Number(m[3]), Number(m[4] || 0), Number(m[5] || 0), 0, 0);
    const t = d.getTime();
    return isNaN(t) ? NaN : t;
  }
  const fallback = Date.parse(text);
  return isNaN(fallback) ? NaN : fallback;
}

function comparePortalSortValuesP15_(a, b, dir) {
  dir = String(dir || 'asc').toLowerCase() === 'desc' ? 'desc' : 'asc';
  const sign = dir === 'desc' ? -1 : 1;
  const av = normalizePortalSortTextP15_(a);
  const bv = normalizePortalSortTextP15_(b);
  const am = !av || av === '-';
  const bm = !bv || bv === '-';
  if (am && bm) return 0;
  if (am) return 1;
  if (bm) return -1;

  const an = parsePortalSortNumberP15_(av);
  const bn = parsePortalSortNumberP15_(bv);
  if (!isNaN(an) && !isNaN(bn) && an !== bn) return (an < bn ? -1 : 1) * sign;

  const ad = parsePortalSortDateP15_(av);
  const bd = parsePortalSortDateP15_(bv);
  if (!isNaN(ad) && !isNaN(bd) && ad !== bd) return (ad < bd ? -1 : 1) * sign;

  const cmp = av.localeCompare(bv, 'ko', { numeric: true, sensitivity: 'base' });
  return cmp * sign;
}

function sortPortalRowsByKeyP15_(rows, key, dir) {
  rows = Array.isArray(rows) ? rows.slice() : [];
  key = String(key || '').trim();
  if (!key) return rows;
  return rows.map(function(row, idx) { return { row: row, idx: idx }; }).sort(function(a, b) {
    const cmp = comparePortalSortValuesP15_(a.row && a.row[key], b.row && b.row[key], dir);
    return cmp || (a.idx - b.idx);
  }).map(function(item) { return item.row; });
}

function getPortalSortArrowP15_(activeKey, activeDir, key) {
  if (String(activeKey || '') !== String(key || '')) return '';
  return String(activeDir || 'asc').toLowerCase() === 'desc' ? ' ▼' : ' ▲';
}

function makePortalSortableThP15_(label, key, activeKey, activeDir, handlerName, styleText) {
  const arrow = getPortalSortArrowP15_(activeKey, activeDir, key);
  return '<th class="portal-sortable-th" ' + (styleText ? 'style="' + escAttr(styleText) + '" ' : '') +
    'onclick="' + escAttr(handlerName) + '(\'' + escAttr(key) + '\')">' +
    esc(label || key) + '<span class="portal-sort-arrow">' + esc(arrow) + '</span></th>';
}
