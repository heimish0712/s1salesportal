<script>
let noticeSortKeyP15 = "";
let noticeSortDirP15 = "asc";
let currentNoticeEditIdP449 = "";
let noticeWriteContextKeyP494D = "";
const NOTICE_LIST_CACHE_KEY_P546 = 'salesPortal.noticeList.p546';
let noticeListLoadingP546 = false;
let noticeListLoadedP546 = false;
let noticeListLoadedAtP546 = 0;
let noticeWriteOpenSeqP494D = 0;
function loadHomeNoticeList() {
  google.script.run
    .withSuccessHandler(renderHomeNoticeList)
    .withFailureHandler(showGlobalError)
    .getPortalNotices(3);
}

function getNoticeListCacheP546_() {
  try {
    const raw = sessionStorage.getItem(NOTICE_LIST_CACHE_KEY_P546);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !Array.isArray(obj.rows)) return null;
    if (Date.now() - Number(obj.cachedAt || 0) > 10 * 60 * 1000) return null;
    return obj;
  } catch (err) { return null; }
}

function saveNoticeListCacheP546_(rows) {
  try { sessionStorage.setItem(NOTICE_LIST_CACHE_KEY_P546, JSON.stringify({ cachedAt: Date.now(), rows: Array.isArray(rows) ? rows : [] })); } catch (err) {}
}

function preloadNoticeTableP546_(options) {
  options = options || {};
  if (noticeListLoadingP546 || noticeListLoadedP546) return;
  const cached = getNoticeListCacheP546_();
  if (cached) {
    noticeListCache = cached.rows.slice();
    upsertNoticeCache_(noticeListCache);
    noticeListLoadedP546 = true;
    noticeListLoadedAtP546 = Number(cached.cachedAt || Date.now());
    return;
  }
  noticeListLoadingP546 = true;
  google.script.run
    .withSuccessHandler(function(rows) {
      noticeListLoadingP546 = false;
      noticeListLoadedP546 = true;
      noticeListLoadedAtP546 = Date.now();
      renderNoticeTable(rows || []);
      saveNoticeListCacheP546_(rows || []);
    })
    .withFailureHandler(function(err) {
      noticeListLoadingP546 = false;
      if (!options.silent) console.warn('공지사항 프리로드 실패', err);
    })
    .getPortalNotices(0);
}

function loadNoticeTable(options) {
  options = options || {};
  try { applyPortalPermissionToUi_(); } catch (err) {}
  const cached = getNoticeListCacheP546_();
  if (noticeListCache && noticeListCache.length) renderNoticeTable(noticeListCache);
  else if (cached) renderNoticeTable(cached.rows || []);
  if (noticeListLoadingP546) return;
  noticeListLoadingP546 = true;
  google.script.run
    .withSuccessHandler(function(rows) {
      noticeListLoadingP546 = false;
      noticeListLoadedP546 = true;
      noticeListLoadedAtP546 = Date.now();
      renderNoticeTable(rows || []);
      saveNoticeListCacheP546_(rows || []);
    })
    .withFailureHandler(function(err) {
      noticeListLoadingP546 = false;
      if (!(noticeListCache && noticeListCache.length) && !cached) showGlobalError(err);
      else console.warn('공지사항 최신 조회 실패', err);
    })
    .getPortalNotices(0);
}

function upsertNoticeCache_(notices) {
  notices = Array.isArray(notices) ? notices : [];
  notices.forEach(function(n) {
    if (n && n.id) noticeCacheById[String(n.id)] = n;
  });
}

function renderHomeNoticeList(notices) {
  const target = document.getElementById('homeNoticeArea');
  if (!target) return;
  notices = Array.isArray(notices) ? notices : [];
  homeNoticeCache = notices.slice();
  upsertNoticeCache_(notices);
  if (!notices.length) {
    target.innerHTML = '<div class="loading">등록된 공지사항이 없습니다.</div>';
    return;
  }
  target.innerHTML = buildNoticeTableHtml(notices.slice(0, 3), false);
}

function renderNoticeTable(notices) {
  try { applyPortalPermissionToUi_(); } catch (err) {}
  const target = document.getElementById('noticeTableArea');
  if (!target) return;
  notices = Array.isArray(notices) ? notices : [];
  noticeListCache = notices.slice();
  noticeListLoadedP546 = true;
  noticeListLoadedAtP546 = Date.now();
  upsertNoticeCache_(notices);
  if (!notices.length) {
    target.innerHTML = '<div class="loading">등록된 공지사항이 없습니다.' + (canPortal_('canWriteNotice') ? ' 작성하기 버튼으로 새 공지를 등록하세요.' : '') + '</div>';
    return;
  }
  target.innerHTML = buildNoticeTableHtml(notices, canPortal_('canDeleteNotice'));
  try { applyPortalPermissionToUi_(); } catch (err) {}
}


function getNoticeCurrentUserNameP449_() {
  const p = getPortalPermission_ ? getPortalPermission_() : null;
  return String((p && (p.name || p.displayName || p.email)) || '').trim();
}

function isNoticeConfirmedByMeP449_(notice) {
  const user = getNoticeCurrentUserNameP449_();
  if (!user || !notice) return false;
  const confirmers = String(notice.confirmers || '').replace(/\r/g, '\n');
  if (!confirmers.trim()) return false;
  const names = [user];
  const p = getPortalPermission_ ? getPortalPermission_() : null;
  if (p) {
    ['name','displayName','email'].forEach(function(k) {
      const v = String(p[k] || '').trim();
      if (v && names.indexOf(v) < 0) names.push(v);
    });
  }
  return names.some(function(name) {
    return name && confirmers.indexOf(name) >= 0;
  });
}

function buildNoticeUnreadDotP449_(notice) {
  return isNoticeConfirmedByMeP449_(notice) ? '' : '<span class="notice-unread-dot" title="미확인 공지"></span>';
}

function buildNoticeCreatedCellP449_(notice) {
  const created = esc(notice.createdDate || notice.createdAt || '-');
  const updated = String(notice.updatedAt || notice.updatedDate || '').trim();
  if (!updated) return created;
  return created + '<div class="notice-updated-line">수정 ' + esc(updated) + '</div>';
}

function buildNoticeUpdatedMetaP449_(notice) {
  const updated = String(notice.updatedAt || notice.updatedDate || '').trim();
  if (!updated) return '';
  const by = String(notice.updatedBy || '').trim();
  return '<label>수정일</label><div>' + esc(updated + (by ? ' · ' + by : '')) + '</div>';
}

function buildNoticeTableHtml(notices, allowDelete) {
  allowDelete = !!(allowDelete && canPortal_('canDeleteNotice'));
  const modeClass = allowDelete && noticeDeleteMode ? ' notice-delete-mode' : '';
  const checkHead = allowDelete ? '<th class="notice-check-col">□</th>' : '';
  if (noticeSortKeyP15) notices = sortPortalRowsByKeyP15_(notices, noticeSortKeyP15, noticeSortDirP15);
  const rows = notices.map(n => {
    const content = String(n.content || '').replace(/\s+/g, ' ');
    const shortContent = content.length > 42 ? content.slice(0, 42) + '...' : content;
    const check = allowDelete ? '<td class="notice-check-col"><input type="checkbox" class="notice-delete-check" value="' + escAttr(n.id) + '"></td>' : '';
    return '<tr>' + check +
      '<td style="text-align:center;white-space:nowrap;">' + buildNoticeCreatedCellP449_(n) + '</td>' +
      '<td style="text-align:center;white-space:nowrap;">' + esc(n.author || '-') + '</td>' +
      '<td class="title-cell" onclick="openNoticeDetail(\'' + escAttr(n.id) + '\')"><span class="notice-title-wrap">' + buildNoticeUnreadDotP449_(n) + '<span>' + esc(n.title || '-') + '</span></span></td>' +
      '<td>' + esc(shortContent || '-') + '</td>' +
    '</tr>';
  }).join('');
  return '<table class="notice-table' + modeClass + '"><thead><tr>' + checkHead +
    renderNoticeSortableThP15_('작성일자', 'createdDate') +
    renderNoticeSortableThP15_('작성자', 'author') +
    renderNoticeSortableThP15_('제목', 'title') +
    renderNoticeSortableThP15_('내용', 'content') +
    '</tr></thead><tbody>' + rows + '</tbody></table>';
}

function toggleNoticeHeaderSortP15_(key) {
  key = String(key || '').trim();
  if (!key) return;
  noticeSortDirP15 = noticeSortKeyP15 === key && noticeSortDirP15 === 'asc' ? 'desc' : 'asc';
  noticeSortKeyP15 = key;
  if (noticeListCache && noticeListCache.length) renderNoticeTable(noticeListCache);
  else loadNoticeTable();
}

function renderNoticeSortableThP15_(label, key) {
  return makePortalSortableThP15_(label, key, noticeSortKeyP15, noticeSortDirP15, 'toggleNoticeHeaderSortP15_', '');
}

function openNoticeDetail(id) {
  currentNoticeId = id;
  const cached = noticeCacheById[String(id || '')];
  if (cached) {
    showNoticeDetailModal(cached);
    return;
  }

  // 캐시에 없는 예외 상황만 서버 조회합니다. 일반 클릭은 목록 로딩 때 받은 내용으로 즉시 팝업을 띄웁니다.
  const body = document.getElementById('noticeDetailBody');
  if (body) body.innerHTML = '<div class="loading">공지 상세를 불러오는 중입니다.</div>';
  document.getElementById('noticeDetailBackdrop').style.display = 'flex';
  google.script.run
    .withSuccessHandler(function(notice){
      if (notice && notice.id) noticeCacheById[String(notice.id)] = notice;
      showNoticeDetailModal(notice);
    })
    .withFailureHandler(showGlobalError)
    .getPortalNoticeDetail(id);
}

function showNoticeDetailModal(notice) {
  currentNoticeId = notice && notice.id || currentNoticeId;
  const body = document.getElementById('noticeDetailBody');
  body.innerHTML = '<div class="notice-form-grid">' +
    '<label>제목</label><div>' + esc(notice.title || '-') + '</div>' +
    '<label>작성자</label><div>' + esc(notice.author || '-') + '</div>' +
    '<label>작성일</label><div>' + esc(notice.createdDate || notice.createdAt || '-') + '</div>' +
    buildNoticeUpdatedMetaP449_(notice) +
    '<label>내용</label><div class="notice-content-box">' + esc(notice.content || '') + '</div>' +
    '</div>' +
    '<div class="notice-confirmers"><b>확인자</b>: ' + esc(notice.confirmers || '아직 확인자가 없습니다.') + '</div>';
  const editBtn = document.getElementById('noticeDetailEditBtn');
  if (editBtn) editBtn.style.display = canPortal_('canWriteNotice') ? '' : 'none';
  document.getElementById('noticeDetailBackdrop').style.display = 'flex';
}

function closeNoticeDetailModal() {
  document.getElementById('noticeDetailBackdrop').style.display = 'none';
}

function confirmCurrentNotice() {
  if (!currentNoticeId) return;
  google.script.run
    .withSuccessHandler(res => {
      toast('확인 처리되었습니다.');
      if (res && res.notice) {
        noticeCacheById[String(res.notice.id)] = res.notice;
        showNoticeDetailModal(res.notice);
      }
      loadNoticeTable();
      loadHomeNoticeList();
    })
    .withFailureHandler(showGlobalError)
    .confirmPortalNotice(currentNoticeId);
}

function setNoticeWriteModalModeP449_(mode, notice) {
  currentNoticeEditIdP449 = mode === 'edit' && notice && notice.id ? String(notice.id) : '';
  const titleEl = document.querySelector('#noticeWriteBackdrop .notice-modal-title');
  const saveBtn = document.getElementById('noticeWriteSaveBtn');
  if (titleEl) titleEl.textContent = currentNoticeEditIdP449 ? '공지사항 수정하기' : '공지사항 작성하기';
  if (saveBtn) saveBtn.textContent = currentNoticeEditIdP449 ? '수정 저장' : '저장';
}

function toNoticeDateInputP449_(noticeDate) {
  const text = String(noticeDate || '').trim();
  const m = text.match(/(\d{4})[.\-\/\s]+(\d{1,2})[.\-\/\s]+(\d{1,2})/);
  if (!m) return new Date().toISOString().slice(0, 10);
  return m[1] + '-' + String(m[2]).padStart(2, '0') + '-' + String(m[3]).padStart(2, '0');
}


// P494D: 공지사항 작성/수정 모달 입력 연속성 보호.
function makeNoticeWriteContextKeyP494D_(mode, noticeId) {
  const id = noticeId || (mode === 'create' ? ('new_' + (++noticeWriteOpenSeqP494D)) : 'unknown');
  if (typeof makePortalDraftContextKeyP494_ === 'function') return makePortalDraftContextKeyP494_('noticeModal', id, mode || 'write');
  return 'noticeModal:' + String(id) + ':' + String(mode || 'write');
}

function setNoticeWriteContextP494D_(mode, noticeId) {
  try { if (noticeWriteContextKeyP494D && typeof releasePortalDraftContextP494_ === 'function') releasePortalDraftContextP494_(noticeWriteContextKeyP494D, { force: true }); } catch (err) {}
  noticeWriteContextKeyP494D = makeNoticeWriteContextKeyP494D_(mode, noticeId || '');
  return noticeWriteContextKeyP494D;
}

function registerNoticeWriteDraftFieldsP494D_(baseValues) {
  try {
    if (typeof isPortalDraftGuardEnabledP494_ === 'function' && !isPortalDraftGuardEnabledP494_('notice')) return;
    if (!noticeWriteContextKeyP494D || typeof registerPortalDraftFieldP494_ !== 'function') return;
    baseValues = baseValues || {};
    [
      ['noticeWriteTitle', 'title'],
      ['noticeWriteAuthor', 'author'],
      ['noticeWriteDate', 'noticeDate'],
      ['noticeWriteContent', 'content']
    ].forEach(function(pair) {
      const el = document.getElementById(pair[0]);
      if (!el) return;
      const base = Object.prototype.hasOwnProperty.call(baseValues, pair[1]) ? baseValues[pair[1]] : (el.value || '');
      registerPortalDraftFieldP494_(el, {
        contextKey: noticeWriteContextKeyP494D,
        fieldKey: pair[1],
        baseValue: base || '',
        serverValue: base || '',
        baseLoaded: true,
        scope: 'notice'
      });
    });
  } catch (err) {}
}

function collectNoticeWriteValuesP494D_() {
  registerNoticeWriteDraftFieldsP494D_();
  return {
    title: (document.getElementById('noticeWriteTitle') || {}).value || '',
    author: (document.getElementById('noticeWriteAuthor') || {}).value || '',
    noticeDate: (document.getElementById('noticeWriteDate') || {}).value || '',
    content: (document.getElementById('noticeWriteContent') || {}).value || ''
  };
}

function markNoticeWritePendingP494D_(patch, operationId) {
  try { if (noticeWriteContextKeyP494D && typeof markPortalDraftPendingP494_ === 'function') markPortalDraftPendingP494_(noticeWriteContextKeyP494D, patch || {}, operationId || 'NOTICE_SAVE'); } catch (err) {}
}

function markNoticeWriteSavedP494D_(patch, operationId) {
  try { if (noticeWriteContextKeyP494D && typeof markPortalDraftSavedP494_ === 'function') markPortalDraftSavedP494_(noticeWriteContextKeyP494D, patch || {}, operationId || 'NOTICE_SAVE'); } catch (err) {}
}

function markNoticeWriteConflictP494D_(serverValues) {
  try {
    if (noticeWriteContextKeyP494D && typeof markPortalDraftConflictP494_ === 'function') markPortalDraftConflictP494_(noticeWriteContextKeyP494D, ['title','author','noticeDate','content'], serverValues || {});
  } catch (err) {}
}

function releaseNoticeWriteContextP494D_(force) {
  try { if (noticeWriteContextKeyP494D && typeof releasePortalDraftContextP494_ === 'function') releasePortalDraftContextP494_(noticeWriteContextKeyP494D, { force: force !== false }); } catch (err) {}
  noticeWriteContextKeyP494D = '';
}

function openNoticeWriteModal() {
  if (!canPortal_('canWriteNotice')) return alert('공지사항 작성 권한이 없습니다.');
  setNoticeWriteModalModeP449_('create');
  setNoticeWriteContextP494D_('create');
  const baseP494D = {
    title: '',
    author: (getPortalPermission_().name || getPortalPermission_().displayName || ''),
    content: '',
    noticeDate: new Date().toISOString().slice(0, 10)
  };
  document.getElementById('noticeWriteTitle').value = baseP494D.title;
  document.getElementById('noticeWriteAuthor').value = baseP494D.author;
  document.getElementById('noticeWriteContent').value = baseP494D.content;
  document.getElementById('noticeWriteDate').value = baseP494D.noticeDate;
  registerNoticeWriteDraftFieldsP494D_(baseP494D);
  document.getElementById('noticeWriteBackdrop').style.display = 'flex';
  setTimeout(() => document.getElementById('noticeWriteTitle').focus(), 60);
}

function openNoticeEditModalFromCurrent() {
  if (!canPortal_('canWriteNotice')) return alert('공지사항 수정 권한이 없습니다.');
  const notice = noticeCacheById[String(currentNoticeId || '')];
  if (!notice || !notice.id) return alert('수정할 공지사항을 먼저 열어주세요.');
  setNoticeWriteModalModeP449_('edit', notice);
  setNoticeWriteContextP494D_('edit', notice.id);
  const baseP494D = {
    title: notice.title || '',
    author: notice.author || (getPortalPermission_().name || getPortalPermission_().displayName || ''),
    noticeDate: toNoticeDateInputP449_(notice.noticeDate || notice.createdDate || notice.createdAt),
    content: notice.content || ''
  };
  document.getElementById('noticeWriteTitle').value = baseP494D.title;
  document.getElementById('noticeWriteAuthor').value = baseP494D.author;
  document.getElementById('noticeWriteDate').value = baseP494D.noticeDate;
  document.getElementById('noticeWriteContent').value = baseP494D.content;
  registerNoticeWriteDraftFieldsP494D_(baseP494D);
  document.getElementById('noticeWriteBackdrop').style.display = 'flex';
  setTimeout(() => document.getElementById('noticeWriteTitle').focus(), 60);
}

function closeNoticeWriteModal() {
  document.getElementById('noticeWriteBackdrop').style.display = 'none';
  currentNoticeEditIdP449 = '';
  releaseNoticeWriteContextP494D_(true);
}

function saveNoticeFromModal() {
  if (!canPortal_('canWriteNotice')) return alert('공지사항 작성 권한이 없습니다.');
  const originalNoticeP489 = currentNoticeEditIdP449 ? (noticeCacheById[String(currentNoticeEditIdP449)] || null) : null;
  const valuesP494D = collectNoticeWriteValuesP494D_();
  const payload = {
    id: currentNoticeEditIdP449,
    title: valuesP494D.title,
    author: valuesP494D.author,
    noticeDate: valuesP494D.noticeDate,
    content: valuesP494D.content,
    clientSaveSource: currentNoticeEditIdP449 ? 'notice.updateModal' : 'notice.createModal',
    clientOperationId: 'NOTICE_SAVE_' + Date.now() + '_' + Math.floor(Math.random() * 1000000)
  };
  markNoticeWritePendingP494D_({ title: payload.title, author: payload.author, noticeDate: payload.noticeDate, content: payload.content }, payload.clientOperationId);
  if (originalNoticeP489) {
    payload.expectedValues = {
      title: originalNoticeP489.title || '',
      author: originalNoticeP489.author || '',
      noticeDate: toNoticeDateInputP449_(originalNoticeP489.noticeDate || originalNoticeP489.createdDate || originalNoticeP489.createdAt),
      content: originalNoticeP489.content || ''
    };
  }
  const runner = google.script.run
    .withSuccessHandler((res) => {
      if (res && res.conflictP473) {
        markNoticeWriteConflictP494D_(res && (res.currentValues || res.serverValues || {}));
        toast('공지사항 저장 충돌 확인 필요: 입력값은 유지됩니다.');
        return;
      }
      if (res && res.queuedFallbackP473) {
        closeNoticeWriteModal();
        toast('공지사항 저장이 저장큐로 넘어갔습니다. 자동으로 다시 반영됩니다.');
        loadNoticeTable();
        loadHomeNoticeList();
        return;
      }
      markNoticeWriteSavedP494D_({ title: payload.title, author: payload.author, noticeDate: payload.noticeDate, content: payload.content }, payload.clientOperationId);
      closeNoticeWriteModal();
      toast(payload.id ? '공지사항을 수정했습니다.' : '공지사항을 저장했습니다.');
      if (res && res.notice) noticeCacheById[String(res.notice.id)] = res.notice;
      if (res && Array.isArray(res.notices)) renderNoticeTable(res.notices);
      else loadNoticeTable();
      loadHomeNoticeList();
      if (payload.id && res && res.notice) showNoticeDetailModal(res.notice);
    })
    .withFailureHandler(showGlobalError);

  if (payload.id) runner.updatePortalNotice(payload);
  else runner.savePortalNotice(payload);
}

function handleNoticeDeleteButton() {
  if (!canPortal_('canDeleteNotice')) return alert('공지사항 삭제 권한이 없습니다.');
  if (!noticeDeleteMode) {
    noticeDeleteMode = true;
    document.body.classList.add('notice-delete-active');
    document.getElementById('noticeDeleteBtn').textContent = '선택 삭제';
    loadNoticeTable();
    return;
  }
  const ids = Array.from(document.querySelectorAll('.notice-delete-check:checked')).map(el => el.value);
  if (!ids.length) {
    noticeDeleteMode = false;
    document.body.classList.remove('notice-delete-active');
    document.getElementById('noticeDeleteBtn').textContent = '삭제하기';
    loadNoticeTable();
    return;
  }
  if (!confirm('선택한 공지사항을 삭제하시겠습니까?')) return;
  google.script.run
    .withSuccessHandler(res => {
      noticeDeleteMode = false;
      document.body.classList.remove('notice-delete-active');
      document.getElementById('noticeDeleteBtn').textContent = '삭제하기';
      toast((res && (res.deletedCount || res.deleted) || ids.length) + '건 삭제했습니다.');
      if (res && Array.isArray(res.notices)) renderNoticeTable(res.notices);
      else loadNoticeTable();
      loadHomeNoticeList();
    })
    .withFailureHandler(showGlobalError)
    .deletePortalNotices(ids);
}
</script>
