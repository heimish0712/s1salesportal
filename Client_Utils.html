<script>
function beginCustomerDetailModalSessionP456_(mode, rowNo, customerNo) {

  const token = ++activeCustomerDetailModalTokenP456;
  const normalizedCustomerNo = (typeof normalizeCustomerNoForKey_ === 'function') ? normalizeCustomerNoForKey_(customerNo || '') : String(customerNo || '').trim();
  activeCustomerDetailModalStateP456 = {
    open: true,
    token: token,
    mode: String(mode || ''),
    rowNo: Number(rowNo) || 0,
    customerNo: normalizedCustomerNo,
    startedAt: Date.now()
  };
  return token;
}

function isCustomerDetailModalVisibleP456_() {
  const backdrop = document.getElementById('modalBackdrop');
  if (!backdrop) return false;
  return backdrop.style.display !== 'none' && backdrop.style.display !== '';
}

function isCustomerDetailResponseStillRelevantP456_(token, rowNo, customerNo, options) {
  options = options || {};
  const state = (typeof activeCustomerDetailModalStateP456 !== 'undefined') ? activeCustomerDetailModalStateP456 : null;
  if (!state || !state.open) return false;
  if (!isCustomerDetailModalVisibleP456_()) return false;
  if (token && Number(token) !== Number(state.token || 0)) return false;

  const expectedRowNo = Number(state.rowNo || 0);
  const actualRowNo = Number(rowNo || 0);
  if (!options.allowNew && expectedRowNo && actualRowNo && expectedRowNo !== actualRowNo) return false;

  const expectedCustomerNo = (typeof normalizeCustomerNoForKey_ === 'function') ? normalizeCustomerNoForKey_(state.customerNo || '') : String(state.customerNo || '').trim();
  const actualCustomerNo = (typeof normalizeCustomerNoForKey_ === 'function') ? normalizeCustomerNoForKey_(customerNo || '') : String(customerNo || '').trim();
  if (!options.allowNew && expectedCustomerNo && actualCustomerNo && expectedCustomerNo !== actualCustomerNo) return false;

  return true;
}

function renderCustomerDetailIfActiveP456_(detail, renderOptions, token) {
  if (!detail) return false;
  const allowNew = !!(detail && detail.isNew);
  const rowNo = Number(detail && detail.rowNo) || 0;
  const customerNo = detail && detail.customerNo;
  if (!isCustomerDetailResponseStillRelevantP456_(token || 0, rowNo, customerNo, { allowNew: allowNew })) return false;
  if (!allowNew && typeof hasActiveDetailDraftP457_ === 'function' && hasActiveDetailDraftP457_() && typeof applyServerDetailSafelyP457_ === 'function') {
    applyServerDetailSafelyP457_(detail, { reason: 'renderIfActiveGuarded', source: 'master', neverRender: true });
    return true;
  }
  if (typeof renderDetail === 'function') renderDetail(detail, renderOptions || {});
  return true;
}

function cleanupCustomerDetailModalStateP456_() {
  try { if (typeof customerDetailModalRequestSeq !== 'undefined') customerDetailModalRequestSeq++; } catch (err) {}
  try { if (typeof activeCustomerDetailModalTokenP456 !== 'undefined') activeCustomerDetailModalTokenP456++; } catch (err) {}
  try { activeCustomerDetailModalStateP456 = { open: false, token: activeCustomerDetailModalTokenP456 || 0, mode: '', rowNo: 0, customerNo: '', startedAt: 0 }; } catch (err) {}

  try { currentDetail = null; } catch (err) {}
  try { currentDetailCustomerNo = ''; } catch (err) {}
  try { isDetailEditMode = false; } catch (err) {}
  try { lastCalcResult = null; } catch (err) {}
  try { discountTargetMode = false; } catch (err) {}
  try { registrationMode = false; } catch (err) {}
  try { savedRegistrationMode = false; } catch (err) {}
  try { registrationApplied = false; } catch (err) {}
  try { registrationCalcResult = null; } catch (err) {}
  try { if (typeof clearDetailEditBaseline_ === 'function') clearDetailEditBaseline_(); } catch (err) {}
  try { if (typeof resetDetailSessionP457_ === 'function') resetDetailSessionP457_({ keepGlobalPending: true }); } catch (err) {}

  try {
    const body = document.getElementById('modalBody');
    if (body) body.innerHTML = '';
  } catch (err) {}
  try {
    const footer = document.getElementById('modalActionFooter');
    if (footer) footer.innerHTML = '<button class="secondary" onclick="closeModal()">닫기</button>';
  } catch (err) {}
  try {

    if (title) {

      title.textContent = '고객 상세';
    }
  } catch (err) {}
  try { document.body.classList.remove('portal-user-editing'); } catch (err) {}
}

function closeModal(options){
  options = options || {};
  // P457: 상세 저장은 고객별 큐/operation log로 추적합니다. 모달 닫기 자체는 입력 흐름을 방해하지 않습니다.
  // 브라우저 종료/새로고침은 beforeunload에서만 보호합니다.
  const backdrop = document.getElementById('modalBackdrop');
  const footer = document.getElementById('modalActionFooter');
  if (backdrop) backdrop.style.display='none';
  if (footer) footer.style.display='none';
  cleanupCustomerDetailModalStateP456_();
  return true;
}
function toast(msg, options){
  options = options || {};
  const text = String(msg == null ? '' : msg);
  if (shouldSuppressToastWhileEditing_(text, options)) return;

  const el = toastEl();
  if (!el) return;

  // 알림은 순수 표시 요소입니다. focus/selection/activeElement에는 절대 개입하지 않습니다.
  el.removeAttribute('role');
  el.removeAttribute('aria-live');
  el.setAttribute('aria-hidden', 'true');
  el.setAttribute('tabindex', '-1');
  try { el.inert = true; } catch (err) {}

  el.textContent = text;
  el.style.display = 'block';

  clearTimeout(window.__portalToastTimer);
  window.__portalToastTimer = setTimeout(function(){
    el.style.display = 'none';
  }, Number(options.duration || 1800));
}

function shouldSuppressToastWhileEditing_(msg, options){
  if (options && options.force) return false;
  if (options && options.silent) return true;
  if (!isPortalUserEditingNow_()) return false;

  // 입력 도중 표시할 필요가 낮은 저장/반영/완료 안내는 아예 띄우지 않습니다.
  // 오류·실패·필수입력 안내는 작업 방해 가능성이 있어도 사용자 확인이 필요하므로 유지합니다.
  const text = String(msg || '');
  const isLowPriorityNotice = /(저장|반영|완료|불러왔습니다|추가했습니다|해제했습니다)/.test(text);
  const isImportantNotice = /(오류|실패|경고|필수|입력|선택|찾지 못|못했습니다|확인)/.test(text);
  return isLowPriorityNotice && !isImportantNotice;
}

function isPortalUserEditingNow_(){
  const active = document.activeElement;
  if (active && active !== document.body && isEditableFocusTarget_(active)) return true;
  if (window.customerInlineEditActive && window.customerInlineEditActive.inputId && document.getElementById(window.customerInlineEditActive.inputId)) return true;
  return !!(document.body && document.body.classList && document.body.classList.contains('portal-user-editing'));
}

function isEditableFocusTarget_(el){
  if (!el) return false;
  const tag = String(el.tagName || '').toUpperCase();
  return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || !!el.isContentEditable;
}
function toastEl(){ return document.getElementById('toast'); }
function showSearchError(err){ const msg=err&&err.message?err.message:String(err||'알 수 없는 오류'); resultArea.innerHTML='<div class="loading" style="color:#b42318;">오류: '+esc(msg)+'</div>'; }
function clearModalErrorBox(){ const old=document.querySelector('.modal-error-box'); if(old) old.remove(); }
function showModalError(err){
  const msg=err&&err.message?err.message:String(err||'알 수 없는 오류');
  const old=document.querySelector('.modal-error-box');
  if(old) old.remove();
  const box=document.createElement('div');
  box.className='section-card modal-error-box';
  box.style.marginTop='16px';
  box.style.color='#b42318';
  box.style.borderColor='#fecdca';
  box.style.background='#fffbfa';
  box.textContent='오류: '+msg;
  modalBody.appendChild(box);
  toast('오류가 발생했습니다. 입력값은 유지됩니다.');
}
function showGlobalError(err){ toast(err&&err.message?err.message:String(err||'오류가 발생했습니다.')); }
function disp(value){ const text=String(value==null?'':value).trim(); return text?text:'-'; }
function escAttr(value){ return esc(value).replace(/`/g,'&#096;'); }
function esc(value){ return String(value==null?'':value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function formatDateInput_(date) {
  date = date instanceof Date ? date : new Date(date);
  const pad = n => String(n).padStart(2, '0');
  return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
}
function parseDateInput_(dateStr) {
  const m = String(dateStr || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])) : new Date();
}
// PATCH P1-5: 표 헤더 클릭 정렬 공통 유틸
function normalizePortalSortTextP15_(value) {
  return String(value == null ? '' : value).replace(/\u00a0/g, ' ').trim();
}

function parsePortalSortNumberP15_(value) {
  const raw = normalizePortalSortTextP15_(value).replace(/[^0-9.\-]/g, '');
  if (!raw || raw === '-' || raw === '.' || raw === '-.') return NaN;
  return Number(raw);
}

function parsePortalSortDateP15_(value) {
  const text = normalizePortalSortTextP15_(value);
  if (!text) return NaN;
  let m = text.match(/(20\d{2}|\d{2})[.\-\/]\s*(\d{1,2})[.\-\/]\s*(\d{1,2})(?:\s+(\d{1,2}):(\d{2}))?/);
  if (m) {
    let y = Number(m[1]);
    if (y < 100) y += 2000;
    const d = new Date(y, Number(m[2]) - 1, Number(m[3]), Number(m[4] || 0), Number(m[5] || 0), 0, 0);
    const t = d.getTime();
    return isNaN(t) ? NaN : t;
  }
  const fallback = Date.parse(text);
  return isNaN(fallback) ? NaN : fallback;
}

function comparePortalSortValuesP15_(a, b, dir) {
  dir = String(dir || 'asc').toLowerCase() === 'desc' ? 'desc' : 'asc';
  const sign = dir === 'desc' ? -1 : 1;
  const av = normalizePortalSortTextP15_(a);
  const bv = normalizePortalSortTextP15_(b);
  const am = !av || av === '-';
  const bm = !bv || bv === '-';
  if (am && bm) return 0;
  if (am) return 1;
  if (bm) return -1;

  const an = parsePortalSortNumberP15_(av);
  const bn = parsePortalSortNumberP15_(bv);
  if (!isNaN(an) && !isNaN(bn) && an !== bn) return (an < bn ? -1 : 1) * sign;

  const ad = parsePortalSortDateP15_(av);
  const bd = parsePortalSortDateP15_(bv);
  if (!isNaN(ad) && !isNaN(bd) && ad !== bd) return (ad < bd ? -1 : 1) * sign;

  const cmp = av.localeCompare(bv, 'ko', { numeric: true, sensitivity: 'base' });
  return cmp * sign;
}

function sortPortalRowsByKeyP15_(rows, key, dir) {
  rows = Array.isArray(rows) ? rows.slice() : [];
  key = String(key || '').trim();
  if (!key) return rows;
  return rows.map(function(row, idx) { return { row: row, idx: idx }; }).sort(function(a, b) {
    const cmp = comparePortalSortValuesP15_(a.row && a.row[key], b.row && b.row[key], dir);
    return cmp || (a.idx - b.idx);
  }).map(function(item) { return item.row; });
}

function getPortalSortArrowP15_(activeKey, activeDir, key) {
  if (String(activeKey || '') !== String(key || '')) return '';
  return String(activeDir || 'asc').toLowerCase() === 'desc' ? ' ▼' : ' ▲';
}

function makePortalSortableThP15_(label, key, activeKey, activeDir, handlerName, styleText) {
  const arrow = getPortalSortArrowP15_(activeKey, activeDir, key);
  return '<th class="portal-sortable-th" ' + (styleText ? 'style="' + escAttr(styleText) + '" ' : '') +
    'onclick="' + escAttr(handlerName) + '(\'' + escAttr(key) + '\')">' +
    esc(label || key) + '<span class="portal-sort-arrow">' + esc(arrow) + '</span></th>';
}


// P459: client-side performance and save-stability instrumentation.
// Keeps a small local ring buffer only; this must never block the user flow.
function portalNowP459_() {
  try { return (window.performance && performance.now) ? performance.now() : Date.now(); } catch (err) { return Date.now(); }
}

function portalPerfSafeJsonP459_(value) {
  try { return JSON.parse(JSON.stringify(value || {})); } catch (err) { return {}; }
}

function portalPerfLogP459_(eventName, detail) {
  try {
    const key = (typeof PORTAL_PERF_LOG_STORAGE_KEY_P459 !== 'undefined') ? PORTAL_PERF_LOG_STORAGE_KEY_P459 : 's1portal:perfLog:P459:v1';
    const max = (typeof PORTAL_PERF_LOG_MAX_ITEMS_P459 !== 'undefined') ? PORTAL_PERF_LOG_MAX_ITEMS_P459 : 500;
    const raw = localStorage.getItem(key);
    const arr = raw ? JSON.parse(raw) : [];
    const item = {
      at: new Date().toISOString(),
      t: Math.round(portalNowP459_()),
      event: String(eventName || ''),
      route: (typeof currentRoute !== 'undefined' ? currentRoute : ''),
      detail: portalPerfSafeJsonP459_(detail || {})
    };
    arr.push(item);
    while (arr.length > max) arr.shift();
    localStorage.setItem(key, JSON.stringify(arr));
    return item;
  } catch (err) {
    return null;
  }
}

function portalPerfStartP459_(eventName, detail) {
  const started = portalNowP459_();
  portalPerfLogP459_(String(eventName || '') + ':start', Object.assign({ started: Math.round(started) }, detail || {}));
  return {
    event: String(eventName || ''),
    started: started,
    detail: portalPerfSafeJsonP459_(detail || {})
  };
}

function portalPerfEndP459_(mark, extra) {
  try {
    if (!mark || !mark.event) return null;
    const ended = portalNowP459_();
    const ms = Math.round(ended - Number(mark.started || ended));
    return portalPerfLogP459_(mark.event + ':end', Object.assign({}, mark.detail || {}, extra || {}, { durationMs: ms }));
  } catch (err) {
    return null;
  }
}

function portalPerfErrorP459_(mark, err, extra) {
  try {
    const ended = portalNowP459_();
    const base = mark && mark.event ? mark.event : 'operation';
    const ms = mark ? Math.round(ended - Number(mark.started || ended)) : 0;
    return portalPerfLogP459_(base + ':error', Object.assign({}, (mark && mark.detail) || {}, extra || {}, {
      durationMs: ms,
      error: getErrorMessage_(err)
    }));
  } catch (e) {
    return null;
  }
}

function getPortalPerfLogsP459_() {
  try {
    const key = (typeof PORTAL_PERF_LOG_STORAGE_KEY_P459 !== 'undefined') ? PORTAL_PERF_LOG_STORAGE_KEY_P459 : 's1portal:perfLog:P459:v1';
    const raw = localStorage.getItem(key);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (err) {
    return [];
  }
}

function copyPortalPerfLogsP459_() {
  const logs = getPortalPerfLogsP459_();
  const text = JSON.stringify(logs, null, 2);
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text);
      toast('성능 로그를 클립보드에 복사했습니다.');
      return;
    }
  } catch (err) {}
  console.log('[P459 PERF LOG]', logs);
  toast('성능 로그를 콘솔에 출력했습니다.');
}

function clearPortalPerfLogsP459_() {
  try {
    const key = (typeof PORTAL_PERF_LOG_STORAGE_KEY_P459 !== 'undefined') ? PORTAL_PERF_LOG_STORAGE_KEY_P459 : 's1portal:perfLog:P459:v1';
    localStorage.removeItem(key);
    toast('성능 로그를 비웠습니다.');

}

function isPortalTransientWriteErrorP459_(err) {
  const msg = getErrorMessage_(err);
  if (typeof isTransientPortalWriteError_ === 'function' && isTransientPortalWriteError_(err)) return true;
  return /PORTAL_LOCK_BUSY|다른 작업 처리 중|LOCK|잠금|LockService|timeout|timed out|Exceeded maximum execution|Service invoked too many times/i.test(msg);
}

function getPortalSaveRetryDelayP459_(attempt) {
  const base = (typeof PORTAL_SAVE_RETRY_BASE_MS_P459 !== 'undefined') ? PORTAL_SAVE_RETRY_BASE_MS_P459 : 900;
  const max = (typeof PORTAL_SAVE_RETRY_MAX_MS_P459 !== 'undefined') ? PORTAL_SAVE_RETRY_MAX_MS_P459 : 12000;
  const n = Math.max(1, Number(attempt || 1));
  return Math.min(max, base * Math.pow(1.7, n - 1));
}

function waitPortalMsP459_(ms) {
  return new Promise(function(resolve) { setTimeout(resolve, Math.max(0, Number(ms || 0) || 0)); });
}
