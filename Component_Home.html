<script>
const HOME_CACHE_STORAGE_KEY_V77_BASE = 'portalHomeCache:v77';
let homeLoadInFlightV77 = false;
let homeRefreshInFlightV77 = false;
let homeLastLoadStartedAtV77 = 0;
let homeLastRefreshStartedAtV77 = 0;

function loadDashboard(options) {
  options = options || {};

  // 권한별 집계이므로 권한 확인 전의 낡은 공용 캐시는 렌더링하지 않습니다.
  if (!options.skipLocal) {
    renderHomeFromLocalCacheV77_();
  }

  const now = Date.now();
  if (homeLoadInFlightV77 || (!options.force && now - homeLastLoadStartedAtV77 < 1500)) {
    return;
  }
  homeLoadInFlightV77 = true;
  homeLastLoadStartedAtV77 = now;

  google.script.run
    .withSuccessHandler(function(data) {
      homeLoadInFlightV77 = false;
      applyHomeDataV77_(data, true);
      scheduleDashboardRefreshV77_(data && data.dashboard);
    })
    .withFailureHandler(function(err) {
      homeLoadInFlightV77 = false;
      renderHomeLoadSoftErrorV77_(err);
    })
    .getPortalHomeData();
}

function applyHomeDataV77_(data, saveCache) {
  data = data || {};
  const dashboard = data.dashboard || data;
  renderDashboardStatsV77_(dashboard);

  if (Array.isArray(data.notices)) {
    renderHomeNoticeList(data.notices);
  } else if (!homeNoticeCache || !homeNoticeCache.length) {
    loadHomeNoticeList();
  }

  scheduleHomeAlignmentFixP510_();

  if (saveCache) saveHomeCacheV77_(data);
}

function renderDashboardStatsV77_(dashboard) {
  dashboard = dashboard || {};
  const cards = Array.isArray(dashboard.cards) && dashboard.cards.length
    ? dashboard.cards.slice(0, 4)
    : [
        { label: '고객', value: dashboard.total },
        { label: '오늘 할 일', value: dashboard.sent },
        { label: '계약 완료', value: dashboard.completed },
        { label: '재확인 필요', value: dashboard.needCheck }
      ];

  while (cards.length < 4) cards.push({ label: '-', value: '-' });

  const valueIds = ['statTotal', 'statSent', 'statCompleted', 'statNeedCheck'];
  const labelEls = getHomeMetricLabelElementsV77_();

  cards.forEach(function(card, idx) {
    const valueEl = document.getElementById(valueIds[idx]);
    if (valueEl) valueEl.textContent = normalizeHomeMetricTextV77_(card.value);
    if (labelEls[idx]) labelEls[idx].textContent = String(card.label || '-');
  });
}

function getHomeMetricLabelElementsV77_() {
  const section = document.getElementById('homeSection');
  if (!section) return [];
  return Array.from(section.querySelectorAll('.home-cards .metric-card .metric-label'));
}

function normalizeHomeMetricTextV77_(value) {
  if (value === undefined || value === null || value === '') return '-';
  return String(value);
}

function renderHomeFromLocalCacheV77_() {
  // 권한 로딩 전에는 admin/sales 캐시가 섞일 수 있으므로 local cache를 사용하지 않습니다.
  if (typeof portalPermissionLoadedV63 !== 'undefined' && !portalPermissionLoadedV63) return false;

  const cached = readHomeCacheV77_();
  if (!cached) return false;
  applyHomeDataV77_(cached, false);
  return true;
}


function isHomeAllScopeByPermissionV78_(p) {
  p = p || {};
  // PATCH P1-15: 고객 전체열람권한과 HOME 관리자형 대시보드 권한을 분리합니다.
  return !!(p.active !== false && p.canUseAdminHome);
}

function getHomeCacheKeyV77_(dashboard) {
  if (dashboard && dashboard.clientCacheKey) return String(dashboard.clientCacheKey);

  try {
    if (typeof getPortalPermission_ === 'function') {
      const p = getPortalPermission_();
      if (p && p.active !== false) {
        const allScope = isHomeAllScopeByPermissionV78_(p);
        const scope = allScope ? 'ALL_ADMIN' : ('OWN_' + (p.salesRepName || p.name || p.email || 'USER'));
        return HOME_CACHE_STORAGE_KEY_V77_BASE + ':' + scope.replace(/[^A-Za-z0-9가-힣_]+/g, '_');
      }
    }
  } catch (err) {}

  return HOME_CACHE_STORAGE_KEY_V77_BASE + ':UNKNOWN';
}

function readHomeCacheV77_() {
  try {
    const raw = localStorage.getItem(getHomeCacheKeyV77_());
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || typeof obj !== 'object') return null;
    return obj;
  } catch (err) {
    return null;
  }
}

function saveHomeCacheV77_(data) {
  try {
    const dashboard = data && data.dashboard ? data.dashboard : null;
    const slim = {
      dashboard: dashboard,
      notices: Array.isArray(data && data.notices) ? data.notices.slice(0, 3) : [],
      savedAt: new Date().toISOString()
    };
    localStorage.setItem(getHomeCacheKeyV77_(dashboard), JSON.stringify(slim));
  } catch (err) {}
}

function scheduleDashboardRefreshV77_(dashboard) {
  dashboard = dashboard || {};
  const now = Date.now();
  const needsRefresh = dashboard.needsRefresh || dashboard.initializing || dashboard.total === '-' || !dashboard.cachedAt;
  if (!needsRefresh && now - homeLastRefreshStartedAtV77 < 5 * 60 * 1000) return;
  if (homeRefreshInFlightV77) return;

  homeRefreshInFlightV77 = true;
  homeLastRefreshStartedAtV77 = now;

  setTimeout(function() {
    google.script.run
      .withSuccessHandler(function(freshDashboard) {
        homeRefreshInFlightV77 = false;
        if (freshDashboard) {
          const cached = readHomeCacheV77_() || {};
          cached.dashboard = freshDashboard;
          saveHomeCacheV77_(cached);
          renderDashboardStatsV77_(freshDashboard);
          scheduleHomeAlignmentFixP510_();
        }
      })
      .withFailureHandler(function(err) {
        homeRefreshInFlightV77 = false;
        console.warn('대시보드 백그라운드 갱신 실패', err);
      })
      .refreshPortalDashboardCache();
  }, 400);
}

function renderHomeLoadSoftErrorV77_(err) {
  console.warn('HOME 데이터 조회 실패', err);
  const hasCached = renderHomeFromLocalCacheV77_();
  if (!hasCached) {
    renderDashboardStatsV77_({
      cards: [
        { label: '고객', value: '-' },
        { label: '오늘 할 일', value: '-' },
        { label: '계약 완료', value: '-' },
        { label: '재확인 필요', value: '-' }
      ]
    });
  }
}

// 기존 코드/다른 컴포넌트에서 참조할 수 있는 구버전 함수명 호환 alias
function renderDashboardStatsV46_(dashboard) { return renderDashboardStatsV77_(dashboard); }
function applyHomeDataV46_(data, saveCache) { return applyHomeDataV77_(data, saveCache); }
function renderHomeFromLocalCacheV46_() { return renderHomeFromLocalCacheV77_(); }
function readHomeCacheV46_() { return readHomeCacheV77_(); }
function saveHomeCacheV46_(data) { return saveHomeCacheV77_(data); }
function scheduleDashboardRefreshV46_(dashboard) { return scheduleDashboardRefreshV77_(dashboard); }
function renderHomeLoadSoftErrorV46_(err) { return renderHomeLoadSoftErrorV77_(err); }


// PATCH HOME-ALIGN-P510: HOME 수주 관련 표/리스트 줄 맞춤 전용
// - 데이터 조회, 저장, 서버 함수 호출 로직은 건드리지 않고 DOM 표시 정렬만 보정합니다.
let homeAlignmentFixTimerP510_ = null;
let homeAlignmentObserverP510_ = null;

function scheduleHomeAlignmentFixP510_() {
  if (homeAlignmentFixTimerP510_) clearTimeout(homeAlignmentFixTimerP510_);
  homeAlignmentFixTimerP510_ = setTimeout(function() {
    homeAlignmentFixTimerP510_ = null;
    applyHomeAlignmentFixP510_();
  }, 30);
  setTimeout(applyHomeAlignmentFixP510_, 180);
  setTimeout(applyHomeAlignmentFixP510_, 650);
}

function setupHomeAlignmentObserverP510_() {
  const root = document.getElementById('homeSection');
  if (!root || typeof MutationObserver === 'undefined' || homeAlignmentObserverP510_) return;
  homeAlignmentObserverP510_ = new MutationObserver(function() {
    scheduleHomeAlignmentFixP510_();
  });
  homeAlignmentObserverP510_.observe(root, { childList: true, subtree: true });
  scheduleHomeAlignmentFixP510_();
}

function applyHomeAlignmentFixP510_() {
  const root = document.getElementById('homeSection');
  if (!root) return;

  Array.from(root.querySelectorAll('table')).forEach(function(table) {
    const headers = Array.from(table.querySelectorAll('thead th, tr:first-child th')).map(function(th) {
      return normalizeHomeAlignmentTextP510_(th.textContent);
    });
    const headerText = headers.join('|');
    const panelText = normalizeHomeAlignmentTextP510_(getHomeAlignmentPanelTextP510_(table));
    const colCount = Math.max(headers.length, getHomeAlignmentFirstBodyColumnCountP510_(table));

    if (isHomeContractListTableP510_(headerText, panelText, colCount)) {
      table.classList.add('home-contract-list-table-p510');
      applyHomeColgroupP510_(table, ['16%', '44%', '11%', '18%', '11%']);
      applyHomeTableAlignmentP510_(table, ['left', 'left', 'center', 'right', 'center']);
      return;
    }

    if (isHomeSalesSummaryTableP510_(headerText, panelText, colCount)) {
      table.classList.add('home-sales-summary-table-p510');
      if (colCount === 3) {
        applyHomeColgroupP510_(table, ['46%', '27%', '27%']);
        applyHomeTableAlignmentP510_(table, ['left', 'right', 'right']);
      } else if (colCount === 4) {
        applyHomeColgroupP510_(table, ['40%', '20%', '20%', '20%']);
        applyHomeTableAlignmentP510_(table, ['left', 'right', 'right', 'right']);
      } else {
        applyHomeTableAlignmentP510_(table, ['left']);
      }
    }
  });

  // 혹시 수주 리스트가 table이 아니라 div grid/flex로 렌더링되는 경우까지 외관만 보정합니다.
  Array.from(root.querySelectorAll('.home-contract-list-p510, .home-sales-summary-p510')).forEach(function(box) {
    alignHomeGridRowsP510_(box);
  });
}

function isHomeContractListTableP510_(headerText, panelText, colCount) {
  const target = headerText + '|' + panelText;
  if (colCount !== 5) return false;
  return /계약일|계약일자/.test(target) &&
    /고객사|고객명|회사명/.test(target) &&
    /담당/.test(target) &&
    /계약가|계약금액|견적가|금액/.test(target) &&
    /수행사/.test(target);
}

function isHomeSalesSummaryTableP510_(headerText, panelText, colCount) {
  const target = headerText + '|' + panelText;
  if (colCount < 2 || colCount > 4) return false;
  return /담당자별|담당별|영업담당/.test(target) && /수주|계약/.test(target);
}

function getHomeAlignmentFirstBodyColumnCountP510_(table) {
  const row = table.querySelector('tbody tr:not(.customer-expand-row), tr:nth-child(2)');
  return row ? row.children.length : 0;
}

function getHomeAlignmentPanelTextP510_(el) {
  let cur = el;
  for (let i = 0; cur && i < 5; i++, cur = cur.parentElement) {
    const t = cur.textContent || '';
    if (/최근\s*수주|이번주\s*수주|담당자별\s*수주|수주\s*리스트|수주\s*현황/.test(t)) return t.slice(0, 800);
  }
  return '';
}

function applyHomeColgroupP510_(table, widths) {
  widths = widths || [];
  if (!widths.length) return;
  const current = table.querySelector('colgroup[data-home-align-p510="Y"]');
  if (current && current.children.length === widths.length) return;

  const old = table.querySelector('colgroup');
  if (old) old.remove();

  const colgroup = document.createElement('colgroup');
  colgroup.setAttribute('data-home-align-p510', 'Y');
  widths.forEach(function(width) {
    const col = document.createElement('col');
    col.style.width = width;
    colgroup.appendChild(col);
  });
  table.insertBefore(colgroup, table.firstChild);
}

function applyHomeTableAlignmentP510_(table, aligns) {
  aligns = aligns || [];
  table.style.width = '100%';
  table.style.tableLayout = 'fixed';
  table.style.borderCollapse = 'collapse';

  Array.from(table.querySelectorAll('tr')).forEach(function(row) {
    Array.from(row.children).forEach(function(cell, idx) {
      const align = aligns[idx] || (idx === 0 ? 'left' : 'center');
      cell.style.boxSizing = 'border-box';
      cell.style.textAlign = align;
      const isHeaderCellP510 = cell.tagName && cell.tagName.toUpperCase() === 'TH';
      cell.style.verticalAlign = isHeaderCellP510 ? 'middle' : (table.classList.contains('home-contract-list-table-p510') ? 'top' : 'middle');
      cell.style.whiteSpace = idx === 1 ? 'normal' : 'nowrap';
      cell.style.overflow = 'hidden';
      cell.style.textOverflow = 'ellipsis';
      if (align === 'right' || /금액|계약가|견적가|건수|합계|총액/.test(cell.textContent || '')) {
        cell.style.fontVariantNumeric = 'tabular-nums';
      }
    });
  });
}

function alignHomeGridRowsP510_(box) {
  const rows = Array.from(box.children || []).filter(function(el) { return el && el.children && el.children.length >= 2; });
  rows.forEach(function(row) {
    const count = row.children.length;
    if (count === 5) row.style.gridTemplateColumns = '16% 44% 11% 18% 11%';
    if (count === 4) row.style.gridTemplateColumns = '40% 20% 20% 20%';
    if (count === 3) row.style.gridTemplateColumns = '46% 27% 27%';
    row.style.alignItems = count === 5 ? 'start' : 'center';
    Array.from(row.children).forEach(function(cell, idx) {
      cell.style.minWidth = '0';
      cell.style.alignSelf = count === 5 ? 'start' : 'center';
      cell.style.overflow = 'hidden';
      cell.style.textOverflow = 'ellipsis';
      cell.style.whiteSpace = idx === 1 ? 'normal' : 'nowrap';
      if (count === 5) cell.style.textAlign = ['left', 'left', 'center', 'right', 'center'][idx] || 'center';
      else if (idx > 0) cell.style.textAlign = 'right';
    });
  });
}

function normalizeHomeAlignmentTextP510_(value) {
  return String(value || '').replace(/\s+/g, ' ').trim();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', setupHomeAlignmentObserverP510_);
} else {
  setupHomeAlignmentObserverP510_();
}

</script>
