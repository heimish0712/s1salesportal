let PORTAL_STATUS_STYLE_MAP = {};

function normalizeStatusKey_(value) {
  return String(value || '').replace(/\s+/g, ' ').trim();
}

function normalizePortalColorClient_(value, fallback) {
  const text = String(value || '').trim();
  if (/^#[0-9a-fA-F]{6}$/.test(text)) return text;
  if (/^[0-9a-fA-F]{6}$/.test(text)) return '#' + text;
  return fallback;
}

function normalizePortalStatusOption_(item, fallbackOrder) {
  item = item || {};
  const value = String(item.value || item.label || '').trim();
  const label = String(item.label || item.value || '').trim();
  return {
    value: value,
    label: label || value,
    bg: normalizePortalColorClient_(item.bg, '#f2f4f7'),
    fg: normalizePortalColorClient_(item.fg, '#344054'),
    order: Number(item.order || fallbackOrder || 9999) || 9999,
    active: item.active !== false,
    description: String(item.description || '').trim()
  };
}

function rebuildPortalStatusSettings_(rawOptions) {
  const seen = {};
  const list = (rawOptions && rawOptions.length ? rawOptions : PORTAL_DEFAULT_STATUS_OPTIONS_F)
    .map(function(item, idx) { return normalizePortalStatusOption_(item, idx + 1); })
    .filter(function(item) { return item.value; })
    .sort(function(a, b) { return (a.order || 9999) - (b.order || 9999); })
    .filter(function(item) {
      const key = normalizeStatusKey_(item.value);
      if (!key || seen[key]) return false;
      seen[key] = true;
      return true;
    });

  PORTAL_STATUS_STYLE_MAP = {};
  list.forEach(function(item) {
    PORTAL_STATUS_STYLE_MAP[normalizeStatusKey_(item.value)] = { bg: item.bg, fg: item.fg, label: item.label, active: item.active, order: item.order };
  });

  portalSettingsState.statusOptions = list;
  return list;
}

function getPortalStatusStyle_(statusText) {
  if (!Object.keys(PORTAL_STATUS_STYLE_MAP || {}).length) rebuildPortalStatusSettings_(portalSettingsState.statusOptions);
  const key = normalizeStatusKey_(statusText);
  if (PORTAL_STATUS_STYLE_MAP[key]) return PORTAL_STATUS_STYLE_MAP[key];
  return { bg: '#f2f4f7', fg: '#344054', label: statusText || '-' };
}

function getPortalStatusOptionsForSelect_(currentValue) {
  const currentKey = normalizeStatusKey_(currentValue);
  const list = (portalSettingsState.statusOptions || []).filter(function(item) {
    return item.active !== false || normalizeStatusKey_(item.value) === currentKey;
  });

  if (currentKey && !list.some(function(item) { return normalizeStatusKey_(item.value) === currentKey; })) {
    const st = getPortalStatusStyle_(currentValue);
    list.unshift({ value: currentValue, label: currentValue, bg: st.bg, fg: st.fg, order: -1, active: false });
  }
  return list;
}

function renderStatusOptionsForDetail_(current) {
  const currentText = String(current || '').trim();
  const options = getPortalStatusOptionsForSelect_(currentText);
  const seen = {};
  let html = '';
  options.forEach(function(opt) {
    const value = String(opt.value || '').trim();
    if (!value) return;
    const key = normalizeStatusKey_(value);
    if (seen[key]) return;
    seen[key] = true;
    html += '<option value="' + escAttr(value) + '"' + (normalizeStatusKey_(currentText) === key ? ' selected' : '') + '>' + esc(opt.label || value) + '</option>';
  });
  return html;
}

function renderStatusChip_(statusText, extraClass) {
  const text = String(statusText || '').trim() || '-';
  const st = getPortalStatusStyle_(text);
  const cls = 'status portal-status-chip' + (extraClass ? ' ' + extraClass : '');
  return '<span class="' + escAttr(cls) + '" style="background:' + escAttr(st.bg) + ';color:' + escAttr(st.fg) + ';border-color:' + escAttr(st.bg) + ';">' + esc(st.label || text) + '</span>';
}

function loadPortalSettings_(options) {
  options = options || {};
  if (portalSettingsState.loading && !options.force) return;
  portalSettingsState.loading = true;

  // 우선 fallback을 즉시 활성화해 화면이 깨지지 않게 합니다.
  rebuildPortalStatusSettings_(portalSettingsState.statusOptions || PORTAL_DEFAULT_STATUS_OPTIONS_F);

  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    portalSettingsState.loading = false;
    portalSettingsState.loaded = true;
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      portalSettingsState.loading = false;
      const opts = res && Array.isArray(res.statusOptions) && res.statusOptions.length ? res.statusOptions : PORTAL_DEFAULT_STATUS_OPTIONS_F;
      portalSettingsState.loaded = true;
      portalSettingsState.source = (res && res.source) || '설정_DB';
      portalSettingsState.updatedAt = (res && res.updatedAt) || '';
      rebuildPortalStatusSettings_(opts);
      refreshPortalStatusUi_();
      if (!options.silent) toast('설정_DB를 불러왔습니다.');
    })
    .withFailureHandler(function(err) {
      portalSettingsState.loading = false;
      portalSettingsState.loaded = true;
      portalSettingsState.source = 'fallback-after-error';
      rebuildPortalStatusSettings_(PORTAL_DEFAULT_STATUS_OPTIONS_F);
      refreshPortalStatusUi_();
      console.warn('설정_DB 로딩 실패. 기본값을 사용합니다.', err);
      if (!options.silent) toast('설정_DB 로딩 실패. 기본 상태값을 사용합니다.');
    })
    .getPortalSettings();
}

function refreshPortalStatusUi_() {
  try {
    document.querySelectorAll('.portal-status-select').forEach(function(select) {
      const current = select.value || '';
      select.innerHTML = renderStatusOptionsForDetail_(current);
      select.value = current;
      if (typeof applyPortalStatusControlStyles_ === 'function') applyPortalStatusControlStyles_();
    });
  } catch (err) {}

  try {
    if (lastCustomerResultResponse && typeof renderCustomerResultsFromResponse_ === 'function') {
      renderCustomerResultsFromResponse_(lastCustomerResultResponse, lastCustomerResultFromCache);
    }
  } catch (err) {}

  try {
    if (typeof rerenderSendCustomerResultsIfVisible_ === 'function') rerenderSendCustomerResultsIfVisible_();
  } catch (err) {}
}

// fallback 색상을 즉시 준비합니다. 실제 설정_DB 값은 window.onload에서 비동기로 덮어씁니다.

function commitFavoriteStateOptimistic_(mutation, serverMap) {

const PORTAL_FONT_SCALE_KEY_P121 = 'uiFontScale';

const PORTAL_FONT_SCALE_MIN_P121 = 0.85;
const PORTAL_FONT_SCALE_MAX_P121 = 1.35;

const PORTAL_FONT_SCALE_LOCAL_KEY_P121 = 'salesPortal.uiFontScale.last';
const PORTAL_FONT_SCALE_LOCAL_PREFIX_P121 = 'salesPortal.uiFontScale.email.';

  loading: false,
  saving: false,
  saveTimer: null,

function clampPortalFontScaleP121_(value) {

  if (!isFinite(n) || n <= 0) n = PORTAL_FONT_SCALE_DEFAULT_P121;
  n = Math.max(PORTAL_FONT_SCALE_MIN_P121, Math.min(PORTAL_FONT_SCALE_MAX_P121, n));
