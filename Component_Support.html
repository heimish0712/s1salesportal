<script>
let supportSortKeyP15 = "";
let supportSortDirP15 = "asc";

function makePortalSupportClientRequestIdP26_(prefix) {
  return String(prefix || 'SUP') + '-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
}

function normalizePortalSaveErrorMessageP26_(err, fallback) {
  const msg = getErrorMessage_(err);
  if (/LockService|lock|мһ кёҲ|timeout|Timeout|Service invoked too many times/i.test(msg)) return 'лӢӨлҘё мһ‘м—… мІҳлҰ¬ мӨ‘мһ…лӢҲлӢӨ. мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙ мЈјм„ёмҡ”.';
  if (/Exception|ReferenceError|TypeError/i.test(msg)) return fallback || 'м ҖмһҘн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. мһ…л Ҙ лӮҙмҡ©мқҖ мң м§Җлҗ©лӢҲлӢӨ.';
  return msg || fallback || 'м ҖмһҘн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. мһ…л Ҙ лӮҙмҡ©мқҖ мң м§Җлҗ©лӢҲлӢӨ.';
}

function isSupportSectionActiveV57_() {
  const section = document.getElementById('supportSection');
  return !!(section && section.classList && section.classList.contains('active'));
}

function renderSupportDataV57_(data) {
  data = data || { rows: [], requestTypes: [], statusOptions: [], currentUser: '' };
  supportCurrentData = data;
  renderSupportStatusFilter_(data.statusOptions || []);
  renderSupportBoard(data.rows || []);
}

function preloadSupportPageV57_(options) {
  options = options || {};
  if (supportPreloadStartedV57 && supportLoadingV56) return;

  const cached = readSupportCacheV56_();
  if (cached && cached.rows && cached.rows.length) {
    supportCurrentData = cached;
    supportLastLoadAtV56 = Number(cached.cachedAt || cached.loadedAt || Date.now()) || Date.now();
    if (isSupportSectionActiveV57_()) renderSupportDataV57_(cached);
    const age = Date.now() - Number(cached.cachedAt || cached.loadedAt || 0);
    if (age > 0 && age < SUPPORT_BACKGROUND_REFRESH_MS_V57) {
      supportPreloadCompletedV57 = true;
      return;
    }
  }

  if (supportLoadingV56) return;
  supportPreloadStartedV57 = true;
  supportLoadingV56 = true;

  google.script.run
    .withSuccessHandler(function(data) {
      supportLoadingV56 = false;
      supportPreloadCompletedV57 = true;
      supportLastLoadAtV56 = Date.now();
      data = data || { rows: [], requestTypes: [], statusOptions: [], currentUser: '' };
      supportCurrentData = data;
      saveSupportCacheV56_(data);
      if (isSupportSectionActiveV57_()) renderSupportDataV57_(data);

      // мөңк·ј мҠӨмә”мқҙ л¶Ҳмҷ„м „н•ҳкі  кІ°кіјк°Җ м—Ҷмңјл©ҙ мӮ¬мҡ©мһҗк°Җ л“Өм–ҙмҳӨкё° м „м—җ м „мІҙ ліҙк°•мқ„ мЎ°мҡ©нһҲ мӢңлҸ„н•©лӢҲлӢӨ.
      if ((!data.rows || !data.rows.length) && data.meta && data.meta.complete === false) {
        setTimeout(function() { loadSupportFullV56_({ silent: true }); }, 400);
      }
    })
    .withFailureHandler(function(err) {
      supportLoadingV56 = false;
      if (!options.silent) console.warn('мҳҒм—…м§Җмӣҗ мҡ”мІӯ н”„лҰ¬лЎңл“ң мӢӨнҢЁ', err);
    })
    .getPortalSupportRecentData({ keyword: '', status: '', limit: 100, maxScanRows: 1200, chunkSize: 300 });
}

function loadSupportPage(options) {
  options = options || {};
  if (!portalPermissionLoadedV63) {
    const area = document.getElementById('supportBoardArea');
    if (area) area.innerHTML = '<div class="loading">мӮ¬мҡ©мһҗ к¶Ңн•ңмқ„ нҷ•мқён•ң л’Ө мҳҒм—…м§Җмӣҗ мҡ”мІӯ нҷ”л©ҙмқ„ мӨҖл№„н•ҳлҠ” мӨ‘мһ…лӢҲлӢӨ...</div>';
    loadPortalCurrentPermission_({ silent: true }, function() { loadSupportPage(options); });
    return;
  }
  updateSupportRoleUiV65_();
  const keyword = document.getElementById('supportKeyword') ? document.getElementById('supportKeyword').value : '';
  const status = document.getElementById('supportStatusFilter') ? document.getElementById('supportStatusFilter').value : '';
  const area = document.getElementById('supportBoardArea');
  const hasFilter = !!String(keyword || '').trim() || !!String(status || '').trim();
  const force = !!options.force;

  // PATCH L: HOMEм—җм„ң л°ұк·ёлқјмҡҙл“ң н”„лҰ¬лЎңл“ң мӨ‘мқҙл©ҙ мӨ‘ліө нҳём¶ңн•ҳм§Җ м•Ҡкі , мҷ„лЈҢ мҪңл°ұмқҙ нҳ„мһ¬ нҷ”л©ҙмқ„ л ҢлҚ”л§Ғн•ҳкІҢ л‘ЎлӢҲлӢӨ.
  if (!force && !hasFilter && supportLoadingV56) {
    if (supportCurrentData && Array.isArray(supportCurrentData.rows) && supportCurrentData.rows.length) {
      renderSupportDataV57_(supportCurrentData);
    } else {
      const cachedWhileLoading = readSupportCacheV56_();
      if (cachedWhileLoading && cachedWhileLoading.rows && cachedWhileLoading.rows.length) {
        supportCurrentData = cachedWhileLoading;
        renderSupportDataV57_(cachedWhileLoading);
      } else if (area) {
        area.innerHTML = '<div class="loading">мҳҒм—…м§Җмӣҗ мҡ”мІӯмқ„ л°ұк·ёлқјмҡҙл“ңм—җм„ң л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ...</div>';
      }
    }
    return;
  }

  // v56: л©”лүҙ мһ¬м§„мһ… мӢң кё°мЎҙ л©”лӘЁлҰ¬/лёҢлқјмҡ°м Җ мәҗмӢңлҘј лЁјм Җ н‘ңмӢңн•©лӢҲлӢӨ.
  if (!force && !hasFilter && supportCurrentData && Array.isArray(supportCurrentData.rows) && supportCurrentData.rows.length) {
    renderSupportStatusFilter_(supportCurrentData.statusOptions || []);
    renderSupportBoard(supportCurrentData.rows || []);
    const age = Date.now() - (supportLastLoadAtV56 || 0);
    if (age < 90 * 1000 || supportLoadingV56) return;
  } else if (!force && !hasFilter) {
    const cached = readSupportCacheV56_();
    if (cached && cached.rows && cached.rows.length) {
      supportCurrentData = cached;
      renderSupportStatusFilter_(cached.statusOptions || []);
      renderSupportBoard(cached.rows || []);
    } else if (area) {
      area.innerHTML = '<div class="loading">л§ҲмҠӨн„°мӢңнҠёмқҳ мҳҒм—…м§Җмӣҗмҡ”мІӯ мӢңнҠём—җм„ң мөңк·ј мҡ”мІӯмқ„ л¶Ҳлҹ¬мҳӨлҠ” мӨ‘мһ…лӢҲлӢӨ...</div>';
    }
  } else if (area) {
    area.innerHTML = '<div class="loading">мҳҒм—…м§Җмӣҗ мҡ”мІӯ м „мІҙ лӘ©лЎқмқ„ кІҖмғүн•ҳлҠ” мӨ‘мһ…лӢҲлӢӨ...</div>';
  }

  supportLoadingV56 = true;

  const onSuccess = function(data) {
    supportLoadingV56 = false;
    supportLastLoadAtV56 = Date.now();
    data = data || { rows: [], requestTypes: [], statusOptions: [], currentUser: '' };
    supportCurrentData = data;
    renderSupportStatusFilter_(data.statusOptions || []);
    renderSupportBoard(data.rows || []);
    if (!hasFilter) saveSupportCacheV56_(data);

    // мөңк·ј мҠӨмә”м—җм„ң 0кұҙмқёлҚ° м „мІҙ мҠӨмә”мқҙ лҒқлӮң кІҢ м•„лӢҲл©ҙ, н•ң лІҲл§Ң м „мІҙ лӘ©лЎқмңјлЎң ліҙк°•н•©лӢҲлӢӨ.
    if (!hasFilter && !force && (!data.rows || !data.rows.length) && data.meta && data.meta.complete === false) {
      setTimeout(function() { loadSupportFullV56_({ silent: true }); }, 250);
    }
  };

  const onFailure = function(err) {
    supportLoadingV56 = false;
    const cached = !hasFilter ? readSupportCacheV56_() : null;
    if (cached && cached.rows && cached.rows.length) {
      supportCurrentData = cached;
      renderSupportStatusFilter_(cached.statusOptions || []);
      renderSupportBoard(cached.rows || []);
      toast('мҳҒм—…м§Җмӣҗ мҡ”мІӯ мөңмӢ  мЎ°нҡҢ мӢӨнҢЁ. мәҗмӢң лӘ©лЎқмқ„ н‘ңмӢңн•©лӢҲлӢӨ.');
      return;
    }
    if (area) area.innerHTML = '<div class="loading" style="color:#b42318;">мҳҒм—…м§Җмӣҗ мҡ”мІӯмқ„ л¶Ҳлҹ¬мҳӨм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ.<br>' + esc(getErrorMessage_(err)) + '</div>';
  };

  const runner = google.script.run.withSuccessHandler(onSuccess).withFailureHandler(onFailure);
  if (hasFilter) {
    runner.getPortalSupportData({ keyword: keyword, status: status, limit: 500 });
  } else {
    runner.getPortalSupportRecentData({ keyword: '', status: '', limit: 100, maxScanRows: 1200, chunkSize: 300 });
  }
}

function loadSupportFullV56_(options) {
  options = options || {};
  const keyword = document.getElementById('supportKeyword') ? document.getElementById('supportKeyword').value : '';
  const status = document.getElementById('supportStatusFilter') ? document.getElementById('supportStatusFilter').value : '';
  google.script.run
    .withSuccessHandler(function(data) {
      data = data || { rows: [], requestTypes: [], statusOptions: [], currentUser: '' };
      supportCurrentData = data;
      supportLastLoadAtV56 = Date.now();
      renderSupportStatusFilter_(data.statusOptions || []);
      renderSupportBoard(data.rows || []);
      if (!String(keyword || '').trim() && !String(status || '').trim()) saveSupportCacheV56_(data);
    })
    .withFailureHandler(function(err) {
      if (!options.silent) alert('мҳҒм—…м§Җмӣҗ мҡ”мІӯ м „мІҙ мЎ°нҡҢ мӢӨнҢЁ: ' + getErrorMessage_(err));
    })
    .getPortalSupportData({ keyword: keyword, status: status, limit: 500 });
}

function readSupportCacheV56_() {
  try {
    const raw = localStorage.getItem(SUPPORT_CACHE_STORAGE_KEY_V56);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.cachedAt || !obj.data) return null;
    if (Date.now() - Number(obj.cachedAt) > 30 * 60 * 1000) return null;
    return obj.data;
  } catch (err) {
    return null;
  }
}

function saveSupportCacheV56_(data) {
  try {
    localStorage.setItem(SUPPORT_CACHE_STORAGE_KEY_V56, JSON.stringify({ cachedAt: Date.now(), data: data || {} }));
  } catch (err) {}
}

function renderSupportStatusFilter_(options) {
  const sel = document.getElementById('supportStatusFilter');
  if (!sel || sel.getAttribute('data-loaded') === 'Y') return;
  sel.innerHTML = '<option value="">м „мІҙ мғҒнғң</option>' + (options || []).map(function(v) { return '<option value="' + escAttr(v) + '">' + esc(v) + '</option>'; }).join('');
  sel.setAttribute('data-loaded', 'Y');
}

function isSupportProcessorModeV65_() {
  const p = (typeof getPortalPermission_ === 'function') ? getPortalPermission_() : null;
  // PATCH P1-15: мҳҒм—…м§Җмӣҗ мІҳлҰ¬/мҷ„лЈҢ UIлҠ” к¶Ңн•ң_DBмқҳ `мҳҒм—…м§Җмӣҗмҷ„лЈҢмІҳлҰ¬`м—җм„ң кі„мӮ°лҗң canCompleteSupportл§Ң мӮ¬мҡ©н•©лӢҲлӢӨ.
  // role/isAdmin fallbackмқ„ м“°л©ҙ к¶Ңн•ң_DBмҷҖ нҷ”л©ҙмқҙ л¶Ҳмқјм№ҳн•  мҲҳ мһҲмҠөлӢҲлӢӨ.
  return !!(p && p.active !== false && p.canCompleteSupport);
}

function updateSupportRoleUiV65_() {
  const isProcessor = isSupportProcessorModeV65_();
  const newPanel = document.getElementById('supportNewPanel');
  const resetBtn = document.getElementById('supportInlineResetBtn');
  const sub = document.getElementById('supportPageSubtext');
  const title = document.querySelector('#supportSection .support-existing-title');
  if (newPanel) newPanel.style.display = isProcessor ? 'none' : '';
  if (resetBtn) resetBtn.style.display = isProcessor ? 'none' : '';
  if (sub) sub.textContent = isProcessor
    ? 'м ‘мҲҳлҗң мҳҒм—…м§Җмӣҗ мҡ”мІӯмқ„ мІҳлҰ¬н•ҳкі  кі к°қ мғҒм„ё кІҖмғүмңјлЎң л°”лЎң мқҙлҸҷн•©лӢҲлӢӨ.'
    : 'мӢ к·ң мҡ”мІӯ л“ұлЎқкіј кё°мЎҙ мҡ”мІӯ лӘ©лЎқмқ„ л¶„лҰ¬н•ҙм„ң кҙҖлҰ¬н•©лӢҲлӢӨ.';
  if (title) title.textContent = isProcessor ? 'мІҳлҰ¬н•  мҡ”мІӯ лӘ©лЎқ' : 'кё°мЎҙ мҡ”мІӯ лӘ©лЎқ';
}

function formatSupportCompletedAtDisplay_(value) {
  const text = String(value || '').trim();
  if (!text) return '';

  // мҳҲ: 2026. 6. 18 мҳӨм „ 8:14:00 -> 26. 6. 18 / мҳӨм „ 8:14:00
  let m = text.match(/^(?:20)?(\d{2})[.\-\/]\s*(\d{1,2})[.\-\/]\s*(\d{1,2})\s+(мҳӨм „|мҳӨнӣ„)\s*(.+)$/);
  if (m) {
    return esc(m[1] + '. ' + Number(m[2]) + '. ' + Number(m[3])) + '<br>' + esc(m[4] + ' ' + m[5]);
  }

  // мқҙлҜё мӨ„л°”кҝҲлҗң к°’лҸ„ м¶•м•Ҫ н‘ңмӢң
  m = text.match(/^(?:20)?(\d{2})[.\-\/]\s*(\d{1,2})[.\-\/]\s*(\d{1,2})\s*\n\s*(.+)$/);
  if (m) {
    return esc(m[1] + '. ' + Number(m[2]) + '. ' + Number(m[3])) + '<br>' + esc(m[4]);
  }

  return esc(text).replace(/\n/g, '<br>');
}

function clearSupportFilter() {
  if (document.getElementById('supportKeyword')) document.getElementById('supportKeyword').value = '';
  if (document.getElementById('supportStatusFilter')) document.getElementById('supportStatusFilter').value = '';
  loadSupportPage({ force: true });
}

function toggleSupportHeaderSortP15_(key) {
  key = String(key || '').trim();
  if (!key) return;
  supportSortDirP15 = supportSortKeyP15 === key && supportSortDirP15 === 'asc' ? 'desc' : 'asc';
  supportSortKeyP15 = key;
  renderSupportBoard((supportCurrentData && supportCurrentData.rows) || []);
}

function renderSupportSortableThP15_(label, key, styleText) {
  return makePortalSortableThP15_(label, key, supportSortKeyP15, supportSortDirP15, 'toggleSupportHeaderSortP15_', styleText || '');
}

function renderSupportBoard(rows) {
  const area = document.getElementById('supportBoardArea');
  if (!area) return;
  updateSupportRoleUiV65_();
  const isProcessor = isSupportProcessorModeV65_();
  const actionHead = isProcessor ? 'мІҳлҰ¬' : 'кҙҖлҰ¬';
  rows = Array.isArray(rows) ? rows : [];
  if (supportSortKeyP15) rows = sortPortalRowsByKeyP15_(rows, supportSortKeyP15, supportSortDirP15);
  const bodyRows = rows.length ? rows.map(function(r) {
      const cls = r.status === 'мҷ„лЈҢ' ? 'done' : (r.status === 'мІҳлҰ¬мӨ‘' ? 'ing' : (r.status === 'ліҙлҘҳ' ? 'hold' : ''));
      const actionHtml = isProcessor
        ? '<button class="support-process-btn" onclick="event.stopPropagation(); startSupportProcessFromRowV64(' + Number(r.rowNo) + ')">мІҳлҰ¬</button>'
        : '<button class="secondary" onclick="event.stopPropagation(); openSupportRequestModal(' + Number(r.rowNo) + ')">мғҒм„ё</button>';
      return '<tr ondblclick="openSupportRequestModal(' + Number(r.rowNo) + ')">' +
        '<td class="customer-cell-center">' + esc(r.receiptNo || '') + '</td>' +
        '<td class="customer-cell-center">' + esc(r.requestType || '') + '</td>' +
        '<td class="customer-cell-center">' + esc(r.requester || '') + '</td>' +
        '<td class="customer-cell-center">' + esc(r.handler || '') + '</td>' +
        '<td class="customer-cell-center">' + esc(r.customerNo || '') + '</td>' +
        '<td><b>' + esc(r.customerName || '') + '</b></td>' +
        '<td><div class="support-request-text">' + esc(r.requestText || '') + '</div></td>' +
        '<td class="customer-cell-center"><span class="support-status ' + cls + '">' + esc(r.status || 'м ‘мҲҳ') + '</span></td>' +
        '<td class="customer-cell-center support-completed-at">' + formatSupportCompletedAtDisplay_(r.completedAt || '') + '</td>' +
        '<td><div class="support-row-actions">' + actionHtml + '</div></td>' +
      '</tr>';
    }).join('') : '<tr><td colspan="10" class="customer-cell-center" style="color:#667085; padding:18px;">л“ұлЎқлҗң мҳҒм—…м§Җмӣҗ мҡ”мІӯмқҙ м—ҶмҠөлӢҲлӢӨ.</td></tr>';

  if (!isProcessor) renderSupportInlineEntryPanel_();
  const meta = supportCurrentData && supportCurrentData.meta ? supportCurrentData.meta : null;
  const metaText = meta ? ('<div class="cache-note" style="padding:0 0 8px 0;">' +
    esc((meta.source === 'MASTER_SPREADSHEET_ID' ? 'л§ҲмҠӨн„°мӢңнҠё мҳҒм—…м§Җмӣҗмҡ”мІӯ' : 'мҳҒм—…м§Җмӣҗмҡ”мІӯ') + ' В· ' +
    ((meta.recent ? 'мөңк·ј мҡ°м„  лЎңл”©' : 'м „мІҙ мЎ°нҡҢ') + ' В· н‘ңмӢң ' + rows.length + 'кұҙ' +
    (meta.complete === false ? ' В· л’Өм—җм„ң м „мІҙ лӘ©лЎқ ліҙк°• к°ҖлҠҘ' : ''))) + '</div>') : '';
  const html = metaText + '<table class="support-table"><thead><tr>' +
    renderSupportSortableThP15_('м ‘мҲҳлІҲнҳё', 'receiptNo', 'width:72px;') +
    renderSupportSortableThP15_('м—…л¬ҙмң нҳ•', 'requestType', 'width:86px;') +
    renderSupportSortableThP15_('мҡ”мІӯмһҗ', 'requester', 'width:76px;') +
    renderSupportSortableThP15_('мІҳлҰ¬мһҗ', 'handler', 'width:72px;') +
    renderSupportSortableThP15_('кі к°қлІҲнҳё', 'customerNo', 'width:92px;') +
    renderSupportSortableThP15_('кі к°қлӘ…', 'customerName', 'width:150px;') +
    renderSupportSortableThP15_('мҡ”мІӯм—…л¬ҙ', 'requestText', 'width:450px;') +
    renderSupportSortableThP15_('м§„н–ү мғҒнғң', 'status', 'width:90px;') +
    renderSupportSortableThP15_('мҷ„лЈҢ мӢңк°Ғ', 'completedAt', 'width:94px;') +
    '<th style="width:76px;">' + esc(actionHead) + '</th>' +
    '</tr></thead><tbody>' + bodyRows + '</tbody></table>';
  area.innerHTML = html;
  try { applyPortalPermissionToUi_(); } catch (err) {}
}

function renderSupportInlineEntryPanel_() {
  const area = document.getElementById('supportInlineArea');
  if (!area) return;
  if (isSupportProcessorModeV65_()) {
    area.innerHTML = '';
    updateSupportRoleUiV65_();
    return;
  }
  const html = '<table class="support-inline-table"><thead><tr>' +
    '<th style="width:108px;">м—…л¬ҙмң нҳ•</th>' +
    '<th style="width:96px;">мҡ”мІӯмһҗ</th>' +
    '<th style="width:190px;">кі к°қлІҲнҳё</th>' +
    '<th style="width:190px;">кі к°қлӘ…</th>' +
    '<th>мҡ”мІӯм—…л¬ҙ</th>' +
    '<th style="width:86px;">м ҖмһҘ</th>' +
    '</tr></thead><tbody>' + renderSupportInlineEntryRow_() + '</tbody></table>';
  area.innerHTML = html;
  initSupportInlineEntryDefaults_();
}

function renderSupportInlineEntryRow_() {
  const types = (supportCurrentData && supportCurrentData.requestTypes) || ['мҲҳкё°кІ¬м Ғ','мһҗлЈҢм ңм¶ң','м•ҪмҶҚмһЎкё°','нҷ•мқён•ҳкё°','кё°нғҖмҡ”мІӯ'];
  const requesters = getSupportRequesterOptions_();
  const typeOptions = '<option value="">м„ нғқ</option>' + types.map(function(v){ return '<option value="' + escAttr(v) + '">' + esc(v) + '</option>'; }).join('');
  const requesterOptions = requesters.map(function(v){ return '<option value="' + escAttr(v) + '">' + esc(v) + '</option>'; }).join('');
  return '<tr class="support-inline-entry">' +
    '<td><select id="supportInlineRequestType">' + typeOptions + '</select></td>' +
    '<td><select id="supportInlineRequester">' + requesterOptions + '</select></td>' +
    '<td><div class="support-inline-customer-cell"><input id="supportInlineCustomerNo" placeholder="кі к°қлІҲнҳё" onkeydown="if(event.key===\'Enter\') applySupportInlineCustomer()"><button type="button" class="secondary" onclick="applySupportInlineCustomer()">м Ғмҡ©</button></div></td>' +
    '<td><input id="supportInlineCustomerName" disabled placeholder="кі к°қлІҲнҳё м Ғмҡ© мӢң мһҗлҸҷ"></td>' +
    '<td><textarea id="supportInlineRequestText" placeholder="мҡ”мІӯм—…л¬ҙ мһ…л Ҙ"></textarea></td>' +
    '<td><button id="supportInlineSaveBtn" class="support-inline-save" onclick="saveSupportInlineRequest()">м ҖмһҘ</button></td>' +
  '</tr>' +

function buildSupportInlineContractSummaryClient_(info) {

  if (info.maintenance) parts.push('мң м§Җ ' + info.maintenance);
  if (info.performance) parts.push('м„ұлҠҘ ' + info.performance);
  if (info.discountRate) parts.push('н• мқёмңЁ ' + String(info.discountRate).replace(/%$/, '') + '%');
  if (info.vat) parts.push('л¶Җк°Җм„ё ' + info.vat);
  if (info.quoteAmount) parts.push('мөңмў…кІ¬м Ғк°Җ ' + info.quoteAmount);
  if (info.status) parts.push('м§„н–үмғҒнғң ' + info.status);

function normalizeSupportInlineAppointmentLabel_(value) {
  const text = String(value || '').trim();
  if (!text) return '';
  const lower = text.toLowerCase();
  if (text.indexOf('лҜё') >= 0 || text.indexOf('м—Ҷ') >= 0 || lower.indexOf('x') >= 0 || lower.indexOf('n') === 0) return 'X';
  if (text.indexOf('н•ҙлӢ№м—ҶмқҢ') >= 0 || text.indexOf('н•ҙлӢ№ м—ҶмқҢ') >= 0) return 'X';
  if (text.indexOf('м„ мһ„') >= 0 || lower.indexOf('o') >= 0 || lower.indexOf('y') === 0 || text.indexOf('мң ') >= 0) return 'O';
  return text;
}

  // мәҗмӢңк°Җ мһҲмңјл©ҙ нҷ”л©ҙмқҖ мҰүмӢң мӮ¬мҡ© к°ҖлҠҘн•ҳлҜҖлЎң к°•м ң мЎ°нҡҢн•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.
  // мәҗмӢңк°Җ м—Ҷкұ°лӮҳ мҡ”мІӯм—…л¬ҙк°Җкё°мІҳлҹј мөңмӢ  мғҒнғңк°Җ мӨ‘мҡ”н•ң кІҪмҡ°м—җл§Ң л°ұк·ёлқјмҡҙл“ң ліҙм •н•©лӢҲлӢӨ.
  if (!cachedItem || options.focusProcess || options.forceRefresh) {
    refreshSupportDetailInBackgroundV78_(supportCurrentRowNo, { focusProcess: !!options.focusProcess, force: false, showError: false });
  }
}

function closeSupportRequestModal() {
  const backdrop = document.getElementById('supportRequestBackdrop');
  if (backdrop) backdrop.style.display = 'none';
  supportCurrentRowNo = 0;
  supportCurrentCustomer = null;
}

function resetSupportModal_() {
  ['supportReceiptNo','supportCustomerNo','supportRequester','supportCustomerName','supportDiscountRate','supportQuoteAmount','supportArea','supportRegion','supportContactName','supportContactEmail','supportRequestText','supportHandler','supportCompletedAt','supportAutoSendCheck','supportProcessContent','supportMasterMemo'].forEach(function(id) {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  const results = document.getElementById('supportCustomerSearchResults');
  if (results) { results.style.display = 'none'; results.innerHTML = ''; }
  const btn = document.getElementById('supportSaveBtn');
  if (btn) { btn.disabled = false; btn.textContent = 'м ҖмһҘ'; }
}

function fillSupportSelects_(types, statuses) {
  const typeSel = document.getElementById('supportRequestType');
  const statusSel = document.getElementById('supportStatus');
  if (typeSel) typeSel.innerHTML = '<option value="">м„ нғқ</option>' + (types || []).map(function(v){ return '<option value="' + escAttr(v) + '">' + esc(v) + '</option>'; }).join('');
  if (statusSel) {
    statusSel.innerHTML = (statuses || []).map(function(v){ return '<option value="' + escAttr(v) + '">' + esc(v) + '</option>'; }).join('');
    if (!canPortal_('canCompleteSupport')) {
      Array.from(statusSel.options || []).forEach(function(opt) { if (String(opt.value || opt.text || '').trim() === 'мҷ„лЈҢ') opt.disabled = true; });
    }
  }
  try { applyPortalPermissionToUi_(); } catch (err) {}
}

function fillSupportModal_(item) {
  item = item || {};
  document.getElementById('supportReceiptNo').value = item.receiptNo || '';
  document.getElementById('supportRequestType').value = item.requestType || '';
  document.getElementById('supportRequester').value = item.requester || '';
  document.getElementById('supportHandler').value = item.handler || '';
  document.getElementById('supportCustomerNo').value = item.customerNo || '';
  document.getElementById('supportCustomerName').value = item.customerName || '';
  document.getElementById('supportRequestText').value = item.requestText || '';
  document.getElementById('supportDiscountRate').value = item.discountRate || '';
  document.getElementById('supportQuoteAmount').value = item.quoteAmount || '';
  document.getElementById('supportArea').value = item.area || '';
  document.getElementById('supportRegion').value = item.region || '';
  document.getElementById('supportContactName').value = item.contactName || '';
  document.getElementById('supportContactEmail').value = item.contactEmail || '';
  document.getElementById('supportProcessContent').value = item.processContent || '';
  document.getElementById('supportCompletedAt').value = item.completedAt || '';
  document.getElementById('supportStatus').value = item.status || 'м ‘мҲҳ';
  document.getElementById('supportMasterMemo').value = item.masterMemo || '';
  document.getElementById('supportAutoSendCheck').value = item.autoSendCheck || '';
  try { applyPortalPermissionToUi_(); } catch (err) {}
}

function lookupSupportCustomer() {
  const q = document.getElementById('supportCustomerNo').value || '';
  if (!q.trim()) return toast('кі к°қлІҲнҳё лҳҗлҠ” кі к°қлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”.');
  google.script.run
    .withSuccessHandler(function(info) { fillSupportCustomerInfo_(info); toast('кі к°қ м •ліҙлҘј л¶Ҳлҹ¬мҷ”мҠөлӢҲлӢӨ.'); })
    .withFailureHandler(function(err) { alert('кі к°қ мЎ°нҡҢ мӢӨнҢЁ: ' + getErrorMessage_(err)); })
    .getPortalSupportCustomerLookup(q);
}

function searchSupportCustomerCandidates() {
  const q = document.getElementById('supportCustomerNo').value || '';
  const box = document.getElementById('supportCustomerSearchResults');
  if (!q.trim()) return toast('кІҖмғүн•  кі к°қлІҲнҳё лҳҗлҠ” кі к°қлӘ…мқ„ мһ…л Ҙн•ҳм„ёмҡ”.');
  if (box) { box.style.display = 'block'; box.innerHTML = '<div class="support-search-result">кІҖмғү мӨ‘...</div>'; }
  google.script.run
    .withSuccessHandler(function(list) {
      list = Array.isArray(list) ? list : [];
      if (!box) return;
      if (!list.length) { box.innerHTML = '<div class="support-search-result">кІҖмғү кІ°кіјк°Җ м—ҶмҠөлӢҲлӢӨ.</div>'; return; }
      box.innerHTML = list.map(function(item, idx) {
        return '<div class="support-search-result" onclick="selectSupportCustomerCandidate(' + idx + ')"><b>' + esc(item.customerName || '-') + '</b> В· ' + esc(item.customerNo || '') + '<br><span class="support-muted">' + esc(item.contactName || '') + ' / ' + esc(item.contactEmail || '') + '</span></div>';
      }).join('');
      window.__supportCandidateList = list;
    })
    .withFailureHandler(function(err) { if (box) box.innerHTML = '<div class="support-search-result" style="color:#b42318;">' + esc(getErrorMessage_(err)) + '</div>'; })
    .searchPortalSupportCustomers(q);
}

function selectSupportCustomerCandidate(idx) {
  const list = window.__supportCandidateList || [];
  const item = list[Number(idx)] || null;
  if (!item) return;
  fillSupportCustomerInfo_(item);
  const box = document.getElementById('supportCustomerSearchResults');
  if (box) { box.style.display = 'none'; box.innerHTML = ''; }
}

function fillSupportCustomerInfo_(info) {
  info = info || {};
  supportCurrentCustomer = info;
  document.getElementById('supportCustomerNo').value = info.customerNo || '';
  document.getElementById('supportCustomerName').value = info.customerName || '';
  document.getElementById('supportDiscountRate').value = info.discountRate || '';
  document.getElementById('supportQuoteAmount').value = info.quoteAmount || '';
  document.getElementById('supportArea').value = info.area || '';
  document.getElementById('supportRegion').value = info.region || '';
  document.getElementById('supportContactName').value = info.contactName || '';
  document.getElementById('supportContactEmail').value = info.contactEmail || '';
  document.getElementById('supportMasterMemo').value = info.masterMemo || '';
  if (info.contractSummary && document.getElementById('supportRequestText') && !document.getElementById('supportRequestText').value) {
    document.getElementById('supportRequestText').value = info.contractSummary;
  }
}

function collectSupportPayload_() {
  return {
    rowNo: supportCurrentRowNo || 0,
    receiptNo: document.getElementById('supportReceiptNo').value || '',
    requestType: document.getElementById('supportRequestType').value || '',
    requester: document.getElementById('supportRequester').value || '',
    handler: document.getElementById('supportHandler').value || '',
    customerNo: document.getElementById('supportCustomerNo').value || '',
    customerName: document.getElementById('supportCustomerName').value || '',
    requestText: document.getElementById('supportRequestText').value || '',
    discountRate: document.getElementById('supportDiscountRate').value || '',
    quoteAmount: document.getElementById('supportQuoteAmount').value || '',
    area: document.getElementById('supportArea').value || '',
    region: document.getElementById('supportRegion').value || '',
    contactName: document.getElementById('supportContactName').value || '',
    contactEmail: document.getElementById('supportContactEmail').value || '',
    processContent: document.getElementById('supportProcessContent').value || '',
    completedAt: document.getElementById('supportCompletedAt').value || '',
    status: document.getElementById('supportStatus').value || 'м ‘мҲҳ',
    masterMemo: document.getElementById('supportMasterMemo').value || '',
    autoSendCheck: document.getElementById('supportAutoSendCheck').value || ''
  };
}

function saveSupportRequestFromModal() {
  if (!canPortal_('canWriteSupport')) return alert('мҳҒм—…м§Җмӣҗ мҡ”мІӯ мһ‘м„ұ к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.');
  if (!canPortal_('canCompleteSupport') && String((document.getElementById('supportStatus') || {}).value || '').trim() === 'мҷ„лЈҢ') {
    return alert('мҳҒм—…м§Җмӣҗ мҷ„лЈҢ мІҳлҰ¬ к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.');
  }
  const payload = collectSupportPayload_();
  payload.clientRequestId = payload.clientRequestId || makePortalSupportClientRequestIdP26_(payload.rowNo ? 'SUPSAVE' : 'SUPNEW');
  const btn = document.getElementById('supportSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'м ҖмһҘ мӨ‘...'; btn.dataset.requestId = payload.clientRequestId; }
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn && btn.dataset.requestId && btn.dataset.requestId !== payload.clientRequestId) return;
      if (btn) delete btn.dataset.requestId;
      toast((res && res.message) || 'м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ.');
      clearSupportDetailCacheV78_(payload.rowNo);
      try {
        if (supportCurrentData && Array.isArray(supportCurrentData.rows) && res && res.item) {
          supportCurrentData.rows = supportCurrentData.rows.map(function(r) {
            return Number(r && r.rowNo) === Number(res.item.rowNo) ? res.item : r;
          });
          saveSupportCacheV56_(supportCurrentData);
        }
      } catch (e) {}
      closeSupportRequestModal();
      if (activeSupportWorkV64 && Number(activeSupportWorkV64.rowNo) === Number(payload.rowNo)) clearActiveSupportWorkV64_();
      loadSupportPage({ force: true });
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.textContent = 'м ҖмһҘ'; delete btn.dataset.requestId; }
      alert('мҳҒм—…м§Җмӣҗ мҡ”мІӯ м ҖмһҘ мӢӨнҢЁ: ' + normalizePortalSaveErrorMessageP26_(err, 'м ҖмһҘн•ҳм§Җ лӘ»н–ҲмҠөлӢҲлӢӨ. мһ…л Ҙ лӮҙмҡ©мқҖ мң м§Җлҗ©лӢҲлӢӨ.'));
    })
    .savePortalSupportRequest(payload);
}

function setSupportCompletedNow() {
  if (!canPortal_('canCompleteSupport')) return alert('мҳҒм—…м§Җмӣҗ мҷ„лЈҢ мІҳлҰ¬ к¶Ңн•ңмқҙ м—ҶмҠөлӢҲлӢӨ.');
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('supportCompletedAt').value = String(d.getFullYear()).slice(2) + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  const status = document.getElementById('supportStatus');
  if (status) status.value = 'мҷ„лЈҢ';
}
