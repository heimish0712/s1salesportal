<script>
// v51: 자료발송 수신/참조 수동 편집 보호
// - 고객 기본정보/상세정보가 비동기로 늦게 도착해도 사용자가 이미 삭제/추가한 수신·참조 목록을 덮어쓰지 않습니다.
// - 고객이 바뀔 때만 수동 편집 상태를 초기화합니다.
var sendRecipientTouchedV51 = { to: false, cc: false };
var sendRecipientOwnerKeyV51 = '';

// v75: 포털 자료발송에서도 기존 메일자동화의 [파일 확인/수정] 세션을 보존합니다.
var sendReviewSessionIdV75 = '';
var sendReviewFolderUrlV75 = '';
var sendReviewRequestNoV75 = '';

// P493: 견적/자료발송 메일 제목/본문 확인·수정 draft.
// - 고객/작업창별로만 보존하고, 발송 payload 생성 시 edited=true인 경우에만 Worker로 넘깁니다.
// - 입력 중에는 renderSendPreview가 다시 돌아도 사용자가 수정한 제목/본문을 덮지 않습니다.
var sendMailSubjectDraftP493 = '';
var sendMailBodyDraftP493 = '';
var sendMailContentTouchedP493 = { subject: false, body: false };
var sendMailContentOwnerKeyP493 = '';


// P477/P481: 발송/파일확인 작업은 전역 큐로 '요청 시작'만 순차 디스패치합니다.
// 목적: 5개 작업창 상태가 섞이지 않게 payload는 고정하되, 앞 메일 발송 완료까지 기다리지 않고 다음 작업도 빠르게 서버로 넘깁니다.
var SEND_ACTION_QUEUE_STORAGE_KEY_P477 = 'salesPortal.sendActionQueue.p477';
var sendActionQueueP477_ = [];
// P481: 이 값은 "메일 완료 대기"가 아니라 "다음 요청 디스패치 중" 플래그입니다.
// google.script.run 요청을 하나 서버로 넘긴 뒤 짧은 간격으로 다음 작업을 바로 시작합니다.
var sendActionQueueRunningP477_ = false;
var sendActionQueueRestoredP477_ = false;
var SEND_ACTION_NEXT_DISPATCH_DELAY_MS_P481 = 650;

// P482: 메일 Worker/Apps Script가 순간적으로 기존 실행을 잡고 있을 때는 실패 처리하지 않고
// 같은 작업창/같은 payload/runId로 자동 재시도합니다.
// 목적: A/B/C 작업창을 빠르게 연속 디스패치할 때 Worker 쪽 lock busy가 떠도 매핑을 바꾸지 않고 누락 없이 이어가기.
var SEND_MAIL_BUSY_RETRY_MAX_P482 = 18;
var SEND_MAIL_BUSY_RETRY_BASE_DELAY_MS_P482 = 1800;
var SEND_MAIL_BUSY_RETRY_MAX_DELAY_MS_P482 = 6500;

function getPortalSendRawErrorMessageP482_(err) {
  return err && err.message ? String(err.message) : String(err || '');
}

function isPortalSendBusyErrorP482_(err) {
  var raw = getPortalSendRawErrorMessageP482_(err);
  return /다른 작업 처리 중|LockService|lock busy|lock|잠금|Service invoked too many times|ScriptLock|timeout|Timeout/i.test(raw);
}

function getPortalSendBusyRetryDelayP482_(retryCount) {
  retryCount = Number(retryCount || 0) || 0;
  var delay = SEND_MAIL_BUSY_RETRY_BASE_DELAY_MS_P482 + Math.min(retryCount, 8) * 600;
  return Math.min(delay, SEND_MAIL_BUSY_RETRY_MAX_DELAY_MS_P482);
}

function markSendWorkspaceBusyRetryP482_(ws, job, err) {
  if (!ws || !job) return;
  var retryCount = Number(job.busyRetryCountP482 || 0) || 0;
  var delay = getPortalSendBusyRetryDelayP482_(retryCount);
  withSendWorkspaceGlobalsP211_(ws, function(){
    ws.sendActionLockP480 = true;
    currentMailRunId = job.runId || currentMailRunId || '';
    mailSendInFlight = true;
    mailProgressState = Object.assign({}, mailProgressState || {}, {
      runId: currentMailRunId,
      ownerClientId: getPortalClientIdV48_(),
      mode: job.mode || '',
      status: 'RUNNING',
      percent: Math.max(1, Number(mailProgressState && mailProgressState.percent || 1) || 1),
      message: '메일 Worker가 다른 발송을 처리 중입니다. 잠시 후 자동 재시도합니다. (' + retryCount + '/' + SEND_MAIL_BUSY_RETRY_MAX_P482 + ')',
      progressError: '자동 재시도 대기 ' + Math.ceil(delay / 1000) + '초 · payload/runId 유지',
      resultText: ''
    });
    if (isActiveSendWorkspaceP211_(ws.id)) {
      renderInlineMailProgress_();
      setSendMessage('메일 Worker가 다른 발송을 처리 중입니다. 이 작업창은 자동 재시도합니다.', false);
    } else {
      ws.messageHtml = '메일 Worker가 다른 발송을 처리 중입니다. 자동 재시도합니다.';
      ws.messageIsError = false;
      ws.messageUseHtml = false;
    }
  });
  renderSendWorkspaceTabsP211_();
}

function scheduleSendMailBusyRetryP482_(job, err) {
  var ws = getSendWorkspaceByIdP211_(job && job.wsId);
  if (!isSendActionJobStillOwnedP481_(ws, job)) return false;
  job.busyRetryCountP482 = Number(job.busyRetryCountP482 || 0) + 1;
  if (job.busyRetryCountP482 > SEND_MAIL_BUSY_RETRY_MAX_P482) return false;
  markSendWorkspaceBusyRetryP482_(ws, job, err);
  var delay = getPortalSendBusyRetryDelayP482_(job.busyRetryCountP482);
  setTimeout(function(){
    var latestWs = getSendWorkspaceByIdP211_(job.wsId);
    if (!isSendActionJobStillOwnedP481_(latestWs, job)) return;
    job.isBusyRetryP482 = true;
    runMailActionJobP477_(job, function(){});
  }, delay);
  return true;
}

function makeSendActionDispatchDoneP481_(done) {
  var called = false;
  return function() {
    if (called) return;
    called = true;
    if (typeof done === 'function') done();
  };
}

function isSendActionJobStillOwnedP481_(ws, job) {
  if (!ws || !job) return false;
  var runId = String(job.runId || '');
  if (!runId) return true;
  var wsRunId = String(ws.mailRunId || '');
  var stateRunId = String((ws.mailProgressState && ws.mailProgressState.runId) || '');
  return wsRunId === runId || stateRunId === runId;
}

function normalizeSendActionQueueJobForStorageP477_(job) {
  if (!job || !job.actionId) return null;
  return {
    actionId: String(job.actionId || ''),
    type: String(job.type || ''),
    mode: String(job.mode || ''),
    wsId: String(job.wsId || ''),
    runId: String(job.runId || ''),
    createdAt: Number(job.createdAt || Date.now()) || Date.now(),
    title: String(job.title || ''),
    customerNo: String(job.customerNo || ''),
    rowNo: Number(job.rowNo || 0) || 0,
    payload: job.payload || {},
    model: job.model || {},
    testInput: String(job.testInput || ''),
    busyRetryCountP482: Number(job.busyRetryCountP482 || 0) || 0,
    isBusyRetryP482: !!job.isBusyRetryP482
  };
}

function persistSendActionQueueP477_() {
  try {
    const storable = (sendActionQueueP477_ || [])
      .map(normalizeSendActionQueueJobForStorageP477_)
      .filter(Boolean);
    localStorage.setItem(SEND_ACTION_QUEUE_STORAGE_KEY_P477, JSON.stringify(storable));
  } catch (err) {}
}

function restoreSendActionQueueP477_() {
  if (sendActionQueueRestoredP477_) return;
  sendActionQueueRestoredP477_ = true;
  try {
    const raw = localStorage.getItem(SEND_ACTION_QUEUE_STORAGE_KEY_P477);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) return;
    sendActionQueueP477_ = parsed
      .map(normalizeSendActionQueueJobForStorageP477_)
      .filter(Boolean)
      .filter(function(job){ return !!getSendWorkspaceByIdP211_(job.wsId); });
  } catch (err) {
    sendActionQueueP477_ = [];
  }
}

function getSendActionQueuePositionP477_(actionId) {
  const id = String(actionId || '');
  if (!id) return 0;
  const idx = (sendActionQueueP477_ || []).findIndex(function(job){ return String(job.actionId) === id; });
  return idx >= 0 ? idx + 1 : 0;
}

function setSendWorkspaceQueuedStateP477_(job, message) {
  const ws = getSendWorkspaceByIdP211_(job && job.wsId);
  if (!ws) return;
  withSendWorkspaceGlobalsP211_(ws, function(){
    ws.sendActionLockP480 = true;
    currentMailRunId = job.runId || currentMailRunId || '';
    mailSendInFlight = true;
    mailProgressState = Object.assign({}, mailProgressState || {}, {
      runId: currentMailRunId,
      ownerClientId: getPortalClientIdV48_(),
      mode: job.type === 'REVIEW' ? 'REVIEW' : (job.mode || ''),
      startedAt: mailProgressState && mailProgressState.startedAt ? mailProgressState.startedAt : Date.now(),
      status: 'RUNNING',
      percent: 1,
      message: message || '발송 대기 중',
      elapsedSec: 0,
      remainingSec: job.model && job.model.estimatedSeconds ? Number(job.model.estimatedSeconds) : null,
      resultText: '',
      progressError: ''
    });
    if (isActiveSendWorkspaceP211_(ws.id)) renderInlineMailProgress_();
  });
  renderSendWorkspaceTabsP211_();
}

function enqueueSendActionP477_(job) {
  restoreSendActionQueueP477_();
  job = normalizeSendActionQueueJobForStorageP477_(job);
  if (!job) return false;
  if ((sendActionQueueP477_ || []).some(function(item){ return item.actionId === job.actionId; })) return false;

  sendActionQueueP477_.push(job);
  persistSendActionQueueP477_();
  const position = getSendActionQueuePositionP477_(job.actionId);
  setSendWorkspaceQueuedStateP477_(job, position > 1 ? ('발송 대기 중 · 앞 작업 ' + (position - 1) + '건 시작 후 자동 진행') : '발송 준비 중');
  toast(position > 1 ? ('발송 대기열에 추가했습니다. 앞 작업 ' + (position - 1) + '건 시작 후 바로 진행됩니다.') : '발송 작업을 시작합니다.');
  processSendActionQueueP477_();
  return true;
}

function processSendActionQueueP477_() {
  restoreSendActionQueueP477_();
  if (sendActionQueueRunningP477_) return;
  const job = (sendActionQueueP477_ || []).shift();
  persistSendActionQueueP477_();
  if (!job) return;

  const ws = getSendWorkspaceByIdP211_(job.wsId);
  if (!ws) {
    setTimeout(processSendActionQueueP477_, 0);
    return;
  }

  // P481: 여기서의 running은 "이전 메일 완료 대기"가 아니라 "현재 job 요청을 서버로 넘기는 중"입니다.
  // runSendActionJobP477_는 google.script.run 요청을 시작한 뒤 짧은 시간 후 done을 호출하고,
  // 실제 완료/실패 처리는 각 작업창의 runId progress/success callback이 별도로 처리합니다.
  sendActionQueueRunningP477_ = true;
  runSendActionJobP477_(job, function(){
    sendActionQueueRunningP477_ = false;
    persistSendActionQueueP477_();
    updateQueuedSendWorkspaceMessagesP477_();
    setTimeout(processSendActionQueueP477_, 80);
  });
}

function updateQueuedSendWorkspaceMessagesP477_() {
  (sendActionQueueP477_ || []).forEach(function(job, idx){
    setSendWorkspaceQueuedStateP477_(job, idx > 0 ? ('발송 대기 중 · 앞 작업 ' + idx + '건 시작 후 자동 진행') : '발송 대기 중 · 곧 시작합니다.');
  });
}

function runSendActionJobP477_(job, done) {
  const ws = getSendWorkspaceByIdP211_(job.wsId);
  if (!ws) { if (done) done(); return; }
  if (job.type === 'REVIEW') return runReviewActionJobP477_(job, done);
  return runMailActionJobP477_(job, done);
}

function runReviewActionJobP477_(job, done) {
  const ws = getSendWorkspaceByIdP211_(job.wsId);
  if (!ws) { if (done) done(); return; }
  const notifyNextDispatchP481 = makeSendActionDispatchDoneP481_(done);
  withSendWorkspaceGlobalsP211_(ws, function(){
    ws.sendActionLockP480 = true;
    currentMailRunId = job.runId;
    mailSendInFlight = true;
    mailProgressState = Object.assign({}, mailProgressState || {}, {
      runId: currentMailRunId,
      ownerClientId: getPortalClientIdV48_(),
      mode: 'REVIEW',
      startedAt: Date.now(),
      status: 'RUNNING',
      percent: 1,
      message: '파일 확인/수정용 파일 생성 요청 중',
      elapsedSec: 0,
      remainingSec: job.model && job.model.estimatedSeconds ? Number(job.model.estimatedSeconds) : null,
      resultText: '',
      progressError: ''
    });
    if (isActiveSendWorkspaceP211_(ws.id)) renderInlineMailProgress_();
  });
  renderSendWorkspaceTabsP211_();
  pollMailProgress(job.runId, ws.id);

  google.script.run
    .withSuccessHandler(function(res){
      const targetWs = getSendWorkspaceByIdP211_(job.wsId);
      if (!isSendActionJobStillOwnedP481_(targetWs, job)) return;
      if (targetWs) {
        withSendWorkspaceGlobalsP211_(targetWs, function(){
          finishPortalReviewProgressV75_(true, '파일 확인/수정용 Drive 폴더 생성 완료', '파일 확인/수정용 Drive 폴더 생성 완료', targetWs.id);
          sendReviewSessionIdV75 = (res && res.reviewSessionId) || '';
          sendReviewFolderUrlV75 = (res && res.folderUrl) || '';
          sendReviewRequestNoV75 = (res && res.requestNo) || '';
          setSendMessage('', false);
          if (isActiveSendWorkspaceP211_(targetWs.id)) renderSendPreview();
        });
        if (targetWs.reviewFolderUrl) {
          setTimeout(function(){
            const opened = window.open(targetWs.reviewFolderUrl, '_blank', 'noopener');
            if (!opened) toast('브라우저가 새 창을 차단했습니다. 화면의 Drive 폴더 열기 링크를 눌러주세요.');
          }, 150);
        }
      }
      renderSendWorkspaceTabsP211_();
    })
    .withFailureHandler(function(err){
      const targetWs = getSendWorkspaceByIdP211_(job.wsId);
      if (!isSendActionJobStillOwnedP481_(targetWs, job)) return;
      const msg = '파일 확인/수정 실패: ' + normalizePortalSendErrorP26_(err);
      if (targetWs) {
        withSendWorkspaceGlobalsP211_(targetWs, function(){
          finishPortalReviewProgressV75_(false, '파일 확인/수정 실패', msg, targetWs.id);
          if (isActiveSendWorkspaceP211_(targetWs.id)) setSendMessage(msg, true);
          else { targetWs.messageHtml = msg; targetWs.messageIsError = true; targetWs.messageUseHtml = false; }
        });
      }
      renderSendWorkspaceTabsP211_();
    })
    .preparePortalMailFilesForReview(job.payload);

  // P481: 파일확인/수정도 완료를 기다리지 않고 요청 전송 후 다음 큐를 디스패치합니다.
  setTimeout(notifyNextDispatchP481, SEND_ACTION_NEXT_DISPATCH_DELAY_MS_P481);
}

function runMailActionJobP477_(job, done) {
  const ws = getSendWorkspaceByIdP211_(job.wsId);
  if (!ws) { if (done) done(); return; }
  const notifyNextDispatchP481 = makeSendActionDispatchDoneP481_(done);
  withSendWorkspaceGlobalsP211_(ws, function(){
    ws.sendActionLockP480 = true;
    currentMailRunId = job.runId || '';
    mailSendInFlight = true;
    mailProgressState = {
      runId: currentMailRunId,
      ownerClientId: getPortalClientIdV48_(),
      mode: job.mode || '',
      startedAt: Date.now(),
      status: 'RUNNING',
      percent: 1,
      message: '메일 발송 요청 전송 중',
      elapsedSec: 0,
      remainingSec: job.model && job.model.estimatedSeconds ? Number(job.model.estimatedSeconds) : null,
      resultText: '',
      progressError: ''
    };
    if (isActiveSendWorkspaceP211_(ws.id)) renderInlineMailProgress_();
  });
  renderSendWorkspaceTabsP211_();
  if (!job.isBusyRetryP482) {
    toast('메일 발송 요청을 보냈습니다. 대기 중인 다음 작업도 곧바로 요청합니다.');
  }
  pollMailProgress(job.runId, ws.id);

  setTimeout(function(){
    const targetWs = getSendWorkspaceByIdP211_(job.wsId);
    if (!targetWs || !targetWs.mailSendInFlight || targetWs.mailRunId !== job.runId) return;
    withSendWorkspaceGlobalsP211_(targetWs, function(){
      mailProgressState = Object.assign({}, mailProgressState || {}, {
        message: '서버 발송 응답을 기다리는 중입니다.',
        progressError: '90초 이상 대기 중 · Apps Script 실행 로그 확인 권장'
      });
      if (isActiveSendWorkspaceP211_(targetWs.id)) renderInlineMailProgress_();
    });
    renderSendWorkspaceTabsP211_();
  }, 90000);

  google.script.run
    .withSuccessHandler(function(res){
      const targetWs = getSendWorkspaceByIdP211_(job.wsId);
      if (!isSendActionJobStillOwnedP481_(targetWs, job)) return;
      job.busyRetryCountP482 = 0;
      job.isBusyRetryP482 = false;
      const msg = (res && res.message) || ((job.mode === 'TEST' ? '테스트 발송' : '고객 발송') + ' 완료');
      if (targetWs) {
        withSendWorkspaceGlobalsP211_(targetWs, function(){
          finishMailProgressModal(true, msg, msg, targetWs.id);
          // P480: 발송 완료 후에도 같은 작업창에서 수정용 파일을 다시 열어 수정·재발송할 수 있어야 합니다.
          // 따라서 reviewSession/folder/requestNo는 보존합니다. 고객 변경/자료 체크 변경/작업창 초기화 때만 clearSendReviewSessionV75_가 정리합니다.
          if (isActiveSendWorkspaceP211_(targetWs.id)) {
            setSendMessage(msg, false);
            renderSendPreview();
          } else {
            targetWs.messageHtml = msg;
            targetWs.messageIsError = false;
            targetWs.messageUseHtml = false;
          }
        });
      }
      renderSendWorkspaceTabsP211_();
    })
    .withFailureHandler(function(err){
      const targetWs = getSendWorkspaceByIdP211_(job.wsId);
      if (!isSendActionJobStillOwnedP481_(targetWs, job)) return;

      // P482: 병렬 디스패치 중 Worker/Apps Script lock busy는 실제 발송 실패가 아닙니다.
      // 실패 팝업으로 끝내지 않고 같은 작업창/같은 payload/runId로 자동 재시도합니다.
      if (isPortalSendBusyErrorP482_(err) && scheduleSendMailBusyRetryP482_(job, err)) {
        return;
      }

      const msg = '오류: ' + normalizePortalSendErrorP26_(err);
      if (targetWs) {
        withSendWorkspaceGlobalsP211_(targetWs, function(){
          finishMailProgressModal(false, '메일 발송 실패', msg, targetWs.id);
          if (isActiveSendWorkspaceP211_(targetWs.id)) setSendMessage(msg, true);
          else { targetWs.messageHtml = msg; targetWs.messageIsError = true; targetWs.messageUseHtml = false; }
        });
      }
      renderSendWorkspaceTabsP211_();
    })
    .sendPortalSingleMail(job.payload);

  // P481: 앞 메일의 실제 발송 완료를 기다리지 않고, 요청 payload를 서버로 넘긴 뒤 다음 작업창 요청을 디스패치합니다.
  setTimeout(notifyNextDispatchP481, SEND_ACTION_NEXT_DISPATCH_DELAY_MS_P481);
}

function getSendRecipientOwnerKeyV51_(detail) {
  detail = detail || sendSelectedDetail || {};
  const customerNo = normalizeCustomerNoForKey_(detail.customerNo || fieldVal(detail, 'basic', 'customerNo') || sendSelectedCustomerNoV50);
  const rowNo = Number(detail.rowNo || sendSelectedRowNoV50 || 0) || 0;
  return customerNo ? ('CNO:' + customerNo) : (rowNo ? ('ROW:' + rowNo) : '');
}

function resetSendRecipientManualStateV51_() {
  sendRecipientTouchedV51 = { to: false, cc: false };
  sendRecipientOwnerKeyV51 = '';
}

function clearSendReviewSessionV75_(reason) {
  sendReviewSessionIdV75 = '';
  sendReviewFolderUrlV75 = '';
  sendReviewRequestNoV75 = '';
  if (reason && typeof console !== 'undefined') console.log('[sendReviewSession cleared]', reason);
}

function resetSendMailContentDraftP493_(reason) {
  try { releaseSendMailDraftContextP494D_(); } catch (err) {}
  sendMailSubjectDraftP493 = '';
  sendMailBodyDraftP493 = '';
  sendMailContentTouchedP493 = { subject: false, body: false };
  sendMailContentOwnerKeyP493 = '';
  if (reason && typeof console !== 'undefined') console.log('[sendMailContentDraft cleared]', reason);
}

function getSendMailContentOwnerKeyP493_(detail, selectedKeys) {
  const base = getSendRecipientOwnerKeyV51_(detail || sendSelectedDetail);
  const keys = normalizePortalSendSelectedKeysP478_(selectedKeys || sendSelectedFileKeysV50 || [], 'mailContentOwner').join('|');
  return base + '::FILES:' + keys;
}

function getSendMailContentTouchedP493_() {
  return !!(sendMailContentTouchedP493 && (sendMailContentTouchedP493.subject || sendMailContentTouchedP493.body));
}


// P494D: 자료발송 메일 제목/본문 입력 연속성 보호.
// 고객/자료 선택, 미리보기 재렌더, 작업창 전환이 와도 사용자가 수정한 메일 제목/본문을 덮지 않습니다.
function getSendMailDraftContextKeyP494D_() {
  const ws = (typeof getActiveSendWorkspaceP211_ === 'function') ? getActiveSendWorkspaceP211_() : null;
  const wsId = (ws && ws.id) || (typeof sendActiveWorkspaceIdP211_ !== 'undefined' ? sendActiveWorkspaceIdP211_ : '') || 'default';
  if (typeof makePortalDraftContextKeyP494_ === 'function') return makePortalDraftContextKeyP494_('sendMail', wsId, 'mailContent');

// P478: 포털 최초/전체 발송자료 key 보정
// - #최초는 수행사정보를 반드시 포함합니다.
// - #전체/#수행사는 선택값을 그대로 보존합니다.
// - 작업창/발송큐 payload 생성 직전에 한 번 더 보정해 브릿지/워크스페이스 상태 꼬임으로 수행사정보가 누락되는 것을 막습니다.
function normalizePortalSendSelectedKeysP478_(keys, context) {
  const allowed = {};
  try { SEND_FILE_OPTIONS.forEach(function(f) { if (f && f.key) allowed[f.key] = true; }); } catch (err) {}

  const out = [];
  const seen = {};
  (Array.isArray(keys) ? keys : String(keys || '').split(/[;,\s]+/)).forEach(function(key) {
    key = String(key || '').trim();
    if (!key) return;
    if (key === 'contractorInfoZip' || key === 'contractorInfoFile' || key === '수행사정보' || key === '수행사 정보') key = 'contractorInfo';
    if (key === 'sample' || key === 'sampleReports' || key === '샘플보고서') key = 'sampleReport';
    if (key === 'terms' || key === 'termsGuideFiles' || key === '약관안내문법령요약') key = 'termsGuide';
    if (Object.keys(allowed).length && !allowed[key]) return;
    if (seen[key]) return;
    seen[key] = true;
    out.push(key);
  });

  const set = {};
  out.forEach(function(k) { set[k] = true; });

  // #최초 프리셋의 본질: 견적서+용역신청서+선임신고서+약관/안내문/법령요약+수행사정보.
  // sampleReport/compareQuote/serviceStandardContract가 없고 최초 기본 4종이 있으면 수행사정보 누락을 복구합니다.
  const looksLikeFirstPreset =
    set.quote && set.serviceApplication && set.appointmentDoc && set.termsGuide &&
    !set.sampleReport && !set.compareQuote && !set.serviceStandardContract;

  if (looksLikeFirstPreset && !set.contractorInfo) {
    out.push('contractorInfo');
    set.contractorInfo = true;
    try { console.warn('[P478] 최초 발송 selectedKeys에서 수행사정보 누락을 복구했습니다.', context || ''); } catch (err) {}
  }

  return out;
}

// PATCH N: 견적/자료 발송 고객검색은 화면 부담을 줄이기 위해 5건 단위로 표시합니다.
// - 고객 상세 검색 화면의 20건 페이지와 분리하여, 발송 화면 전용 페이지 크기를 사용합니다.
// - 검색인덱스_DB가 준비되어 있으면 브라우저 인덱스에서 즉시 5건 단위로 표시하고,
//   없으면 서버 searchCustomersPaged(keyword, page, 5)를 호출합니다.
const SEND_CUSTOMER_PAGE_SIZE = 5;



function fetchSendCustomerPage_(keyword, page, onSuccess, onError, options) {
  options = options || {};
  page = Math.max(0, Number(page) || 0);

  if (!options.forceNetwork) {
    const fromIndex = buildSendCustomerPageFromIndex_(keyword, page);
    if (fromIndex) {
      onSuccess(fromIndex, true);
      return;
    }
  }

  google.script.run
    .withSuccessHandler(function(res) {
      res = normalizeSendPagedResponse_(res, page);
      if (res && Array.isArray(res.rows) && typeof mergeCustomerIndexRows_ === 'function') {
        mergeCustomerIndexRows_(res.rows, res.version || 'sendServerPage');
      }
      onSuccess(res, false);
    })
    .withFailureHandler(onError)
    .searchCustomersPaged(keyword, page, SEND_CUSTOMER_PAGE_SIZE);
}

function buildSendCustomerPageFromIndex_(keyword, page) {
  if (!customerSearchIndexState || !customerSearchIndexState.ready || !Array.isArray(customerSearchIndexState.rows)) return null;
  keyword = String(keyword || '').trim().toLowerCase();
  page = Math.max(0, Number(page) || 0);

  const filtered = customerSearchIndexState.rows.filter(function(row) {
    return doesCustomerRowMatchKeywordClient_(row, keyword);
  });
  const start = page * SEND_CUSTOMER_PAGE_SIZE;
  const rows = filtered.slice(start, start + SEND_CUSTOMER_PAGE_SIZE);
  return {
    rows: rows,
    total: filtered.length,
    page: page,
    pageSize: SEND_CUSTOMER_PAGE_SIZE,
    start: start,
    end: Math.min(start + rows.length, filtered.length),
    hasPrev: page > 0,
    hasNext: start + SEND_CUSTOMER_PAGE_SIZE < filtered.length,
    keyword: keyword,
    source: customerSearchIndexState.source || 'clientIndex',
    version: customerSearchIndexState.version,
    builtAt: customerSearchIndexState.builtAt
  };
}

function normalizeSendPagedResponse_(response, fallbackPage) {
  response = response || {};
  if (Array.isArray(response)) response = { rows: response };
  const page = Math.max(0, Number(response.page != null ? response.page : fallbackPage) || 0);
  const rows = Array.isArray(response.rows) ? response.rows.slice(0, SEND_CUSTOMER_PAGE_SIZE) : [];
  const total = Number(response.total != null ? response.total : rows.length) || 0;
  const start = Number(response.start != null ? response.start : page * SEND_CUSTOMER_PAGE_SIZE) || 0;
  const end = Number(response.end != null ? response.end : Math.min(start + rows.length, total)) || 0;
  return Object.assign({}, response, {
    rows: rows,
    total: total,
    page: page,
    pageSize: SEND_CUSTOMER_PAGE_SIZE,
    start: start,
    end: end,
    hasPrev: page > 0,
    hasNext: end < total
  });
}


function renderSendPagerHtml_(res, fromCache) {
  res = normalizeSendPagedResponse_(res, res && res.page);
  const pageText = res.total ? ((res.start + 1) + '-' + res.end + ' / 총 ' + res.total + '건') : '총 0건';
  const cacheText = fromCache ? '<span class="cache-note">캐시 표시 · 5건씩</span>' : '<span class="cache-note">최신 조회 · 5건씩</span>';

function loadMailCompleteSoundFromServerV48_() {

function primeMailCompleteSoundV48_() {
  // 브라우저 자동재생 차단 완화용: 발송 버튼 클릭 이벤트 안에서 오디오를 미리 초기화합니다.
  const audio = ensureMailCompleteSoundLoadedV48_();
  if (!audio) return;
  try {
    const oldVolume = audio.volume;
    audio.volume = 0;
    const p = audio.play();
    if (p && typeof p.then === 'function') {
      p.then(function(){
        try { audio.pause(); audio.currentTime = 0; audio.volume = oldVolume || 1; } catch (e) {}
      }).catch(function(){
        try { audio.volume = oldVolume || 1; } catch (e) {}
      });
    } else {
      try { audio.pause(); audio.currentTime = 0; audio.volume = oldVolume || 1; } catch (e) {}
    }
  } catch (err) {}
}

function playMailCompleteSoundForRunV48_(runId) {
  runId = String(runId || currentMailRunId || '').trim();
  if (!runId) return;
  if (mailCompleteSoundPlayedRunIdsV48[runId]) return;

  // 중요: 현재 브라우저에서 시작한 발송 건만 재생합니다.
  const ownerId = mailProgressState && mailProgressState.ownerClientId;
  if (ownerId && ownerId !== getPortalClientIdV48_()) return;

  const audio = ensureMailCompleteSoundLoadedV48_();
  if (!audio) return;

  mailCompleteSoundPlayedRunIdsV48[runId] = true;
  try {
    audio.volume = 1;
    audio.currentTime = 0;
    const p = audio.play();
    if (p && typeof p.catch === 'function') {
      p.catch(function(){
        mailCompleteSoundPendingRunIdV48 = runId;
        loadMailCompleteSoundFromServerV48_();
      });
    }
  } catch (err) {
    mailCompleteSoundPendingRunIdV48 = runId;
    loadMailCompleteSoundFromServerV48_();
  }
}

function normalizePortalSendErrorP26_(err) {
