<script>
// v57 FIX + PATCH B: 상세 모달 비동기 보강 응답이 사용자의 정보수정 상태를 되돌리지 않도록 요청 세대를 추적합니다.
let customerDetailModalRequestSeq = 0;
let contactSelectedTagsP11 = [];
let contactNextActionTagsP119 = [];

function openNewCustomer() {
  document.getElementById('modalBackdrop').style.display = 'flex';
  const modalTitleEl = document.getElementById('modalTitle');
  modalTitleEl.classList.remove('company-title-mode');
  modalTitleEl.textContent = '신규 고객 등록';
  document.getElementById('modalBody').innerHTML = '<div class="loading">등록 화면 불러오는 중...</div>';
  google.script.run.withSuccessHandler(renderDetail).withFailureHandler(showModalError).getNewCustomerTemplate();
}

function openDetail(rowNo, customerNo, options) {
  options = options || {};
  rowNo = Number(rowNo) || 0;
  const rowSummary = findCustomerRowSummary_(rowNo, customerNo) || {};
  const targetCustomerNo = normalizeCustomerNoForKey_(customerNo || rowSummary.customerNo);
  currentDetailCustomerNo = targetCustomerNo;
  const requestSeq = ++customerDetailModalRequestSeq;
  const forceEditMode = !!options.forceEdit;

  document.getElementById('modalBackdrop').style.display = 'flex';
  const modalTitleEl = document.getElementById('modalTitle');
  modalTitleEl.classList.remove('company-title-mode');
  modalTitleEl.textContent = '고객 상세';

  const cached = getCustomerDetailCache_(rowNo, targetCustomerNo) || loadCustomerDetailFromLocalStorage_(rowNo, targetCustomerNo) || buildCustomerDetailFromRowSummary_(rowSummary, rowNo);
  if (cached && cached.rowNo) {
    currentDetailCustomerNo = normalizeCustomerNoForKey_(cached.customerNo || targetCustomerNo);
    renderDetail(cached, forceEditMode ? { preserveEditMode: true, reason: 'openDetailForceEdit' } : undefined);
    if (cached.__summary || cached.__lite) toast('기본 정보를 먼저 표시했습니다. 상세정보를 보강 중입니다.');
  } else {
    document.getElementById('modalBody').innerHTML = '<div class="loading">상세정보 불러오는 중...</div>';
  }

  getCustomerDetailFast_(rowNo, function(detail) {
    // 캐시 표시 후 전체 상세가 도착하면 조용히 갱신합니다.
    // 단, 사용자가 그 사이 '정보 수정'을 눌렀다면 수정 모드와 입력 중인 값을 절대 되돌리지 않습니다.
    if (requestSeq !== customerDetailModalRequestSeq) return;
    if (!detail || Number(detail.rowNo) !== rowNo) return;
    if (targetCustomerNo && normalizeCustomerNoForKey_(detail.customerNo) && normalizeCustomerNoForKey_(detail.customerNo) !== targetCustomerNo) return;
    if (currentDetail && Number(currentDetail.rowNo) !== rowNo) return;

    const preserveEditMode = !!isDetailEditMode || forceEditMode;
    const draftValues = preserveEditMode ? collectCurrentDetailInputValues_() : null;
    const nextDetail = preserveEditMode ? mergeDetailDraftValues_(detail, draftValues) : detail;
    renderDetail(nextDetail, {
      preserveEditMode: preserveEditMode,
      draftValues: draftValues,
      reason: 'asyncDetailHydration'
    });
  }, showModalError, { forceFull: true, customerNo: targetCustomerNo });
}

function openDetailReadOnly(rowNo, customerNo) {
  openDetail(rowNo, customerNo, { forceEdit: false });
}

function openDetailEdit(rowNo, customerNo) {
  openDetail(rowNo, customerNo, { forceEdit: true });
}

function openDetailSafe_(rowNo, customerNo, options) {
  try {
    openDetail(rowNo, customerNo, options || {});
  } catch (err) {
    console.error('상세 모달 열기 실패', err);
    alert('상세 모달을 열지 못했습니다: ' + (err && err.message ? err.message : err));
  }
}

function renderDetail(d, options) {
  options = options || {};
  const preserveEditMode = !!options.preserveEditMode && !d.isNew;
  const draftValues = options.draftValues || null;

  currentDetail = d;
  currentDetailCustomerNo = normalizeCustomerNoForKey_(d && d.customerNo);
  isDetailEditMode = preserveEditMode;
  if (!preserveEditMode) {
    lastCalcResult = null;
    discountTargetMode = false;
  }
  registrationMode = !!d.isNew;
  registrationApplied = d.isNew ? false : registrationApplied;
  registrationCalcResult = d.isNew ? null : registrationCalcResult;
  savedRegistrationMode = false;
  if (d.isNew) {
    modalTitle.classList.remove('company-title-mode');
    modalTitle.textContent = '신규 고객 등록';
  } else {
    modalTitle.classList.add('company-title-mode');
    modalTitle.innerHTML = renderDetailModalTitle_(d);
  }

  let html = '';
  if (d.__summary || d.__lite) html += '<div class="section-card" style="border-color:#bae6fd;background:#f0f9ff;color:#075985;font-weight:800;">기본 정보를 먼저 표시했습니다. 전체 상세정보와 최근 이력은 뒤에서 보강 중입니다.</div>';
  html += renderCustomerBasicSection(d);
  html += renderContractSection(d);
  if (!d.isNew) html += renderContactQuickPanel(d);
  if (!d.isNew) html += renderTempMemoPanel();
  html += '<div class="section-card"><div class="section-title">최근 이력</div>' + renderTimeline(d.contactLogs || []) + '</div>';

  modalBody.innerHTML = html;
  modalActionFooter.style.display = 'flex';

  if (d.isNew) {
    renderRegistrationFooter('newEditing');
    toggleDetailEdit(true);
    applyNewCustomerRegistrationDefaults_();
    applyContractDefaultsOnRender_({ onlyBlank: true });
    bindContractDefaultHandlers_();
    bindPortalContractDateHandlersP420_();
    bindCustomerAddressAutoRegionVendor_();
    enforceRegionReadonly_();
    applyPortalStatusControlStyles_();
    setRegistrationSaveEnabled(true);
  } else {
    renderExistingFooter();
    if (draftValues) restoreDetailInputValues_(draftValues);
    toggleDetailEdit(preserveEditMode);
    applyContractDefaultsOnRender_({ onlyBlank: true });
    bindContractDefaultHandlers_();
    bindPortalContractDateHandlersP420_();
    bindCustomerAddressAutoRegionVendor_();
    enforceRegionReadonly_();
    applyPortalStatusControlStyles_();
    setTempMemoDefaultTime();
    if (preserveEditMode) toast('상세정보 보강 완료. 수정 모드는 유지했습니다.');
  }
}

function collectCurrentDetailInputValues_() {
  const values = {};
  document.querySelectorAll('.detail-edit-input').forEach(function(el) {
    const key = el.getAttribute('data-key');
    if (key) values[key] = el.value || '';
  });
  return values;
}

// PATCH J: 저장 payload는 전체 editable input이 아니라 실제 변경된 필드만 보냅니다.
// 상세정보가 아직 __summary/__lite 상태일 때 보이지 않던 계약조건 빈값이 마스터시트 값을 덮어쓰는 사고를 막습니다.
function normalizeDetailSaveCompareValue_(value) {
  return String(value == null ? '' : value).replace(/\r?\n/g, '\n');
}
function getDirtyDetailInputValues_() {
  const currentValues = collectCurrentDetailInputValues_();
  const baseline = detailEditBaselineValues || {};
  const dirty = {};
  Object.keys(currentValues).forEach(function(key) {
    const cur = normalizeDetailSaveCompareValue_(currentValues[key]);
    const base = normalizeDetailSaveCompareValue_(baseline[key]);
    if (cur !== base) dirty[key] = currentValues[key] || '';
  });
  return dirty;
}

function setDetailEditBaselineFromCurrentInputs_() {
  detailEditBaselineValues = collectCurrentDetailInputValues_();
}

function clearDetailEditBaseline_() {
  detailEditBaselineValues = null;
}

function restoreDetailInputValues_(values) {
  values = values || {};
  Object.keys(values).forEach(function(key) {
    const selector = '.detail-edit-input[data-key="' + String(key).replace(/"/g, '\"') + '"]';
    const el = document.querySelector(selector);
    if (el) el.value = values[key] || '';
  });
}

function mergeDetailDraftValues_(detail, values) {
  detail = detail || {};
  values = values || {};
  try {
    return applyDetailValuesToDetailObject_(JSON.parse(JSON.stringify(detail)), values);
  } catch (err) {
    const next = Object.assign({}, detail);
    Object.keys(values).forEach(function(key) {
      next[key] = values[key] || '';
      ['basic', 'contract'].forEach(function(section) {
        const arr = next.detailFields && next.detailFields[section] ? next.detailFields[section] : [];
        arr.forEach(function(f) {
          if (f && f.key === key) f.value = values[key] || '';
        });
      });
    });
    return next;
  }
}

function renderExistingFooter() {
  modalActionFooter.innerHTML = '' +
    '<button class="secondary" id="footerEditDetail" onclick="toggleDetailEdit(true)">정보 수정</button>' +
    '<button id="footerSaveDetail" onclick="saveDetailFields()" disabled>저장</button>' +
    '<button class="secondary" onclick="goToSupportForCurrentDetailP19_()">영업지원요청</button>' +
    '<button class="secondary" id="footerTemp" onclick="toggleTempMemoPanel()">임시메모 추가</button>' +
    '<button class="secondary" onclick="closeModal()">닫기</button>';
}


function setCustomerDetailSaveUiP430_(pending, message, options) {
  options = options || {};
  const body = document.getElementById('modalBody');
  let box = document.getElementById('customerDetailSaveStatusP430');
  if (body && (pending || options.success)) {
    if (!box) {
      box = document.createElement('div');
      box.id = 'customerDetailSaveStatusP430';
      box.className = 'section-card';
      box.style.marginBottom = '12px';
      body.insertBefore(box, body.firstChild);
    }
    box.style.borderColor = pending ? '#fedf89' : '#abefc6';
    box.style.background = pending ? '#fffaeb' : '#ecfdf3';
    box.style.color = pending ? '#93370d' : '#067647';
    box.style.fontWeight = '800';
    box.textContent = message || (pending ? '마스터시트에 저장 중입니다.' : '마스터시트 저장 완료');
  } else if (box && !pending) {
    box.remove();
  }

  const editBtn = document.getElementById('footerEditDetail');
  const saveBtn = document.getElementById('footerSaveDetail');
  if (editBtn) editBtn.disabled = !!pending;
  if (saveBtn) {
    saveBtn.disabled = true;
    saveBtn.textContent = pending ? '마스터 저장 중...' : '저장';
  }
  if (!pending && options.success) {
    setTimeout(function() {
      const doneBox = document.getElementById('customerDetailSaveStatusP430');
      if (doneBox && !hasCustomerDetailServerSavePendingP430_()) doneBox.remove();
      const editBtn2 = document.getElementById('footerEditDetail');
      if (editBtn2) editBtn2.disabled = false;
    }, 3500);
  }
}

  if (mode === 'saved') {
    modalActionFooter.innerHTML = '' +
      '<button id="registrationSendBtn" onclick="goToSendForSavedRegistrationCustomer()">견적/자료 발송으로 이동</button>' +
      '<button class="secondary" id="registrationEditBtn" onclick="editSavedRegistrationCustomer()">수정</button>' +
      '<button class="secondary" onclick="closeModal()">닫기</button>';
    return;
  }
  modalActionFooter.innerHTML = '' +
    '<button id="registrationSaveBtn" onclick="saveRegistrationCustomerFromModal()">저장</button>' +
    '<button class="secondary" onclick="closeModal()">닫기</button>';
}

function setRegistrationSaveEnabled(enabled) {
  const btn = document.getElementById('registrationSaveBtn');
  if (btn) btn.disabled = !enabled;
}

function getFieldMap(section) {
  const arr = (currentDetail && currentDetail.detailFields && currentDetail.detailFields[section]) || [];
  const map = {};
  arr.forEach(f => map[f.key] = f);
  return map;
}

function renderDetailModalTitle_(d) {
  const company = String((d && d.company) || '').trim();
  if (!company) return '고객 상세';
  return '<span class="modal-title-prefix">[회사명]</span><span class="modal-title-company">' + esc(company) + '</span>';
}

function renderCustomerBasicSection(d) {
  const f = getFieldMap('basic');
  let html = '<div class="section-card section-card-basic"><div class="section-title">고객사 기본 정보</div><div class="field-grid">';
  ['customerNo','company','salesRep','firstRegisteredAt','region','vendor','grade','status','customerRank','contact','phone','directPhone','email'].forEach(k => html += renderDetailField(f[k], 'basic'));
  html += renderDetailField(f.address, 'basic', true);
  html += renderDetailField(f.memo, 'basic', true, 'master-memo-input');
  html += '</div></div>';

  const b = getFieldMap('basic');
  const f = getFieldMap('contract');
  let html = '<div class="section-card section-card-contract"><div class="section-title">상세 계약조건</div><div class="field-grid">';

  html += renderDetailField(f.contractUnit, 'contract');
  html += renderDetailField(f.contractStartDate, 'contract');

  html += renderDetailField(f.vat, 'contract');
  html += renderDetailField(f.discountRate, 'contract');
  html += renderButtonCell('할인율 계산하기', 'handleDiscountModeClick()', 'soft', 'discountModeBtn');
  html += '<div class="field-item"><div class="field-label">목표 최종견적가</div><input id="calcTargetFinal" disabled placeholder="원하는 최종견적가를 입력하세요"><div class="readonly-note">할인율 계산하기 클릭 후 입력</div></div>';
  html += renderDetailField(f.specialTerms, 'contract', true);
  html += '</div></div>';

function getDetailButtonHelpTextP13_(text) {
  text = String(text || '');
  if (text === '견적가 계산') return '현재 계약 조건으로 최종 견적가를 다시 계산합니다.';
  if (text === '할인율 계산하기') return '목표 최종견적가를 기준으로 필요한 할인율을 계산합니다.';
  return '';
}

function renderButtonCell(text, onclick, cls, id) {
  return '<div class="field-item button-cell"><button ' + (id ? 'id="' + escAttr(id) + '" ' : '') + 'class="' + escAttr(cls || '') + '" onclick="' + onclick + '">' + esc(text) + '</button></div>';
}


function getDetailFieldHelpTextP13_(key) {
  key = String(key || '');
  const map = {
    customerNo: '행 번호가 아니라 고객을 식별하는 고유번호입니다.',
    status: '현재 영업 진행현황입니다. 목록에서도 글자 더블클릭으로 빠르게 수정할 수 있습니다.',
    memo: '마스터시트 메모입니다. 고객 접촉 내용과 특이사항을 누적해서 확인합니다.',
    finalQuote: '계약기간, 할인율, 선임/유지/성능 조건을 반영한 최종 견적가입니다.',
    discountRate: '최종 견적가 산정에 반영되는 할인율입니다.',
    specialTerms: '용역신청서에 별도로 반영할 특약사항입니다.'
  };
  return map[key] || '';
}

function renderDetailFieldLabelP13_(f) {
  return esc((f && f.label) || '');
}

function renderDetailField(f, sectionKey, forceWide, extraClass) {
  if (!f) return '<div class="field-item"><div class="field-label">-</div><input disabled value="-"></div>';
  const wide = forceWide || f.wide ? ' wide' : '';
  const cls = extraClass ? ' ' + extraClass : '';
  const key = String(f.key || '');
  let fieldItemClass = 'field-item' + wide;
  if (key === 'discountRate' || key === 'finalQuote') fieldItemClass += ' field-item-emphasis';
  if (key === 'discountRate') fieldItemClass += ' field-item-discount';
  if (key === 'finalQuote') fieldItemClass += ' field-item-final-quote';
  let html = '<div class="' + fieldItemClass + '"><div class="field-label">' + renderDetailFieldLabelP13_(f) + '</div>';
  const editableFlag = key === 'region' ? 'N' : (f.editable !== false ? 'Y' : 'N');
  const data = ' data-section="' + escAttr(sectionKey) + '" data-key="' + escAttr(f.key) + '" data-editable="' + editableFlag + '"';
  if (f.type === 'textarea') {
    html += '<textarea class="detail-edit-input' + cls + '"' + data + ' disabled>' + esc(f.value || '') + '</textarea>';
  } else if (f.type === 'select') {
    if (f.key === 'status') {
      html += '<select class="detail-edit-input portal-status-select"' + data + ' disabled>' + renderStatusOptionsForDetail_(f.value || '') + '</select>';
    } else {
      html += '<select class="detail-edit-input"' + data + ' disabled>' + renderGenericOptions(f.options || [], f.value || '', f.key) + '</select>';
    }
  } else {
    const isDateTextP420 = f.type === 'dateText' || key === 'contractStartDate' || key === 'contractEndDate';
    const inputType = f.type === 'email' ? 'email' : 'text';
    const placeholderP420 = isDateTextP420 ? ' placeholder="2026.07.01."' : '';
    const dateClsP420 = isDateTextP420 ? ' portal-contract-date-input' : '';
    html += '<input class="detail-edit-input' + cls + dateClsP420 + '" type="' + inputType + '" value="' + escAttr(isDateTextP420 ? normalizePortalContractDateDisplayClientP420_(f.value || '') : (f.value || '')) + '"' + placeholderP420 + data + ' disabled>';
  }
  html += '</div>';
  return html;
}

function getGenericOptionValueP280_(opt) {
  if (opt && typeof opt === 'object') return opt.value == null ? '' : String(opt.value);
  return opt == null ? '' : String(opt);
}

function getGenericOptionLabelP280_(opt) {
  if (opt && typeof opt === 'object') return opt.label == null ? getGenericOptionValueP280_(opt) : String(opt.label);
  return opt == null || String(opt) === '' ? '-' : String(opt);
}

function isDetailZeroDateLikeP340_(value) {
  const text = String(value == null ? '' : value).trim();
  if (!text) return false;
  const compact = text.replace(/\s+/g, '');
  if (/^1899[.\-\/]12[.\/](30|31)$/.test(compact)) return true;
  if (/^1899년12월(30|31)일$/.test(compact)) return true;
  return false;
}

function normalizeDetailSelectCurrentP280_(key, value) {
  const text = String(value == null ? '' : value).trim();
  if (!text || text === '-' || text === '–' || text === '—') return '';
  if (isDetailZeroDateLikeP340_(text)) return (key === 'maintenance' || key === 'performance') ? '0' : '';
  if (key === 'contractUnit') {
    if (text === '1년') return '12';
    if (text === '반년') return '6';
    const m = text.match(/\d+/);
    return m ? String(Math.max(1, Math.min(12, Number(m[0]) || 12))) : text;
  }
  if (key === 'maintenance' || key === 'performance') {
    const m = text.match(/\d+/);
    return m ? String(Math.max(0, Math.min(12, Number(m[0]) || 0))) : text;
  }
  return text;
}

function renderGenericOptions(options, current, key) {
  options = (options || []).slice();
  const normalizedCurrent = normalizeDetailSelectCurrentP280_(key || '', current);
  const seen = {}; let html = '';
  const hasCurrent = options.some(function(opt) { return String(getGenericOptionValueP280_(opt)) === String(normalizedCurrent); });
  if (normalizedCurrent && !hasCurrent) options.unshift({ value: normalizedCurrent, label: current || normalizedCurrent });
  options.forEach(function(opt) {
    const value = getGenericOptionValueP280_(opt);
    const label = getGenericOptionLabelP280_(opt);
    const seenKey = String(value);
    if (seen[seenKey]) return;
    seen[seenKey] = true;
    html += '<option value="' + escAttr(value) + '"' + (String(value) === String(normalizedCurrent) ? ' selected' : '') + '>' + esc(label || '-') + '</option>';
  });
  return html;
}

function toggleDetailEdit(enable) {
  const wasEditMode = !!isDetailEditMode;
  isDetailEditMode = !!enable;
  document.querySelectorAll('.detail-edit-input').forEach(el => {
    const editable = el.getAttribute('data-editable') === 'Y';
    el.disabled = !(enable && editable);
  });
  enforceRegionReadonly_();

  const editBtn = document.getElementById('footerEditDetail');
  const saveBtn = document.getElementById('footerSaveDetail');
  if (editBtn) editBtn.disabled = !!enable;
  if (saveBtn) saveBtn.disabled = !enable;

  // PATCH J: 처음 정보수정에 진입한 순간의 값을 저장 기준선으로 둡니다.
  // 비동기 상세정보 보강으로 renderDetail(... preserveEditMode)이 다시 실행되어도 기존 기준선은 유지합니다.
  if (enable && !wasEditMode && !detailEditBaselineValues) {
    setDetailEditBaselineFromCurrentInputs_();
  }

  if (!enable) {
    clearDetailEditBaseline_();
    const target = document.getElementById('calcTargetFinal');
    const btn = document.getElementById('discountModeBtn');
    if (target) { target.disabled = true; target.value = ''; }
    if (btn) btn.textContent = '할인율 계산하기';
    discountTargetMode = false;
  }
}


// PATCH P1-12: 계약조건 필수값 검증 + 할인율 공란 0 보정
const DETAIL_CONTRACT_REQUIRED_KEYS_P112 = ['area','contractUnit','appointment','maintenance','performance','vat'];
const DETAIL_CONTRACT_REQUIRED_LABELS_P112 = {
  area:'연면적',
  contractUnit:'계약단위',
  appointment:'관리자 선임 여부',
  maintenance:'유지점검 횟수',
  performance:'성능점검 횟수',
  vat:'부가세 여부'
};
const DETAIL_CONTRACT_SAVE_KEYS_P112 = DETAIL_CONTRACT_REQUIRED_KEYS_P112.concat(['discountRate','grade','finalQuote','targetFinalPrice']);


function normalizeDetailContractFieldForDbP280_(key, value) {
  const text = String(value == null ? '' : value).trim();
  if (key === 'contractUnit') {
    if (!text || text === '-' || text === '–' || text === '—') return '';
    if (text === '1년') return '12';
    if (text === '반년') return '6';
    const m = text.match(/\d+/);
    if (!m) return text;
    const n = Number(m[0]);
    return n >= 1 && n <= 12 ? String(n) : '';
  }
  if (key === 'maintenance' || key === 'performance') {
    if (!text || text === '-' || text === '–' || text === '—') return '';
    if (isDetailZeroDateLikeP340_(text)) return '0';
    const m = text.match(/\d+/);
    if (!m) return text;
    const n = Number(m[0]);
    return n >= 0 && n <= 12 ? String(n) : '';
  }
  return text;
}

function normalizeDetailContractValuesForDbP280_(values) {
  values = Object.assign({}, values || {});
  ['contractUnit', 'maintenance', 'performance'].forEach(function(key) {
    if (Object.prototype.hasOwnProperty.call(values, key)) values[key] = normalizeDetailContractFieldForDbP280_(key, values[key]);
  });
  ['contractStartDate', 'contractEndDate'].forEach(function(key) {
    if (Object.prototype.hasOwnProperty.call(values, key)) values[key] = normalizePortalContractDateDisplayClientP420_(values[key]);
  });
  return values;
}

function isDetailContractValueBlankP112_(value) {
  const text = String(value == null ? '' : value).trim();
  if (!text) return true;
  if (text === '-' || text === '–' || text === '—') return true;
  if (/^(선택|미선택|입력필요|변수입력부족|변수 입력 부족)$/i.test(text)) return true;
  return false;
}

function isDetailContractSaveTouchedP112_(values) {
  values = values || {};
  return DETAIL_CONTRACT_SAVE_KEYS_P112.some(function(key){ return Object.prototype.hasOwnProperty.call(values, key); });
}

function prepareDetailContractValuesForClientSaveP112_(values, options) {
  options = options || {};
  values = normalizeDetailContractValuesForDbP280_(Object.assign({}, values || {}));
  const requireFull = !!options.requireFull;
  if (!requireFull && !isDetailContractSaveTouchedP112_(values)) return values;

  const currentValues = collectCurrentDetailInputValues_ ? collectCurrentDetailInputValues_() : gatherRegistrationValues();
  const effective = normalizeDetailContractValuesForDbP280_(Object.assign({}, currentValues || {}, values || {}));
  if (isDetailContractValueBlankP112_(effective.discountRate)) {
    effective.discountRate = '0';
    values.discountRate = '0';
    const discountEl = getDetailInputByKey_ ? getDetailInputByKey_('discountRate') : null;
    if (discountEl) discountEl.value = '0';
  }

  const missing = [];
  DETAIL_CONTRACT_REQUIRED_KEYS_P112.forEach(function(key) {
    if (isDetailContractValueBlankP112_(effective[key])) missing.push(DETAIL_CONTRACT_REQUIRED_LABELS_P112[key] || key);
  });
  if (missing.length) {
    throw new Error('계약조건 저장 불가: ' + missing.join(', ') + '을(를) 입력해야 합니다. 할인율은 공란이면 0으로 저장됩니다.');
  }
  return values;
}

  try { markDetailSourceK1_(detail, 'master'); } catch (err) {}
  setCustomerDetailCache_(detail, {
    force: true,
    skipPendingMerge: true,
    source: 'master',
    allowIndexPatch: true,
    allowPagePatch: true,
    allowStorageWrite: true
  });

  toggleDetailEdit(false);
  repaintCustomerResultsIfVisible_();
  try { if (typeof rerenderSendCustomerResultsIfVisible_ === 'function') rerenderSendCustomerResultsIfVisible_(); } catch(e) {}

}

  const targetCustomerNo = normalizeCustomerNoForKey_(currentDetail.customerNo || currentDetailCustomerNo);

  // PATCH J: 전체 input이 아니라 정보수정 진입 후 실제 변경된 필드만 저장합니다.
  // 로딩 중이던 계약조건 빈값이 payload에 섞여 마스터시트를 덮어쓰는 문제를 차단합니다.

  try {
    values = prepareDetailContractValuesForClientSaveP112_(values, { requireFull: false });

  optimisticDetail.__pendingSaveSeq = saveSeq;
  optimisticDetail.__optimisticSavedAt = clientSavedAtP430;

  registerCustomerDetailPendingSave_(optimisticDetail, values, saveSeq);
  const detailSaveGuardIdP430 = markCustomerDetailServerSaveStartedP430_(rowNo, targetCustomerNo, saveSeq, values);

  // PATCH K2-FIX1:
  // 상세 팝업 저장 직후 뒤쪽 고객검색 행도 즉시 바뀌어야 합니다.
  // K-1/K-2 이후 setCustomerDetailCache_는 allowIndexPatch:true가 있어야
  // customerSearchIndexState / lastCustomerResultResponse / page cache까지 패치합니다.
  // 예: 대표전화번호 phone만 수정해도 검색결과 행의 전화번호 칸이 즉시 변경됩니다.

    skipPendingMerge: true,

    allowIndexPatch: true,
    patchValues: values

  currentDetail = optimisticDetail;
  repaintCustomerResultsIfVisible_();
  try { if (typeof rerenderSendCustomerResultsIfVisible_ === 'function') rerenderSendCustomerResultsIfVisible_(); } catch(e) {}

  renderDetail(optimisticDetail);
  toggleDetailEdit(false);
  setCustomerDetailSaveUiP430_(true, '화면에는 임시 반영했습니다. 아직 마스터시트 저장 완료 전입니다.');
  toast('임시 반영 중입니다. 저장 완료 메시지가 뜰 때까지 닫거나 이동하지 마세요.', { force: true, duration: 3500 });

  enqueueCustomerSaveP220_(rowNo, targetCustomerNo, function() {
    return runCustomerSaveRequestP220_('saveCustomerDetailFast', makeCustomerSavePayloadP202_(rowNo, targetCustomerNo, values, {
        clientSaveSource: 'detailModal',
        clientRequestId: detailSaveGuardIdP430,
        clientSavedAt: clientSavedAtP430,
        requireAuditLog: false,
        fastMode: true
      }))
      .then(function(res){
        try { applyCustomerMasterMetaFromSaveP202_(rowNo, targetCustomerNo, res); } catch(e) {}
        if (res && (res.masterVersion || res.masterUpdatedAt || res.masterEditor) && currentDetail && Number(currentDetail.rowNo) === rowNo) {
          if (res.masterVersion) currentDetail.__masterVersion = currentDetail.masterVersion = res.masterVersion;
          if (res.masterUpdatedAt) currentDetail.__masterUpdatedAt = currentDetail.masterUpdatedAt = res.masterUpdatedAt;
          if (res.masterEditor) currentDetail.__masterEditor = currentDetail.masterEditor = res.masterEditor;
        }

        if (res && res.detail && res.refreshedFromMaster) {
          applyServerDetailAfterSaveP112_(res.detail, rowNo);
        } else if (currentDetail && Number(currentDetail.rowNo) === rowNo) {

      }, function(err){

        try { setCustomerDetailSaveUiP430_(false); } catch(e) {}

          setCustomerDetailCache_(prevDetail, { force: true, skipPendingMerge: true });
          if (currentDetail && Number(currentDetail.rowNo) === rowNo) renderDetail(prevDetail);
          repaintCustomerResultsIfVisible_();

        showModalError(err);

      });

}

// STEP42/P420: 계약시작일/계약종료일 클라이언트 표시·자동계산
function parsePortalContractDateClientP420_(value) {
  const text = String(value == null ? '' : value).trim().replace(/\s*([.\/-])\s*/g, '$1');
  if (!text) return null;
  let m = text.match(/^(\d{2})[.\/-](\d{1,2})[.\/-](\d{1,2})\.?$/);
  if (m) return new Date(2000 + Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  m = text.match(/^(\d{4})[.\/-](\d{1,2})[.\/-](\d{1,2})\.?$/);
  if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  const d = new Date(text);
  return isNaN(d.getTime()) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function formatPortalContractDateClientP420_(date) {
  if (!(date instanceof Date) || isNaN(date.getTime())) return '';
  const yyyy = String(date.getFullYear());
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  return yyyy + '.' + mm + '.' + dd + '.';
}

function normalizePortalContractDateDisplayClientP420_(value) {
  const d = parsePortalContractDateClientP420_(value);
  return d ? formatPortalContractDateClientP420_(d) : String(value == null ? '' : value).trim();
}

function getDefaultPortalContractStartDateClientP420_() {
  return new Date(2026, 6, 1);
}

function calculatePortalContractEndDateClientP420_(startValue, unitValue) {
  const start = parsePortalContractDateClientP420_(startValue) || getDefaultPortalContractStartDateClientP420_();
  const unit = Number(normalizeContractUnitValue_(unitValue) || 12) || 12;
  return new Date(start.getFullYear(), start.getMonth() + unit, start.getDate() - 1);
}

function updatePortalContractEndDateClientP420_(options) {
  options = options || {};
  const startEl = getDetailInputByKey_('contractStartDate');
  const endEl = getDetailInputByKey_('contractEndDate');
  const unitEl = getDetailInputByKey_('contractUnit');
  if (!endEl) return;
  if (startEl && !String(startEl.value || '').trim()) startEl.value = formatPortalContractDateClientP420_(getDefaultPortalContractStartDateClientP420_());
  if (!options.force && String(endEl.value || '').trim() && !(currentDetail && currentDetail.isNew)) return;
  endEl.value = formatPortalContractDateClientP420_(calculatePortalContractEndDateClientP420_(startEl && startEl.value, unitEl && unitEl.value));
}

  }
}

// PATCH P1-4B: 신규 고객 등록 기본값/주소 기반 지역·수행사 자동 입력
// - 영업담당자: 현재 로그인 사용자명 자동 입력, 직접 수정 가능
// - 지역구분: 주소 기반 자동 입력 전용으로 비활성화
// - 고객사 상세 주소 blur 시 주소 표준화 + 지역구분 + 수행사 자동 입력
// - 계약단위: 신규 등록 기본값 12개월
function getPortalCurrentUserNameForSalesRep_() {
  let raw = '';
  try {
    const p = (typeof getPortalPermission_ === 'function') ? getPortalPermission_() : null;
    raw = (p && (p.name || p.userName || p.salesRepName || p.displayName || p.email)) || '';
    if (!raw || raw === '권한 확인 중') return '';
    const rawText = String(raw || '').replace(/·.*$/g, '').trim();
    if (rawText && !/@/.test(rawText) && (/[\s()]/.test(rawText) || /영업팀|기획팀|관리자|서무|ADMIN|SALES/i.test(rawText))) {
      let text = rawText.replace(/\([^)]*\)/g, ' ').trim();
      const skip = /^(영업팀|기획팀|관리자|서무|ADMIN|SALES|대리|차장|과장|부장|팀장|책임|대표|실장|사원|주임)$/i;
      const tokens = text.split(/\s+/).filter(Boolean).filter(function(t){ return !skip.test(t); });
      const nameToken = tokens.find(function(t){ return /^[가-힣]{2,4}$/.test(t); });
      if (nameToken) return nameToken;
      return tokens[0] || text;
    }
    return rawText;
  } catch (err) {
    return '';
  }
}

function normalizePortalAddressClient_(address) {
  let text = String(address || '').trim().replace(/\s+/g, ' ');
  if (!text) return '';
  const rules = [
    [/^서울시(?=\s|$)/, '서울특별시'], [/^서울(?=\s|$)/, '서울특별시'],
    [/^부산시(?=\s|$)/, '부산광역시'], [/^부산(?=\s|$)/, '부산광역시'],
    [/^대구시(?=\s|$)/, '대구광역시'], [/^대구(?=\s|$)/, '대구광역시'],
    [/^인천시(?=\s|$)/, '인천광역시'], [/^인천(?=\s|$)/, '인천광역시'],
    [/^광주시(?=\s|$)/, '광주광역시'], [/^광주(?=\s|$)/, '광주광역시'],
    [/^대전시(?=\s|$)/, '대전광역시'], [/^대전(?=\s|$)/, '대전광역시'],
    [/^울산시(?=\s|$)/, '울산광역시'], [/^울산(?=\s|$)/, '울산광역시'],
    [/^세종시(?=\s|$)/, '세종특별자치시'], [/^세종(?=\s|$)/, '세종특별자치시'],
    [/^경기(?=\s|$)/, '경기도'], [/^강원도(?=\s|$)/, '강원특별자치도'], [/^강원(?=\s|$)/, '강원특별자치도'],
    [/^충남(?=\s|$)/, '충청남도'], [/^충북(?=\s|$)/, '충청북도'],
    [/^경남(?=\s|$)/, '경상남도'], [/^경북(?=\s|$)/, '경상북도'],
    [/^제주도(?=\s|$)/, '제주특별자치도'], [/^제주(?=\s|$)/, '제주특별자치도']
  ];
  rules.some(function(pair){
    if (pair[0].test(text)) {
      text = text.replace(pair[0], pair[1]);
      return true;
    }
    return false;
  });
  return text;
}

function derivePortalRegionFromAddressClient_(address) {
  const text = normalizePortalAddressClient_(address);
  if (!text) return '';
  if (/^(서울특별시|경기도|인천광역시)\b/.test(text)) return '수도권';
  if (/^강원특별자치도\b/.test(text)) return '강원권';
  if (/^(대전광역시|세종특별자치시|충청남도|충청북도)\b/.test(text)) return '충청권';
  if (/^(부산광역시|울산광역시|경상남도)\b/.test(text)) return '부울경권';
  if (/^(대구광역시|경상북도)\b/.test(text)) return '대구경북권';
  return '';
}

function derivePortalVendorFromAddressClient_(address, region) {
  const text = normalizePortalAddressClient_(address);
  if (!String(text || '').trim()) return '';
  if (/^제주특별자치도\b/.test(text)) return '삼구';
  if (region === '부울경권' || /^(부산광역시|울산광역시|경상남도)\b/.test(text)) return '일신';
  return 'KJ';
}

function updateRegionVendorFromAddress_(options) {
  options = options || {};
  const addressEl = getDetailInputByKey_('address');
  if (!addressEl) return;
  const rawAddress = String(addressEl.value || '').trim();
  if (options.onlyIfAddress && !rawAddress) return;

  const normalizedAddress = normalizePortalAddressClient_(rawAddress);
  if (options.normalizeAddress && normalizedAddress && normalizedAddress !== rawAddress) {
    addressEl.value = normalizedAddress;
  }

  const sourceAddress = normalizedAddress || rawAddress;

// - 12개월: 선임 / 유지 2회 / 성능 1회 / 부가세 별도
// - 6개월: 선임 / 유지 1회 / 성능점검 미선택 / 부가세 별도
// 사용자가 자동 기입 후 각 항목을 직접 수정하는 것은 그대로 허용합니다.
function getDetailInputByKey_(key) {
  return document.querySelector('.detail-edit-input[data-key="' + String(key).replace(/"/g, '\\"') + '"]');
}

function setInputValueByKeyIfExists_(key, value, options) {
  options = options || {};
  const el = getDetailInputByKey_(key);
  if (!el) return;
  if (options.onlyBlank && String(el.value || '').trim()) return;
  el.value = value == null ? '' : String(value);
}

function normalizeContractUnitValue_(value) {
  const text = String(value || '').trim();
  if (!text) return '';
  if (text === '1년') return '12';
  if (text === '반년') return '6';
  const m = text.match(/\d+/);
  if (!m) return text;
  const n = Number(m[0]);
  return n >= 1 && n <= 12 ? String(n) : text;
}

function applyContractUnitDefaults_(contractUnit, options) {
  options = options || {};
  const unit = normalizeContractUnitValue_(contractUnit);
  if (!unit) {
    setInputValueByKeyIfExists_('vat', '별도', { onlyBlank: true });
    return;
  }

  if (unit === '12') {
    setInputValueByKeyIfExists_('appointment', '선임', options);
    setInputValueByKeyIfExists_('maintenance', '2', options);
    setInputValueByKeyIfExists_('performance', '1', options);
    setInputValueByKeyIfExists_('vat', '별도', options.onlyBlank ? { onlyBlank: true } : options);
    return;
  }

  if (unit === '6') {
    setInputValueByKeyIfExists_('appointment', '선임', options);
    setInputValueByKeyIfExists_('maintenance', '1', options);
    // 6개월은 성능점검 0회/1회가 모두 쓰이므로 미리 선택하지 않습니다.
    setInputValueByKeyIfExists_('performance', '', options);
    setInputValueByKeyIfExists_('vat', '별도', options.onlyBlank ? { onlyBlank: true } : options);
  }
}

function normalizePersonNameOnlyP438_(value) {
  let s = String(value || '').trim();
  if (!s) return '';
  s = s.replace(/\s*·.*$/, '').trim();
  s = s.replace(/\([^)]*\)/g, ' ').replace(/\[[^\]]*\]/g, ' ').trim();
  if (/@/.test(s)) s = s.split('@')[0].trim();
  s = s.replace(/^(기획팀|영업팀|영업지원팀|관리팀|전산팀|서무팀|총무팀|수행사|ADMIN|관리자)\s+/i, '').trim();
  s = s.replace(/\s+(대리|책임|차장|부장|과장|주임|사원|팀장|실장|이사|상무|전무|대표|대표이사|ADMIN|관리자)$/i, '').trim();
  const parts = s.split(/\s+/).filter(Boolean);
  const blocked = /^(기획팀|영업팀|영업지원팀|관리팀|전산팀|서무팀|총무팀|대리|책임|차장|부장|과장|주임|사원|팀장|실장|이사|상무|전무|대표|대표이사|ADMIN|관리자)$/i;
  const koreanNames = parts.filter(function(part) {
    return /^[가-힣]{2,4}$/.test(part) && !blocked.test(part) && !/팀$/.test(part);
  });
  if (koreanNames.length) return koreanNames[koreanNames.length - 1];
  return s;
}

function insertTextAtTextareaCursorP11_(textarea, text) {
  if (!textarea) return;
  text = String(text || '');
  textarea.focus({ preventScroll: true });
  const value = String(textarea.value || '');
  let start = typeof textarea.selectionStart === 'number' ? textarea.selectionStart : value.length;
  let end = typeof textarea.selectionEnd === 'number' ? textarea.selectionEnd : start;
  const needsLeadingSpace = start > 0 && value.charAt(start - 1) && !/\s/.test(value.charAt(start - 1));
  const insertText = (needsLeadingSpace ? ' ' : '') + text;
  textarea.value = value.slice(0, start) + insertText + value.slice(end);
  const pos = start + insertText.length;
  try { textarea.setSelectionRange(pos, pos); } catch (e) {}
  textarea.dispatchEvent(new Event('input', { bubbles: true }));
}

function fillSelectOptions_(select, values, labelFn) {
