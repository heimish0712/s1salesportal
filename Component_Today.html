<script>
let todayTaskFilterP117_ = 'open';
let todayTagOptionsP118_ = [];
let todayHiddenTagsP123_ = [];
let todayAssigneeFilterP350_ = 'ALL';
let todayLastLoadedAuthorOptionsP350_ = [];
let todayHasLocalDraftP120_ = false;
let todaySaveInProgressP350_ = false;
let todayLoadSeqP360_ = 0;
let todaySaveSeqP120_ = 0;
let todayLastLoadedBaseTasksP360_ = [];
let todayPreloadMemoryP360_ = {};
let todayDeletedTasksP360_ = [];
let todayCustomerLinkTargetRowP123_ = null;
let todayCustomerLinkCandidatesP123_ = [];
let todaySummaryTimerP370_ = null;
const TODAY_DEFAULT_TAGS_P123_ = ['전화','메일','견적','컨택','계약','서류','영업지원','재확인','긴급','내부처리'];

function isTodaySectionActiveV57_() {
  const section = document.getElementById('todaySection');
  return !!(section && section.classList.contains('active'));
}

function getTodayCacheKeyP360_(dateStr) {
  return String(dateStr || todaySelectedDate || formatDateInput_(new Date())) + '::' + encodeURIComponent(getTodayAssigneeFilterP350_());
}

function normalizeTodayDataP117_(data) {
  data = data || {};
  const tasks = Array.isArray(data.tasks) ? data.tasks : (Array.isArray(data.todos) ? data.todos : []);
  data.selectedDate = String(data.selectedDate || todaySelectedDate || formatDateInput_(new Date()));
  data.tasks = tasks.map(normalizeTodayTaskP117_);
  data.todos = data.tasks;
  data.canViewAllTodos = !!data.canViewAllTodos;
  data.authorOptions = Array.isArray(data.authorOptions) ? data.authorOptions : [];
  data.authorFilter = data.authorFilter || 'ALL';
  data.currentUserLabel = data.currentUserLabel || getTodayDefaultAuthorP350_();
  todayHiddenTagsP123_ = normalizeTodayTagsP118_(data.hiddenTags || todayHiddenTagsP123_ || []);
  todayTagOptionsP118_ = mergeTodayTagOptionsP118_(data.tagOptions || todayTagOptionsP118_ || [], data.tasks);
  todayLastLoadedAuthorOptionsP350_ = data.authorOptions.length ? data.authorOptions : todayLastLoadedAuthorOptionsP350_;
  if (data.canViewAllTodos) todayAssigneeFilterP350_ = String(data.authorFilter || todayAssigneeFilterP350_ || 'ALL');
  return data;
}

function normalizeTodayTaskP117_(task) {
  task = task || {};
  const sourceType = String(task.sourceType || '').trim() || 'MANUAL';
  const done = !!task.done;
  return {
    id: String(task.id || '').trim() || createTodayTaskIdP360_(),
    done: done,
    content: String(task.content || '').trim(),
    detail: String(task.detail || '').trim(),
    author: String(task.author || '').trim(),
    category: String(task.category || '').trim() || (sourceType === 'CONTACT_NEXT' ? '다음액션' : '할일'),
    sourceType: sourceType,
    sourceId: String(task.sourceId || '').trim(),
    customerNo: String(task.customerNo || '').trim(),
    company: String(task.company || '').trim(),
    rowNo: String(task.rowNo || '').trim(),
    timeText: String(task.timeText || task.nextActionAt || '').trim(),
    priority: String(task.priority || '').trim(),
    updatedAt: String(task.updatedAt || '').trim(),
    createdAt: toTodayLocalDateTimeValueP118_(task.createdAt || task.updatedAt || todayNowLocalDateTimeP118_()),
    dueAt: done ? '' : toTodayLocalDateTimeValueP118_(task.dueAt || task.timeText || ''),
    completedAt: done ? toTodayLocalDateTimeValueP118_(task.completedAt || '') : '',
    tags: filterTodayHiddenTagsP123_(normalizeTodayTagsP118_(task.tags)),
    nextAction: String(task.nextAction || '').trim(),
    rawContent: String(task.rawContent || '').trim()
  };
}

function createTodayTaskIdP360_() {
  return 'manual_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
}

function canTodayViewAllP350_() {
  if (todayCurrentData && todayCurrentData.canViewAllTodos) return true;
  if (typeof getPortalPermissionClient_ === 'function') {
    const p = getPortalPermissionClient_();
    return !!(p && p.active !== false && (p.canUseAdminHome || p.canReadAllSupport || p.canCompleteSupport));
  }
  return false;
}

function getTodayDefaultAuthorP350_() {
  const p = (typeof getPortalPermissionClient_ === 'function') ? getPortalPermissionClient_() : null;
  return String((p && (p.displayName || p.name || p.salesRepName)) || (todayCurrentData && todayCurrentData.currentUserLabel) || '').trim();
}

function getTodayAssigneeFilterP350_() {
  return canTodayViewAllP350_() ? String(todayAssigneeFilterP350_ || 'ALL') : getTodayDefaultAuthorP350_();
}

function getTodayNewTaskAuthorP360_() {
  if (canTodayViewAllP350_()) {
    const selected = String(todayAssigneeFilterP350_ || 'ALL').trim();
    if (selected && selected !== 'ALL') return selected;
  }
  return getTodayDefaultAuthorP350_();
}

function renderTodayAssigneeFilterP350_(data) {
  const area = document.getElementById('todayAssigneeFilterAreaP350');
  if (!area) return;
  data = data || todayCurrentData || {};
  if (!data.canViewAllTodos && !canTodayViewAllP350_()) {
    area.innerHTML = '';
    return;
  }
  let opts = Array.isArray(data.authorOptions) && data.authorOptions.length ? data.authorOptions.slice() : (todayLastLoadedAuthorOptionsP350_ || []).slice();
  const selected = String(todayAssigneeFilterP350_ || data.authorFilter || 'ALL');
  if (selected && selected !== 'ALL' && opts.map(function(v){ return String(v); }).indexOf(selected) < 0) opts.push(selected);
  const optionHtml = ['<option value="ALL"' + (selected === 'ALL' ? ' selected' : '') + '>전체 담당자</option>']
    .concat((opts || []).map(function(name) {
      return '<option value="' + escAttrP117_(name) + '"' + (String(name) === selected ? ' selected' : '') + '>' + esc(name) + '</option>';
    })).join('');
  area.innerHTML = '<label class="today-assignee-filter-label-p350"><span>담당자</span><select id="todayAssigneeFilterP350" onchange="changeTodayAssigneeFilterP350_(this.value)">' + optionHtml + '</select></label>';
}

function changeTodayAssigneeFilterP350_(value) {
  if (!confirmDiscardTodayDraftP350_('저장하지 않은 오늘 할 일이 있습니다. 저장하지 않고 담당자 조회 조건을 바꿀까요?')) return;
  todayAssigneeFilterP350_ = String(value || 'ALL');
  todayHasLocalDraftP120_ = false;
  todayDeletedTasksP360_ = [];
  todayPreloadMemoryP360_ = {};
  if (typeof todayCacheByDateV57 !== 'undefined') todayCacheByDateV57 = {};
  loadTodayPage({ force: true });
}

function confirmDiscardTodayDraftP350_(message) {
  if (!todayHasLocalDraftP120_) return true;
  return confirm(message || '저장하지 않은 오늘 할 일이 있습니다. 저장하지 않고 이동할까요?');
}

function confirmLeaveTodayPageP350_(nextPage) {
  if (nextPage === 'today') return true;
  if (!isTodaySectionActiveV57_()) return true;
  if (!todayHasLocalDraftP120_) return true;
  const ok = confirm('저장하지 않은 오늘 할 일이 있습니다. 저장하지 않고 다른 화면으로 이동할까요?');
  if (ok) {
    todayHasLocalDraftP120_ = false;
    todayDeletedTasksP360_ = [];
  }
  return ok;
}

window.addEventListener('beforeunload', function(e) {
  if (!todayHasLocalDraftP120_) return;
  e.preventDefault();
  e.returnValue = '';
});

function preloadTodayPageV57_(options) {
  options = options || {};
  const dateStr = String(options.date || todaySelectedDate || formatDateInput_(new Date()));
  const key = getTodayCacheKeyP360_(dateStr);
  if (todayLoadingByDateV57[key]) return;
  todayLoadingByDateV57[key] = true;
  google.script.run
    .withSuccessHandler(function(data) {
      todayLoadingByDateV57[key] = false;
      data = normalizeTodayDataP117_(data || { selectedDate: dateStr, tasks: [] });
      todayPreloadMemoryP360_[key] = { data: data, cachedAt: Date.now() };
      todayCacheByDateV57[key] = data;
      todayLastLoadAtByDateV57[key] = Date.now();
      if (isTodaySectionActiveV57_() && !todayHasLocalDraftP120_ && String(todaySelectedDate) === String(data.selectedDate)) {
        renderTodayDataV57_(data, { fromPreload: true });
      }
    })
    .withFailureHandler(function(err) {
      todayLoadingByDateV57[key] = false;
      if (!options.silent) console.warn('오늘 할 일 프리로드 실패', err);
    })
    .getPortalTodayData(dateStr, { assigneeFilter: getTodayAssigneeFilterP350_() });
}

function loadTodayPage(options) {
  options = options || {};
  const dateStr = String(todaySelectedDate || formatDateInput_(new Date()));
  renderTodayCalendar();
  setTodaySelectedLabelP360_(dateStr);

  const key = getTodayCacheKeyP360_(dateStr);
  // 오늘 할 일은 저장/삭제 신뢰성이 우선입니다.
  // 메뉴 진입/담당자 변경/날짜 변경 시 브라우저 캐시로 먼저 그리지 않고 서버 현재값을 바로 조회합니다.
  if (options.force) {
    delete todayPreloadMemoryP360_[key];
    delete todayCacheByDateV57[key];
  }

  const area = document.getElementById('todayTodoArea');
  if (area) area.innerHTML = '<div class="loading">할 일을 불러오는 중입니다...</div>';
  const seq = ++todayLoadSeqP360_;
  todayLoadingByDateV57[key] = true;
  google.script.run
    .withSuccessHandler(function(data) {
      if (seq !== todayLoadSeqP360_) return;
      todayLoadingByDateV57[key] = false;
      data = normalizeTodayDataP117_(data || { selectedDate: dateStr, tasks: [] });
      todayPreloadMemoryP360_[key] = { data: data, cachedAt: Date.now() };
      todayCacheByDateV57[key] = data;
      todayLastLoadAtByDateV57[key] = Date.now();
      renderTodayDataV57_(data, { forceRender: true });
    })
    .withFailureHandler(function(err) {
      if (seq !== todayLoadSeqP360_) return;
      todayLoadingByDateV57[key] = false;
      if (area) area.innerHTML = '<div class="loading" style="color:#b42318;">오늘 할 일을 불러오지 못했습니다.<br>' + esc(getErrorMessage_(err)) + '</div>';
    })
    .getPortalTodayData(dateStr, { assigneeFilter: getTodayAssigneeFilterP350_() });
}

function renderTodayDataV57_(data, options) {
  options = options || {};
  const incoming = normalizeTodayDataP117_(data || { selectedDate: todaySelectedDate, tasks: [] });
  todaySelectedDate = incoming.selectedDate || todaySelectedDate;
  todayCurrentData = incoming;
  todayLastLoadedBaseTasksP360_ = (incoming.tasks || []).map(function(t) { return Object.assign({}, normalizeTodayTaskP117_(t)); });
  todayDeletedTasksP360_ = [];
  todayHasLocalDraftP120_ = false;
  todaySaveInProgressP350_ = false;
  renderTodayAssigneeFilterP350_(incoming);
  renderTodayTasksP117_(incoming.tasks || []);
  renderTodaySummaryV111_(incoming.tasks || []);
  renderTodayCalendar();
  setTodaySelectedLabelP360_(todaySelectedDate);
}

function setTodaySelectedLabelP360_(dateStr) {
  const label = document.getElementById('todaySelectedLabel');
  if (label) label.textContent = String(dateStr || todaySelectedDate || '') + ' 오늘 할 일';
}

function renderTodaySummaryV111_(tasks) {
  const area = document.getElementById('todaySummaryArea');
  if (!area) return;
  tasks = Array.isArray(tasks) ? tasks.map(normalizeTodayTaskP117_) : [];
  const filled = tasks.filter(function(t) { return String(t.content || '').trim(); });
  const active = filled.filter(function(t) { return !t.done; });
  const done = filled.filter(function(t) { return !!t.done; });
  const due = active.filter(function(t) { return !!t.dueAt; });
  const customer = active.filter(function(t) { return t.customerNo || t.rowNo || t.company; });
  const now = Date.now();
  const overdue = due.filter(function(t) { const ms = todayTaskDateMsP122_(t.dueAt); return ms && ms < now; }).length;
  area.innerHTML = '' +
    '<div class="today-summary-card today-summary-main"><div class="today-summary-label">남은 할 일</div><div class="today-summary-value">' + active.length + '</div><div class="today-summary-sub">저장 후 DB 반영</div></div>' +
    '<div class="today-summary-card"><div class="today-summary-label">고객 연결</div><div class="today-summary-value">' + customer.length + '</div><div class="today-summary-sub">고객 검색 바로가기</div></div>' +
    '<div class="today-summary-card ' + (overdue ? 'today-summary-warn' : '') + '"><div class="today-summary-label">시간 지정</div><div class="today-summary-value">' + due.length + '</div><div class="today-summary-sub">' + (overdue ? '지연 ' + overdue + '건' : '예정시간 있음') + '</div></div>' +
    '<div class="today-summary-card"><div class="today-summary-label">완료</div><div class="today-summary-value">' + done.length + '</div><div class="today-summary-sub">완료 체크 후 저장 필요</div></div>';
}

function setTodayTaskFilterP117_(filter) {
  todayTaskFilterP117_ = filter || 'open';
  applyTodayTaskFilterFastP370_();
}

function getTodayTaskVisibleP117_(task) {
  const f = todayTaskFilterP117_ || 'open';
  task = normalizeTodayTaskP117_(task || {});
  if (f === 'all') return true;
  if (f === 'open') return !task.done;
  if (f === 'done') return !!task.done;
  if (String(f).indexOf('tag:') === 0) return !task.done && task.tags.indexOf(String(f).slice(4)) >= 0;
  return true;
}

function renderTodayTasksP117_(tasks) {
  const area = document.getElementById('todayTodoArea');
  if (!area) return;
  tasks = (Array.isArray(tasks) ? tasks : []).map(normalizeTodayTaskP117_).filter(function(t) { return t.content || t.id; });
  todayTagOptionsP118_ = mergeTodayTagOptionsP118_(todayTagOptionsP118_, tasks);
  renderTodaySideFiltersP123_(tasks);
  const rowsHtml = tasks.map(renderTodayTodoRow_).join('');
  const visibleCount = tasks.filter(getTodayTaskVisibleP117_).length;
  area.innerHTML = '' +
    '<div class="today-workbench-p122 today-workbench-p123">' +
      '<div class="today-list-shell-p122 today-list-shell-p123">' +
        '<div class="today-task-list" id="todayTodoList">' + rowsHtml + '</div>' +
        '<div class="today-empty-state" id="todayEmptyStateP370" style="' + (visibleCount ? 'display:none;' : '') + '"><b>등록된 할 일이 없습니다.</b><span>+ 할 일 추가를 누르면 입력 라인이 생깁니다. 작성 후 반드시 [저장]을 눌러야 반영됩니다.</span></div>' +
      '</div>' +
    '</div>';
}

function renderTodaySideFiltersP123_(tasks) {
  const area = document.getElementById('todayTagFilterArea');
  if (!area) return;
  tasks = (Array.isArray(tasks) ? tasks : []).map(normalizeTodayTaskP117_).filter(function(t) { return t.content; });
  const tags = mergeTodayTagOptionsP118_(todayTagOptionsP118_, tasks).slice(0, 30);
  const counts = buildTodayTagCountMapP122_(tasks);
  const statusHtml = renderTodayFilterButtonP117_('open', '미완료', countTodayTasksForFilterP122_(tasks, 'open')) +
    renderTodayFilterButtonP117_('all', '전체', countTodayTasksForFilterP122_(tasks, 'all')) +
    renderTodayFilterButtonP117_('done', '완료', countTodayTasksForFilterP122_(tasks, 'done'));
  const tagHtml = tags.map(function(tag) { return renderTodaySideTagChipP123_(tag, counts[tag] || 0); }).join('');
  area.innerHTML = '' +
    '<div class="today-side-filter-p123">' +
      '<div class="today-side-filter-title-p123">빠른 조회</div>' +
      '<div class="today-side-filter-group-p123">' + statusHtml + '</div>' +
      '<div class="today-side-filter-title-p123 small">태그</div>' +
      '<div class="today-side-filter-group-p123 today-side-tag-group-p123">' + (tagHtml || '<span class="today-side-empty-p123">사용 중인 태그가 없습니다.</span>') + '</div>' +
    '</div>';
}

function renderTodayFilterButtonP117_(key, label, count) {
  const active = todayTaskFilterP117_ === key ? ' active' : '';
  const badge = (typeof count === 'number') ? '<span class="today-filter-count-p122">' + count + '</span>' : '';
  return '<button type="button" class="today-filter-chip' + active + '" onclick="setTodayTaskFilterP117_(\'' + escJsP118_(key) + '\')"><span>' + esc(label) + '</span>' + badge + '</button>';
}

function renderTodaySideTagChipP123_(tag, count) {
  const active = todayTaskFilterP117_ === ('tag:' + tag) ? ' active' : '';
  const removable = !isTodayDefaultTagP123_(tag);
  return '<span class="today-side-tag-wrap-p123' + active + '">' +
    '<button type="button" class="today-filter-chip today-side-tag-filter-p123' + active + '" onclick="setTodayTaskFilterP117_(\'tag:' + escJsP118_(tag) + '\')"><span>' + esc(tag) + '</span><span class="today-filter-count-p122">' + Number(count || 0) + '</span></button>' +
    (removable ? '<button type="button" class="today-tag-delete-p123" onclick="deleteTodayTagOptionP123_(\'' + escJsP118_(tag) + '\')">×</button>' : '') +
  '</span>';
}

function countTodayTasksForFilterP122_(tasks, filter) {
  const prev = todayTaskFilterP117_;
  todayTaskFilterP117_ = filter;
  const count = (Array.isArray(tasks) ? tasks : []).filter(getTodayTaskVisibleP117_).length;
  todayTaskFilterP117_ = prev;
  return count;
}

function buildTodayTagCountMapP122_(tasks) {
  const counts = {};
  (Array.isArray(tasks) ? tasks : []).forEach(function(t) {
    t = normalizeTodayTaskP117_(t || {});
    if (t.done || !String(t.content || '').trim()) return;
    normalizeTodayTagsP118_(t.tags).forEach(function(tag) { counts[tag] = (counts[tag] || 0) + 1; });
  });
  return counts;
}

function renderTodayTodoRow_(todo, idx) {
  todo = normalizeTodayTaskP117_(todo || {});
  const visible = getTodayTaskVisibleP117_(todo);
  const rowNo = Number(todo.rowNo) || 0;
  const dueClass = getTodayDueStateClassP122_(todo);
  const tagHtml = renderTodaySelectedTagsP118_(todo.tags) + renderTodayTagSelectP119_(todo.tags);
  const customerLabel = (rowNo || todo.customerNo || todo.company) ? ('연동고객: ' + (todo.company || todo.customerNo || ('행 ' + rowNo))) : '고객연동';
  return '<div class="today-task-row today-task-row-compact today-task-row-p122 today-task-row-p123 ' + (todo.done ? 'done ' : '') + dueClass + (!visible ? 'today-task-hidden ' : '') + '" ' +
      'data-id="' + escAttrP117_(todo.id) + '" data-category="' + escAttrP117_(todo.category) + '" data-source-type="' + escAttrP117_(todo.sourceType) + '" data-source-id="' + escAttrP117_(todo.sourceId) + '" ' +
      'data-customer-no="' + escAttrP117_(todo.customerNo) + '" data-company="' + escAttrP117_(todo.company) + '" data-row-no="' + escAttrP117_(todo.rowNo) + '" data-time-text="' + escAttrP117_(todo.timeText) + '" data-priority="' + escAttrP117_(todo.priority) + '" data-updated-at="' + escAttrP117_(todo.updatedAt || '') + '" data-author="' + escAttrP117_(todo.author || getTodayNewTaskAuthorP360_()) + '" data-done="' + (todo.done ? 'Y' : '') + '" data-tags-flat="' + escAttrP117_(todo.tags.join(',')) + '">' +
    '<label class="today-task-check"><input type="checkbox" class="todayTodoDone" onchange="onTodayTaskDoneChangeP117_(this)" ' + (todo.done ? 'checked' : '') + '><span></span></label>' +
    '<div class="today-task-body">' +
      '<div class="today-task-topline today-task-topline-p119 today-task-topline-p122 today-task-topline-p123">' +
        '<div class="today-tag-box today-tag-box-inline" data-tags="' + escAttrP117_(todo.tags.join(',')) + '">' + tagHtml + '</div>' +
        '<button type="button" class="today-customer-link-btn-p123 ' + ((rowNo || todo.customerNo || todo.company) ? 'linked' : '') + '" onclick="handleTodayCustomerLinkClickP123_(this)">' + esc(customerLabel) + '</button>' +
      '</div>' +
      '<div class="today-task-line-p119 today-task-line-p122 today-task-line-p123 ' + (canTodayViewAllP350_() ? 'today-task-line-admin-p370' : '') + '">' +
        '<input class="todayCreatedAt" type="hidden" value="' + escAttrP117_(todo.createdAt || todayNowLocalDateTimeP118_()) + '">' +
        (canTodayViewAllP350_() ? '<label class="today-author-wrap-p350"><span>담당자</span><input class="todayAuthorP350" readonly value="' + escAttrP117_(todo.author || getTodayNewTaskAuthorP360_()) + '"></label>' : '') +
        '<label class="today-content-wrap"><span>할 일</span><input class="todayTodoText" placeholder="해야 할 일" value="' + escAttrP117_(todo.content || '') + '" oninput="markTodayTaskDirtyP117_()"></label>' +
        '<label class="today-detail-wrap"><span>처리</span><input class="todayTodoDetail" placeholder="처리내용" value="' + escAttrP117_(todo.detail || '') + '" oninput="markTodayTaskDirtyP117_()"></label>' +
        '<label class="today-due-wrap ' + (todo.done ? 'hidden' : '') + '"><span>예정</span>' + renderTodayDateTimePickerP123_('todayDueAt', todo.dueAt || '', '미정') + '</label>' +
        '<label class="today-completed-wrap ' + (todo.done ? '' : 'hidden') + '"><span>완료</span>' + renderTodayDateTimePickerP123_('todayCompletedAt', todo.completedAt || '', '미정') + '</label>' +
      '</div>' +
    '</div>' +
    '<button class="today-todo-remove" type="button" onclick="removeTodayTodoRow(this)">×</button>' +
  '</div>';
}

function renderTodayDateTimePickerP123_(className, value, emptyLabel) {
  const display = formatTodayDateTimeDisplayP123_(value, emptyLabel || '미정');
  return '<div class="today-datetime-shell-p123">' +
    '<button type="button" class="today-datetime-display-p123 ' + (value ? 'has-value' : 'empty') + '" onclick="openTodayDateTimePickerP123_(this)">' + esc(display) + '</button>' +
    '<input class="' + escAttrP117_(className) + ' todayDateTimeInputP123" type="datetime-local" value="' + escAttrP117_(value || '') + '" onchange="onTodayDateTimeValueChangeP123_(this)" oninput="onTodayDateTimeValueChangeP123_(this)">' +
    '<button type="button" class="today-datetime-clear-p123" onclick="clearTodayDateTimeP123_(this)">×</button>' +
  '</div>';
}

function renderTodaySelectedTagsP118_(tags) {
  tags = normalizeTodayTagsP118_(tags);
  return '<span class="today-selected-tags">' + tags.map(function(tag) {
    return '<button type="button" class="today-tag-chip selected" onclick="toggleTodayRowTagP118_(this, \'' + escJsP118_(tag) + '\')">' + esc(tag) + '</button>';
  }).join('') + '</span>';
}

function renderTodayTagSelectP119_(selectedTags) {
  const opts = mergeTodayTagOptionsP118_(todayTagOptionsP118_, (todayCurrentData && todayCurrentData.tasks) || []);
  const options = opts.map(function(tag) { return '<option value="' + escAttrP117_(tag) + '">' + esc(tag) + '</option>'; }).join('');
  return '<select class="today-tag-select" onchange="addTodayTagFromSelectP119_(this)"><option value="">+태그</option>' + options + '</select>';
}

function toggleTodayRowTagP118_(btn, tag) {
  const row = btn && btn.closest ? btn.closest('.today-task-row') : null;
  if (!row) return;
  const box = row.querySelector('.today-tag-box');
  const current = normalizeTodayTagsP118_(box ? box.getAttribute('data-tags') : '');
  const idx = current.indexOf(tag);
  if (idx >= 0) current.splice(idx, 1);
  else current.push(tag);
  if (box) {
    box.setAttribute('data-tags', current.join(','));
    const selected = box.querySelector('.today-selected-tags');
    if (selected) selected.outerHTML = renderTodaySelectedTagsP118_(current);
  }
  markTodayTaskDirtyP117_();
}

function addTodayTagFromSelectP119_(select) {
  const tag = String(select.value || '').trim();
  select.value = '';
  if (!tag) return;
