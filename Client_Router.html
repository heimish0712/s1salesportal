<script>
window.onload = function() {
  try { initPortalFontScale_(); } catch (err) { console.warn('글자 크기 설정 시작 실패', err); }
  try { loadPortalSettings_({ silent: true }); } catch (err) { console.warn('설정_DB 로딩 시작 실패', err); }
  try { loadPortalCurrentPermission_({ silent: true }); } catch (err) { console.warn('권한_DB 로딩 시작 실패', err); }
  // v46: HOME은 즉시 표시합니다. 무거운 대시보드 갱신/공지 전체 조회는 화면을 막지 않습니다.
  switchPage('home', true);
  setTimeout(function() {
    initializeCustomerSearchIndex({ silent: true, useLocalFirst: true });
  }, 250);
  // PATCH L: 사용자가 메뉴를 누르기 전에 가벼운 업무 화면 데이터를 백그라운드로 준비합니다.
  // HOME 최초 표시를 막지 않도록 시간차를 두고 시작합니다.
  setTimeout(function() {
    try { loadCustomerFavoriteMap_({ silent: true }); } catch (err) { console.warn('고객 즐겨찾기 프리로드 실패', err); }
  }, 520);
  setTimeout(function() {
    try { preloadSupportPageV57_({ silent: true }); } catch (err) { console.warn('영업지원 요청 프리로드 실패', err); }
  }, 700);
  setTimeout(function() {
    try { preloadTodayPageV57_({ silent: true }); } catch (err) { console.warn('오늘 할 일 프리로드 실패', err); }
  }, 1100);
  setTimeout(function() {
    try { startPortalDataVersionWatcherP201_(); } catch (err) { console.warn('데이터 버전 감시 시작 실패', err); }
  }, 1600);
  // v31 FIX 유지: 고객 상세 검색 메뉴 진입 시 searchCustomerPage(0)가 실행됩니다.
  // v46: notice 전체 목록은 공지사항 메뉴 진입 시에만 조회합니다.
};
const keywordInput = document.getElementById('keyword');
if (keywordInput) keywordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') search(); });

function toggleSidebar() {
  document.body.classList.toggle('sidebar-collapsed');
  const btn = document.getElementById('sidebarToggle');
  if (btn) btn.innerHTML = document.body.classList.contains('sidebar-collapsed') ? '&gt;&gt;' : '&lt;&lt;';
}



function renderPortalSettingsPageP310_() {
  const title = document.getElementById('placeholderTitle');
  const desc = document.getElementById('placeholderDesc');
  if (title) title.textContent = '설정';
  const isAdmin = (typeof isPortalAdmin_ === 'function') && isPortalAdmin_();
  if (!desc) return;
  let html = '';
  html += '<div class="portal-settings-panel-p310">';
  html += '<div class="portal-settings-card-p310">';
  html += '<div class="portal-settings-card-title-p310">마스터시트 기준 강제갱신</div>';
  html += '<div class="portal-settings-card-desc-p310">영업관리대장 마스터시트를 원천으로 검색인덱스_DB와 브라우저 캐시를 다시 맞춥니다. 마스터시트에서 직접 수정한 진행현황/담당자/계약조건이 웹앱에 늦게 반영될 때 사용합니다.</div>';
  if (isAdmin) {
    html += '<button type="button" class="portal-danger-primary-p310" id="forceMasterSearchIndexBtnP310" onclick="forceMasterSearchIndexRefreshP310_()">마스터시트 기준 강제갱신</button>';
    html += '<div class="portal-settings-status-p310" id="forceMasterSearchIndexStatusP310">대기 중</div>';
  } else {
    html += '<div class="portal-settings-denied-p310">이 기능은 서무/admin 계정에서만 사용할 수 있습니다.</div>';
  }
  html += '</div>';
  html += '</div>';
  desc.innerHTML = html;
}

function forceMasterSearchIndexRefreshP310_() {
  if (typeof isPortalAdmin_ === 'function' && !isPortalAdmin_()) {
    alert('마스터시트 기준 강제갱신은 서무/admin 계정에서만 사용할 수 있습니다.');
    return;
  }
  const btn = document.getElementById('forceMasterSearchIndexBtnP310');
  const status = document.getElementById('forceMasterSearchIndexStatusP310');
  if (btn) btn.disabled = true;
  if (status) status.textContent = '영업관리대장 마스터시트를 기준으로 검색인덱스를 다시 생성하는 중입니다...';
  try { if (typeof invalidateCustomerSearchCaches_ === 'function') invalidateCustomerSearchCaches_({ clearIndex: true, clearDetail: true }); } catch (err) {}
  try { customerSearchIndexStaleDueToMasterP310 = true; } catch (err) {}

  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) btn.disabled = false;
      if (!res || !res.ok) {
        const msg = (res && res.message) || '강제갱신에 실패했습니다.';
        if (status) status.textContent = msg;
        alert(msg);
        return;
      }
      try { if (typeof invalidateCustomerSearchCaches_ === 'function') invalidateCustomerSearchCaches_({ clearIndex: true, clearDetail: true }); } catch (err) {}
      try {
        if (res.indexData && typeof setCustomerSearchIndexData_ === 'function') setCustomerSearchIndexData_(res.indexData, 'masterForce');
        else if (typeof initializeCustomerSearchIndex === 'function') initializeCustomerSearchIndex({ silent: true, useLocalFirst: false, force: true, clearDetail: true, renderAfterLoad: true });
      } catch (err) {}
      try { customerSearchIndexStaleDueToMasterP310 = false; } catch (err) {}
      try {
        if (typeof portalLastDataVersionP201 !== 'undefined' && res.indexData) {
          portalLastDataVersionP201.customerIndexVersion = res.indexData.version || portalLastDataVersionP201.customerIndexVersion;
          portalLastDataVersionP201.masterVersion = res.indexData.masterVersion || portalLastDataVersionP201.masterVersion;
          portalLastDataVersionP201.customerIndexDirty = res.indexData.dirty ? 'Y' : 'N';
          portalLastDataVersionP201.customerIndexDirtyAt = res.indexData.dirtyAt || '';
        }
      } catch (err) {}
      const message = '강제갱신 완료: ' + (res.rebuilt || 0) + '건 / 버전 ' + (res.version || '-') + ' / ' + Math.round((res.elapsedMs || 0) / 1000) + '초';
      if (status) status.textContent = message;
      try { toast(message); } catch (err) {}
      try {
        if (document.getElementById('customerSearchSection') && document.getElementById('customerSearchSection').classList.contains('active')) {
          searchCustomerPage(customerSearchState && customerSearchState.page || 0);
        }
      } catch (err) {}
      try {
        if (typeof clearFocusCustomerClientCacheP300_ === 'function') clearFocusCustomerClientCacheP300_();
        if (document.getElementById('focusCustomerSection') && document.getElementById('focusCustomerSection').classList.contains('active') && typeof loadFocusCustomerPageP290 === 'function') {
          loadFocusCustomerPageP290(true);
        }
      } catch (err) {}
      alert((res.message || '강제갱신 완료') + '\n\n반영 건수: ' + (res.rebuilt || 0) + '건\n버전: ' + (res.version || '-'));
    })
    .withFailureHandler(function(err) {
      if (btn) btn.disabled = false;
      const msg = '강제갱신 실패: ' + (err && err.message ? err.message : String(err || ''));
      if (status) status.textContent = msg;
      alert(msg);
    })
    .forceCustomerSearchIndexFromMasterP310({ maxWaitMs: 12000 });
}

function switchPage(page, skipSearch) {
  try { applyPortalPermissionToUi_(); } catch (err) {}
  page = page || 'home';
  if (page === 'dashboard') page = 'home';

  document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.getAttribute('data-page') === page));
  ['homeSection', 'noticeSection', 'supportSection', 'activityLogSection', 'systemHealthSection', 'todaySection', 'customerSearchSection', 'customerFavoritesSection', 'focusCustomerSection', 'contractCompleteSection', 'placeholderSection'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });

  const pageTitle = document.getElementById('pageTitle');
  const pageSubtitle = document.getElementById('pageSubtitle');
  const keyword = document.getElementById('keyword');

  if (page === 'home') {
    document.getElementById('homeSection').classList.add('active');
    pageTitle.textContent = '영업전산 HOME';
    pageSubtitle.textContent = '영업 현황 및 공지사항을 볼 수 있습니다.';
    loadDashboard();
    return;
  }

  if (page === 'notices') {
    document.getElementById('noticeSection').classList.add('active');
    pageTitle.textContent = '공지사항';
    pageSubtitle.textContent = '공지사항 세부 내용 확인 및 공지사항 작성이 가능합니다.';
    loadNoticeTable();
    setTimeout(function(){ try { applyPortalPermissionToUi_(); } catch (err) {} }, 50);
    return;
  }

  if (page === 'customers') {
    document.getElementById('customerSearchSection').classList.add('active');
    pageTitle.textContent = '고객 상세 검색';
    pageSubtitle.textContent = '고객사 기본정보와 상세 계약조건을 조회하고 수정합니다.';
    if (!skipSearch) search();
    setTimeout(() => { if (keyword) keyword.focus(); }, 80);
    return;
  }


  if (page === 'favorites') {
    document.getElementById('customerFavoritesSection').classList.add('active');
    pageTitle.textContent = '고객 즐겨찾기';
    pageSubtitle.textContent = '내가 즐겨찾기한 고객만 빠르게 조회합니다.';
    refreshFavoriteCustomers(false);
    setTimeout(function() { const el = document.getElementById('favoriteKeyword'); if (el) el.focus(); }, 80);
    return;
  }

  if (page === 'focusCustomers') {
    document.getElementById('focusCustomerSection').classList.add('active');
    pageTitle.textContent = '중점고객관리';
    pageSubtitle.textContent = '자동점수와 추천등급으로 오늘 우선 챙길 고객을 확인합니다.';
    if (typeof renderFocusCustomerShellP290_ === 'function') renderFocusCustomerShellP290_();
    if (typeof loadFocusCustomerPageP290 === 'function') loadFocusCustomerPageP290(false);
    setTimeout(function() { const el = document.getElementById('focusKeywordP290'); if (el) el.focus(); }, 80);
    return;
  }

  if (page === 'contracts') {
    document.getElementById('contractCompleteSection').classList.add('active');
    pageTitle.textContent = '계약종합관리';
    pageSubtitle.textContent = '마스터 파일의 수주확정/계약완료 시트 목록을 조회하고 운영 정보를 수정합니다.';
    loadContractCompletePageV69();
    setTimeout(function() { const el = document.getElementById('contractCompleteKeyword'); if (el) el.focus(); }, 80);
    return;
  }

  if (page === 'send') {
    document.getElementById('placeholderSection').classList.add('active');
    pageTitle.textContent = '견적/자료 발송';
    pageSubtitle.textContent = '고객을 선택하고 발송할 자료를 체크한 뒤 미리보기까지 확인합니다.';
    renderSendPage();
    return;
  }

  if (page === 'support') {
    document.getElementById('supportSection').classList.add('active');
    pageTitle.textContent = '영업지원 요청';
    pageSubtitle.textContent = '영업지원 요청을 등록하고 처리 상태를 관리합니다.';
    loadSupportPage();
    setTimeout(function(){ try { applyPortalPermissionToUi_(); } catch (err) {} }, 50);
    return;
  }

  if (page === 'activityLog') {
    document.getElementById('activityLogSection').classList.add('active');
    pageTitle.textContent = '작업로그';
    pageSubtitle.textContent = '개인은 본인 작업을, 관리자/서무는 담당자별 작업 로그와 비교 통계를 확인합니다.';
    loadActivityLogPage(false);
    return;
  }

  if (page === 'systemHealth') {
    document.getElementById('systemHealthSection').classList.add('active');
    pageTitle.textContent = '시스템 점검';
    pageSubtitle.textContent = '동시작업, 마스터 동기화, 검색인덱스, DB 상태를 점검합니다.';
    loadSystemHealthPageP208(false);
    return;
  }

  if (page === 'concurrencyTest') {
    document.getElementById('concurrencyTestSection').classList.add('active');
    pageTitle.textContent = '동시성 테스트';
    pageSubtitle.textContent = '저장 Lock, 동시 요청, 테스트 데이터 정리를 관리자 전용으로 검증합니다.';
    loadConcurrencyTestPageP240(false);
    return;
  }

  if (page === 'today') {
    document.getElementById('todaySection').classList.add('active');
    pageTitle.textContent = '오늘 할 일';
    pageSubtitle.textContent = '투두리스트와 컨택 예정 액션을 날짜별로 관리합니다.';
    loadTodayPage();
    return;
  }

  if (page === 'settings') {
    document.getElementById('placeholderSection').classList.add('active');
    pageTitle.textContent = '설정';
    pageSubtitle.textContent = '상태값, 권한, 캐시, 검색인덱스 관련 운영 기능을 관리합니다.';
    renderPortalSettingsPageP310_();
    setTimeout(function(){ try { applyPortalPermissionToUi_(); } catch (err) {} }, 50);
    return;
  }

  document.getElementById('placeholderSection').classList.add('active');
  const labels = {};
  const item = labels[page] || ['준비 중','이 메뉴는 다음 단계에서 구현할 예정입니다.'];
  pageTitle.textContent = item[0];
  pageSubtitle.textContent = item[1];
  document.getElementById('placeholderTitle').textContent = item[0];
  document.getElementById('placeholderDesc').innerHTML = item[1] + '<br><br>현재 단계에서는 Home/공지사항/고객검색/자료발송 화면을 우선 안정화합니다.';
}
</script>
