<script>
// P534: 나의 고객 현황 - 추천상태 적용 즉시 반영 + compact 펼침/정렬
let myCustomerStatusBundleP528 = null;
let myCustomerStatusLoadingP528 = false;
let myCustomerStatusActiveViewP528 = 'all';
let myCustomerStatusActiveValueP528 = '';
let myCustomerStatusKeywordP528 = '';
let myCustomerStatusPageP528 = 0;
let myCustomerStatusPageSizeP528 = 50;
// P533: 기본 행은 분석 요약으로 압축하고, 더블클릭 시 고객상세검색 하단 펼침 UI를 재사용합니다.
let myCustomerStatusSortKeyP533 = '';
let myCustomerStatusSortDirP533 = '';
let myCustomerStatusExpandedKeyP533 = '';
let myCustomerStatusExpandedRowNoP533 = 0;
let myCustomerStatusExpandedCustomerNoP533 = '';
let myCustomerStatusExpandedLoadingP533 = {};

function loadMyCustomerStatusPageP528(force) {
  const area = document.getElementById('myCustomerStatusAreaP528');
  if (!area) return;
  if (myCustomerStatusLoadingP528) return;
  myCustomerStatusLoadingP528 = true;
  if (!myCustomerStatusBundleP528 || force) {
    area.innerHTML = '<div class="loading">나의 고객 현황을 분석하는 중입니다.</div>';
  } else {
    renderMyCustomerStatusPageP528_();
  }
  google.script.run
    .withSuccessHandler(function(res) {
      myCustomerStatusLoadingP528 = false;
      if (!res || res.ok === false) {
        area.innerHTML = renderMyCustomerStatusLoadErrorP531_(res || { error: 'empty response' });
        return;
      }
      myCustomerStatusBundleP528 = res;
      myCustomerStatusPageP528 = 0;
      if (force) {
        myCustomerStatusExpandedKeyP533 = '';
        myCustomerStatusExpandedRowNoP533 = 0;
        myCustomerStatusExpandedCustomerNoP533 = '';
      }
      try {
        renderMyCustomerStatusPageP528_();
      } catch (renderErr) {
        area.innerHTML = renderMyCustomerStatusLoadErrorP531_({
          stage: 'clientRender',
          error: renderErr && renderErr.message ? renderErr.message : String(renderErr || ''),
          stack: renderErr && renderErr.stack ? String(renderErr.stack).slice(0, 2000) : '',
          responseMode: res && res.responseMode,
          rows: res && res.rows ? res.rows.length : 0
        });
      }
    })
    .withFailureHandler(function(err) {
      myCustomerStatusLoadingP528 = false;
      area.innerHTML = renderMyCustomerStatusLoadErrorP531_({
        stage: 'serverCallFailure',
        error: err && err.message ? err.message : String(err || ''),
        stack: err && err.stack ? String(err.stack).slice(0, 2000) : ''
      });
    })
    .getMyCustomerStatusDashboardP528({ force: !!force });
}

function resetMyCustomerStatusPageP528_() {
  myCustomerStatusBundleP528 = null;
  myCustomerStatusActiveViewP528 = 'all';
  myCustomerStatusActiveValueP528 = '';
  myCustomerStatusKeywordP528 = '';
  myCustomerStatusPageP528 = 0;
  myCustomerStatusExpandedKeyP533 = '';
  myCustomerStatusExpandedRowNoP533 = 0;
  myCustomerStatusExpandedCustomerNoP533 = '';
  myCustomerStatusExpandedLoadingP533 = {};
  loadMyCustomerStatusPageP528(true);
}

function renderMyCustomerStatusLoadErrorP531_(res) {
  res = res || {};
  const msg = res.error || res.message || res.reason || '';
  let html = '<div class="my-status-error-p528"><b>나의 고객 현황을 불러오지 못했습니다.</b>';
  html += '<div class="muted">서버 응답이 실패로 돌아왔습니다. 아래 단계/오류를 확인해 주세요.</div>';
  if (res.version) html += '<div>분석버전: ' + esc(res.version) + '</div>';
  if (res.stage) html += '<div>실패 단계: ' + esc(res.stage) + '</div>';
  if (msg) html += '<div>오류: ' + esc(msg) + '</div>';
  if (res.responseMode) html += '<div>응답모드: ' + esc(res.responseMode) + '</div>';
  if (res.rows != null) html += '<div>응답 row 수: ' + esc(String(res.rows)) + '</div>';
  if (res.elapsedMs != null) html += '<div>소요시간: ' + esc(String(res.elapsedMs)) + 'ms</div>';
  if (res.stack) html += '<details><summary>오류 상세</summary><pre>' + esc(res.stack) + '</pre></details>';
  html += '<div class="my-status-actions-p528"><button class="primary" onclick="loadMyCustomerStatusPageP528(true)">다시 불러오기</button><button class="secondary" onclick="runMyCustomerStatusScopeDebugP532_()">범위 진단</button></div>';
  html += '<div id="myCustomerStatusDebugP532"></div>';
  html += '</div>';
  return html;
}

function renderMyCustomerStatusPageP528_() {
  const area = document.getElementById('myCustomerStatusAreaP528');
  if (!area) return;
  const bundle = myCustomerStatusBundleP528;
  if (!bundle) {
    area.innerHTML = '<div class="loading">나의 고객 현황을 불러오는 중입니다.</div>';
    return;
  }
  const cards = bundle.cards || {};
  const owner = bundle.owner || {};
  const scopeText = owner.scope === 'ALL' ? 'ADMIN 전체 고객' : ('마스터시트 영업담당자 = ' + (owner.name || owner.displayName || '-'));
  let html = '';
  html += '<div class="my-status-shell-p528">';
  html += '<div class="my-status-toolbar-p528">';
  html += '<div><div class="my-status-title-p528">나의 고객 현황</div><div class="my-status-sub-p528">기준: ' + esc(scopeText) + ' · 분석방식: 상태추천/업무인사이트 분리 · 화면응답 경량화</div></div>';
  html += '<div class="my-status-actions-p528"><button class="secondary" onclick="loadMyCustomerStatusPageP528(true)">새로고침</button><button class="secondary" onclick="switchPage(\'myCustomerFolder\')">나의 고객 폴더</button></div>';
  html += '</div>';

  const idx = bundle.index || {};
  html += '<div class="my-status-meta-p528">분석시각 ' + esc(bundle.generatedAt || '-') + ' · 범위 ' + esc(owner.scope || 'OWN') + ' · 원천 ' + esc(idx.sourceType || 'MASTER') + ' · 마스터대상 ' + esc(String(idx.sourceTotal || 0)) + '건' + (owner.scopeReason ? ' · 권한판정 ' + esc(owner.scopeReason) : '') + (idx.dirty ? ' · <b>인덱스 갱신 필요</b>' : '') + renderMyCustomerStatusDbMetaP529_(bundle) + '</div>';

  html += '<div class="my-status-cards-p528">';
  html += renderMyCustomerStatusCardP528_(owner.scope === 'ALL' ? '전체 고객' : '전체 내 고객', cards.total, 'all', '', owner.scope === 'ALL' ? 'admin 전체 고객' : '담당자 기준 전체 고객');
  html += renderMyCustomerStatusCardP528_('진행중', cards.active, 'active', '', '수주실패/발주완료/계약완료 제외');
  html += renderMyCustomerStatusCardP528_('상태지정필요', cards.needStatus, 'needStatus', '', '진행현황 정리 필요');
  html += renderMyCustomerStatusCardP528_('상태변경 추천', cards.mismatch, 'mismatch', '', '확실한 건만 버튼 노출');
  html += renderMyCustomerStatusCardP528_('자료발송 후 미후속', cards.sentNoFollow, 'sentNoFollow', '', '상태변경 아님, 후속연락');
  html += renderMyCustomerStatusCardP528_('연락장애/담당자확인', cards.contactIssue, 'contactIssue', '', '전화연결/직통/담당자 문제');
  html += renderMyCustomerStatusCardP528_('계약/발주 확인필요', cards.contractCheck, 'contractCheck', '', '자동 상태추천 제외');
  html += renderMyCustomerStatusCardP528_('장기 재접촉', cards.longReconnect, 'longReconnect', '', '예산/내년/보류 신호');
  html += renderMyCustomerStatusCardP528_('최근 7일 연락', cards.recent7, 'recent7', '', '최신 판정 이벤트 기준');
  html += renderMyCustomerStatusCardP528_('14일 이상 미접촉', cards.noContact14, 'noContact14', '', '진행중 고객 기준');
  html += renderMyCustomerStatusCardP528_('종결/보호상태 참고', cards.terminal, 'terminal', '', '수주실패·발주완료·계약완료 보호');
  html += renderMyCustomerStatusCardP528_('계약 가능성 높음', cards.highPotential, 'highPotential', '', '점수 6점 이상');
  html += renderMyCustomerStatusCardP528_('데이터 누락', cards.dataMissing, 'dataMissing', '', '영업 필수값 확인');
  html += '</div>';

  html += '<div class="my-status-main-grid-p528">';
  html += '<div class="my-status-panel-p528">' + renderMyCustomerStatusDistributionP528_(bundle.statusCounts || []) + '</div>';
  html += '<div class="my-status-panel-p528">' + renderMyCustomerStatusTopIssuesP528_(bundle) + '</div>';
  html += '</div>';

  html += '<div class="my-status-list-panel-p528">';
  html += renderMyCustomerStatusListToolbarP528_();
  html += '<div id="myCustomerStatusListBodyP528">' + renderMyCustomerStatusListBodyP528_() + '</div>';
  html += '</div>';
  html += '</div>';
  area.innerHTML = html;
}


function renderMyCustomerStatusDbMetaP529_(bundle) {
  const db = bundle && bundle.analysisDb || {};
  if (!db) return '';
  if (db.saved) return ' · 분석DB 저장 ' + esc(String(db.rows || 0)) + '건 / 기록 ' + esc(String(db.written || db.totalRows || 0)) + '건(' + esc(db.sheetName || '고객현황분석_DB') + ')';
  if (db.error) return ' · <b>분석DB 저장 실패</b>: ' + esc(db.error);
  return '';
}

function renderMyCustomerStatusCardP528_(label, value, view, viewValue, desc) {
  const active = myCustomerStatusActiveViewP528 === view && String(myCustomerStatusActiveValueP528 || '') === String(viewValue || '');
  return '<button type="button" class="my-status-card-p528 ' + (active ? 'active' : '') + '" onclick="setMyCustomerStatusViewP528_(\'' + escAttr(view) + '\',\'' + escAttr(viewValue || '') + '\')"><span>' + esc(label) + '</span><b>' + esc(String(value == null ? 0 : value)) + '</b><em>' + esc(desc || '') + '</em></button>';
}

function renderMyCustomerStatusDistributionP528_(items) {
  let html = '<div class="my-status-panel-head-p528"><div><b>진행현황별 고객 수</b><span>클릭하면 하단 리스트가 해당 상태로 필터됩니다.</span></div></div>';
  html += '<div class="my-status-dist-p528">';
  (items || []).forEach(function(item) {
    html += '<button type="button" class="my-status-pill-p528" onclick="setMyCustomerStatusViewP528_(\'status\',\'' + escAttr(item.status || '') + '\')"><span>' + esc(item.status || '(공란)') + '</span><b>' + esc(String(item.count || 0)) + '</b></button>';
  });
  html += '</div>';
  return html;
}

function renderMyCustomerStatusTopIssuesP528_(bundle) {
  const rows = ((bundle && bundle.rows) || []).filter(function(row) { return row.analysis && row.analysis.statusChangeRecommendation; }).slice(0, 5);
  let html = '<div class="my-status-panel-head-p528"><div><b>상태변경 추천 TOP 5</b><span>상태지정필요/공란 중 확실한 수주실패·견적제출완료만 표시합니다.</span></div><button type="button" class="secondary" onclick="setMyCustomerStatusViewP528_(\'mismatch\',\'\')">전체보기</button></div>';
  if (!rows.length) return html + '<div class="my-status-empty-p528">상태변경 추천 건이 없습니다.</div>';
  html += '<div class="my-status-issue-list-p528">';
  rows.forEach(function(row) {
    const a = row.analysis || {};
    html += '<div class="my-status-issue-p528"><b>' + esc(row.company || '-') + '</b><span>' + esc(row.status || '(공란)') + ' → ' + esc(a.statusChangeRecommendedStatus || a.recommendedStatus || '-') + '</span><em>' + esc(a.insightSummary || a.reason || '') + '</em></div>';
  });
  html += '</div>';
  return html;
}

function renderMyCustomerStatusListToolbarP528_() {
  const tabs = [
    ['all','전체'], ['mismatch','상태변경 추천'], ['sentNoFollow','자료발송 후 미후속'], ['contactIssue','연락장애/담당자확인'],
    ['contractCheck','계약/발주 확인필요'], ['longReconnect','장기 재접촉'], ['recent7','최근 연락'], ['noContact14','장기 미접촉'],
    ['terminal','종결/보호 참고'], ['highPotential','계약 가능성 높음'], ['dataMissing','데이터 누락'], ['active','진행중'], ['needStatus','상태지정필요']
  ];
  let html = '<div class="my-status-tabs-p528">';
  tabs.forEach(function(t) {
    html += '<button type="button" class="' + (myCustomerStatusActiveViewP528 === t[0] ? 'active' : '') + '" onclick="setMyCustomerStatusViewP528_(\'' + t[0] + '\',\'\')">' + esc(t[1]) + '</button>';
  });
  html += '</div>';
  html += '<div class="my-status-list-tools-p528"><input value="' + escAttr(myCustomerStatusKeywordP528) + '" placeholder="회사명, 고객번호, 메모, 상태, 인사이트 검색" oninput="updateMyCustomerStatusKeywordP528_(this.value)"><select onchange="changeMyCustomerStatusPageSizeP528_(this.value)"><option value="30" ' + (myCustomerStatusPageSizeP528===30?'selected':'') + '>30건</option><option value="50" ' + (myCustomerStatusPageSizeP528===50?'selected':'') + '>50건</option><option value="100" ' + (myCustomerStatusPageSizeP528===100?'selected':'') + '>100건</option></select></div>';
  return html;
}

function renderMyCustomerStatusListBodyP528_() {
  const rows = getMyCustomerStatusRowsForViewP528_();
  const total = rows.length;
  const start = myCustomerStatusPageP528 * myCustomerStatusPageSizeP528;
  const pageRows = rows.slice(start, start + myCustomerStatusPageSizeP528);
  let html = '<div class="my-status-list-meta-p528">표시 ' + esc(String(total ? start + 1 : 0)) + '-' + esc(String(Math.min(start + pageRows.length, total))) + '건 / 총 ' + esc(String(total)) + '건<span class="my-status-meta-tip-p533">행을 더블클릭하면 고객상세검색과 같은 상세 영역이 아래에 펼쳐집니다. 헤더 클릭 시 정렬됩니다.</span></div>';
  if (!pageRows.length) return html + '<div class="my-status-empty-p528">표시할 고객이 없습니다.</div>';
  html += '<div class="my-status-table-wrap-p528"><table class="my-status-table-p528 my-status-table-compact-p533"><thead><tr>';
  html += renderMyCustomerStatusSortableThP533_('customer', '고객');
  html += renderMyCustomerStatusSortableThP533_('status', '현재상태');
  html += renderMyCustomerStatusSortableThP533_('analysis', '상태추천/인사이트');
  html += renderMyCustomerStatusSortableThP533_('recent', '최근연락');
  html += renderMyCustomerStatusSortableThP533_('evidence', '판정근거');
  html += '<th>액션</th></tr></thead><tbody>';
  pageRows.forEach(function(row) { html += renderMyCustomerStatusRowP528_(row); });
  html += '</tbody></table></div>';
  html += renderMyCustomerStatusPagerP528_(total);
  return html;
}

function renderMyCustomerStatusSortableThP533_(key, label) {
  const active = myCustomerStatusSortKeyP533 === key;
  const dir = active ? myCustomerStatusSortDirP533 : '';
  const mark = !active ? '↕' : (dir === 'asc' ? '▲' : '▼');
  return '<th class="my-status-sort-th-p533 ' + (active ? 'is-active' : '') + '" onclick="setMyCustomerStatusSortP533_(\'' + escAttr(key) + '\')"><button type="button">' + esc(label) + '<span>' + esc(mark) + '</span></button></th>';
}

function renderMyCustomerStatusRowP528_(row) {
  row = row || {};
  const a = row.analysis || {};
  const rowNo = Number(row.rowNo || 0) || 0;
  const customerNo = String(row.customerNo || '');
  const key = getMyCustomerStatusRowKeyP533_(rowNo, customerNo);
  const isExpanded = !!key && key === myCustomerStatusExpandedKeyP533;
  const rowClass = 'my-status-main-row-p533' + (isExpanded ? ' is-expanded' : '');

  const analysisBrief = buildMyCustomerStatusBriefAnalysisP533_(row, a);
  const evidenceText = a.latestDecisionEventText || row.memoSummary || '';
  const evidenceSource = a.latestDecisionEventSource || a.latestEventSource || '';
  const evidenceTitle = [evidenceSource, evidenceText, a.latestAnyEventText && a.latestAnyEventText !== evidenceText ? ('최근전체: ' + a.latestAnyEventText) : '', a.nextAction || ''].filter(Boolean).join('\n');

  let actions = '<div class="my-status-row-actions-p528 my-status-row-actions-compact-p533">';
  actions += '<button type="button" class="secondary" onclick="event.stopPropagation(); openDetailSafe_(' + rowNo + ',\'' + escAttr(customerNo) + '\')">상세</button>';
  actions += '<button type="button" class="secondary" onclick="event.stopPropagation(); openContactHistoryModal(' + rowNo + ',\'' + escAttr(customerNo) + '\')">컨택</button>';
  actions += '<button type="button" class="secondary" onclick="event.stopPropagation(); openSendForCustomer(' + rowNo + ')">발송</button>';
  if (a.canApplyRecommendation && a.statusChangeRecommendedStatus) {
    actions += '<button type="button" onclick="event.stopPropagation(); applyMyCustomerRecommendedStatusP528_(' + rowNo + ',\'' + escAttr(customerNo) + '\',\'' + escAttr(a.statusChangeRecommendedStatus) + '\',\'' + escAttr(row.status || '') + '\')">추천상태 적용</button>';
  }
  actions += '</div>';

  let html = '<tr class="' + rowClass + '" data-row-no="' + escAttr(String(rowNo)) + '" data-customer-no="' + escAttr(customerNo) + '" ondblclick="toggleMyCustomerStatusExpandP533_(event,' + rowNo + ',\'' + escAttr(customerNo) + '\')">' +
    '<td class="my-status-customer-cell-p533"><b>' + esc(row.company || '-') + '</b><div class="muted">#' + esc(customerNo || '-') + ' · ' + esc(row.vendor || '-') + ' · ' + esc(row.salesRep || '') + '</div><div class="muted line-one-p533">' + esc(row.contact || '') + ' ' + esc(row.phone || row.directPhone || '') + '</div></td>' +
    '<td class="my-status-state-cell-p533"><span class="status">' + esc(row.status || '(공란)') + '</span></td>' +
    '<td class="my-status-analysis-cell-p533" title="' + escAttr(analysisBrief.title || '') + '">' + analysisBrief.html + '</td>' +
    '<td class="my-status-recent-cell-p533">' + esc(row.lastContactDate || '-') + '<div class="muted">' + (a.lastContactDays == null ? '날짜 없음' : esc(String(a.lastContactDays)) + '일 전') + '</div></td>' +
    '<td class="my-status-evidence-cell-p533" title="' + escAttr(evidenceTitle) + '"><div class="my-status-evidence-line-p533">' + esc(evidenceText || '-') + '</div><div class="muted line-one-p533">' + esc(evidenceSource ? ('판정근거: ' + evidenceSource) : '') + '</div></td>' +
    '<td>' + actions + '</td>' +
    '</tr>';

  if (isExpanded) html += renderMyCustomerStatusExpandedRowP533_(row);
  return html;
}

function buildMyCustomerStatusBriefAnalysisP533_(row, a) {
  a = a || {};
  const chips = [];
  let titleParts = [];
  let summary = '';
  if (a.statusChangeRecommendation && a.statusChangeRecommendedStatus) {
    chips.push('<span class="my-status-rec-p528 is-action-p533">상태추천 ' + esc(a.statusChangeRecommendedStatus) + '</span>');
    summary = a.statusChangeRecommendationGrade || '상태변경 추천';
    titleParts.push('상태변경 추천: ' + (a.statusChangeRecommendedStatus || ''));
  } else if (a.statusProtected) {
    chips.push('<span class="my-status-rec-p528 is-protected-p533">상태유지</span>');
    summary = a.insightSummary || a.reason || '종결/보호 상태라 자동 추천하지 않음';
    titleParts.push('보호 상태: ' + (row.status || ''));
  } else if (a.insightType || a.insightSummary) {
    chips.push('<span class="my-status-rec-p528 is-insight-p533">' + esc(a.insightType || '인사이트') + '</span>');
    summary = a.insightSummary || a.reason || '';
    titleParts.push('인사이트: ' + (a.insightType || ''));
  } else {
    chips.push('<span class="my-status-rec-p528 is-neutral-p533">특이없음</span>');
    summary = a.reason || '';
  }
  if (a.confidence != null) chips.push('<span class="my-status-score-p528">신뢰 ' + esc(String(a.confidence || 0)) + '</span>');
  if (a.potentialScore) chips.push('<span class="my-status-potential-p528 compact-p533">가능성 ' + esc(String(a.potentialScore)) + '</span>');
  if (a.missingFields && a.missingFields.length) chips.push('<span class="my-status-mini-warn-p533">누락 ' + esc(String(a.missingFields.length)) + '</span>');
  if (a.statusRecommendationBlockedReason) titleParts.push('차단: ' + a.statusRecommendationBlockedReason);
  if (a.sourceLabels && a.sourceLabels.length) titleParts.push('근거: ' + a.sourceLabels.join(', '));
  if (summary) titleParts.push(summary);
  if (a.nextAction) titleParts.push('액션: ' + a.nextAction);
  return {
    html: '<div class="my-status-analysis-compact-p533"><div class="my-status-chip-line-p533">' + chips.join(' ') + '</div>' + (summary ? '<div class="my-status-summary-line-p533">' + esc(summary) + '</div>' : '') + '</div>',
    title: titleParts.join('\n')
  };
}

function renderMyCustomerStatusExpandedRowP533_(row) {
  const rowNo = Number(row && row.rowNo || 0) || 0;
  const customerNo = String(row && row.customerNo || '');
  let content = '';
  try {
    content = renderMyCustomerStatusExpandedDetailP533_(row);
  } catch (err) {

  }

function compareMyCustomerStatusValuesP533_(a, b, key) {
  if (key === 'recent') {
    const an = Number(a) || 0;

    if (!an && !bn) return 0;

function parseMyCustomerStatusDateMsP533_(value) {
  value = String(value || '').trim();
  if (!value) return 0;
  let m = value.match(/^(20\d{2})[-.\/]\s*(\d{1,2})[-.\/]\s*(\d{1,2})/);
  if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])).getTime();

  const t = Date.parse(value.replace(/\./g, '-'));

function recomputeMyCustomerStatusClientSummaryP534_() {
  const bundle = myCustomerStatusBundleP528;
  if (!bundle || !bundle.rows) return;
  const rows = bundle.rows || [];
  const cards = {
    total: rows.length, active: 0, needStatus: 0, mismatch: 0, recent7: 0, noContact14: 0, sentNoFollow: 0, highPotential: 0, dataMissing: 0, terminal: 0, contactIssue: 0, contractCheck: 0, longReconnect: 0
  };
  const counts = {};
  rows.forEach(function(row) {
    const status = String(row.status || '').trim() || '(공란)';
    const a = row.analysis || {};
    counts[status] = (counts[status] || 0) + 1;
    if (status !== '수주실패' && status !== '발주완료' && status !== '계약완료') cards.active++;
    if (!status || status.indexOf('상태지정') >= 0 || status === '(공란)') cards.needStatus++;
    if (a.statusChangeRecommendation) cards.mismatch++;
    if (a.lastContactDays != null && Number(a.lastContactDays) <= 7) cards.recent7++;
    if (a.longNoContact) cards.noContact14++;
    if (a.sentNoFollow || a.insightType === '자료발송후미후속' || a.insightType === '견적후속필요') cards.sentNoFollow++;
    if (Number(a.potentialScore || 0) >= 6) cards.highPotential++;
    if (a.dataMissing) cards.dataMissing++;
    if (a.terminalCandidate || a.statusProtected) cards.terminal++;
    if (a.insightType === '연락장애/담당자확인') cards.contactIssue++;
    if (a.insightType === '계약/발주확인필요') cards.contractCheck++;
    if (a.insightType === '장기재접촉') cards.longReconnect++;
  });
  bundle.cards = cards;
  bundle.statusCounts = buildMyCustomerStatusClientStatusCountsP534_(counts);
  if (bundle.analysisDb) {
    bundle.analysisDb.fastUpdatedAt = new Date().toISOString();
    bundle.analysisDb.note = 'P534: 추천상태 적용은 전체 재분석 없이 화면/분석DB 해당 행만 반영';
  }
}

function buildMyCustomerStatusClientStatusCountsP534_(counts) {
  const order = ['미컨택','TM 배분 완료','TM 성공콜','영업팀 2차콜 필요','영업팀 2차콜 이후 영업 중','고객 설득 중','견적제출완료','장기 추진건','발주완료','계약완료','수주실패','영업종료(거절)','계약중도취소','!!상태지정필요!!','(공란)'];
  const used = {};
  const out = [];
  order.forEach(function(k) { if (counts[k]) { out.push({ status: k, count: counts[k] }); used[k] = true; } });
  Object.keys(counts).sort(function(a,b){ return String(a).localeCompare(String(b), 'ko-KR', { numeric: true, sensitivity: 'base' }); }).forEach(function(k) { if (!used[k]) out.push({ status: k, count: counts[k] }); });
  return out;
}
