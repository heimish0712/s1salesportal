<script>

let customerDetailModalRequestSeq = 0;
let contactSelectedTagsP11 = [];

  rowNo = Number(rowNo) || 0;

  const targetCustomerNo = normalizeCustomerNoForKey_(customerNo || rowSummary.customerNo);

  const modalTokenP456 = (typeof beginCustomerDetailModalSessionP456_ === 'function') ? beginCustomerDetailModalSessionP456_('detail', rowNo, targetCustomerNo) : 0;
  const requestSeq = ++customerDetailModalRequestSeq;

  const cached = getCustomerDetailCache_(rowNo, targetCustomerNo) || loadCustomerDetailFromLocalStorage_(rowNo, targetCustomerNo) || buildCustomerDetailFromRowSummary_(rowSummary, rowNo);
  if (cached && cached.rowNo) {

    if (typeof portalPerfLogP460_ === 'function') portalPerfLogP460_('customerDetail.firstPaint', { rowNo: rowNo, customerNo: targetCustomerNo, fromCache: true, durationMs: 0 });
    // P457: 상세 보강 상태는 모달 내부 안내/하단 배지로만 표시합니다. 입력 focus를 방해하는 토스트는 띄우지 않습니다.
  } else {

  getCustomerDetailFast_(rowNo, function(detail) {
    // 캐시 표시 후 전체 상세가 도착하면 조용히 갱신합니다.
    // 단, 사용자가 그 사이 '정보 수정'을 눌렀다면 수정 모드와 입력 중인 값을 절대 되돌리지 않습니다.
    if (requestSeq !== customerDetailModalRequestSeq) return;
    if (typeof isCustomerDetailResponseStillRelevantP456_ === 'function' && !isCustomerDetailResponseStillRelevantP456_(modalTokenP456, rowNo, targetCustomerNo)) return;
    if (!detail || Number(detail.rowNo) !== rowNo) return;
    if (targetCustomerNo && normalizeCustomerNoForKey_(detail.customerNo) && normalizeCustomerNoForKey_(detail.customerNo) !== targetCustomerNo) return;
    if (currentDetail && Number(currentDetail.rowNo) !== rowNo) return;

    const protectActiveInputP457 = typeof hasActiveDetailDraftP457_ === 'function' && hasActiveDetailDraftP457_();
    if (protectActiveInputP457 && typeof applyServerDetailSafelyP457_ === 'function') {
      applyServerDetailSafelyP457_(detail, { reason: 'asyncDetailHydration', source: 'master', neverRender: true });
      try { renderDetailSyncStatusP457_(); } catch (e) {}
      if (typeof portalPerfEndP460_ === 'function') portalPerfEndP460_(__detailPerfP460, { fullHydrated: true, protectedInput: true, rowNo: rowNo, customerNo: targetCustomerNo });
      return;
    }
    const preserveEditMode = !!isDetailEditMode || forceEditMode;
    const draftValues = preserveEditMode ? collectCurrentDetailInputValues_() : null;
    const nextDetail = preserveEditMode ? mergeDetailDraftValues_(detail, draftValues) : detail;
    renderDetail(nextDetail, {
      preserveEditMode: preserveEditMode,
      draftValues: draftValues,
      reason: 'asyncDetailHydration'
    });
    if (typeof portalPerfEndP460_ === 'function') portalPerfEndP460_(__detailPerfP460, { fullHydrated: true, rowNo: rowNo, customerNo: targetCustomerNo });
  }, function(err) {
    if (typeof isCustomerDetailResponseStillRelevantP456_ === 'function' && !isCustomerDetailResponseStillRelevantP456_(modalTokenP456, rowNo, targetCustomerNo)) return;
    if (typeof portalPerfErrorP460_ === 'function') portalPerfErrorP460_(__detailPerfP460, err, { rowNo: rowNo, customerNo: targetCustomerNo });
    showModalError(err);
  }, { forceFull: true, customerNo: targetCustomerNo });
}

function openDetailReadOnly(rowNo, customerNo) {

}

function openDetailEdit(rowNo, customerNo) {

function openDetailSafe_(rowNo, customerNo, options) {
  try {
    openDetail(rowNo, customerNo, options || {});
  } catch (err) {
    console.error('상세 모달 열기 실패', err);
    alert('상세 모달을 열지 못했습니다: ' + (err && err.message ? err.message : err));

}

function renderDetail(d, options) {
  options = options || {};
  if (typeof prepareDetailForRenderP457_ === 'function') {
    d = prepareDetailForRenderP457_(d, options);
  }
  const preserveEditMode = !!options.preserveEditMode && !d.isNew;
  const draftValues = options.draftValues || null;

  currentDetail = d;
  currentDetailCustomerNo = normalizeCustomerNoForKey_(d && d.customerNo);

  if (!preserveEditMode) {
    lastCalcResult = null;
    discountTargetMode = false;
  }
  registrationMode = !!d.isNew;
  registrationApplied = d.isNew ? false : registrationApplied;
  registrationCalcResult = d.isNew ? null : registrationCalcResult;
  savedRegistrationMode = false;
  if (d.isNew) {

  let html = '';

  html += renderCustomerBasicSection(d);
  html += renderContractSection(d);
  if (!d.isNew) html += renderContactQuickPanel(d);
  if (!d.isNew) html += renderTempMemoPanel();
  html += '<div class="section-card"><div class="section-title">최근 이력</div>' + renderTimeline(d.contactLogs || []) + '</div>';

  modalBody.innerHTML = html;
  modalActionFooter.style.display = 'flex';

  if (d.isNew) {
    renderRegistrationFooter('newEditing');
    toggleDetailEdit(true);
    applyNewCustomerRegistrationDefaults_();
    applyContractDefaultsOnRender_({ onlyBlank: true });
    bindContractDefaultHandlers_();
    bindPortalContractDateHandlersP420_();
    bindPortalAreaGradeAutoUpdateP451_();
    bindCustomerAddressAutoRegionVendor_();
    bindDetailRealtimeCalculatedFieldsP462_();
    enforceRegionReadonly_();
    applyPortalStatusControlStyles_();
    setRegistrationSaveEnabled(true);
  } else {
    renderExistingFooter();
    if (draftValues) restoreDetailInputValues_(draftValues);
    toggleDetailEdit(preserveEditMode);
    applyContractDefaultsOnRender_({ onlyBlank: true });
    bindContractDefaultHandlers_();
    bindPortalContractDateHandlersP420_();
    bindPortalAreaGradeAutoUpdateP451_();
    bindCustomerAddressAutoRegionVendor_();
    bindDetailRealtimeCalculatedFieldsP462_();
    enforceRegionReadonly_();
    applyPortalStatusControlStyles_();
    setTempMemoDefaultTime();
    // P457: 서버 보강/저장 상태 표시는 focus를 뺏지 않는 footer badge만 사용합니다.
  }
  try { if (typeof bindDetailDraftProtectionP457_ === 'function') bindDetailDraftProtectionP457_(); } catch (err) {}
  try { if (typeof renderDetailSyncStatusP457_ === 'function') renderDetailSyncStatusP457_(); } catch (err) {}
}

function collectCurrentDetailInputValues_() {
  const values = {};
  document.querySelectorAll('.detail-edit-input').forEach(function(el) {
    const key = el.getAttribute('data-key');
    if (key) values[key] = el.value || '';
  });
  return values;
}

// PATCH J: 저장 payload는 전체 editable input이 아니라 실제 변경된 필드만 보냅니다.
// 상세정보가 아직 __summary/__lite 상태일 때 보이지 않던 계약조건 빈값이 마스터시트 값을 덮어쓰는 사고를 막습니다.
function normalizeDetailSaveCompareValue_(value) {
  return String(value == null ? '' : value).replace(/\r?\n/g, '\n');
}

function parseDetailAreaNumberP451_(value) {
  const text = String(value == null ? '' : value).replace(/,/g, '').replace(/㎡/g, '').trim();
  if (!text) return 0;
  const n = Number(text.replace(/[^0-9.\-]/g, ''));
  return isFinite(n) ? n : 0;
}

function calculateDetailGradeByAreaP451_(area) {
  area = Number(area) || 0;
  if (!area) return '';
  if (area < 10000) return '초급';
  if (area < 15000) return '초급';
  if (area < 30000) return '중급';
  if (area < 60000) return '고급';
  return '특급';
}

function applyDetailAreaGradeAutoUpdateP451_() {
  const areaEl = getDetailInputByKey_ ? getDetailInputByKey_('area') : document.querySelector('.detail-edit-input[data-key="area"]');
  const gradeEl = getDetailInputByKey_ ? getDetailInputByKey_('grade') : document.querySelector('.detail-edit-input[data-key="grade"]');
  if (!areaEl || !gradeEl) return '';
  const nextGrade = calculateDetailGradeByAreaP451_(parseDetailAreaNumberP451_(areaEl.value));
  if (String(gradeEl.value || '') !== String(nextGrade || '')) {
    gradeEl.value = nextGrade || '';
    try { gradeEl.dispatchEvent(new Event('input', { bubbles: true })); } catch (e) {}
    try { gradeEl.dispatchEvent(new Event('change', { bubbles: true })); } catch (e) {}
  }
  return nextGrade || '';
}

function bindPortalAreaGradeAutoUpdateP451_() {
  const areaEl = getDetailInputByKey_ ? getDetailInputByKey_('area') : document.querySelector('.detail-edit-input[data-key="area"]');
  if (!areaEl || areaEl.__portalAreaGradeBoundP451) return;
  areaEl.__portalAreaGradeBoundP451 = true;
  areaEl.addEventListener('input', applyDetailAreaGradeAutoUpdateP451_);
  areaEl.addEventListener('change', applyDetailAreaGradeAutoUpdateP451_);
}

function buildDetailBaselineFallbackP461_() {
  const base = {};
  const source = (detailSessionP457 && detailSessionP457.serverSnapshot) || currentDetail || {};
  document.querySelectorAll('.detail-edit-input').forEach(function(el) {
    const key = el.getAttribute('data-key');
    if (!key) return;
    // P462: detail.basic/detail.contract는 객체가 아니라 detailFields 배열입니다.
    // 기존 fallback은 source.basic[key]를 보다가 항상 공란이 되어 전체 필드를 dirty로 오판했습니다.
    let value = '';
    try { value = getDetailValueByKeyP457_(source, key); } catch (err) { value = ''; }
    base[key] = value == null ? '' : String(value);
  });
  return base;
}

function getDirtyDetailInputValues_() {
  const currentValues = collectCurrentDetailInputValues_();
  // P461: baseline이 비어 있으면 모든 input을 dirty로 보는 사고가 납니다.
  // 로그상 detailModal 저장이 전체 필드 20개 이상을 보내 stale 충돌을 만들었으므로, baseline fallback을 반드시 둡니다.
  const baseline = detailEditBaselineValues || buildDetailBaselineFallbackP461_();
  const dirty = {};
  Object.keys(currentValues).forEach(function(key) {
    const cur = normalizeDetailSaveCompareValue_(currentValues[key]);
    const base = normalizeDetailSaveCompareValue_(baseline[key]);
    if (cur !== base) dirty[key] = currentValues[key] || '';
  });
  return dirty;
}

function setDetailEditBaselineFromCurrentInputs_() {
  detailEditBaselineValues = collectCurrentDetailInputValues_();
}

function clearDetailEditBaseline_() {
  detailEditBaselineValues = null;
}

function restoreDetailInputValues_(values) {
  values = values || {};
  Object.keys(values).forEach(function(key) {
    const selector = '.detail-edit-input[data-key="' + String(key).replace(/"/g, '\"') + '"]';
    const el = document.querySelector(selector);
    if (el) el.value = values[key] || '';
  });
}

function mergeDetailDraftValues_(detail, values) {
  detail = detail || {};
  values = values || {};
  try {
    return applyDetailValuesToDetailObject_(JSON.parse(JSON.stringify(detail)), values);
  } catch (err) {
    const next = Object.assign({}, detail);
    Object.keys(values).forEach(function(key) {
      next[key] = values[key] || '';
      ['basic', 'contract'].forEach(function(section) {
        const arr = next.detailFields && next.detailFields[section] ? next.detailFields[section] : [];
        arr.forEach(function(f) {
          if (f && f.key === key) f.value = values[key] || '';
        });
      });
    });
    return next;
  }
}

// P457: 상세 모달 No-Interrupt 상태 계층
// - serverSnapshot: 서버/캐시에서 마지막으로 받은 확정 스냅샷
// - pendingOps: 서버 저장 중인 필드 단위 operation log
// - draft: 사용자가 현재 입력 중인 값
// 화면값은 항상 serverSnapshot + pendingOps + draft 순서로 계산합니다.
function cloneDetailP457_(obj) {
  try { return obj ? JSON.parse(JSON.stringify(obj)) : obj; } catch (err) { return obj; }
}

function getDetailSessionKeyP457_(rowNo, customerNo) {
  return makeCustomerDetailCacheKey_(Number(rowNo) || 0, normalizeCustomerNoForKey_(customerNo || ''));
}

function resetDetailSessionP457_(options) {
  options = options || {};
  detailSessionP457 = null;
  // global pending op map은 캐시/검색결과 보호용이므로 모달 cleanup 시 기본적으로 보존합니다.
  if (!options.keepGlobalPending) customerDetailPendingOpMapP457 = {};
}

function ensureDetailSessionP457_(detail, options) {
  options = options || {};
  if (!detail || detail.isNew) return null;
  const rowNo = Number(detail.rowNo) || 0;
  const customerNo = normalizeCustomerNoForKey_(detail.customerNo || currentDetailCustomerNo || '');
  const key = getDetailSessionKeyP457_(rowNo, customerNo);
  const needNew = !detailSessionP457 || detailSessionP457.key !== key || options.reset === true;
  if (needNew) {
    detailSessionP457 = {
      key: key,
      sessionId: 'DS_' + Date.now() + '_' + Math.floor(Math.random() * 1000000),
      rowNo: rowNo,
      customerNo: customerNo,
      serverSnapshot: cloneDetailP457_(detail),
      pendingOps: [],
      draft: {},
      dirtyFields: {},
      focusedField: null,
      syncStatus: 'idle',
      startedAt: Date.now()
    };
  } else if (options.serverSnapshot) {
    detailSessionP457.serverSnapshot = cloneDetailP457_(detail);
  }
  return detailSessionP457;
}

function isSameDetailSessionP457_(rowNo, customerNo) {
  const key = getDetailSessionKeyP457_(rowNo, customerNo);
  return !!(detailSessionP457 && detailSessionP457.key === key);
}

function prunePendingOpsP457_(ops) {
  const now = Date.now();
  return (ops || []).filter(function(op) {
    if (!op) return false;
    if (op.status === 'APPLIED') return false;
    if (op.status === 'FAILED' || op.status === 'CONFLICT') return true;
    return now - Number(op.createdAt || now) <= DETAIL_PENDING_OPERATION_TTL_MS_P457;
  });
}

function getPendingOpsForCustomerP457_(rowNo, customerNo) {
  const key = getDetailSessionKeyP457_(rowNo, customerNo);
  const ops = key && customerDetailPendingOpMapP457 ? (customerDetailPendingOpMapP457[key] || []) : [];
  const pruned = prunePendingOpsP457_(ops);
  if (key && customerDetailPendingOpMapP457 && pruned.length !== ops.length) customerDetailPendingOpMapP457[key] = pruned;
  return pruned;
}

function getPendingPatchForCustomerP457_(rowNo, customerNo) {
  const patch = {};
  getPendingOpsForCustomerP457_(rowNo, customerNo).forEach(function(op) {
    if (!op || op.status === 'FAILED' || op.status === 'CONFLICT') return;
    Object.assign(patch, op.patch || {});
  });
  return patch;
}

function computeDetailViewModelP457_(baseDetail) {
  let next = cloneDetailP457_(baseDetail || (detailSessionP457 && detailSessionP457.serverSnapshot) || currentDetail || {});
  const session = detailSessionP457;
  if (!session || !next) return next;
  const pending = {};
  (session.pendingOps || []).forEach(function(op) {
    if (!op || op.status === 'FAILED' || op.status === 'CONFLICT') return;
    Object.assign(pending, op.patch || {});
  });
  if (Object.keys(pending).length) next = applyDetailValuesToDetailObject_(next, pending);
  if (session.draft && Object.keys(session.draft).length) next = applyDetailValuesToDetailObject_(next, session.draft);
  if (session.pendingOps && session.pendingOps.some(function(op) { return op && op.status !== 'APPLIED'; })) {
    next.__pendingSave = true;
    next.__pendingOpsP457 = (session.pendingOps || []).map(function(op) { return op.opId; });
  }
  return next;
}

function prepareDetailForRenderP457_(detail, options) {
  options = options || {};
  if (!detail || detail.isNew) return detail;
  const hasExisting = !!detailSessionP457 && isSameDetailSessionP457_(detail.rowNo, detail.customerNo || currentDetailCustomerNo);
  const reset = options.resetP457Session === true || !hasExisting;
  const session = ensureDetailSessionP457_(detail, { reset: reset, serverSnapshot: !reset });
  if (!session) return detail;
  session.pendingOps = prunePendingOpsP457_(session.pendingOps || []);
  const globalOps = getPendingOpsForCustomerP457_(session.rowNo, session.customerNo);
  if (globalOps.length) {
    const seen = {};
    (session.pendingOps || []).forEach(function(op) { if (op && op.opId) seen[op.opId] = true; });
    globalOps.forEach(function(op) { if (op && op.opId && !seen[op.opId]) session.pendingOps.push(op); });
  }
  return computeDetailViewModelP457_(session.serverSnapshot);
}

function isDetailInputElementP457_(el) {
  return !!(el && el.classList && el.classList.contains('detail-edit-input'));
}

function getDetailInputKeyP457_(el) {
  return el && el.getAttribute ? String(el.getAttribute('data-key') || '') : '';
}

function getDetailProtectedFieldsP457_() {
  const protectedMap = {};
  const session = detailSessionP457;
  if (!session) return protectedMap;
  Object.keys(session.dirtyFields || {}).forEach(function(k) { if (session.dirtyFields[k]) protectedMap[k] = true; });
  Object.keys(session.draft || {}).forEach(function(k) { protectedMap[k] = true; });
  if (session.focusedField) protectedMap[session.focusedField] = true;
  (session.pendingOps || []).forEach(function(op) {
    Object.keys((op && op.patch) || {}).forEach(function(k) { protectedMap[k] = true; });
  });
  const active = document.activeElement;
  if (isDetailInputElementP457_(active)) {
    const k = getDetailInputKeyP457_(active);
    if (k) protectedMap[k] = true;
  }
  return protectedMap;
}

function hasActiveDetailDraftP457_() {
  const session = detailSessionP457;
  if (!session) return false;
  return !!(session.focusedField || Object.keys(session.draft || {}).length || Object.keys(session.dirtyFields || {}).length || (session.pendingOps || []).length);
}

function markDetailDraftFieldP457_(key, value, options) {
  options = options || {};
  key = String(key || '');
  if (!key || !detailSessionP457) return;
  if (!isDetailEditMode && !options.force) return;
  detailSessionP457.draft[key] = value == null ? '' : String(value);
  detailSessionP457.dirtyFields[key] = true;
  detailSessionP457.syncStatus = 'dirty';
}

function bindDetailDraftProtectionP457_() {
  const session = detailSessionP457;
  if (!session) return;
  document.querySelectorAll('.detail-edit-input').forEach(function(el) {
    if (!el || el.__detailDraftBoundP457) return;
    el.__detailDraftBoundP457 = true;
    el.addEventListener('focus', function() {
      if (!detailSessionP457) return;
      detailSessionP457.focusedField = getDetailInputKeyP457_(el) || null;
      try { document.body.classList.add('portal-user-editing'); } catch (err) {}
    });
    el.addEventListener('blur', function() {
      if (detailSessionP457 && detailSessionP457.focusedField === getDetailInputKeyP457_(el)) detailSessionP457.focusedField = null;
      setTimeout(function() {
        const active = document.activeElement;
        if (!isDetailInputElementP457_(active)) {
          try { document.body.classList.remove('portal-user-editing'); } catch (err) {}
        }
      }, 0);
    });
    const handler = function() {
      const key = getDetailInputKeyP457_(el);
      if (!key) return;
      markDetailDraftFieldP457_(key, el.value || '', { force: true });
      try { updateDetailSaveButtonDirtyStateP457_(); } catch (err) {}
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
}

function updateDetailSaveButtonDirtyStateP457_() {
  const saveBtn = document.getElementById('footerSaveDetail');
  if (!saveBtn || !isDetailEditMode) return;
  const dirty = getDirtyDetailInputValues_();
  saveBtn.disabled = Object.keys(dirty).length === 0;
}

function applyServerDetailSafelyP457_(serverDetail, options) {
  options = options || {};
  if (!serverDetail || serverDetail.isNew) return false;
  const rowNo = Number(serverDetail.rowNo) || 0;
  const customerNo = normalizeCustomerNoForKey_(serverDetail.customerNo || currentDetailCustomerNo || '');
  const session = ensureDetailSessionP457_(serverDetail, { reset: !isSameDetailSessionP457_(rowNo, customerNo), serverSnapshot: true });
  if (!session) return false;
  session.serverSnapshot = cloneDetailP457_(serverDetail);
  session.pendingOps = prunePendingOpsP457_(session.pendingOps || []);

  const shouldNotRender = !!(options.neverRender || isDetailEditMode || hasActiveDetailDraftP457_());
  const view = computeDetailViewModelP457_(session.serverSnapshot);
  currentDetail = view;
  currentDetailCustomerNo = normalizeCustomerNoForKey_(view.customerNo || customerNo);

  setCustomerDetailCache_(view, {
    force: true,
    skipPendingMerge: true,
    source: options.source || 'serverSnapshot',
    allowIndexPatch: !!options.allowIndexPatch,
    patchValues: getPendingPatchForCustomerP457_(rowNo, customerNo)
  });

  if (shouldNotRender) {
    // 사용자가 입력 중이면 DOM은 절대 갈아엎지 않습니다. 안전한 캐시만 갱신합니다.
    return true;
  }
  renderDetail(view, { preserveP457Session: true, reason: options.reason || 'safeServerDetail' });
  return true;
}

function createDetailSaveOperationP457_(rowNo, customerNo, patch, baseValues) {
  rowNo = Number(rowNo) || 0;
  customerNo = normalizeCustomerNoForKey_(customerNo || '');
  const opId = 'DOP_' + (++detailOperationSeqP457) + '_' + Date.now() + '_' + Math.floor(Math.random() * 1000000);
  return {
    opId: opId,
    seq: detailOperationSeqP457,
    rowNo: rowNo,
    customerNo: customerNo,

function addDetailPendingOperationP457_(op) {

    if (result) {

function markDetailOperationFailedP457_(op, err, conflict) {

// P458: 가벼운 내구 저장 큐 -------------------------------------------------
// 목적: 사용자가 저장 버튼을 누른 operation을 브라우저 localStorage에 남겨,
// 일시 오류/새로고침이 있어도 재시도할 수 있게 합니다. 입력 DOM은 절대 건드리지 않습니다.
function getDetailDurableOpsP458_() {
  try {
    const raw = localStorage.getItem(DETAIL_DURABLE_OPS_STORAGE_KEY_P458);
    const arr = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(arr)) return [];
    const now = Date.now();
    return arr.filter(function(op) {
      if (!op || !op.opId) return false;
      if (op.status === 'APPLIED') return false;
      if (now - Number(op.createdAt || now) > DETAIL_DURABLE_OP_MAX_AGE_MS_P458) return false;
      return true;
    });
  } catch (err) {
    return [];
  }
}

function setDetailDurableOpsP458_(ops) {
  try {
    const now = Date.now();
    const safe = (ops || []).filter(function(op) {
      return op && op.opId && op.status !== 'APPLIED' && (now - Number(op.createdAt || now) <= DETAIL_DURABLE_OP_MAX_AGE_MS_P458);
    });
    localStorage.setItem(DETAIL_DURABLE_OPS_STORAGE_KEY_P458, JSON.stringify(safe));
  } catch (err) {}
}

function compactDetailOperationForStorageP458_(op) {
  op = op || {};
  return {
    opId: String(op.opId || ''),
    seq: Number(op.seq || 0) || 0,
    rowNo: Number(op.rowNo || 0) || 0,
    customerNo: normalizeCustomerNoForKey_(op.customerNo || ''),
    patch: Object.assign({}, op.patch || {}),
    baseValues: Object.assign({}, op.baseValues || {}),
    status: String(op.status || 'LOCAL_PENDING'),
    createdAt: Number(op.createdAt || Date.now()) || Date.now(),
    queuedAt: Number(op.queuedAt || 0) || 0,
    appliedAt: Number(op.appliedAt || 0) || 0,
    attemptCount: Number(op.attemptCount || 0) || 0,
    nextRetryAt: Number(op.nextRetryAt || 0) || 0,
    lastError: String(op.lastError || '')
  };
}

function persistDetailDurableOperationP458_(op) {
  if (!op || !op.opId) return;
  const compact = compactDetailOperationForStorageP458_(op);
  const ops = getDetailDurableOpsP458_();
  let found = false;
  for (let i = 0; i < ops.length; i++) {
    if (ops[i] && ops[i].opId === compact.opId) {
      ops[i] = compact;
      found = true;
      break;
    }
  }
  if (!found) ops.push(compact);
  setDetailDurableOpsP458_(ops);
}

function removeDetailDurableOperationP458_(opId) {
  opId = String(opId || '');
  if (!opId) return;
  setDetailDurableOpsP458_(getDetailDurableOpsP458_().filter(function(op) { return op && op.opId !== opId; }));
}

function scheduleDetailDurableFlushP458_(delayMs) {
  try { if (detailDurableFlushTimerP458) clearTimeout(detailDurableFlushTimerP458); } catch (err) {}
  detailDurableFlushTimerP458 = setTimeout(function() {

  }, Math.max(500, Number(delayMs || 0) || 0));

function shouldRetryDetailDurableOpP458_(op, now) {
  if (!op || !op.opId) return false;
  if (op.status === 'APPLIED' || op.status === 'CONFLICT') return false;
  if (!op.patch || !Object.keys(op.patch).length) return false;
  if (op.status === 'APPLYING' || op.status === 'SERVER_QUEUED' || op.status === 'RETRYING') {
    const lastActive = Number(op.queuedAt || op.createdAt || now) || now;
    if (now - lastActive < DETAIL_DURABLE_OP_APPLYING_RETRY_MS_P458) return false;
  }
  if (Number(op.nextRetryAt || 0) && now < Number(op.nextRetryAt || 0)) return false;
  return true;
}

function getRetryDelayForDetailDurableOpP458_(attemptCount) {
  const base = DETAIL_DURABLE_RETRY_BASE_MS_P458;
  const pow = Math.min(5, Math.max(0, Number(attemptCount || 0)));
  return Math.min(DETAIL_DURABLE_RETRY_MAX_MS_P458, base * Math.pow(2, pow));
}

function attachRecoveredOperationToSessionP458_(op) {
  if (!op || !op.opId) return;
  const key = getDetailSessionKeyP457_(op.rowNo, op.customerNo);
  if (key) {
    if (!customerDetailPendingOpMapP457) customerDetailPendingOpMapP457 = {};
    const list = prunePendingOpsP457_(customerDetailPendingOpMapP457[key] || []);
    if (!list.some(function(item) { return item && item.opId === op.opId; })) list.push(op);
    customerDetailPendingOpMapP457[key] = list;
  }
  if (detailSessionP457 && detailSessionP457.key === key) {
    if (!detailSessionP457.pendingOps.some(function(item) { return item && item.opId === op.opId; })) detailSessionP457.pendingOps.push(op);
    detailSessionP457.syncStatus = 'retrying';
    try { renderDetailSyncStatusP457_(); } catch (err) {}

function flushDetailDurableSaveQueueP458_(reason) {
  if (detailDurableFlushRunningP458) return Promise.resolve({ ok: true, skipped: true, reason: 'already-running' });
  const allOps = getDetailDurableOpsP458_();
  const now = Date.now();
  const due = allOps.filter(function(op) { return shouldRetryDetailDurableOpP458_(op, now); }).slice(0, 3);
  if (!due.length) return Promise.resolve({ ok: true, processed: 0 });

  detailDurableFlushRunningP458 = true;
  let chain = Promise.resolve();
  due.forEach(function(storedOp) {
    chain = chain.then(function() {
      const op = compactDetailOperationForStorageP458_(storedOp);
      op.status = 'RETRYING';
      op.attemptCount = Number(op.attemptCount || 0) + 1;
      op.queuedAt = Date.now();
      persistDetailDurableOperationP458_(op);
      attachRecoveredOperationToSessionP458_(op);
      return enqueueCustomerSaveP220_(op.rowNo, op.customerNo, function() {
        return runCustomerSaveRequestP220_('saveCustomerDetailFast', makeCustomerSavePayloadP202_(op.rowNo, op.customerNo, op.patch, {
          clientSaveSource: 'detailModalRetryP458',
          clientRequestId: op.opId,
          clientSavedAt: new Date(op.createdAt || Date.now()).toISOString(),
          clientOperationId: op.opId,
          expectedValues: op.baseValues || {},
          requireAuditLog: false,
          fastMode: true,
          noSynchronousRefresh: true
        }));
      }, { silentQueued: true }).then(function(res) {
        try { applyCustomerMasterMetaFromSaveP202_(op.rowNo, op.customerNo, res); } catch(e) {}
        try { markDetailOperationAppliedP457_(op, (res && (res.changedValues || res.values)) || op.patch, res || {}); } catch(e) {}
        removeDetailDurableOperationP458_(op.opId);
      }).catch(function(err) {
        const conflict = typeof isCustomerStaleSaveErrorP202_ === 'function' && isCustomerStaleSaveErrorP202_(err);
        op.status = conflict ? 'CONFLICT' : 'FAILED';
        op.lastError = getErrorMessage_(err);
        op.nextRetryAt = conflict ? 0 : (Date.now() + getRetryDelayForDetailDurableOpP458_(op.attemptCount));
        persistDetailDurableOperationP458_(op);
        try { markDetailOperationFailedP457_(op, err, conflict); } catch(e) {}
      });
    });
  });
  return chain.finally(function() {
    detailDurableFlushRunningP458 = false;
    const remain = getDetailDurableOpsP458_().filter(function(op) { return shouldRetryDetailDurableOpP458_(op, Date.now()); });
    if (remain.length) scheduleDetailDurableFlushP458_(1500);
  });
}

function startDetailDurableQueueP458_() {
  const ops = getDetailDurableOpsP458_();
  if (!ops.length) return;
  ops.forEach(function(op) { attachRecoveredOperationToSessionP458_(op); });
  scheduleDetailDurableFlushP458_(1200);
}

function parsePortalContractDateClientP420_(value) {
  const text = String(value == null ? '' : value).trim().replace(/\s*([.\/-])\s*/g, '$1');
  if (!text) return null;
  let m = text.match(/^(\d{2})[.\/-](\d{1,2})[.\/-](\d{1,2})\.?$/);
  if (m) return new Date(2000 + Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  m = text.match(/^(\d{4})[.\/-](\d{1,2})[.\/-](\d{1,2})\.?$/);
  if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  const d = new Date(text);
  return isNaN(d.getTime()) ? null : new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function formatPortalContractDateClientP420_(date) {
  if (!(date instanceof Date) || isNaN(date.getTime())) return '';
  const yyyy = String(date.getFullYear());
  const mm = String(date.getMonth() + 1).padStart(2, '0');
  const dd = String(date.getDate()).padStart(2, '0');
  return yyyy + '.' + mm + '.' + dd + '.';
}

function normalizePortalContractDateDisplayClientP420_(value) {
  const d = parsePortalContractDateClientP420_(value);

function getPortalCurrentUserNameForSalesRep_() {
  let raw = '';
  try {
    const p = (typeof getPortalPermission_ === 'function') ? getPortalPermission_() : null;
    raw = (p && (p.name || p.userName || p.salesRepName || p.displayName || p.email)) || '';
    if (!raw || raw === '권한 확인 중') return '';
    const rawText = String(raw || '').replace(/·.*$/g, '').trim();
    if (rawText && !/@/.test(rawText) && (/[\s()]/.test(rawText) || /영업팀|기획팀|관리자|서무|ADMIN|SALES/i.test(rawText))) {
      let text = rawText.replace(/\([^)]*\)/g, ' ').trim();
      const skip = /^(영업팀|기획팀|관리자|서무|ADMIN|SALES|대리|차장|과장|부장|팀장|책임|대표|실장|사원|주임)$/i;
      const tokens = text.split(/\s+/).filter(Boolean).filter(function(t){ return !skip.test(t); });
      const nameToken = tokens.find(function(t){ return /^[가-힣]{2,4}$/.test(t); });
      if (nameToken) return nameToken;
      return tokens[0] || text;
    }
    return rawText;
  } catch (err) {
    return '';
  }
}

function normalizePortalAddressClient_(address) {
  let text = String(address || '').trim().replace(/\s+/g, ' ');
  if (!text) return '';
  const rules = [
    [/^서울시(?=\s|$)/, '서울특별시'], [/^서울(?=\s|$)/, '서울특별시'],
    [/^부산시(?=\s|$)/, '부산광역시'], [/^부산(?=\s|$)/, '부산광역시'],
    [/^대구시(?=\s|$)/, '대구광역시'], [/^대구(?=\s|$)/, '대구광역시'],
    [/^인천시(?=\s|$)/, '인천광역시'], [/^인천(?=\s|$)/, '인천광역시'],
    [/^광주시(?=\s|$)/, '광주광역시'], [/^광주(?=\s|$)/, '광주광역시'],
    [/^대전시(?=\s|$)/, '대전광역시'], [/^대전(?=\s|$)/, '대전광역시'],
    [/^울산시(?=\s|$)/, '울산광역시'], [/^울산(?=\s|$)/, '울산광역시'],
    [/^세종시(?=\s|$)/, '세종특별자치시'], [/^세종(?=\s|$)/, '세종특별자치시'],
    [/^경기(?=\s|$)/, '경기도'], [/^강원도(?=\s|$)/, '강원특별자치도'], [/^강원(?=\s|$)/, '강원특별자치도'],
    [/^충남(?=\s|$)/, '충청남도'], [/^충북(?=\s|$)/, '충청북도'],
    [/^경남(?=\s|$)/, '경상남도'], [/^경북(?=\s|$)/, '경상북도'],
    [/^제주도(?=\s|$)/, '제주특별자치도'], [/^제주(?=\s|$)/, '제주특별자치도']
  ];
  rules.some(function(pair){
    if (pair[0].test(text)) {
      text = text.replace(pair[0], pair[1]);
      return true;
    }
    return false;
  });
  return text;
}

function derivePortalRegionFromAddressClient_(address) {

  if (/^강원특별자치도\b/.test(text)) return '강원권';

function normalizePersonNameOnlyP438_(value) {
  let s = String(value || '').trim();
  if (!s) return '';
  s = s.replace(/\s*·.*$/, '').trim();
  s = s.replace(/\([^)]*\)/g, ' ').replace(/\[[^\]]*\]/g, ' ').trim();
  if (/@/.test(s)) s = s.split('@')[0].trim();
  s = s.replace(/^(기획팀|영업팀|영업지원팀|관리팀|전산팀|서무팀|총무팀|수행사|ADMIN|관리자)\s+/i, '').trim();
  s = s.replace(/\s+(대리|책임|차장|부장|과장|주임|사원|팀장|실장|이사|상무|전무|대표|대표이사|ADMIN|관리자)$/i, '').trim();
  const parts = s.split(/\s+/).filter(Boolean);
  const blocked = /^(기획팀|영업팀|영업지원팀|관리팀|전산팀|서무팀|총무팀|대리|책임|차장|부장|과장|주임|사원|팀장|실장|이사|상무|전무|대표|대표이사|ADMIN|관리자)$/i;
  const koreanNames = parts.filter(function(part) {
    return /^[가-힣]{2,4}$/.test(part) && !blocked.test(part) && !/팀$/.test(part);
  });
  if (koreanNames.length) return koreanNames[koreanNames.length - 1];
  return s;
}

  let arr = [];
  if (Array.isArray(value)) arr = value;
  else arr = String(value || '').split(/[#,，,;；\s]+/);
  const seen = {};
  return arr.map(function(v) { return String(v || '').replace(/^#+/, '').trim(); })
    .filter(function(v) { if (!v || seen[v]) return false; seen[v] = true; return true; });
}

function renderContactNextActionTagsP119_() {
  const panel = document.getElementById('contactNextActionTagPanel');

  const selected = normalizeTodayLikeTagsP119_(contactNextActionTagsP119 || []);
  const selectedHtml = selected.length

    : '<span class="contact-next-tag-placeholder">다음액션 태그 선택</span>';
  const options = getTodayDefaultTagListP119_().map(function(tag) {
    return '<button type="button" class="contact-next-tag" onclick="toggleContactNextActionTagP119_(\'' + escJsP119_(tag) + '\')">' + esc(tag) + '</button>';
  }).join('');
  panel.innerHTML = '<div class="contact-next-selected">' + selectedHtml + '</div><div class="contact-next-options">' + options + '<input id="contactNextCustomTagInput" placeholder="새 태그" onkeydown="if(event.key===\'Enter\'){event.preventDefault(); addContactNextCustomTagP119_();}"><button type="button" onclick="addContactNextCustomTagP119_()">추가</button></div>';
}

function toggleContactNextActionTagP119_(tag) {
  tag = String(tag || '').replace(/^#+/, '').trim();
  if (!tag) return;
  const tags = normalizeTodayLikeTagsP119_(contactNextActionTagsP119 || []);
  const idx = tags.indexOf(tag);
  if (idx >= 0) tags.splice(idx, 1); else tags.push(tag);
  contactNextActionTagsP119 = tags;
  renderContactNextActionTagsP119_();
}

function addContactNextCustomTagP119_() {
  const input = document.getElementById('contactNextCustomTagInput');
  const tag = input ? String(input.value || '').replace(/^#+/, '').trim() : '';
  if (!tag) return;
  if (input) input.value = '';
  const tags = normalizeTodayLikeTagsP119_(contactNextActionTagsP119 || []);
  if (tags.indexOf(tag) < 0) tags.push(tag);
  contactNextActionTagsP119 = tags;
  renderContactNextActionTagsP119_();
}

function escJsP119_(value) { return String(value || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n'); }

function insertContactQuickTagP11_(tag) {
  tag = String(tag || '').trim();
  if (!tag) return;
  const input = document.getElementById('contactContentInput');
  if (!input) return;
  if ((contactSelectedTagsP11 || []).indexOf(tag) < 0) contactSelectedTagsP11.push(tag);
  const panel = document.getElementById('contactQuickTagPanel');

      if (btn.getAttribute('data-tag') === tag) btn.classList.add('selected');

function insertTextAtTextareaCursorP11_(textarea, text) {
  if (!textarea) return;
  text = String(text || '');
  textarea.focus({ preventScroll: true });
  const value = String(textarea.value || '');
  let start = typeof textarea.selectionStart === 'number' ? textarea.selectionStart : value.length;
  let end = typeof textarea.selectionEnd === 'number' ? textarea.selectionEnd : start;
  const needsLeadingSpace = start > 0 && value.charAt(start - 1) && !/\s/.test(value.charAt(start - 1));
  const insertText = (needsLeadingSpace ? ' ' : '') + text;
  textarea.value = value.slice(0, start) + insertText + value.slice(end);
  const pos = start + insertText.length;
  try { textarea.setSelectionRange(pos, pos); } catch (e) {}
  textarea.dispatchEvent(new Event('input', { bubbles: true }));
}

function fillSelectOptions_(select, values, labelFn) {
  if (!select) return;
  select.innerHTML = (values || []).map(function(v) {
    return '<option value="' + escAttr(v) + '">' + esc(labelFn ? labelFn(v) : v) + '</option>';
  }).join('');
}
