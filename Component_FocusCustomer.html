<script>
let focusCustomerStateP290_ = {
  page: 0,
  pageSize: 20,
  keyword: '',
  rank: 'ALL',
  salesRep: 'ALL',
  status: 'ALL',
  priorityOnly: false,
  includeExcluded: false,
  sortMode: 'priority',
  metricFilter: 'ALL',
  loading: false,
  data: null,
  requestSeq: 0,
  cache: {},
  expandedRowNo: 0
};


// STEP25/P330: HOME 진입 후 일정 시간 뒤 중점고객관리 기본 데이터를 조용히 프리로드합니다.
// - 화면을 렌더링하지 않습니다.
// - 기본 조건 1페이지를 서버 CacheService와 브라우저 메모리 캐시에만 저장합니다.
// - 중점고객관리 화면이 이미 열려 있으면 기존 화면 로딩 흐름을 방해하지 않습니다.
function preloadFocusCustomerDefaultP330_(options) {
  options = options || {};
  try {
    if (typeof focusCustomerStateP290_ === 'undefined' || !focusCustomerStateP290_) return;
    if (focusCustomerStateP290_.preloadLoading || focusCustomerStateP290_.loading) return;
    if (focusCustomerStateP290_.preloadDone && !options.force) return;

    const perm = (typeof getPortalPermission_ === 'function') ? getPortalPermission_() : null;
    // 권한 로딩 전이면 한 번만 살짝 늦춰서 재시도합니다. 실패해도 HOME 사용성은 막지 않습니다.
    if ((!perm || perm.active === false || !perm.email) && !options._retried) {
      setTimeout(function() {
        try { preloadFocusCustomerDefaultP330_(Object.assign({}, options, { _retried: true })); } catch (err) {}
      }, 1600);
      return;
    }
    if (!perm || perm.active === false) return;

    const payload = {
      keyword: '',
      rank: 'ALL',
      salesRep: 'ALL',
      status: 'ALL',
      priorityOnly: false,
      includeExcluded: false,
      sortMode: 'priority',
      metricFilter: 'ALL',
      page: 0,
      pageSize: 20
    };
    const cacheKey = makeFocusCustomerClientCacheKeyP300_(payload);
    if (!options.force && focusCustomerStateP290_.cache && focusCustomerStateP290_.cache[cacheKey]) {
      focusCustomerStateP290_.preloadDone = true;
      focusCustomerStateP290_.preloadAt = Date.now();
      return;
    }

    focusCustomerStateP290_.preloadLoading = true;
    google.script.run
      .withSuccessHandler(function(res) {
        focusCustomerStateP290_.preloadLoading = false;
        focusCustomerStateP290_.preloadDone = true;
        focusCustomerStateP290_.preloadAt = Date.now();
        focusCustomerStateP290_.cache = focusCustomerStateP290_.cache || {};
        focusCustomerStateP290_.cache[cacheKey] = res || {};
        // 사용자가 이미 중점고객관리 화면에 들어와 있고 아직 데이터가 없다면 그때만 화면에 반영합니다.
        const section = document.getElementById('focusCustomerSection');
        if (section && section.classList.contains('active') && !focusCustomerStateP290_.data) {
          focusCustomerStateP290_.data = res || {};
          try { renderFocusCustomerDataP290_(res || {}); } catch (err) {}
        }
      })
      .withFailureHandler(function() {
        focusCustomerStateP290_.preloadLoading = false;
      })
      .getFocusCustomerDashboardP290(payload);
  } catch (err) {
    try { focusCustomerStateP290_.preloadLoading = false; } catch (e) {}
    if (!options.silent) console.warn('중점고객관리 프리로드 실패', err);
  }
}

function loadFocusCustomerPageP290(forceRefresh) {
  const area = document.getElementById('focusCustomerArea');
  if (!area) return;
  if (!document.getElementById('focusListP290')) {
    renderFocusCustomerShellP290_();
  }
  if (!focusCustomerStateP290_.data && !forceRefresh) {
    const list = document.getElementById('focusListP290');
    if (list) list.innerHTML = '<div class="loading">중점고객관리 데이터를 불러오는 중입니다.</div>';
    // P546: 기본조건 프리로드가 이미 진행 중이면 동일 서버 호출을 중복 실행하지 않습니다.
    // 프리로드 완료 콜백이 현재 화면이 활성 상태일 때 바로 렌더링합니다.
    if (focusCustomerStateP290_.preloadLoading) return;
  }
  requestFocusCustomerDataP290_(!!forceRefresh);
}

function collectFocusCustomerFiltersP290_() {
  const keyword = document.getElementById('focusKeywordP290');
  const rank = document.getElementById('focusRankFilterP290');
  const salesRep = document.getElementById('focusSalesRepFilterP290');
  const status = document.getElementById('focusStatusFilterP290');
  const priorityOnly = document.getElementById('focusPriorityOnlyP290');
  const includeExcluded = document.getElementById('focusIncludeExcludedP290');
  const sortMode = document.getElementById('focusSortModeP290');
  focusCustomerStateP290_.keyword = keyword ? keyword.value || '' : '';
  focusCustomerStateP290_.rank = rank ? rank.value || 'ALL' : 'ALL';
  focusCustomerStateP290_.salesRep = salesRep ? salesRep.value || 'ALL' : 'ALL';
  focusCustomerStateP290_.status = status ? status.value || 'ALL' : 'ALL';
  focusCustomerStateP290_.priorityOnly = priorityOnly ? !!priorityOnly.checked : false;
  focusCustomerStateP290_.includeExcluded = includeExcluded ? !!includeExcluded.checked : false;
  focusCustomerStateP290_.sortMode = sortMode ? sortMode.value || 'priority' : 'priority';
  focusCustomerStateP290_.metricFilter = focusCustomerStateP290_.metricFilter || 'ALL';
}



function clearFocusCustomerClientCacheP300_() {
  try {
    if (focusCustomerStateP290_) {
      focusCustomerStateP290_.cache = {};
      focusCustomerStateP290_.data = null;
    }
  } catch (err) {}
}

function makeFocusCustomerClientCacheKeyP300_(payload) {
  try { return JSON.stringify(payload || {}); } catch (err) { return String(Date.now()); }
}

function requestFocusCustomerDataP290_(forceRefresh) {
  collectFocusCustomerFiltersP290_();
  const area = document.getElementById('focusCustomerArea');
  if (!area) return;
  const requestSeq = ++focusCustomerStateP290_.requestSeq;
  focusCustomerStateP290_.loading = true;
  const btn = document.getElementById('focusRefreshBtnP290');
  if (btn) { btn.disabled = true; btn.textContent = forceRefresh ? '갱신 중' : '조회 중'; }
  const payload = {
    keyword: focusCustomerStateP290_.keyword,
    rank: focusCustomerStateP290_.rank,
    salesRep: focusCustomerStateP290_.salesRep,
    status: focusCustomerStateP290_.status,
    priorityOnly: focusCustomerStateP290_.priorityOnly,
    includeExcluded: focusCustomerStateP290_.includeExcluded,
    sortMode: focusCustomerStateP290_.sortMode,
    metricFilter: focusCustomerStateP290_.metricFilter || 'ALL',
    page: focusCustomerStateP290_.page,
    pageSize: focusCustomerStateP290_.pageSize
  };
  const cacheKey = makeFocusCustomerClientCacheKeyP300_(payload);
  if (!forceRefresh && focusCustomerStateP290_.cache && focusCustomerStateP290_.cache[cacheKey]) {
    focusCustomerStateP290_.data = focusCustomerStateP290_.cache[cacheKey];
    renderFocusCustomerDataP290_(focusCustomerStateP290_.data, { fromClientCache: true });
    focusCustomerStateP290_.loading = false;
    if (btn) { btn.disabled = false; btn.textContent = '새로고침'; }
    return;
  }
  google.script.run
    .withSuccessHandler(function(res) {
      if (requestSeq !== focusCustomerStateP290_.requestSeq) return;
      focusCustomerStateP290_.loading = false;
      if (btn) { btn.disabled = false; btn.textContent = '새로고침'; }
      if (forceRefresh && typeof toast === 'function') toast('중점고객관리 데이터를 갱신했습니다.');
      focusCustomerStateP290_.data = res || {};
      focusCustomerStateP290_.cache = focusCustomerStateP290_.cache || {};
      focusCustomerStateP290_.cache[cacheKey] = focusCustomerStateP290_.data;
      renderFocusCustomerDataP290_(res || {});
    })
    .withFailureHandler(function(err) {
      if (requestSeq !== focusCustomerStateP290_.requestSeq) return;
      focusCustomerStateP290_.loading = false;
      if (btn) { btn.disabled = false; btn.textContent = '새로고침'; }
      const list = document.getElementById('focusListP290') || area;
      list.innerHTML = '<div class="loading" style="color:#b42318;">중점고객관리 데이터를 불러오지 못했습니다.<br>' + esc(getErrorMessage_(err)) + '</div>';
    })
    .getFocusCustomerDashboardP290(payload);
}

function renderFocusCustomerShellP290_() {
  const area = document.getElementById('focusCustomerArea');
  if (!area) return;
  area.innerHTML = '<div class="focus-toolbar-p290">' +
    '<input id="focusKeywordP290" placeholder="회사명, 고객번호, 담당자, 메모, TM 검색" onkeydown="if(event.key===\'Enter\') searchFocusCustomersP290()">' +
    '<select id="focusRankFilterP290" onchange="clearFocusMetricFilterP340_(); searchFocusCustomersP290()"><option value="ALL">전체등급</option><option value="A급">A급</option><option value="B급">B급</option><option value="C급">C급</option><option value="보류">보류</option><option value="제외">제외</option></select>' +
    '<select id="focusSalesRepFilterP290" onchange="searchFocusCustomersP290()"><option value="ALL">전체담당자</option></select>' +
    '<select id="focusStatusFilterP290" onchange="searchFocusCustomersP290()"><option value="ALL">전체진행현황</option></select>' +
    '<select id="focusSortModeP290" onchange="searchFocusCustomersP290()"><option value="priority">업무분류/우선순위순</option><option value="scoreDesc">점수높은순</option><option value="areaDesc">연면적큰순</option><option value="customerNoDesc">고객번호최신순</option><option value="companyAsc">회사명순</option></select>' +
    '<div class="focus-check-row-p290">' +
      '<label class="focus-check-p290"><input id="focusPriorityOnlyP290" type="checkbox" onchange="clearFocusMetricFilterP340_(); searchFocusCustomersP290()"><span>오늘 처리만</span></label>' +
      '<label class="focus-check-p290"><input id="focusIncludeExcludedP290" type="checkbox" onchange="searchFocusCustomersP290()"><span>제외 포함</span></label>' +
    '</div>' +
    '<button onclick="searchFocusCustomersP290()">조회</button>' +
    '<button class="secondary" id="focusRefreshBtnP290" onclick="refreshFocusCustomersP290()">새로고침</button>' +
    '</div>' +
    '<div id="focusSummaryP290"></div>' +
    '<div id="focusTodayP290"></div>' +
    '<div id="focusListP290"><div class="loading">중점고객 데이터를 불러오는 중입니다.</div></div>';
}

function renderFocusCustomerDataP290_(data) {
  if (!document.getElementById('focusListP290')) renderFocusCustomerShellP290_();
  hydrateFocusFilterOptionsP290_(data || {});
  restoreFocusFilterValuesP290_();
  renderFocusStatsP290_(data || {});
  renderFocusTodayP290_(data || {});
  renderFocusRowsP290_(data || {});
}

function hydrateFocusFilterOptionsP290_(data) {
  const salesEl = document.getElementById('focusSalesRepFilterP290');
  const statusEl = document.getElementById('focusStatusFilterP290');
  if (salesEl) {
    const opts = ['<option value="ALL">전체담당자</option>'].concat((data.options && data.options.salesReps || []).map(function(v) {
      return '<option value="' + escAttr(normalizeFocusFilterValueClientP290_(v)) + '">' + esc(v) + '</option>';
    }));
    salesEl.innerHTML = opts.join('');
  }
  if (statusEl) {
    const opts = ['<option value="ALL">전체진행현황</option>'].concat((data.options && data.options.statuses || []).map(function(v) {
      return '<option value="' + escAttr(normalizeFocusFilterValueClientP290_(v)) + '">' + esc(v) + '</option>';
    }));
    statusEl.innerHTML = opts.join('');
  }
}

function restoreFocusFilterValuesP290_() {
  const setVal = function(id, val) { const el = document.getElementById(id); if (el) el.value = val == null ? '' : val; };
  setVal('focusKeywordP290', focusCustomerStateP290_.keyword || '');
  setVal('focusRankFilterP290', focusCustomerStateP290_.rank || 'ALL');
  setVal('focusSalesRepFilterP290', focusCustomerStateP290_.salesRep || 'ALL');
  setVal('focusStatusFilterP290', focusCustomerStateP290_.status || 'ALL');
  setVal('focusSortModeP290', focusCustomerStateP290_.sortMode || 'priority');
  const p = document.getElementById('focusPriorityOnlyP290'); if (p) p.checked = !!focusCustomerStateP290_.priorityOnly;
  const ex = document.getElementById('focusIncludeExcludedP290'); if (ex) ex.checked = !!focusCustomerStateP290_.includeExcluded;
}

function renderFocusStatsP290_(data) {
  const el = document.getElementById('focusSummaryP290');
  if (!el) return;
  const s = data.stats || {};
  const fs = data.filterStats || {};
  const b = s.byBucket || {};
  const resultTotal = (fs && typeof fs.total === 'number') ? fs.total : (Number(data.total || 0));
  el.innerHTML = '<div class="focus-stat-grid-p290 focus-stat-grid-workflow-p514">' +
    renderFocusMetricP290_('오늘 처리', b.TODAY || 0, 'today', 'bucket:TODAY') +
    renderFocusMetricP290_('견적 후 미확인', b.QUOTE_NO_RESPONSE || s.quoteNoResponse || 0, 'quote', 'bucket:QUOTE_NO_RESPONSE') +
    renderFocusMetricP290_('TM 성공 후속', b.TM_SUCCESS_FOLLOWUP || s.tmSuccessFollowup || 0, 'tm', 'bucket:TM_SUCCESS_FOLLOWUP') +
    renderFocusMetricP290_('상태값 정리 필요', b.STATUS_REVIEW || s.statusReview || 0, 'status', 'bucket:STATUS_REVIEW') +
    renderFocusMetricP290_('데이터 보강 필요', b.DATA_FIX || s.dataFix || 0, 'data', 'bucket:DATA_FIX') +
    renderFocusMetricP290_('장기추진 예약', b.LONG_TERM || s.longTerm || 0, 'long', 'bucket:LONG_TERM') +
    renderFocusMetricP290_('종결/제외', b.CLOSED || s.closed || s.excluded || 0, 'closed', 'bucket:CLOSED') +
    renderFocusMetricP290_('조회 결과', resultTotal, 'result', 'result') +
    '</div>' +
    '<div class="focus-meta-p290">기준: ' + esc(data.source || '검색인덱스_DB+상태판정') + ' · 인덱스 ' + esc(data.indexBuiltAt || '-') + (data.fromCache ? ' · 캐시' : '') + '</div>';
}

function renderFocusMetricP290_(label, value, type, filterKey) {
  const active = isFocusMetricActiveP340_(filterKey) ? ' is-active' : '';
  return '<button type="button" class="focus-metric-p290 focus-metric-' + escAttr(type) + active + '" onclick="applyFocusMetricFilterP340_(\'' + escJs(filterKey || 'result') + '\')">' +
    '<span>' + esc(label) + '</span><b>' + esc(value) + '</b></button>';
}

function isFocusMetricActiveP340_(filterKey) {
  filterKey = String(filterKey || 'result');
  const metric = focusCustomerStateP290_.metricFilter || 'ALL';
  if (filterKey.indexOf('bucket:') === 0) return metric === filterKey;
  if (filterKey.indexOf('rank:') === 0) return focusCustomerStateP290_.rank === filterKey.slice(5) && !focusCustomerStateP290_.priorityOnly && metric === 'ALL';
  if (filterKey === 'today') return !!focusCustomerStateP290_.priorityOnly && metric === 'ALL';
  if (filterKey === 'quoteNoResponse') return metric === 'quoteNoResponse' || metric === 'bucket:QUOTE_NO_RESPONSE';
  return filterKey === 'result' && metric === 'ALL' && !focusCustomerStateP290_.priorityOnly && (focusCustomerStateP290_.rank || 'ALL') === 'ALL';
}

function clearFocusMetricFilterP340_() {
  focusCustomerStateP290_.metricFilter = 'ALL';
}

function applyFocusMetricFilterP340_(filterKey) {
  filterKey = String(filterKey || 'result');
  focusCustomerStateP290_.page = 0;
  focusCustomerStateP290_.metricFilter = 'ALL';
  if (filterKey.indexOf('bucket:') === 0) {
    focusCustomerStateP290_.rank = 'ALL';
    focusCustomerStateP290_.priorityOnly = false;
    focusCustomerStateP290_.metricFilter = filterKey;
    if (filterKey === 'bucket:CLOSED') focusCustomerStateP290_.includeExcluded = true;
  } else if (filterKey.indexOf('rank:') === 0) {
    const rank = filterKey.slice(5);
    focusCustomerStateP290_.rank = rank;
    focusCustomerStateP290_.priorityOnly = false;
    if (rank === '제외') focusCustomerStateP290_.includeExcluded = true;
  } else if (filterKey === 'today') {
    focusCustomerStateP290_.rank = 'ALL';
    focusCustomerStateP290_.priorityOnly = true;
  } else if (filterKey === 'quoteNoResponse') {
    focusCustomerStateP290_.rank = 'ALL';
    focusCustomerStateP290_.priorityOnly = false;
    focusCustomerStateP290_.metricFilter = 'bucket:QUOTE_NO_RESPONSE';
  } else {
    focusCustomerStateP290_.rank = 'ALL';
    focusCustomerStateP290_.priorityOnly = false;
    focusCustomerStateP290_.metricFilter = 'ALL';
  }
  restoreFocusFilterValuesP290_();
  requestFocusCustomerDataP290_(false);
}

function openFocusHelpP340_() {
  let modal = document.getElementById('focusHelpModalP340');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'focusHelpModalP340';
    modal.className = 'focus-help-modal-p340';
    modal.innerHTML = '<div class="focus-help-backdrop-p340" onclick="closeFocusHelpP340_()"></div>' +
      '<div class="focus-help-card-p340" role="dialog" aria-modal="true" aria-label="중점고객관리 도움말">' +
        '<button type="button" class="focus-help-close-p340" onclick="closeFocusHelpP340_()">×</button>' +
        '<h2>중점고객관리 도움말</h2>' +
        '<p class="focus-help-lead-p340">중점고객관리는 단순 점수표가 아니라 오늘 처리할 영업 액션 큐입니다. 현재상태, 메모상 추측 상태값, TM 진행현황, 데이터 확인 필요 여부를 함께 봅니다.</p>' +
        '<div class="focus-help-grid-p340">' +
          '<section><h3>오늘 처리</h3><p>상태와 메모가 일치하고 즉시 후속콜·계약/발주 확인이 필요한 활성 고객입니다.</p></section>' +
          '<section><h3>견적 후 미확인</h3><p>견적·자료 발송 흔적은 있으나 확인/검토/회신 단서가 부족한 고객입니다.</p></section>' +
          '<section><h3>TM 성공 후속</h3><p>TM 진행 현황이 성공·검토중·견적요청으로 잡혀 영업자가 받아야 하는 고객입니다.</p></section>' +
          '<section><h3>상태값 정리 필요</h3><p>현재 영업 진행 상황과 메모상 추측 상태값이 어긋난 고객입니다. 실제 영업보다 상태 정리가 먼저입니다.</p></section>' +
          '<section><h3>데이터 보강 필요</h3><p>주소, 연면적, 담당자, 연락처, 이메일 등 영업/발송 전 필수 데이터가 부족한 고객입니다.</p></section>' +
          '<section><h3>장기추진 예약</h3><p>내년, 하반기, 11월/12월, 자체선임 후 점검위탁 등 당장 영업보다 예약 관리가 맞는 고객입니다.</p></section>' +
          '<section><h3>종결/제외</h3><p>수주실패, 계약완료, 타사계약, 대상아님, 중복 등 일반 후속관리에서 빼야 하는 고객입니다.</p></section>' +
          '<section><h3>조회 결과</h3><p>현재 검색어, 등급, 담당자, 진행현황, 업무분류 필터를 적용한 실제 목록 수입니다.</p></section>' +
        '</div>' +
        '<div class="focus-help-note-p340">상단 업무분류 카드를 누르면 해당 액션 큐만 바로 필터링됩니다. 상태값 자동수정은 하지 않고 먼저 검토 대상으로만 보여줍니다.</div>' +
      '</div>';
    document.body.appendChild(modal);
  }
  modal.style.display = 'block';
}

function closeFocusHelpP340_() {
  const modal = document.getElementById('focusHelpModalP340');
  if (modal) modal.style.display = 'none';
}

function renderFocusTodayP290_(data) {
  const el = document.getElementById('focusTodayP290');
  if (!el) return;
  const rows = data.todayRows || [];
  if (!rows.length) {
    el.innerHTML = '<div class="focus-today-box-p290"><div class="focus-section-title-p290">오늘 처리/후속 큐</div><div class="focus-empty-p290">현재 조건에서 바로 처리할 고객이 없습니다.</div></div>';
    return;
  }
  el.innerHTML = '<div class="focus-today-box-p290"><div class="focus-section-title-p290">오늘 처리/후속 큐</div><div class="focus-today-list-p290">' + rows.map(renderFocusTodayCardP290_).join('') + '</div></div>';
}

function renderFocusTodayCardP290_(row) {
  return '<div class="focus-today-card-p290" onclick="openFocusCustomerDetailP290_(' + Number(row.rowNo || 0) + ',\'' + escJs(row.customerNo || '') + '\')">' +
    '<div><span class="focus-bucket-badge-p514 bucket-' + escAttr(row.focusBucketTone || 'today') + '">' + esc(row.focusBucketLabel || '오늘 처리') + '</span> <b>' + esc(row.company || '-') + '</b></div>' +
    '<div class="focus-today-sub-p290">' + esc(row.salesRep || '-') + ' · ' + esc(row.effectiveStatus || row.status || '-') + ' · ' + esc(row.nextAction || '-') + '</div>' +
    '</div>';
}

function renderFocusRowsP290_(data) {
  const el = document.getElementById('focusListP290');
  if (!el) return;
  const rows = data.rows || [];
  if (!rows.length) {
    focusCustomerStateP290_.expandedRowNo = 0;
    el.innerHTML = '<div class="loading">조건에 맞는 중점고객이 없습니다. 검색조건을 초기화하거나 제외 포함 여부를 확인하세요.</div>';
    return;
  }
  const visibleRowNos = {};
  rows.forEach(function(r) { const rn = Number(r && r.rowNo) || 0; if (rn) visibleRowNos[rn] = true; });
  if (focusCustomerStateP290_.expandedRowNo && !visibleRowNos[focusCustomerStateP290_.expandedRowNo]) {
    focusCustomerStateP290_.expandedRowNo = 0;
  }
  const pager = renderFocusPagerP290_(data);
  const bodyHtml = rows.map(renderFocusRowBlockP380_).join('');
  el.innerHTML = pager + '<div class="focus-table-wrap-p290"><table class="focus-table-p290"><thead><tr>' +
    '<th>분류/점수</th><th>고객</th><th>상태판정</th><th>TM/발송</th><th>담당/연락처</th><th>추천 액션</th><th>판정 근거</th><th>작업</th>' +
    '</tr></thead><tbody>' + bodyHtml + '</tbody></table></div>' + pager;
}

function renderFocusRowBlockP380_(row) {
  const rowNo = Number(row && row.rowNo) || 0;
  const isExpanded = rowNo && focusCustomerStateP290_.expandedRowNo === rowNo;
  let html = renderFocusRowP290_(row, isExpanded);
  if (isExpanded) {
    html += '<tr class="focus-expand-row-p380 customer-expand-row" id="focusCustomerExpandRow_' + rowNo + '"><td colspan="8">' + renderFocusCustomerExpandedContentP380_(row) + '</td></tr>';
  }
  return html;
}

function renderFocusRowP290_(row, isExpanded) {
  const rowNo = Number(row && row.rowNo) || 0;
  const reasons = (row.reasons || []).slice(0, 4).map(function(v) { return '<span>' + esc(v) + '</span>'; }).join('');
  const deductions = (row.deductions || []).slice(0, 2).map(function(v) { return '<em>' + esc(v) + '</em>'; }).join('');
  const statusMatchHtml = row.statusMatch ? '<span class="focus-status-match-p514 ' + (row.statusMatch === 'O' ? 'ok' : 'bad') + '">' + esc(row.statusMatch === 'O' ? '일치' : '불일치') + '</span>' : '';
  const tmLine = row.tmProgressStatus || row.tmPreview || '-';
  const sentLine = [row.sendStatus, row.sentAt || row.lastSent, row.sendCount ? ('발송 ' + row.sendCount + '회') : ''].filter(Boolean).join(' · ');
  const areaLine = formatFocusAreaP290_(row.area) + ' · ' + (row.grade || '-') + ' · ' + (row.buildingType || '-');
  const dataBadges = [];
  if (row.areaCheckNeeded) dataBadges.push('연면적확인');
  if (row.addressCheckNeeded || row.addressNormalizeStatus === '확인필요') dataBadges.push('주소확인');
  if (row.dataIssueLevel) dataBadges.push('데이터보강');
  return '<tr class="focus-main-row-p380' + (isExpanded ? ' focus-expanded-p380' : '') + '" data-focus-row-no="' + rowNo + '" ondblclick="toggleFocusCustomerExpandP380_(' + rowNo + ')">' +
    '<td><div class="focus-bucket-line-p514"><span class="focus-bucket-badge-p514 bucket-' + escAttr(row.focusBucketTone || 'today') + '">' + esc(row.focusBucketLabel || '-') + '</span><b>' + esc(row.score || 0) + '</b></div><div class="focus-sub-p290">' + esc(row.finalRank || '-') + '</div>' + (row.priorityTarget ? '<div class="focus-priority-pill-p290">처리 대상</div>' : '') + '</td>' +
    '<td><b>' + esc(row.company || '-') + '</b><div class="focus-sub-p290">고객번호 ' + esc(row.customerNo || '-') + ' · ' + esc(row.salesRep || '-') + '</div><div class="focus-sub-p290">' + esc(areaLine) + '</div><div class="focus-memo-preview-p290">' + esc(row.memoPreview || '') + '</div></td>' +
    '<td><div class="focus-status-stack-p514"><div>현재 <span class="status-chip">' + esc(row.status || '-') + '</span></div><div>메모추측 <span class="focus-inferred-status-p514">' + esc(row.memoInferredStatus || '-') + '</span> ' + statusMatchHtml + '</div>' + (dataBadges.length ? '<div class="focus-data-badges-p514">' + dataBadges.map(function(v){ return '<span>' + esc(v) + '</span>'; }).join('') + '</div>' : '') + '</div></td>' +
    '<td><b>' + esc(tmLine) + '</b><div class="focus-sub-p290">' + esc(sentLine || '-') + '</div><div class="focus-sub-p290">' + esc(row.latestSignal || '') + '</div></td>' +
    '<td>' + esc(row.contact || '-') + '<div class="focus-sub-p290">' + esc(row.directPhone || row.phone || '-') + '</div><div class="focus-sub-p290">' + esc(row.email || '-') + '</div></td>' +
    '<td><b>' + esc(row.nextAction || '-') + '</b></td>' +
    '<td><div class="focus-reason-tags-p290">' + reasons + deductions + '</div></td>' +
    '<td><div class="focus-row-actions-p290">' +
      '<button type="button" onclick="event.stopPropagation(); openFocusCustomerDetailP290_(' + rowNo + ',\'' + escJs(row.customerNo || '') + '\')">상세</button>' +
      '<button type="button" class="secondary" onclick="event.stopPropagation(); openFocusCustomerSendP290_(' + rowNo + ')">자료발송</button>' +
      '<button type="button" class="secondary" onclick="event.stopPropagation(); openFocusCustomerSupportP290_(\'' + encodeURIComponent(JSON.stringify(row)).replace(/'/g, '%27') + '\')">영업지원</button>' +
      '<button type="button" class="secondary focus-row-expand-btn-p380" onclick="event.stopPropagation(); toggleFocusCustomerExpandP380_(' + rowNo + ')">' + (isExpanded ? '접기' : '펼침') + '</button>' +
    '</div></td>' +
    '</tr>';
}

function renderFocusCustomerExpandedContentP380_(row) {
  const rowNo = Number(row && row.rowNo) || 0;
  if (!rowNo) return '<div class="customer-expand-loading">고객 행 정보를 확인할 수 없습니다.</div>';
  const summary = buildFocusCustomerRowSummaryP380_(row);
  if (typeof renderCustomerExpandedContent_ === 'function') {
    return renderCustomerExpandedContent_(rowNo, summary);
  }
  return '<div class="customer-expand-loading">고객 상세 펼침 기능을 준비하지 못했습니다.</div>';
}

function buildFocusCustomerRowSummaryP380_(row) {
  row = row || {};
  return Object.assign({}, row, {
    rowNo: Number(row.rowNo) || 0,
    company: row.company || '',
    customerNo: row.customerNo || '',
    salesRep: row.salesRep || '',
    status: row.status || '',
    memoInferredStatus: row.memoInferredStatus || '',
    statusMatch: row.statusMatch || '',
    focusBucket: row.focusBucket || '',
    focusBucketLabel: row.focusBucketLabel || '',
    contact: row.contact || '',
    phone: row.phone || '',
    directPhone: row.directPhone || '',
    email: row.email || '',
    area: row.area || '',
    grade: row.grade || '',
    buildingType: row.buildingType || '',
    memo: row.memo || row.memoPreview || '',
    memoPreview: row.memoPreview || row.memo || '',
    customerRank: row.finalRank || row.customerRank || '',
    fullAddress: row.fullAddress || row.address || '',
    address: row.address || row.fullAddress || ''
  });
}

function clearCustomerSearchExpandedDomForFocusP380_(rowNo) {
  try {
    if (typeof customerExpandedRowNo !== 'undefined') customerExpandedRowNo = null;
    document.querySelectorAll('.customer-expand-row').forEach(function(el) {
      if (!el || String(el.id || '').indexOf('focusCustomerExpandRow_') === 0) return;
      el.parentNode && el.parentNode.removeChild(el);
    });
    document.querySelectorAll('.customer-main-row.customer-expanded').forEach(function(el) { el.classList.remove('customer-expanded'); });
  } catch (err) {}
}

function toggleFocusCustomerExpandP380_(rowNo) {
  rowNo = Number(rowNo) || 0;
  if (!rowNo) return;
  if (focusCustomerStateP290_.expandedRowNo === rowNo) {
    focusCustomerStateP290_.expandedRowNo = 0;
    renderFocusRowsP290_(focusCustomerStateP290_.data || {});
    return;
  }

  clearCustomerSearchExpandedDomForFocusP380_(rowNo);
  focusCustomerStateP290_.expandedRowNo = rowNo;
  const row = findFocusCustomerRowByRowNoP380_(rowNo);
  const summary = buildFocusCustomerRowSummaryP380_(row || { rowNo: rowNo });
  const targetCustomerNo = (typeof normalizeCustomerNoForKey_ === 'function') ? normalizeCustomerNoForKey_(summary.customerNo || '') : String(summary.customerNo || '');
  if (typeof getCustomerDetailCache_ === 'function' && typeof setCustomerDetailCache_ === 'function' && typeof buildCustomerDetailFromRowSummary_ === 'function') {
    if (!getCustomerDetailCache_(rowNo, targetCustomerNo)) {
      setCustomerDetailCache_(buildCustomerDetailFromRowSummary_(summary, rowNo), { source: 'focusIndex', skipStorage: true, allowIndexPatch: false });
    }
  }
  renderFocusRowsP290_(focusCustomerStateP290_.data || {});

  const cached = (typeof getCustomerDetailCache_ === 'function') ? getCustomerDetailCache_(rowNo, targetCustomerNo) : null;
  const isFresh = (typeof isCustomerDetailFreshFromMasterP112_ === 'function') ? isCustomerDetailFreshFromMasterP112_(cached, 10 * 60 * 1000) : false;
  if (cached && !cached.__summary && !cached.__lite && isFresh) return;

  if (typeof fetchCustomerDetailFromServer_ === 'function') {
    fetchCustomerDetailFromServer_(rowNo, function() {
      if (focusCustomerStateP290_.expandedRowNo === rowNo) renderFocusRowsP290_(focusCustomerStateP290_.data || {});
    }, function(err) {
      const rowEl = document.getElementById('focusCustomerExpandRow_' + rowNo);
      if (rowEl) rowEl.querySelector('td').innerHTML = '<div class="customer-expand-loading">상세정보를 불러오지 못했습니다.<br>' + esc(getErrorMessage_(err)) + '</div>';
    });
  }
}

function findFocusCustomerRowByRowNoP380_(rowNo) {
  rowNo = Number(rowNo) || 0;
  const rows = (focusCustomerStateP290_.data && focusCustomerStateP290_.data.rows) || [];
  for (let i = 0; i < rows.length; i++) {
    if (Number(rows[i] && rows[i].rowNo) === rowNo) return rows[i];
  }
  return null;
}

function renderFocusPagerP290_(data) {
  const total = Number(data.total || 0);
  const page = Number(data.page || 0);
  const pageSize = Number(data.pageSize || 20);
  const start = total ? Number(data.start || 0) + 1 : 0;
  const end = Number(data.end || 0);
  const pageText = start + '-' + end + ' / ' + total;
  return '<div class="focus-pager-p290"><span>' + esc(pageText) + '</span>' +
    '<button class="secondary" ' + (page <= 0 ? 'disabled' : '') + ' onclick="goFocusCustomerPageP290_(' + (page - 1) + ')">이전</button>' +
    '<button class="secondary" ' + (!data.hasNext ? 'disabled' : '') + ' onclick="goFocusCustomerPageP290_(' + (page + 1) + ')">다음</button></div>';
}

function searchFocusCustomersP290() {
  focusCustomerStateP290_.expandedRowNo = 0;
  focusCustomerStateP290_.page = 0;
  requestFocusCustomerDataP290_(false);
}

function refreshFocusCustomersP290() {
  focusCustomerStateP290_.expandedRowNo = 0;
  focusCustomerStateP290_.page = 0;
  focusCustomerStateP290_.cache = {};
  google.script.run.withSuccessHandler(function(){ requestFocusCustomerDataP290_(true); }).withFailureHandler(function(){ requestFocusCustomerDataP290_(true); }).clearFocusCustomerCacheP290();
}

function goFocusCustomerPageP290_(page) {
  focusCustomerStateP290_.expandedRowNo = 0;
  focusCustomerStateP290_.page = Math.max(0, Number(page) || 0);
  requestFocusCustomerDataP290_(false);
}

function openFocusCustomerDetailP290_(rowNo, customerNo) {
  rowNo = Number(rowNo) || 0;
  if (!rowNo) return;
  if (typeof openDetailSafe_ === 'function') openDetailSafe_(rowNo, customerNo || '', { forceEdit: false });
}

function openFocusCustomerSendP290_(rowNo) {
  rowNo = Number(rowNo) || 0;
  if (!rowNo) return;
  if (typeof openSendForCustomer === 'function') openSendForCustomer(rowNo);
}

function openFocusCustomerSupportP290_(encodedRow) {
  let row = {};
  try { row = JSON.parse(decodeURIComponent(String(encodedRow || ''))); } catch (err) {}
  switchPage('support');
  let tries = 0;
  const timer = setInterval(function() {
    tries++;
    if (typeof fillSupportInlineCustomerInfo_ === 'function') {
      clearInterval(timer);
      fillSupportInlineCustomerInfo_({
        rowNo: row.rowNo || '',
        customerNo: row.customerNo || '',
        customerName: row.company || '',
        quoteAmount: row.finalQuote || '',
        status: row.status || '',
        area: row.area || '',
        region: row.region || '',
        contactName: row.contact || '',
        contactEmail: row.email || '',
        masterMemo: row.memo || '',
        contractSummary: [row.finalRank || '', row.score ? ('점수 ' + row.score) : '', row.nextAction || ''].filter(Boolean).join(' / ')
      });
      const text = document.getElementById('supportInlineRequestText');
      if (text && !text.value) text.value = '[중점고객관리] ' + (row.nextAction || '후속조치 필요');
      if (text) text.focus();
      return;
    }
    if (tries > 30) {
      clearInterval(timer);
      toast('영업지원 요청 화면을 준비하지 못했습니다. 고객번호 ' + (row.customerNo || '') + '를 직접 입력하세요.');
    }
  }, 100);
}

function normalizeFocusFilterValueClientP290_(v) {
  return String(v || '').replace(/[\s\n\r\t]+/g, '').trim().toLowerCase();
}
function formatFocusAreaP290_(v) {
  const raw = String(v || '').replace(/[,㎡\s]/g, '');
  const n = Number(raw);
  if (isNaN(n) || !n) return '-';
  return n.toLocaleString('ko-KR') + '㎡';
}
function escJs(value) {
  return String(value == null ? '' : value).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
}
</script>
