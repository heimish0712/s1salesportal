  html += renderSystemHealthCardShellP503_('systemHealthCacheCardP503', '브라우저 캐시', '현재 브라우저에 남아 있는 포털 캐시를 확인하고 정리합니다.');
  html += renderSystemHealthCardShellP503_('systemHealthConnectionCardP503', '시스템 연결 상태', '마스터시트, 웹앱 DB, 주요 DB 시트 연결을 가볍게 확인합니다.');
  html += renderSystemHealthCardShellP503_('systemHealthSaveQueueCardP525', '저장큐 상태', '자료발송을 막을 수 있는 저장큐 충돌·실패·대기 건을 확인합니다.');

function renderSystemHealthCardShellP503_(id, title, sub) {
  return '<div class="system-health-card-p503" id="' + escapeHtml_(id) + '">' +
    '<div class="system-health-card-head-p503"><div><div class="system-health-card-title-p503">' + escapeHtml_(title) + '</div><div class="system-health-card-sub-p503">' + escapeHtml_(sub) + '</div></div><span class="system-health-pill-p503 is-info">대기</span></div>' +
    '<div class="system-health-card-body-p503"><div class="system-health-skeleton-p503">대기 중입니다.</div></div>' +
    '</div>';
}

function setSystemHealthCardLoadingP503_(id, message) {
  const card = document.getElementById(id);
  if (!card) return;
  const pill = card.querySelector('.system-health-pill-p503');
  const body = card.querySelector('.system-health-card-body-p503');
  if (pill) pill.className = 'system-health-pill-p503 is-info', pill.textContent = '점검중';
  if (body) body.innerHTML = '<div class="system-health-skeleton-p503">' + escapeHtml_(message || '확인 중입니다...') + '</div>';
}

function setSystemHealthCardP503_(id, title, bodyHtml, status) {
  const card = document.getElementById(id);
  if (!card) return;
  status = String(status || 'info').toLowerCase();
  const pill = card.querySelector('.system-health-pill-p503');
  const body = card.querySelector('.system-health-card-body-p503');
  if (pill) {
    pill.className = 'system-health-pill-p503 is-' + status;
    pill.textContent = renderSystemHealthStatusTextP208_(status);
  }
  if (body) {
    body.innerHTML = '<div class="system-health-card-message-p503">' + escapeHtml_(title || '') + '</div>' + (bodyHtml || '');
  }
}

function beginSystemHealthTimedLoadP503_(key, cardId, message) {
  clearSystemHealthTimerP503_(key);
  setSystemHealthCardLoadingP503_(cardId, message);
  portalSystemHealthTimersP503[key] = setTimeout(function() {
    const card = document.getElementById(cardId);
    if (!card) return;
    const pill = card.querySelector('.system-health-pill-p503');
    const body = card.querySelector('.system-health-card-body-p503');
    if (pill && pill.textContent === '점검중') pill.className = 'system-health-pill-p503 is-warn', pill.textContent = '지연';
    if (body && /확인 중|점검/.test(body.textContent || '')) {
      body.innerHTML = '<div class="system-health-timeout-p503">응답이 지연되고 있습니다. 화면은 계속 사용할 수 있습니다. 필요하면 새로고침하거나 해당 버튼만 다시 눌러 주세요.</div>';
    }
  }, 7000);
}

function clearSystemHealthTimerP503_(key) {
  if (portalSystemHealthTimersP503[key]) clearTimeout(portalSystemHealthTimersP503[key]);
  delete portalSystemHealthTimersP503[key];
}

function loadSystemHealthPermissionCardP503_(force) {
  beginSystemHealthTimedLoadP503_('permission', 'systemHealthPermissionCardP503', '현재 권한을 확인하는 중입니다...');
  google.script.run
    .withSuccessHandler(function(res) {
      clearSystemHealthTimerP503_('permission');
      renderSystemHealthPermissionCardP503_(res);
    })
    .withFailureHandler(function(err) {
      clearSystemHealthTimerP503_('permission');
      setSystemHealthCardP503_('systemHealthPermissionCardP503', '권한 상태 확인 실패', '<pre class="system-health-detail-p208">' + escapeHtml_(getSystemHealthErrorP208_(err, '권한 상태를 확인하지 못했습니다.')) + '</pre>', 'warn');
    })
    .getPortalSystemHealthPermissionDebugP503();
}

function renderSystemHealthPermissionCardP503_(res) {
  if (!res || !res.ok) {
    setSystemHealthCardP503_('systemHealthPermissionCardP503', '권한 상태 확인 실패', '<pre class="system-health-detail-p208">' + escapeHtml_((res && res.message) || '결과 없음') + '</pre>', 'warn');
    return;
  }
  const p = res.permission || {};
  const cache = res.cache || {};
  let html = '<div class="system-health-kv-p503">';
  html += renderSystemHealthKvP503_('이메일', p.email || res.activeEmail || '-');
  html += renderSystemHealthKvP503_('표시명', p.displayName || p.name || '-');
  html += renderSystemHealthKvP503_('권한', (p.level || '-') + (p.role ? ' / ' + p.role : ''));
  html += renderSystemHealthKvP503_('담당자 필터', p.salesRepName || p.name || '-');
  html += renderSystemHealthKvP503_('전체고객 조회', (p.canViewAllCustomers || p.canUseAdminHome) ? '가능' : '본인 담당만');
  html += renderSystemHealthKvP503_('권한 캐시', 'hit=' + (cache.cacheHit ? 'Y' : 'N') + ' / bust=' + (cache.cacheBust || '-'));
  html += '</div>';
  html += '<div class="system-health-inline-actions-p503"><button class="primary" onclick="forcePermissionUpdateP503_()">권한 강제 업데이트</button><button class="secondary" onclick="loadSystemHealthPermissionCardP503_(true)">권한 다시 확인</button></div>';
  setSystemHealthCardP503_('systemHealthPermissionCardP503', '현재 권한 상태', html, p.active === false ? 'danger' : 'ok');
}

function loadSystemHealthConnectionCardP503_(force) {
  beginSystemHealthTimedLoadP503_('connection', 'systemHealthConnectionCardP503', '시트 연결을 확인하는 중입니다...');
  google.script.run
    .withSuccessHandler(function(res) {
      clearSystemHealthTimerP503_('connection');
      renderSystemHealthConnectionCardP503_(res);
    })
    .withFailureHandler(function(err) {
      clearSystemHealthTimerP503_('connection');
      setSystemHealthCardP503_('systemHealthConnectionCardP503', '연결 상태 확인 실패', '<pre class="system-health-detail-p208">' + escapeHtml_(getSystemHealthErrorP208_(err, '연결 상태를 확인하지 못했습니다.')) + '</pre>', 'warn');
    })
    .getPortalSystemHealthConnectionChecksP503();
}

function renderSystemHealthConnectionCardP503_(res) {
  const checks = res && Array.isArray(res.checks) ? res.checks : [];
  let status = 'ok';
  if (checks.some(function(c) { return c.status === 'danger'; })) status = 'danger';
  else if (checks.some(function(c) { return c.status === 'warn'; })) status = 'warn';
  let html = '<div class="system-health-mini-checks-p503">';
  checks.forEach(function(c) {
    html += '<div class="system-health-mini-check-p503 is-' + escapeHtml_(c.status || 'info') + '"><span>' + renderSystemHealthStatusTextP208_(c.status) + '</span><div><b>' + escapeHtml_(c.name || '') + '</b><small>' + escapeHtml_(c.message || '') + '</small></div></div>';
  });
  if (!checks.length) html += '<div class="system-health-skeleton-p503">점검 결과가 없습니다.</div>';
  html += '</div>';
  html += '<div class="system-health-inline-actions-p503"><button class="secondary" onclick="loadSystemHealthConnectionCardP503_(true)">연결 다시 확인</button></div>';
  setSystemHealthCardP503_('systemHealthConnectionCardP503', '연결 점검 결과', html, status);
}


function loadSystemHealthSaveQueueCardP525_(force) {
  beginSystemHealthTimedLoadP503_('saveQueueP525', 'systemHealthSaveQueueCardP525', '저장큐_DB 상태를 확인하는 중입니다...');
  google.script.run
    .withSuccessHandler(function(res) {
      clearSystemHealthTimerP503_('saveQueueP525');
      renderSystemHealthSaveQueueCardP525_(res);
    })
    .withFailureHandler(function(err) {
      clearSystemHealthTimerP503_('saveQueueP525');
      setSystemHealthCardP503_('systemHealthSaveQueueCardP525', '저장큐 상태 확인 실패', '<pre class="system-health-detail-p208">' + escapeHtml_(getSystemHealthErrorP208_(err, '저장큐 상태를 확인하지 못했습니다.')) + '</pre>', 'warn');
    })
    .getPortalSaveQueueDashboardP525();
}

function renderSystemHealthSaveQueueCardP525_(res) {
  res = res || {};
  const counts = res.counts || {};
  const blocking = res.blockingByStatus || {};
  const ignored = res.ignoredByReason || {};
  let status = res.status || (res.ok === false ? 'warn' : 'ok');
  let html = '<div class="system-health-kv-p503">';
  html += renderSystemHealthKvP503_('전체/스캔', String(res.totalRows || 0) + '건 / 최근 ' + String(res.scannedRows || 0) + '행');
  html += renderSystemHealthKvP503_('차단 가능', String(res.blockingCount || 0) + '건');
  html += renderSystemHealthKvP503_('대기/재시도', String((blocking.QUEUED || 0) + (blocking.RUNNING || 0) + (blocking.RETRY || 0)) + '건');
  html += renderSystemHealthKvP503_('충돌/실패', String((blocking.CONFLICT || 0) + (blocking.FAIL || 0)) + '건');
  html += renderSystemHealthKvP503_('DONE', String(counts.DONE || 0) + '건');
  html += renderSystemHealthKvP503_('차단 제외', String(res.ignoredCount || 0) + '건');
  if (res.latestUpdated || res.latestRegistered) html += renderSystemHealthKvP503_('최근 처리/등록', res.latestUpdated || res.latestRegistered || '-');
  html += '</div>';

  const statusParts = [];
  ['QUEUED','RUNNING','RETRY','CONFLICT','FAIL'].forEach(function(k) {
    if (blocking[k]) statusParts.push(k + ' ' + blocking[k]);
  });
  if (statusParts.length) html += '<div class="system-health-card-message-p503">차단 상태: ' + escapeHtml_(statusParts.join(' / ')) + '</div>';
  const ignoredParts = Object.keys(ignored).filter(function(k) { return ignored[k]; }).map(function(k) { return k + ' ' + ignored[k]; });
  if (ignoredParts.length) html += '<div class="system-health-card-message-p503">차단 제외: ' + escapeHtml_(ignoredParts.join(' / ')) + '</div>';

  const items = Array.isArray(res.recentBlocking) ? res.recentBlocking : [];
  html += '<div class="system-health-mini-checks-p503">';
  if (items.length) {
    items.slice(0, 5).forEach(function(item) {
      const itemStatus = /CONFLICT|FAIL/i.test(item.status || '') ? 'danger' : 'warn';
      const title = '#' + escapeHtml_(String(item.sheetRow || '')) + ' · ' + escapeHtml_(item.status || '') + ' · 고객 ' + escapeHtml_(item.customerNo || '-') + (item.rowNo ? ' / row ' + escapeHtml_(item.rowNo) : '');
      const msg = [item.source || item.methodName || '', item.updatedAt || item.registeredAt || '', item.lastError || ''].filter(Boolean).join(' · ');
      html += '<div class="system-health-mini-check-p503 is-' + itemStatus + '"><span>' + renderSystemHealthStatusTextP208_(itemStatus) + '</span><div><b>' + title + '</b><small>' + escapeHtml_(msg || '-') + '</small></div></div>';
    });
  } else {
    html += '<div class="system-health-mini-check-p503 is-ok"><span>정상</span><div><b>자료발송 차단 가능 저장큐 없음</b><small>DONE/적용완료/비차단 상태는 차단 대상에서 제외됩니다.</small></div></div>';
  }
  html += '</div>';

  html += '<div class="system-health-inline-actions-p503">';
  html += '<button class="secondary" onclick="loadSystemHealthSaveQueueCardP525_(true)">저장큐 다시 확인</button>';
  if (res.sheetUrl) html += '<button class="secondary" onclick="window.open(\'' + escapeHtml_(String(res.sheetUrl || '')).replace(/'/g, '&#39;') + '\', \'_blank\')">저장큐_DB 열기</button>';
  html += '</div>';
  setSystemHealthCardP503_('systemHealthSaveQueueCardP525', res.message || '저장큐 상태', html, status);
}

function renderSystemHealthBrowserCacheCardP503_() {
  const counts = getPortalBrowserCacheCountsP503_();
  const versionInfo = (typeof getPortalClientCacheVersionInfoP526_ === 'function') ? getPortalClientCacheVersionInfoP526_() : { currentVersion: '-', storedVersion: '', protectedTotal: 0, versionMatched: false };
  let html = '<div class="system-health-kv-p503">';
  html += renderSystemHealthKvP503_('클라이언트 캐시 버전', String(versionInfo.currentVersion || '-'));
  html += renderSystemHealthKvP503_('브라우저 보관 버전', String(versionInfo.storedVersion || '미기록') + (versionInfo.versionMatched ? ' / 정상' : ' / 갱신 예정'));
  html += renderSystemHealthKvP503_('보호된 저장/발송 작업', String(versionInfo.protectedTotal || 0) + '개');
  html += renderSystemHealthKvP503_('localStorage', counts.localTotal + '개');
  html += renderSystemHealthKvP503_('sessionStorage', counts.sessionTotal + '개');
  html += renderSystemHealthKvP503_('고객검색/상세 캐시', counts.customer + '개');
  html += renderSystemHealthKvP503_('나의 고객 폴더 관련', counts.folder + '개');
  html += '</div>';
  html += '<div class="system-health-inline-actions-p503"><button class="secondary" onclick="clearCustomerSearchCachesP503_()">고객검색 캐시 초기화</button><button class="secondary" onclick="clearMyCustomerFolderCachesP503_()">폴더 캐시 초기화</button><button class="danger-light-p208" onclick="clearPortalScreenCachesP503_()">전체 화면 캐시 초기화</button></div>';
  setSystemHealthCardP503_('systemHealthCacheCardP503', '브라우저 캐시 상태', html, counts.localTotal || counts.sessionTotal ? 'info' : 'ok');
}

function getPortalBrowserCacheCountsP503_() {
  const localKeys = [];
  const sessionKeys = [];
  try { for (let i = 0; i < localStorage.length; i++) localKeys.push(localStorage.key(i)); } catch (err) {}
  try { for (let i = 0; i < sessionStorage.length; i++) sessionKeys.push(sessionStorage.key(i)); } catch (err2) {}
  const customerRe = /salesPortal\.customer|portalCustomerPage:|customerSearch|customerDetail|customerPage/i;
  const folderRe = /myCustomerFolder|MY_CUSTOMER_FOLDER|customerFolder|salesPortal\.myCustomer/i;
  return {
    localTotal: localKeys.length,
    sessionTotal: sessionKeys.length,
    customer: localKeys.concat(sessionKeys).filter(function(k) { return customerRe.test(String(k || '')); }).length,
    folder: localKeys.concat(sessionKeys).filter(function(k) { return folderRe.test(String(k || '')); }).length
  };
}

function renderSystemHealthKvP503_(label, value) {
  return '<div class="system-health-kv-row-p503"><span>' + escapeHtml_(label) + '</span><strong>' + escapeHtml_(String(value == null ? '' : value)) + '</strong></div>';
}

function forcePermissionUpdateP503_() {
  pushSystemHealthActionP503_('권한 캐시 무효화 요청 중...', 'info');
  google.script.run
    .withSuccessHandler(function(res) {
      clearPortalPermissionClientStateP503_();
      clearCustomerSearchCachesP503_({ silent: true });
      clearMyCustomerFolderClientStateP503_();
      pushSystemHealthActionP503_('권한 캐시 무효화 완료: cacheBust=' + ((res && res.cacheBust) || ''), 'ok');
      try {
        loadPortalCurrentPermission_({ silent: true }, function() {
          try { applyPortalPermissionToUi_(); } catch (err) {}
          loadSystemHealthPermissionCardP503_(true);
          renderSystemHealthBrowserCacheCardP503_();
          toast('권한 강제 업데이트 완료. 화면이 이상하면 Ctrl+F5 해주세요.');
        });
      } catch (err2) {
        loadSystemHealthPermissionCardP503_(true);
      }
    })
    .withFailureHandler(function(err) {
      pushSystemHealthActionP503_('권한 캐시 무효화 실패: ' + getSystemHealthErrorP208_(err, '권한 캐시를 무효화하지 못했습니다.'), 'danger');
    })
    .clearPortalPermissionCacheFromHealthP350();
}

function clearPortalPermissionClientStateP503_() {
  try { portalCurrentPermissionV63 = null; } catch (err) {}
  try { portalPermissionLoadedV63 = false; } catch (err2) {}
  try { portalPermissionLoadingV63 = false; } catch (err3) {}
}

function clearCustomerSearchCachesP503_(options) {
  options = options || {};
  let removed = 0;
  try { if (typeof clearCustomerPageCachesP230_ === 'function') clearCustomerPageCachesP230_(); } catch (err) {}
  try { if (typeof clearCustomerDetailCachesP230_ === 'function') clearCustomerDetailCachesP230_(); } catch (err2) {}
  try {

function renderSystemHealthFullResultP503_(res) {

  }
  const summary = res.summary || {};
  const checks = Array.isArray(res.checks) ? res.checks : [];
  let status = summary.danger ? 'danger' : (summary.warn ? 'warn' : 'ok');
  let html = '<div class="system-health-summary-p208 compact-p503">';
  html += renderSystemHealthSummaryCardP208_('정상', summary.ok || 0, 'ok');
  html += renderSystemHealthSummaryCardP208_('주의', summary.warn || 0, 'warn');
  html += renderSystemHealthSummaryCardP208_('위험', summary.danger || 0, 'danger');
  html += renderSystemHealthSummaryCardP208_('정보', summary.info || 0, 'info');
  html += '</div>';
  html += '<div class="system-health-meta-p208 compact-p503">점검시각: ' + escapeHtml_(res.checkedAt || '-') + ' · 소요 ' + escapeHtml_(String(res.elapsedMs || 0)) + 'ms</div>';
  html += '<div class="system-health-full-list-p503">';
  checks.slice(0, 30).forEach(function(c) {
    html += '<div class="system-health-mini-check-p503 is-' + escapeHtml_(c.status || 'info') + '"><span>' + renderSystemHealthStatusTextP208_(c.status) + '</span><div><b>' + escapeHtml_((c.group ? '[' + c.group + '] ' : '') + (c.name || '')) + '</b><small>' + escapeHtml_(c.message || '') + '</small></div></div>';
  });
  if (checks.length > 30) html += '<div class="system-health-more-p503">외 ' + (checks.length - 30) + '건은 기존 상세 점검 결과에 포함되어 있습니다.</div>';
  html += '</div>';
  setSystemHealthCardP503_('systemHealthFullCardP503', '전체 점검 완료', html, status);
}

function renderSystemHealthStatusTextP208_(status) {
  status = String(status || 'info').toLowerCase();
  if (status === 'ok') return '정상';
  if (status === 'warn') return '주의';
  if (status === 'danger') return '위험';
  if (status === 'running') return '점검중';
  return '정보';
}

function renderSystemHealthActionLogP503_() {
  const el = document.getElementById('systemHealthActionLogP503');

    return;
  }
  el.innerHTML = portalSystemHealthActionLogP503.map(function(item) {
    return '<div class="system-health-action-row-p503 is-' + escapeHtml_(item.type || 'info') + '"><span>' + escapeHtml_(formatSystemHealthActionTimeP503_(item.at)) + '</span><strong>' + escapeHtml_(item.message) + '</strong></div>';
  }).join('');
}

function formatSystemHealthActionTimeP503_(date) {
  try {
    const d = date instanceof Date ? date : new Date(date);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
  } catch (err) { return ''; }
}
