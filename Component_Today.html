<script>
let todayTaskFilterP117_ = 'open';
let todayAutoSaveTimerP117_ = null;

function isTodaySectionActiveV57_() {
  const section = document.getElementById('todaySection');
  return !!(section && section.classList && section.classList.contains('active'));
}

function getTodayCacheKeyV57_(dateStr) {
  return TODAY_CACHE_STORAGE_KEY_PREFIX_V57 + String(dateStr || todaySelectedDate || formatDateInput_(new Date()));
}

function readTodayCacheV57_(dateStr) {
  dateStr = String(dateStr || todaySelectedDate || formatDateInput_(new Date()));
  if (todayCacheByDateV57[dateStr]) return todayCacheByDateV57[dateStr];
  try {
    const raw = localStorage.getItem(getTodayCacheKeyV57_(dateStr));
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.data || !obj.cachedAt) return null;
    if (Date.now() - Number(obj.cachedAt) > TODAY_CACHE_MAX_AGE_MS_V57) return null;
    todayCacheByDateV57[dateStr] = obj.data;
    todayLastLoadAtByDateV57[dateStr] = Number(obj.cachedAt) || Date.now();
    return obj.data;
  } catch (err) {
    return null;
  }
}

function saveTodayCacheV57_(data) {
  data = normalizeTodayDataP117_(data || {});
  const dateStr = String(data.selectedDate || todaySelectedDate || formatDateInput_(new Date()));
  const copy = Object.assign({}, data, { selectedDate: dateStr, cachedAt: Date.now() });
  todayCacheByDateV57[dateStr] = copy;
  todayLastLoadAtByDateV57[dateStr] = Date.now();
  try {
    localStorage.setItem(getTodayCacheKeyV57_(dateStr), JSON.stringify({ cachedAt: Date.now(), data: copy }));
  } catch (err) {}
  return copy;
}

function normalizeTodayDataP117_(data) {
  data = data || {};
  const tasks = Array.isArray(data.tasks) ? data.tasks : normalizeTodayLegacyTasksP117_(data.todos || [], data.nextActions || []);
  data.tasks = tasks.map(normalizeTodayTaskP117_);
  data.todos = data.tasks;
  data.nextActions = Array.isArray(data.nextActions) ? data.nextActions : [];
  return data;
}

function normalizeTodayLegacyTasksP117_(todos, nextActions) {
  todos = Array.isArray(todos) ? todos : [];
  nextActions = Array.isArray(nextActions) ? nextActions : [];
  const manual = todos.map(function(t) {
    t = t || {};
    return Object.assign({}, t, { category: t.category || '수동', sourceType: t.sourceType || 'MANUAL' });
  });
  const actions = nextActions.map(function(item, idx) {
    item = item || {};
    return {
      id: 'contact_' + idx,
      done: false,
      category: '컨택예정',
      sourceType: 'CONTACT_NEXT',
      sourceId: item.sourceId || item.historyId || String(idx),
      customerNo: item.customerNo || '',
      company: item.company || '',
      rowNo: item.rowNo || '',
      timeText: item.nextActionAt || '',
      content: buildTodayContactTaskTextP117_(item),
      author: item.author || ''
    };
  });
  return manual.concat(actions);
}

function normalizeTodayTaskP117_(task) {
  task = task || {};
  const sourceType = String(task.sourceType || '').trim() || 'MANUAL';
  return {
    id: String(task.id || '').trim() || ('task_' + Math.random().toString(36).slice(2, 10)),
    done: !!task.done,
    content: String(task.content || '').trim(),
    author: String(task.author || '').trim(),
    category: String(task.category || '').trim() || (sourceType === 'CONTACT_NEXT' ? '컨택예정' : '수동'),
    sourceType: sourceType,
    sourceId: String(task.sourceId || '').trim(),
    customerNo: String(task.customerNo || '').trim(),
    company: String(task.company || '').trim(),
    rowNo: String(task.rowNo || '').trim(),
    timeText: String(task.timeText || task.nextActionAt || '').trim(),
    priority: String(task.priority || '').trim(),
    updatedAt: String(task.updatedAt || '').trim()
  };
}

function buildTodayContactTaskTextP117_(item) {
  const parts = [];
  if (item.company) parts.push('[' + item.company + ']');
  if (item.nextAction) parts.push(item.nextAction);
  if (item.nextActionAt) parts.push(String(item.nextActionAt).replace(/^\d{4}-\d{1,2}-\d{1,2}\s*/, ''));
  if (item.content) parts.push('- ' + item.content);
  return parts.join(' ').trim() || '컨택 예정 확인';
}

function renderTodayDataV57_(data) {
  todayCurrentData = normalizeTodayDataP117_(data || { selectedDate: todaySelectedDate, tasks: [] });
  todaySelectedDate = todayCurrentData.selectedDate || todaySelectedDate;
  renderTodayTasksP117_(todayCurrentData.tasks || []);
  renderTodaySummaryV111_(todayCurrentData.tasks || []);
  renderTodayCalendar();
  const label = document.getElementById('todaySelectedLabel');
  if (label) label.textContent = todaySelectedDate + ' 오늘 할 일';
}

function preloadTodayPageV57_(options) {
  options = options || {};
  const dateStr = String(options.date || todaySelectedDate || formatDateInput_(new Date()));
  const cached = readTodayCacheV57_(dateStr);
  if (cached) {
    todayCurrentData = normalizeTodayDataP117_(cached);
    if (isTodaySectionActiveV57_()) renderTodayDataV57_(todayCurrentData);
    const age = Date.now() - Number(todayLastLoadAtByDateV57[dateStr] || 0);
    if (age > 0 && age < TODAY_BACKGROUND_REFRESH_MS_V57) return;
  }
  if (todayLoadingByDateV57[dateStr]) return;
  todayLoadingByDateV57[dateStr] = true;

  google.script.run
    .withSuccessHandler(function(data) {
      todayLoadingByDateV57[dateStr] = false;
      data = saveTodayCacheV57_(data || { selectedDate: dateStr, tasks: [] });
      if (String(todaySelectedDate || '') === String(data.selectedDate || '') && isTodaySectionActiveV57_()) renderTodayDataV57_(data);
    })
    .withFailureHandler(function(err) {
      todayLoadingByDateV57[dateStr] = false;
      if (!options.silent) console.warn('오늘 할 일 프리로드 실패', err);
    })
    .getPortalTodayData(dateStr);
}

function loadTodayPage(options) {
  options = options || {};
  const dateStr = String(todaySelectedDate || formatDateInput_(new Date()));
  renderTodayCalendar();
  const label = document.getElementById('todaySelectedLabel');
  if (label) label.textContent = dateStr + ' 오늘 할 일';
  const area = document.getElementById('todayTodoArea');

  const cached = !options.force ? readTodayCacheV57_(dateStr) : null;
  if (cached) {
    renderTodayDataV57_(cached);
    const age = Date.now() - Number(todayLastLoadAtByDateV57[dateStr] || 0);
    if (age < TODAY_BACKGROUND_REFRESH_MS_V57 || todayLoadingByDateV57[dateStr]) return;
    preloadTodayPageV57_({ date: dateStr, silent: true });
    return;
  }

  if (todayLoadingByDateV57[dateStr]) {
    if (area) area.innerHTML = '<div class="loading">오늘 할 일을 백그라운드에서 불러오는 중입니다...</div>';
    return;
  }

  if (area) area.innerHTML = '<div class="loading">할 일을 불러오는 중입니다...</div>';
  todayLoadingByDateV57[dateStr] = true;

  google.script.run
    .withSuccessHandler(function(data) {
      todayLoadingByDateV57[dateStr] = false;
      data = saveTodayCacheV57_(data || { selectedDate: dateStr, tasks: [] });
      renderTodayDataV57_(data);
    })
    .withFailureHandler(function(err) {
      todayLoadingByDateV57[dateStr] = false;
      const fallback = readTodayCacheV57_(dateStr);
      if (fallback) {
        renderTodayDataV57_(fallback);
        toast('오늘 할 일 최신 조회 실패. 캐시를 표시합니다.');
        return;
      }
      if (area) area.innerHTML = '<div class="loading" style="color:#b42318;">오늘 할 일을 불러오지 못했습니다.<br>' + esc(getErrorMessage_(err)) + '</div>';
    })
    .getPortalTodayData(dateStr);
}

function renderTodaySummaryV111_(tasks) {
  const area = document.getElementById('todaySummaryArea');
  if (!area) return;
  tasks = Array.isArray(tasks) ? tasks : [];
  const active = tasks.filter(function(t) { return t && !t.done && String(t.content || '').trim(); });
  const done = tasks.filter(function(t) { return t && t.done && String(t.content || '').trim(); });
  const contact = active.filter(function(t) { return t.category === '컨택예정' || t.sourceType === 'CONTACT_NEXT'; });
  const customer = active.filter(function(t) { return t.customerNo || t.rowNo || t.company; });
  area.innerHTML = '' +
    '<div class="today-summary-card today-summary-main"><div class="today-summary-label">오늘 할 일</div><div class="today-summary-value">' + active.length + '</div></div>' +
    '<div class="today-summary-card"><div class="today-summary-label">고객 관련</div><div class="today-summary-value">' + customer.length + '</div></div>' +
    '<div class="today-summary-card"><div class="today-summary-label">컨택 예정</div><div class="today-summary-value">' + contact.length + '</div></div>' +
    '<div class="today-summary-card"><div class="today-summary-label">완료</div><div class="today-summary-value">' + done.length + '</div></div>';
}

function setTodayTaskFilterP117_(filter) {
  todayTaskFilterP117_ = filter || 'open';
  renderTodayTasksP117_(collectTodayTodos_());
  renderTodaySummaryV111_(collectTodayTodos_());
}

function getTodayTaskVisibleP117_(task) {
  const f = todayTaskFilterP117_ || 'open';
  if (f === 'all') return true;
  if (f === 'open') return !task.done;
  if (f === 'done') return !!task.done;
  if (f === 'manual') return !task.done && task.category === '수동';
  if (f === 'contact') return !task.done && (task.category === '컨택예정' || task.sourceType === 'CONTACT_NEXT');
  return true;
}

function renderTodayTasksP117_(tasks) {
  const area = document.getElementById('todayTodoArea');
  if (!area) return;
  tasks = (Array.isArray(tasks) ? tasks : []).map(normalizeTodayTaskP117_);
  if (!tasks.length) tasks = [{ id: 'manual_empty', content: '', done: false, category: '수동', sourceType: 'MANUAL' }];
  const visibleCount = tasks.filter(getTodayTaskVisibleP117_).length;
  area.innerHTML = '' +
    '<div class="today-task-filterbar">' + renderTodayFilterButtonP117_('open', '미완료') + renderTodayFilterButtonP117_('all', '전체') + renderTodayFilterButtonP117_('contact', '컨택') + renderTodayFilterButtonP117_('manual', '수동') + renderTodayFilterButtonP117_('done', '완료') + '</div>' +
    '<div class="today-task-list" id="todayTodoList">' + tasks.map(renderTodayTodoRow_).join('') + '</div>' +
    (visibleCount ? '' : '<div class="today-empty-state">해당 분류의 할 일이 없습니다.</div>');
}

function renderTodayFilterButtonP117_(key, label) {
  return '<button type="button" class="today-filter-chip ' + (todayTaskFilterP117_ === key ? 'active' : '') + '" onclick="setTodayTaskFilterP117_(\'' + key + '\')">' + esc(label) + '</button>';
}

function renderTodayTodos(todos) { renderTodayTasksP117_(todos); }
function renderTodayNextActions(items) { /* P1-17: 컨택 예정은 오늘 할 일 목록에 통합됨 */ }

function renderTodayTodoRow_(todo, idx) {
  todo = normalizeTodayTaskP117_(todo || {});
  const visible = getTodayTaskVisibleP117_(todo);
  const isContact = todo.category === '컨택예정' || todo.sourceType === 'CONTACT_NEXT';
  const rowNo = Number(todo.rowNo) || 0;
  let actions = '';
  if (rowNo) {
    actions += '<button class="secondary" type="button" onclick="openDetail(' + rowNo + ')">상세</button>';
    actions += '<button class="secondary" type="button" onclick="openContactHistoryModal(' + rowNo + ')">컨택이력</button>';
    actions += '<button type="button" onclick="openSendForCustomer(' + rowNo + ')">발송</button>';
  }
  return '<div class="today-task-row ' + (todo.done ? 'done ' : '') + (!visible ? 'today-task-hidden ' : '') + (isContact ? 'is-contact' : 'is-manual') + '" ' +
      'data-id="' + escAttrP117_(todo.id) + '" ' +
      'data-category="' + escAttrP117_(todo.category) + '" ' +
      'data-source-type="' + escAttrP117_(todo.sourceType) + '" ' +
      'data-source-id="' + escAttrP117_(todo.sourceId) + '" ' +
      'data-customer-no="' + escAttrP117_(todo.customerNo) + '" ' +
      'data-company="' + escAttrP117_(todo.company) + '" ' +
      'data-row-no="' + escAttrP117_(todo.rowNo) + '" ' +
      'data-time-text="' + escAttrP117_(todo.timeText) + '" ' +
      'data-priority="' + escAttrP117_(todo.priority) + '">' +
    '<label class="today-task-check"><input type="checkbox" class="todayTodoDone" onchange="onTodayTaskDoneChangeP117_(this)" ' + (todo.done ? 'checked' : '') + '><span></span></label>' +
    '<div class="today-task-body">' +
      '<div class="today-task-topline">' +
        '<span class="today-task-badge ' + (isContact ? 'contact' : 'manual') + '">' + esc(todo.category || '수동') + '</span>' +
        (todo.timeText ? '<span class="today-task-time">' + esc(compactTodayTimeP117_(todo.timeText)) + '</span>' : '') +
        (todo.company ? '<span class="today-task-company">' + esc(todo.company) + '</span>' : '') +
      '</div>' +
      '<textarea class="todayTodoText" placeholder="오늘 처리할 일을 입력하세요." oninput="markTodayTaskDirtyP117_()">' + esc(todo.content || '') + '</textarea>' +
      (todo.customerNo || todo.author ? '<div class="today-task-meta">' + (todo.customerNo ? '고객번호 ' + esc(todo.customerNo) : '') + (todo.customerNo && todo.author ? ' · ' : '') + (todo.author ? '작성자 ' + esc(todo.author) : '') + '</div>' : '') +
      (actions ? '<div class="today-task-actions">' + actions + '</div>' : '') +
    '</div>' +
    '<button class="today-todo-remove" type="button" onclick="removeTodayTodoRow(this)">×</button>' +
  '</div>';
}

function escAttrP117_(value) {
  return String(value || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function compactTodayTimeP117_(value) {
  const text = String(value || '').trim();
  const m = text.match(/(\d{1,2}:\d{2})/);
  if (m) return m[1];
  return text.replace(/^\d{4}-\d{1,2}-\d{1,2}\s*/, '');
}

function markTodayTaskDirtyP117_() {
  renderTodaySummaryV111_(collectTodayTodos_());
}

function onTodayTaskDoneChangeP117_(checkbox) {
  const row = checkbox && checkbox.closest ? checkbox.closest('.today-task-row') : null;
  if (row) row.classList.toggle('done', !!checkbox.checked);
  const tasks = collectTodayTodos_();
  todayCurrentData = saveTodayCacheV57_(Object.assign({}, todayCurrentData || {}, { selectedDate: todaySelectedDate, tasks: tasks, todos: tasks }));
  renderTodayTasksP117_(tasks);
  renderTodaySummaryV111_(tasks);
  window.clearTimeout(todayAutoSaveTimerP117_);
  todayAutoSaveTimerP117_ = window.setTimeout(function() { saveTodayTodos({ silent: true, preserveFocus: true }); }, 250);
}

function addTodayTodoRow() {
  const tasks = collectTodayTodos_();
  tasks.unshift({
    id: 'manual_' + Date.now(),
    done: false,
    content: '',
    category: '수동',
    sourceType: 'MANUAL',
    sourceId: '',
    customerNo: '',
    company: '',
    rowNo: '',
    timeText: '',
    priority: ''
  });
  todayTaskFilterP117_ = 'open';
  todayCurrentData = Object.assign({}, todayCurrentData || {}, { selectedDate: todaySelectedDate, tasks: tasks, todos: tasks });
  renderTodayTasksP117_(tasks);
  const first = document.querySelector('#todayTodoList .today-task-row .todayTodoText');
  if (first) first.focus();
}

function removeTodayTodoRow(btn) {
  const row = btn && btn.closest ? btn.closest('.today-task-row') : null;
  if (row) row.remove();
  const tasks = collectTodayTodos_();
  todayCurrentData = saveTodayCacheV57_(Object.assign({}, todayCurrentData || {}, { selectedDate: todaySelectedDate, tasks: tasks, todos: tasks }));
  renderTodayTasksP117_(tasks.length ? tasks : []);
  renderTodaySummaryV111_(tasks);
}

function collectTodayTodos_() {
  const rows = Array.from(document.querySelectorAll('#todayTodoList .today-task-row'));
  return rows.map(function(row, idx) {
    const text = row.querySelector('.todayTodoText');
    return {
      id: row.getAttribute('data-id') || ('manual_' + idx),
      done: !!(row.querySelector('.todayTodoDone') && row.querySelector('.todayTodoDone').checked),
      content: text ? (text.value || '') : '',
      category: row.getAttribute('data-category') || '수동',
      sourceType: row.getAttribute('data-source-type') || 'MANUAL',
      sourceId: row.getAttribute('data-source-id') || '',
      customerNo: row.getAttribute('data-customer-no') || '',
      company: row.getAttribute('data-company') || '',
      rowNo: row.getAttribute('data-row-no') || '',
      timeText: row.getAttribute('data-time-text') || '',
      priority: row.getAttribute('data-priority') || ''
    };
  }).filter(function(item) { return String(item.content || '').trim(); });
}

function saveTodayTodos(options) {
  options = options || {};
  const tasks = collectTodayTodos_();
  const prev = todayCurrentData ? JSON.parse(JSON.stringify(todayCurrentData)) : null;
  const optimistic = saveTodayCacheV57_(Object.assign({}, todayCurrentData || {}, {
    selectedDate: todaySelectedDate,
    tasks: tasks,
    todos: tasks,
    nextActions: (todayCurrentData && todayCurrentData.nextActions) || []
  }));
  todayCurrentData = optimistic;
  renderTodaySummaryV111_(tasks);
  if (!options.preserveFocus && !isTodayTodoEditingV111_()) renderTodayTasksP117_(tasks);
  if (!options.silent) toast('오늘 할 일을 저장 중입니다.');

  google.script.run
    .withSuccessHandler(function(data) {
      data = saveTodayCacheV57_(data || optimistic);
      todayCurrentData = data;
      if (!isTodayTodoEditingV111_()) renderTodayDataV57_(data);
      else renderTodaySummaryV111_((data && data.tasks) || tasks);
      if (!options.silent) toast('오늘 할 일이 저장되었습니다.');
    })
    .withFailureHandler(function(err) {
      if (prev) {
        saveTodayCacheV57_(prev);
        todayCurrentData = prev;
        renderTodayDataV57_(prev);
      }
      alert('할 일 저장 실패: ' + getErrorMessage_(err));
    })
    .savePortalTodosForDate({ date: todaySelectedDate, tasks: tasks, todos: tasks });
}

function isTodayTodoEditingV111_() {
  const active = document.activeElement;
  return !!(active && active.closest && active.closest('#todayTodoList'));
}

function appendTodayTodoTextV111_(content) {
  const tasks = collectTodayTodos_();
  const text = String(content || '').trim();
  if (!text) return;
  tasks.unshift({ id: 'manual_' + Date.now(), done: false, content: text, category: '수동', sourceType: 'MANUAL' });
  todayTaskFilterP117_ = 'open';
  todayCurrentData = Object.assign({}, todayCurrentData || {}, { selectedDate: todaySelectedDate, tasks: tasks, todos: tasks });
  renderTodayTasksP117_(tasks);
  renderTodaySummaryV111_(tasks);
  const first = document.querySelector('#todayTodoList .today-task-row .todayTodoText');
  if (first) first.focus();
}

function addTodayNextActionToTodoV111_(encoded) {
  let item = {};
  try { item = JSON.parse(decodeURIComponent(String(encoded || ''))); } catch (err) { item = {}; }
  appendTodayTodoTextV111_(buildTodayContactTaskTextP117_(item));
}

function getTodayNextActionPayloadV111_(item) {
  try {
    return encodeURIComponent(JSON.stringify({
      company: item.company || '',
      nextAction: item.nextAction || '',
      nextActionAt: item.nextActionAt || item.timeText || '',
      content: item.content || ''
    }));
  } catch (err) {
    return '';
  }
}

function renderTodayCalendar() {
  const area = document.getElementById('todayCalendarArea');
  const title = document.getElementById('todayCalendarTitle');
  if (!area) return;
  const cursor = todayCalendarCursor instanceof Date ? todayCalendarCursor : new Date();
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  if (title) title.textContent = year + '년 ' + String(month + 1).padStart(2, '0') + '월';

  const first = new Date(year, month, 1);
  const start = new Date(year, month, 1 - first.getDay());
  const todayStr = formatDateInput_(new Date());
  let html = '<table class="today-calendar"><thead><tr>';
  ['일','월','화','수','목','금','토'].forEach(function(d){ html += '<th>' + d + '</th>'; });
  html += '</tr></thead><tbody>';
  for (let w = 0; w < 6; w++) {
    html += '<tr>';
    for (let d = 0; d < 7; d++) {
      const cur = new Date(start.getFullYear(), start.getMonth(), start.getDate() + w * 7 + d);
      const dateStr = formatDateInput_(cur);
      const cls = [cur.getMonth() !== month ? 'other-month' : '', dateStr === todayStr ? 'is-today' : '', dateStr === todaySelectedDate ? 'selected' : ''].filter(Boolean).join(' ');
      html += '<td class="' + cls + '" onclick="selectTodayDate(\'' + dateStr + '\')">' + cur.getDate() + '</td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  area.innerHTML = html;
}

function shiftTodayCalendar(delta) {
  todayCalendarCursor = new Date(todayCalendarCursor.getFullYear(), todayCalendarCursor.getMonth() + Number(delta || 0), 1);
  renderTodayCalendar();
}

function selectTodayDate(dateStr) {
  todaySelectedDate = dateStr;
  todayCalendarCursor = parseDateInput_(dateStr);
  loadTodayPage();
}

function setTodayDate(date) {
  todaySelectedDate = formatDateInput_(date || new Date());
  todayCalendarCursor = parseDateInput_(todaySelectedDate);
  loadTodayPage();
}

function formatDateInput_(date) {
  date = date instanceof Date ? date : new Date(date);
  const pad = n => String(n).padStart(2, '0');
  return date.getFullYear() + '-' + pad(date.getMonth() + 1) + '-' + pad(date.getDate());
}

function parseDateInput_(dateStr) {
  const m = String(dateStr || '').match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3])) : new Date();
}
</script>
