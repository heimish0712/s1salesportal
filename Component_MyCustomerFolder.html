function loadMyCustomerFolderPageP497(force) {
  force = !!force;
  const area = document.getElementById('myCustomerFolderAreaP497');
  if (area && !myCustomerFolderBundleP497) {
    area.innerHTML = '<div class="loading">나의 고객 폴더를 불러오는 중입니다.</div>';

    loadPortalCurrentPermission_({ silent: true }, function() { loadMyCustomerFolderPageP497(force); });
    return;
  }

  ensureMyCustomerFolderSearchIndexP501_(false);

  if (!force && myCustomerFolderBundleP497) {
    renderMyCustomerFolderPageP497_();
    startMyCustomerFolderRenderPollP497_();
    return;
  }

  myCustomerFolderServerLoadingP497 = true;
  google.script.run
    .withSuccessHandler(function(res) {

    dbError: String(message || '')

}

function ensureMyCustomerFolderSearchIndexP501_(force) {
  try { if (typeof loadCustomerSearchIndexFromLocalStorage_ === 'function') loadCustomerSearchIndexFromLocalStorage_(); } catch (err) {}
  try {
    if (typeof initializeCustomerSearchIndex !== 'function') return;
    const hasRows = !!(customerSearchIndexState && customerSearchIndexState.ready && Array.isArray(customerSearchIndexState.rows) && customerSearchIndexState.rows.length);
    const loading = !!(customerSearchIndexState && customerSearchIndexState.loading);
    if (!force && (hasRows || loading)) return;
    myCustomerFolderIndexEnsureRequestedP501 = true;
    initializeCustomerSearchIndex({
      silent: true,
      useLocalFirst: true,
      skipNetworkIfReady: false,
      maxAgeMs: 60000,
      renderAfterLoad: false,
      onLoaded: function() {
        myCustomerFolderIndexEnsureRequestedP501 = false;
        invalidateMyCustomerFolderClientIndexesP499_();
        renderMyCustomerFolderPageP497_({ keepFocus: true });
      }
    });
    setTimeout(function() {
      if (!isMyCustomerFolderIndexLoadingP501_()) {
        myCustomerFolderIndexEnsureRequestedP501 = false;
        renderMyCustomerFolderPageP497_({ keepFocus: true });
      }
    }, 7000);
  } catch (err) {
    console.warn('나의 고객 폴더 검색인덱스 준비 실패', err);
  }
}

function isMyCustomerFolderIndexLoadingP501_() {

}

function hasMyCustomerFolderIndexRowsP501_() {
  return !!(customerSearchIndexState && customerSearchIndexState.ready && Array.isArray(customerSearchIndexState.rows) && customerSearchIndexState.rows.length);
}

function showMyCustomerFolderNoticeP501_(message, type) {
  const msg = String(message || '').trim() || '처리 중 문제가 발생했습니다.';
  const kind = String(type || 'error').trim() || 'error';
  myCustomerFolderNoticeP501 = { message: msg, type: kind, createdAt: Date.now() };
  try { if (typeof toast === 'function') toast(msg); } catch (err) {}
  try {
    const body = document.getElementById('myFolderPickerBodyP499');
    if (body && (myCustomerFolderPickerStateP499 || myCustomerFolderTransferStateP499)) {
      const old = body.querySelector('.my-folder-modal-notice-p501');
      if (old) old.remove();
      const box = document.createElement('div');
      box.className = 'my-folder-modal-notice-p501 ' + kind;
      box.textContent = msg;
      body.insertBefore(box, body.firstChild);
    }
  } catch (err) {}
  try {
    const section = document.getElementById('myCustomerFolderSectionP497');
    if (section && section.classList.contains('active')) renderMyCustomerFolderPageP497_({ keepFocus: true });
  } catch (err) {}
  return false;
}

function clearMyCustomerFolderNoticeP501_() {
  myCustomerFolderNoticeP501 = null;
  renderMyCustomerFolderPageP497_({ keepFocus: true });
}

function renderMyCustomerFolderNoticeP501_() {
  const n = myCustomerFolderNoticeP501;
  if (!n || !n.message) return '';
  const type = String(n.type || 'info');
  return '<div class="my-folder-notice-p501 ' + escAttr(type) + '"><span>' + esc(n.message) + '</span><button type="button" onclick="clearMyCustomerFolderNoticeP501_()">닫기</button></div>';
}

function repairMyCustomerFolderDbP497_() {
  setMyCustomerFolderBusyP497_(true, '고객분류 DB 초기화/복구 중입니다.');
  google.script.run
    .withSuccessHandler(function(res) {
      setMyCustomerFolderBusyP497_(false);
      toast('고객분류 DB를 확인했습니다.');
      loadMyCustomerFolderPageP497(true);
    })
    .withFailureHandler(function(err) {
      setMyCustomerFolderBusyP497_(false);
      showMyCustomerFolderNoticeP501_('DB 초기화/복구 실패: ' + getErrorMessage_(err), 'error');
    })
    .setupMyCustomerFolderDbP497();
}

function resetMyCustomerFolderPageP497_() {
  myCustomerFolderCandidateRowsP497 = [];
  myCustomerFolderExpandedRowNoP497 = null;
  clearMyCustomerFolderBulkSelectionP500_();
  const input = document.getElementById('myCustomerFolderAddKeywordP497');

function startMyCustomerFolderRenderPollP497_() {
  if (myCustomerFolderRenderPollP497) clearInterval(myCustomerFolderRenderPollP497);
  let count = 0;
  myCustomerFolderRenderPollP497 = setInterval(function() {
    count += 1;
    const section = document.getElementById('myCustomerFolderSectionP497');
    if (!section || !section.classList.contains('active')) {
      clearInterval(myCustomerFolderRenderPollP497);
      myCustomerFolderRenderPollP497 = null;
      return;
    }
    renderMyCustomerFolderPageP497_({ keepFocus: true });
    if ((customerSearchIndexState && customerSearchIndexState.ready) || count >= 5) {
      clearInterval(myCustomerFolderRenderPollP497);
      myCustomerFolderRenderPollP497 = null;
    }
  }, 700);
}

function ensureMyCustomerFolderSelectedP497_() {
  const folders = getMyCustomerFolderFoldersP497_();
  if (!folders.length) {
    myCustomerFolderSelectedIdP497 = '';
    return;
  }
  const exists = folders.some(function(f) { return f.folderId === myCustomerFolderSelectedIdP497; });
  if (!exists) {
    const myAll = folders.find(function(f) { return f.folderId === MY_CUSTOMER_FOLDER_SYSTEM_MY_ALL_P500; });
    myCustomerFolderSelectedIdP497 = (myAll || folders[0]).folderId;
  }
}

function getMyCustomerFolderFoldersP497_() {
  return (myCustomerFolderBundleP497 && Array.isArray(myCustomerFolderBundleP497.folders)) ? myCustomerFolderBundleP497.folders : [];
}

function getMyCustomerFolderItemsP497_() {
  return (myCustomerFolderBundleP497 && Array.isArray(myCustomerFolderBundleP497.items)) ? myCustomerFolderBundleP497.items : [];
}

function setMyCustomerFolderBundleP499_(bundle) {
  myCustomerFolderBundleP497 = bundle || null;

}

function invalidateMyCustomerFolderClientIndexesP499_() {
  myCustomerFolderItemsByFolderCacheP499 = null;
  myCustomerFolderIndexMapCacheP499 = null;
}

function getMyCustomerFolderItemsByFolderMapP499_() {
  if (myCustomerFolderItemsByFolderCacheP499) return myCustomerFolderItemsByFolderCacheP499;
  const map = {};
  getMyCustomerFolderItemsP497_().forEach(function(item) {
    if (!canViewMyCustomerFolderStoredItemClientP504_(item)) return;
    const folderId = String(item && item.folderId || '').trim();
    if (!folderId) return;
    if (!map[folderId]) map[folderId] = [];
    map[folderId].push(item);
  });
  Object.keys(map).forEach(function(folderId) {
    map[folderId].sort(function(a, b) {
      return (Number(a.sortOrder) || 0) - (Number(b.sortOrder) || 0) || String(a.createdAt || '').localeCompare(String(b.createdAt || ''));
    });
  });
  myCustomerFolderItemsByFolderCacheP499 = map;
  return map;
}

function getMyCustomerFolderItemCountP499_(folderId) {
  const folder = getMyCustomerFolderFolderByIdP500_(folderId);
  if (isMyCustomerFolderSystemFolderP500_(folder)) return getMyCustomerFolderVirtualRowsP500_(folder).length;
  const list = getMyCustomerFolderItemsByFolderMapP499_()[String(folderId || '').trim()] || [];
  return list.length;
}

function getMyCustomerFolderFolderByIdP500_(folderId) {
  folderId = String(folderId || '').trim();
  return getMyCustomerFolderFoldersP497_().find(function(f) { return String(f && f.folderId || '') === folderId; }) || null;
}

function getMyCustomerFolderScopeP500_(folder) {
  if (!folder) return '';
  if (folder.isSystemFolder || folder.isVirtual || String(folder.folderScope || '').toUpperCase() === 'SYSTEM' || String(folder.folderId || '').indexOf('SYS_') === 0) return 'SYSTEM';
  if (String(folder.folderScope || '').toUpperCase() === 'ADMIN' || String(folder.ownerEmail || '') === MY_CUSTOMER_FOLDER_ADMIN_OWNER_P500) return 'ADMIN';
  return 'PERSONAL';
}

function isMyCustomerFolderSystemFolderP500_(folder) {
  return getMyCustomerFolderScopeP500_(folder) === 'SYSTEM';
}

function isMyCustomerFolderAdminFolderP500_(folder) {
  return getMyCustomerFolderScopeP500_(folder) === 'ADMIN';
}

function isMyCustomerFolderPersonalFolderP500_(folder) {
  return getMyCustomerFolderScopeP500_(folder) === 'PERSONAL';
}

function canEditMyCustomerFolderP500_(folder) {
  if (!folder || isMyCustomerFolderSystemFolderP500_(folder)) return false;
  if (isMyCustomerFolderAdminFolderP500_(folder)) return !!(myCustomerFolderBundleP497 && myCustomerFolderBundleP497.user && myCustomerFolderBundleP497.user.canEditBasicFolders);
  return true;
}

function canDropToMyCustomerFolderP500_(folder) {
  return canEditMyCustomerFolderP500_(folder);
}

function getMyCustomerFolderBasicFoldersP500_() {
  return getMyCustomerFolderFoldersP497_().filter(function(f) { return isMyCustomerFolderSystemFolderP500_(f) || isMyCustomerFolderAdminFolderP500_(f); });
}

function getMyCustomerFolderSystemFoldersP501_() {
  return getMyCustomerFolderFoldersP497_().filter(isMyCustomerFolderSystemFolderP500_);
}

function getMyCustomerFolderAdminFoldersP501_() {
  return getMyCustomerFolderFoldersP497_().filter(isMyCustomerFolderAdminFolderP500_);
}

function formatMyCustomerFolderTreeCountP501_(folder) {
  if (isMyCustomerFolderSystemFolderP500_(folder) && !hasMyCustomerFolderIndexRowsP501_()) {
    return isMyCustomerFolderIndexLoadingP501_() || myCustomerFolderIndexEnsureRequestedP501 ? '…' : '0';
  }
  return String(getMyCustomerFolderItemCountP499_(folder && folder.folderId));
}

function getMyCustomerFolderPersonalFoldersP500_() {
  return getMyCustomerFolderFoldersP497_().filter(function(f) { return isMyCustomerFolderPersonalFolderP500_(f); });
}

  html += '<button type="button" class="my-folder-mini-btn-p497" ' + (selected && selectedScope === 'PERSONAL' ? '' : 'disabled') + ' onclick="renameMyCustomerFolderP497_()">이름변경</button>';
  html += '<button type="button" class="my-folder-mini-btn-p497 danger" ' + (selected && selectedScope === 'PERSONAL' ? '' : 'disabled') + ' onclick="deleteMyCustomerFolderP497_()">삭제</button>';
  html += '</div>';

      html += '<div class="my-folder-add-title-p497">고객 추가</div>';

function renderMyCustomerFolderTreeSectionP500_(folders, section) {
  folders = Array.isArray(folders) ? folders.slice() : [];

function searchMyCustomerFolderCandidatesLocalP497_(keyword, limit) {
  keyword = String(keyword || '').trim().toLowerCase();
  limit = Math.max(1, Number(limit) || 20);
  if (!keyword) return [];
  const rows = getMyCustomerFolderIndexRowsP497_();
  let filtered = rows.filter(function(r) {
    try {
      if (typeof doesCustomerRowMatchKeyword_ === 'function') return doesCustomerRowMatchKeyword_(r, keyword);
    } catch (err) {}
    return [r.customerNo, r.company, r.salesRep, r.status, r.contact, r.phone, r.directPhone, r.email, r.address, r.memo].join(' ').toLowerCase().indexOf(keyword) >= 0;
  });
  if (/^[0-9]+$/.test(keyword)) {
    const exact = filtered.filter(function(r) { return normalizeCustomerNoForKey_(r && r.customerNo) === keyword; });
    if (exact.length) filtered = exact;
  }
  return filtered.slice(0, limit);
}

function applyMyCustomerFolderDeltaP499_(res) {
  if (!res || !res.ok) return false;
  if (res.folders && res.items) {
    setMyCustomerFolderBundleP499_(res);
    return true;
  }
  if (!myCustomerFolderBundleP497) return false;
  const deletedMap = {};
  (res.deletedItemIds || []).forEach(function(id) { deletedMap[String(id || '')] = true; });
  let items = getMyCustomerFolderItemsP497_().filter(function(item) { return !deletedMap[String(item && item.itemId || '')]; });
  const upserts = [].concat(res.savedItems || [], res.upsertItems || []);
  if (upserts.length) {
    const byId = {};
    items.forEach(function(item, idx) { if (item && item.itemId) byId[item.itemId] = idx; });
    upserts.forEach(function(item) {
      if (!item || !item.itemId) return;
      item.isDeleted = false;
      if (Object.prototype.hasOwnProperty.call(byId, item.itemId)) items[byId[item.itemId]] = item;
      else { byId[item.itemId] = items.length; items.push(item); }
    });
  }
  myCustomerFolderBundleP497.items = items;
  myCustomerFolderBundleP497.loadedAt = res.loadedAt || myCustomerFolderBundleP497.loadedAt;
  invalidateMyCustomerFolderClientIndexesP499_();
  clearMyCustomerFolderBulkSelectionP500_();
  return true;
}

function renderMyCustomerFolderPickerFolderListP500_(folders, actionRenderer, fixedFolderId) {

    const parent = String(f.parentFolderId || '');
    if (parent && folders.some(function(x) { return x.folderId === parent; })) {
      if (!childrenMap[parent]) childrenMap[parent] = [];
      childrenMap[parent].push(f);
    } else {
      roots.push(f);
    }
  });
  Object.keys(childrenMap).forEach(function(key) {
    childrenMap[key].sort(function(a, b) { return (Number(a.sortOrder) || 0) - (Number(b.sortOrder) || 0) || String(a.folderName || '').localeCompare(String(b.folderName || '')); });
  });
  roots.sort(function(a, b) { return (Number(a.sortOrder) || 0) - (Number(b.sortOrder) || 0) || String(a.folderName || '').localeCompare(String(b.folderName || '')); });
  const renderLevel = function(list, depth) {
    return (list || []).map(function(f) {
      if (fixedFolderId && String(f.folderId) !== String(fixedFolderId)) return renderLevel(childrenMap[f.folderId] || [], depth + 1);
      return '<div class="my-folder-picker-node-wrap-p499">' +
        '<div class="my-folder-picker-node-p499" style="padding-left:' + (12 + depth * 18) + 'px">' +

          actionRenderer(f) +
        '</div>' + renderLevel(childrenMap[f.folderId] || [], depth + 1) +
      '</div>';
    }).join('');
  };
  return renderLevel(roots, 0);
}

function isMyCustomerFolderDescendantFolderP507_(sourceFolderId, candidateParentFolderId) {
  sourceFolderId = String(sourceFolderId || '').trim();
  candidateParentFolderId = String(candidateParentFolderId || '').trim();
  if (!sourceFolderId || !candidateParentFolderId) return false;
  const folders = getMyCustomerFolderPersonalFoldersP500_();
  const childrenMap = {};
  folders.forEach(function(f) {
    const parent = String(f && f.parentFolderId || '').trim();
    if (!childrenMap[parent]) childrenMap[parent] = [];
    childrenMap[parent].push(String(f.folderId || '').trim());
  });
  const stack = (childrenMap[sourceFolderId] || []).slice();
  const seen = {};
  while (stack.length) {
    const id = stack.shift();
    if (!id || seen[id]) continue;
    if (id === candidateParentFolderId) return true;
    seen[id] = true;
    (childrenMap[id] || []).forEach(function(childId) { stack.push(childId); });
  }
  return false;
}

function canMoveMyCustomerFolderTreeToParentP507_(sourceFolderId, newParentFolderId) {
  sourceFolderId = String(sourceFolderId || '').trim();
  newParentFolderId = String(newParentFolderId || '').trim();
  const source = getMyCustomerFolderFolderByIdP500_(sourceFolderId);
  if (!canMoveMyCustomerFolderTreeFolderP507_(source)) return false;
  if (sourceFolderId === newParentFolderId) return false;
  if (newParentFolderId) {
    const parent = getMyCustomerFolderFolderByIdP500_(newParentFolderId);
    if (!canMoveMyCustomerFolderTreeFolderP507_(parent)) return false;
    if (isMyCustomerFolderDescendantFolderP507_(sourceFolderId, newParentFolderId)) return false;
  }
  return String(source.parentFolderId || '').trim() !== newParentFolderId;
}

function startMyCustomerFolderFolderDragP507_(event, folderId) {

}

function dropMyCustomerFolderRowsP500_(event, folderId) {
