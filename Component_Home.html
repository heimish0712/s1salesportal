<script>
const HOME_CACHE_STORAGE_KEY_V77_BASE = 'portalHomeCache:v77';
let homeLoadInFlightV77 = false;
let homeRefreshInFlightV77 = false;
let homeLastLoadStartedAtV77 = 0;
let homeLastRefreshStartedAtV77 = 0;

function loadDashboard(options) {
  options = options || {};

  // 권한별 집계이므로 권한 확인 전의 낡은 공용 캐시는 렌더링하지 않습니다.
  if (!options.skipLocal) {
    renderHomeFromLocalCacheV77_();
    renderHomeSalesStatusFromLocalP443_();
  }

  const now = Date.now();
  if (homeLoadInFlightV77 || (!options.force && now - homeLastLoadStartedAtV77 < 1500)) {
    return;
  }
  homeLoadInFlightV77 = true;
  homeLastLoadStartedAtV77 = now;

  google.script.run
    .withSuccessHandler(function(data) {
      homeLoadInFlightV77 = false;
      applyHomeDataV77_(data, true);
      scheduleDashboardRefreshV77_(data && data.dashboard);
      scheduleHomeSalesStatusLoadP443_();
    })
    .withFailureHandler(function(err) {
      homeLoadInFlightV77 = false;
      renderHomeLoadSoftErrorV77_(err);
    })
    .getPortalHomeData();
}

function applyHomeDataV77_(data, saveCache) {
  data = data || {};
  const dashboard = data.dashboard || data;
  renderDashboardStatsV77_(dashboard);

  if (Array.isArray(data.notices)) {
    renderHomeNoticeList(data.notices);
  } else if (!homeNoticeCache || !homeNoticeCache.length) {
    loadHomeNoticeList();
  }

  if (saveCache) saveHomeCacheV77_(data);
}

function renderDashboardStatsV77_(dashboard) {
  dashboard = dashboard || {};
  const cards = Array.isArray(dashboard.cards) && dashboard.cards.length
    ? dashboard.cards.slice(0, 4)
    : [
        { label: '고객', value: dashboard.total },
        { label: '오늘 할 일', value: dashboard.sent },
        { label: '계약 완료', value: dashboard.completed },
        { label: '재확인 필요', value: dashboard.needCheck }
      ];

  while (cards.length < 4) cards.push({ label: '-', value: '-' });

  const valueIds = ['statTotal', 'statSent', 'statCompleted', 'statNeedCheck'];
  const labelEls = getHomeMetricLabelElementsV77_();

  cards.forEach(function(card, idx) {
    const valueEl = document.getElementById(valueIds[idx]);
    if (valueEl) valueEl.textContent = normalizeHomeMetricTextV77_(card.value);
    if (labelEls[idx]) labelEls[idx].textContent = String(card.label || '-');
  });
}

function getHomeMetricLabelElementsV77_() {
  const section = document.getElementById('homeSection');
  if (!section) return [];
  return Array.from(section.querySelectorAll('.home-cards .metric-card .metric-label'));
}

function normalizeHomeMetricTextV77_(value) {
  if (value === undefined || value === null || value === '') return '-';
  return String(value);
}

function renderHomeFromLocalCacheV77_() {
  // 권한 로딩 전에는 admin/sales 캐시가 섞일 수 있으므로 local cache를 사용하지 않습니다.
  if (typeof portalPermissionLoadedV63 !== 'undefined' && !portalPermissionLoadedV63) return false;

  const cached = readHomeCacheV77_();
  if (!cached) return false;
  applyHomeDataV77_(cached, false);
  return true;
}


function isHomeAllScopeByPermissionV78_(p) {
  p = p || {};
  // PATCH P1-15: 고객 전체열람권한과 HOME 관리자형 대시보드 권한을 분리합니다.
  return !!(p.active !== false && p.canUseAdminHome);
}

function getHomeCacheKeyV77_(dashboard) {
  if (dashboard && dashboard.clientCacheKey) return String(dashboard.clientCacheKey);

  try {
    if (typeof getPortalPermission_ === 'function') {
      const p = getPortalPermission_();
      if (p && p.active !== false) {
        const allScope = isHomeAllScopeByPermissionV78_(p);
        const scope = allScope ? 'ALL_ADMIN' : ('OWN_' + (p.salesRepName || p.name || p.email || 'USER'));
        return HOME_CACHE_STORAGE_KEY_V77_BASE + ':' + scope.replace(/[^A-Za-z0-9가-힣_]+/g, '_');
      }
    }
  } catch (err) {}

  return HOME_CACHE_STORAGE_KEY_V77_BASE + ':UNKNOWN';
}

function readHomeCacheV77_() {
  try {
    const raw = localStorage.getItem(getHomeCacheKeyV77_());
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || typeof obj !== 'object') return null;
    return obj;
  } catch (err) {
    return null;
  }
}

function saveHomeCacheV77_(data) {
  try {
    const dashboard = data && data.dashboard ? data.dashboard : null;
    const slim = {
      dashboard: dashboard,
      notices: Array.isArray(data && data.notices) ? data.notices.slice(0, 3) : [],
      savedAt: new Date().toISOString()
    };
    localStorage.setItem(getHomeCacheKeyV77_(dashboard), JSON.stringify(slim));
  } catch (err) {}
}

function scheduleDashboardRefreshV77_(dashboard) {
  dashboard = dashboard || {};
  const now = Date.now();
  const needsRefresh = dashboard.needsRefresh || dashboard.initializing || dashboard.total === '-' || !dashboard.cachedAt;
  if (!needsRefresh && now - homeLastRefreshStartedAtV77 < 5 * 60 * 1000) return;
  if (homeRefreshInFlightV77) return;

  homeRefreshInFlightV77 = true;
  homeLastRefreshStartedAtV77 = now;

  setTimeout(function() {
    google.script.run
      .withSuccessHandler(function(freshDashboard) {
        homeRefreshInFlightV77 = false;
        if (freshDashboard) {
          const cached = readHomeCacheV77_() || {};
          cached.dashboard = freshDashboard;
          saveHomeCacheV77_(cached);
          renderDashboardStatsV77_(freshDashboard);
        }
      })
      .withFailureHandler(function(err) {
        homeRefreshInFlightV77 = false;
        console.warn('대시보드 백그라운드 갱신 실패', err);
      })
      .refreshPortalDashboardCache();
  }, 400);
}

function renderHomeLoadSoftErrorV77_(err) {
  console.warn('HOME 데이터 조회 실패', err);
  const hasCached = renderHomeFromLocalCacheV77_();
  if (!hasCached) {
    renderDashboardStatsV77_({
      cards: [
        { label: '고객', value: '-' },
        { label: '오늘 할 일', value: '-' },
        { label: '계약 완료', value: '-' },
        { label: '재확인 필요', value: '-' }
      ]
    });
  }
}

// 기존 코드/다른 컴포넌트에서 참조할 수 있는 구버전 함수명 호환 alias
function renderDashboardStatsV46_(dashboard) { return renderDashboardStatsV77_(dashboard); }
function applyHomeDataV46_(data, saveCache) { return applyHomeDataV77_(data, saveCache); }
function renderHomeFromLocalCacheV46_() { return renderHomeFromLocalCacheV77_(); }
function readHomeCacheV46_() { return readHomeCacheV77_(); }
function saveHomeCacheV46_(data) { return saveHomeCacheV77_(data); }
function scheduleDashboardRefreshV46_(dashboard) { return scheduleDashboardRefreshV77_(dashboard); }
function renderHomeLoadSoftErrorV46_(err) { return renderHomeLoadSoftErrorV77_(err); }


// P443: HOME 수주현황
const HOME_SALES_STATUS_CACHE_KEY_P443_BASE = 'portalHomeSalesStatus:p443';
let homeSalesStatusLoadInFlightP443 = false;
let homeSalesStatusLastLoadAtP443 = 0;
let homeSalesStatusScheduledP443 = false;

function scheduleHomeSalesStatusLoadP443_() {
  if (homeSalesStatusScheduledP443) return;
  homeSalesStatusScheduledP443 = true;
  setTimeout(function() {
    homeSalesStatusScheduledP443 = false;
    loadHomeSalesStatusP443({ silent: true });
  }, 250);
}

function loadHomeSalesStatusP443(options) {
  options = options || {};
  if (!options.force && !options.skipLocal) renderHomeSalesStatusFromLocalP443_();
  const now = Date.now();
  if (homeSalesStatusLoadInFlightP443 || (!options.force && now - homeSalesStatusLastLoadAtP443 < 2500)) return;
  homeSalesStatusLoadInFlightP443 = true;
  homeSalesStatusLastLoadAtP443 = now;
  const area = document.getElementById('homeSalesStatusAreaP443');
  if (area && (options.force || !area.dataset.rendered)) {
    area.innerHTML = '<div class="loading">수주현황을 불러오는 중입니다.</div>';
  }

  google.script.run
    .withSuccessHandler(function(res) {
      homeSalesStatusLoadInFlightP443 = false;
      renderHomeSalesStatusP443_(res);
      saveHomeSalesStatusCacheP443_(res);
    })
    .withFailureHandler(function(err) {
      homeSalesStatusLoadInFlightP443 = false;
      const hasCached = renderHomeSalesStatusFromLocalP443_();
      if (!hasCached) renderHomeSalesStatusErrorP443_(err);
    })
    .getPortalHomeSalesStatus({ force: options.force === true });
}

function renderHomeSalesStatusP443_(res) {
  const area = document.getElementById('homeSalesStatusAreaP443');
  if (!area) return;
  if (!res || res.ok === false) {
    renderHomeSalesStatusErrorP443_(res && res.message ? res.message : '수주현황을 불러오지 못했습니다.');
    return;
  }
  area.dataset.rendered = 'Y';
  const sub = document.getElementById('homeSalesSubP443');
  if (sub) {
    sub.textContent = (res.title || '수주현황') + ' · ' + (res.generatedAt || '-') + (res.fromCache ? ' · 캐시' : '');
  }

  const kpis = [
    { label: '이번주 수주', data: res.thisWeek || {} },
    { label: '이번달 수주', data: res.thisMonth || {} },
    { label: '최근 30일', data: res.last30 || {} },
    { label: '누적 수주', data: res.total || {} }
  ];

  let html = '<div class="home-sales-wrap-p443">';
  html += '<div class="home-sales-kpis-p443">';
  kpis.forEach(function(k) {
    html += '<div class="home-sales-kpi-p443">';
    html += '<div class="home-sales-kpi-label-p443">' + esc(k.label) + '</div>';
    html += '<div class="home-sales-kpi-value-p443">' + esc(String(k.data.count || 0)) + '건</div>';
    html += '<div class="home-sales-kpi-money-p443">' + esc(k.data.amountText || '₩0') + '</div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="home-sales-content-p443">';
  html += '<div class="home-sales-block-p443">';
  html += '<div class="home-sales-block-title-p443">' + (res.allScope ? '담당자별 수주' : '기간별 나의 수주') + '</div>';
  html += res.allScope ? renderHomeSalesRepTableP443_(res.repSummary || []) : renderHomeSalesPeriodTableP443_(res.periodBuckets || []);
  html += '</div>';

  html += '<div class="home-sales-block-p443">';
  html += '<div class="home-sales-block-title-p443">이번주 수주 리스트</div>';
  html += renderHomeSalesListTableP443_(res.thisWeekList || [], '이번주 수주가 없습니다.');
  html += '</div>';
  html += '</div>';

  html += '<div class="home-sales-block-p443 home-sales-recent-p443">';
  html += '<div class="home-sales-block-title-p443">최근 수주 리스트</div>';
  html += renderHomeSalesListTableP443_(res.recentList || [], '수주 리스트가 없습니다.');
  html += '</div>';
  html += '</div>';

  area.innerHTML = html;
}

function renderHomeSalesRepTableP443_(rows) {
  if (!rows.length) return '<div class="home-sales-empty-p443">담당자별 수주 데이터가 없습니다.</div>';
  let html = '<div class="home-sales-table-wrap-p443"><table class="home-sales-table-p443"><thead><tr><th>담당자</th><th>누적</th><th>누적금액</th><th>이번달</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    html += '<tr>';
    html += '<td>' + esc(r.rep || '-') + '</td>';
    html += '<td class="num">' + esc(String(r.count || 0)) + '건</td>';
    html += '<td class="num">' + esc(r.amountText || '₩0') + '</td>';
    html += '<td class="num">' + esc(String(r.monthCount || 0)) + '건</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderHomeSalesPeriodTableP443_(rows) {
  if (!rows.length) return '<div class="home-sales-empty-p443">기간별 수주 데이터가 없습니다.</div>';
  let html = '<div class="home-sales-table-wrap-p443"><table class="home-sales-table-p443"><thead><tr><th>기간</th><th>건수</th><th>금액</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    html += '<tr>';
    html += '<td>' + esc(r.label || '-') + '</td>';
    html += '<td class="num">' + esc(String(r.count || 0)) + '건</td>';
    html += '<td class="num">' + esc(r.amountText || '₩0') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function renderHomeSalesListTableP443_(rows, emptyMsg) {
  if (!rows.length) return '<div class="home-sales-empty-p443">' + esc(emptyMsg || '데이터가 없습니다.') + '</div>';
  let html = '<div class="home-sales-table-wrap-p443"><table class="home-sales-table-p443 home-sales-list-table-p443"><thead><tr><th>계약일</th><th>고객사</th><th>담당</th><th>계약가</th><th>수행사</th></tr></thead><tbody>';
  rows.forEach(function(r) {
    html += '<tr>';
    html += '<td>' + esc(r.contractDate || '-') + '</td>';
    html += '<td><div class="home-sales-company-p443">' + esc(r.company || '-') + '</div><div class="home-sales-muted-p443">#' + esc(r.contractNo || '-') + ' · 고객 ' + esc(r.customerNo || '-') + '</div></td>';
    html += '<td>' + esc(r.contractRep || '-') + '</td>';
    html += '<td class="num">' + esc(r.amountText || '₩0') + '</td>';
    html += '<td>' + esc(r.vendor || '-') + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

function getHomeSalesStatusCacheKeyP443_() {
  try {
    const p = typeof getPortalPermission_ === 'function' ? getPortalPermission_() : null;
    const scope = (p && p.canUseAdminHome) ? 'ALL_ADMIN' : ('OWN_' + ((p && (p.salesRepName || p.name || p.email)) || 'USER'));
    return HOME_SALES_STATUS_CACHE_KEY_P443_BASE + ':' + String(scope).replace(/[^A-Za-z0-9가-힣_]+/g, '_');
  } catch (err) {
    return HOME_SALES_STATUS_CACHE_KEY_P443_BASE + ':UNKNOWN';
  }
}

function renderHomeSalesStatusFromLocalP443_() {
  try {
    if (typeof portalPermissionLoadedV63 !== 'undefined' && !portalPermissionLoadedV63) return false;
    const raw = localStorage.getItem(getHomeSalesStatusCacheKeyP443_());
    if (!raw) return false;
    const obj = JSON.parse(raw);
    if (!obj || !obj.ok) return false;
    obj.fromCache = true;
    renderHomeSalesStatusP443_(obj);
    return true;
  } catch (err) {
    return false;
  }
}

function saveHomeSalesStatusCacheP443_(res) {
  try {
    if (!res || !res.ok) return;
    localStorage.setItem(getHomeSalesStatusCacheKeyP443_(), JSON.stringify(res));
  } catch (err) {}
}

function renderHomeSalesStatusErrorP443_(err) {
  const area = document.getElementById('homeSalesStatusAreaP443');
  if (!area) return;
  const msg = err && err.message ? err.message : String(err || '수주현황을 불러오지 못했습니다.');
  area.innerHTML = '<div class="home-sales-error-p443">' + esc(msg) + '</div>';
}

</script>
