function ensurePortalBootOverlayP462_() {

function setPortalBootLoadingP462_(on, text, options) {

}
function finishPortalBootP462_() {

function deferPortalRouteLoadP462_(label, fn) {
  // P463: 메뉴 전환 때 전역 로딩 오버레이를 띄우지 않습니다.
  // 오버레이가 input focus와 클릭 흐름을 막고, 비동기 화면에서 무한 spinner처럼 보이는 문제가 있었습니다.
  const nonce = ++portalRouteLoadingNonceP463_;
  try { markPortalRouteLoadingP463_(label, true); } catch (e) {}
  setTimeout(function() {
    try { fn(); }
    finally {
      setTimeout(function(){
        try { if (nonce === portalRouteLoadingNonceP463_) markPortalRouteLoadingP463_(label, false); } catch(e){}
      }, 80);
    }
  }, 16);
}
function markPortalRouteLoadingP463_(label, on) {

function schedulePortalIdlePrewarmP461_() {
  const jobs = [
    function(){ try { loadCustomerFavoriteMap_({ silent: true }); } catch (err) { console.warn('고객 즐겨찾기 프리로드 실패', err); } },
    function(){ try { preloadSupportPageV57_({ silent: true }); } catch (err) { console.warn('영업지원 요청 프리로드 실패', err); } },
    function(){ try { if (typeof preloadTodayPageV57_ === 'function') preloadTodayPageV57_({ silent: true, reason: 'home-idle-prewarm' }); } catch (err) { console.warn('오늘 할 일 프리로드 실패', err); } },
    function(){ try { if (typeof preloadContractCompletePageP360_ === 'function') preloadContractCompletePageP360_({ silent: true }); } catch (err) { console.warn('계약종합관리 프리로드 실패', err); } },
    function(){ try { if (typeof preloadFocusCustomerDefaultP330_ === 'function') preloadFocusCustomerDefaultP330_({ silent: true, reason: 'home-idle-prewarm' }); } catch (err) { console.warn('중점고객관리 프리로드 실패', err); } }
  ];
  let i = 0;
  const runNext = function() {
    if (i >= jobs.length) return;
    // P462: 사용자가 이미 업무 메뉴를 누른 뒤에는 백그라운드 예열이 현재 작업을 방해하지 않도록 중단합니다.
    if (window.__portalUserNavigatedP462) return;
    // 사용자가 입력/저장 중이면 예열을 뒤로 미룹니다.
    if (document.body && document.body.classList && document.body.classList.contains('portal-user-editing')) {
      setTimeout(runNext, 2500);
      return;
    }
    const job = jobs[i++];
    const exec = function(){ try { job(); } finally { setTimeout(runNext, 3200); } };
    if (window.requestIdleCallback) requestIdleCallback(exec, { timeout: 2500 });
    else setTimeout(exec, 400);
  };
  runNext();
}

function forceMasterSearchIndexRefreshP310_() {
  if (typeof isPortalAdmin_ === 'function' && !isPortalAdmin_()) {
    alert('마스터시트 기준 강제갱신은 서무/admin 계정에서만 사용할 수 있습니다.');

  }

  const status = document.getElementById('forceMasterSearchIndexStatusP310');
  if (btn) btn.disabled = true;
  if (status) status.textContent = '영업관리대장 마스터시트를 기준으로 검색인덱스를 다시 생성하는 중입니다...';

  try { customerSearchIndexStaleDueToMasterP310 = true; } catch (err) {}

  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) btn.disabled = false;
      if (!res || !res.ok) {
        const msg = (res && res.message) || '강제갱신에 실패했습니다.';
        if (status) status.textContent = msg;
        alert(msg);
        return;
      }
      try { if (typeof invalidateCustomerSearchCaches_ === 'function') invalidateCustomerSearchCaches_({ clearIndex: true, clearDetail: true }); } catch (err) {}
      try {
        if (res.indexData && typeof setCustomerSearchIndexData_ === 'function') setCustomerSearchIndexData_(res.indexData, 'masterForce');
        else if (typeof initializeCustomerSearchIndex === 'function') initializeCustomerSearchIndex({ silent: true, useLocalFirst: false, force: true, clearDetail: true, renderAfterLoad: true });
      } catch (err) {}
      try { customerSearchIndexStaleDueToMasterP310 = false; } catch (err) {}
      try {
        if (typeof portalLastDataVersionP201 !== 'undefined' && res.indexData) {
          portalLastDataVersionP201.customerIndexVersion = res.indexData.version || portalLastDataVersionP201.customerIndexVersion;
          portalLastDataVersionP201.masterVersion = res.indexData.masterVersion || portalLastDataVersionP201.masterVersion;
          portalLastDataVersionP201.customerIndexDirty = res.indexData.dirty ? 'Y' : 'N';
          portalLastDataVersionP201.customerIndexDirtyAt = res.indexData.dirtyAt || '';
        }
      } catch (err) {}
      const message = '강제갱신 완료: ' + (res.rebuilt || 0) + '건 / 버전 ' + (res.version || '-') + ' / ' + Math.round((res.elapsedMs || 0) / 1000) + '초';

      try { toast(message); } catch (err) {}
      try {
        if (document.getElementById('customerSearchSection') && document.getElementById('customerSearchSection').classList.contains('active')) {

    })
    .withFailureHandler(function(err) {
      if (btn) btn.disabled = false;
      const msg = '강제갱신 실패: ' + (err && err.message ? err.message : String(err || ''));
      if (status) status.textContent = msg;

}

function forcePortalHomeVisibleP470_(reason) {

    ['homeSection', 'noticeSection', 'supportSection', 'activityLogSection', 'systemHealthSection', 'todaySection', 'customerSearchSection', 'customerFavoritesSection', 'focusCustomerSection', 'contractCompleteSection', 'placeholderSection'].forEach(function(id) {
      const el = document.getElementById(id);

    const home = document.getElementById('homeSection');
    if (home) home.classList.add('active');
    const pageTitle = document.getElementById('pageTitle');
    const pageSubtitle = document.getElementById('pageSubtitle');
    if (pageTitle) pageTitle.textContent = '영업전산 HOME';
    if (pageSubtitle) pageSubtitle.textContent = '새로고침 후 화면 복귀 중 오류가 발생해 HOME으로 복귀했습니다.';
    portalCurrentPageP469_ = 'home';

    try { setPortalBootLoadingP462_(false); } catch (err) {}
    console.warn('[P470] 화면 fallback HOME:', reason || '');

    console.error('[P470] HOME fallback 실패', err);
  }

function ensurePortalActiveSectionP470_(page) {

}

function safeRestorePortalPageAfterRefreshP470_(page) {

// P470: switchPage 내부 오류가 화면 전체 백지로 이어지지 않도록 최후 방어막을 둡니다.
